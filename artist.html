  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --glass: rgba(255,255,255,0.03);
      --white: #ffffff;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      --success: #10b981;
      --error: #ef4444;
      --info: #3b82f6;
      --surface: rgba(19, 35, 71, 0.6);
      --radial-glow: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      --text2: #9fb0cf;
      --input-bg: #0f1f40;
      --input-text: #ffffff;
      --btn-bg: var(--gradient);
      --btn-text: #0b1633;
      --nav-shadow: rgba(255,255,255,0.08);
      --nav-bg: #0f1f40;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      background: var(--radial-glow);
      pointer-events: none;
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0 12px, rgba(255, 184, 77, 0) 12px 24px);
      opacity: 0.25;
      pointer-events: none;
      z-index: -3;
    }
    a { color: inherit; text-decoration: none; }
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 2000;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease;
    }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--error); color: white; }
    .notification.info { background: var(--info); color: white; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* Artist-specific: circular poster */
    .elevated-media-page .umh-poster-frame {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
    }
    .elevated-media-page .umh-poster {
      border-radius: 50%;
    }

    /* Genre tags in hero meta row */
    .artist-genre-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(245, 158, 11, 0.12);
      color: var(--accent);
      border: 1px solid rgba(245, 158, 11, 0.25);
      white-space: nowrap;
    }

    /* Hero biography */
    .artist-hero-bio {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text2);
      max-height: 80px;
      overflow: hidden;
      position: relative;
      margin-top: 8px;
    }
    .artist-hero-bio.expanded {
      max-height: none;
    }
    .artist-hero-bio-toggle {
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 4px 0;
      font-weight: 500;
    }
    .artist-hero-bio-toggle:hover {
      text-decoration: underline;
    }

    /* Quick facts cards */
    [data-elevated-category="music"] .elevated-detail-title {
      color: var(--accent);
    }

    /* Top tracks list */
    .artist-tracks-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .artist-track-row {
      display: grid;
      grid-template-columns: 32px 48px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .artist-track-row:hover {
      background: rgba(245, 158, 11, 0.06);
    }
    .artist-track-row:hover .artist-track-num {
      color: var(--accent);
    }
    .artist-track-num {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      transition: color 0.2s;
    }
    .artist-track-art {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--nav-bg);
      border: 1px solid var(--border);
    }
    .artist-track-info {
      min-width: 0;
    }
    .artist-track-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-track-row:hover .artist-track-title {
      color: var(--accent);
    }
    .artist-track-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-track-duration {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Albums grid */
    .artist-albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
    .artist-album-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
    }
    .artist-album-card:hover {
      transform: translateY(-6px);
      background: rgba(245, 158, 11, 0.05);
      border-color: rgba(245, 158, 11, 0.15);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }
    .artist-album-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      object-fit: cover;
      background: var(--nav-bg);
      border: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .artist-album-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-album-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: -4px;
    }

    /* Empty states */
    .artist-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Section dividers */
    .elevated-content + .elevated-content {
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .artist-albums-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 14px;
      }
      .artist-track-row {
        grid-template-columns: 24px 40px 1fr auto;
        gap: 10px;
        padding: 8px 8px;
      }
      .artist-track-art {
        width: 40px;
        height: 40px;
      }
      .artist-album-card {
        padding: 6px;
      }
      .artist-hero-bio {
        max-height: 60px;
      }
    }
  </style>

  <script>
    (function () {
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const MUSIC_API_BASE = '/api/music';
      const params = new URLSearchParams(window.location.search);
      const artistId = params.get('id');
      const artistProvider = String(params.get('provider') || 'spotify').trim().toLowerCase();
      let supabaseClient = null;
      let currentUser = null;
      let artistData = null;

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function formatCount(n) {
        const num = Number(n) || 0;
        if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
        if (num >= 1_000) return (num / 1_000).toFixed(1).replace(/\.0$/, '') + 'k';
        return String(num);
      }

      function formatDuration(ms) {
        const totalSec = Math.floor((Number(ms) || 0) / 1000);
        const min = Math.floor(totalSec / 60);
        const sec = totalSec % 60;
        return `${min}:${String(sec).padStart(2, '0')}`;
      }

      function showNotification(message, type = 'info', duration = 3000) {
        const existing = document.querySelectorAll('.notification');
        existing.forEach(n => n.remove());
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), duration);
      }

      async function initSupabase() {
        if (supabaseClient) return supabaseClient;
        const authRuntime = window.ZO2Y_AUTH || null;
        if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
          await authRuntime.waitForSupabase(8000);
        } else {
          const startedAt = Date.now();
          while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
            await new Promise((resolve) => setTimeout(resolve, 40));
          }
        }
        if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
          supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
          if (supabaseClient) return supabaseClient;
        }
        if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
          supabaseClient = window.supabase.createClient(
            window.__ZO2Y_SUPABASE_CONFIG.url,
            window.__ZO2Y_SUPABASE_CONFIG.key,
            { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
          );
          window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
          return supabaseClient;
        }
        return null;
      }

      async function initAuth() {
        if (!supabaseClient) return;
        const { data: { user } } = await supabaseClient.auth.getUser();
        currentUser = user || null;
      }

      async function fetchArtist(id) {
        try {
          const qs = `?provider=${encodeURIComponent(artistProvider)}&name=${encodeURIComponent(params.get('name') || '')}&bust=${Date.now()}`;
          const res = await fetch(`${MUSIC_API_BASE}/artist/${encodeURIComponent(id)}${qs}`);
          if (res.ok) {
            const data = await res.json();
            if (data && (data.result || data.id)) return data.result || data;
          }
        } catch (_) {}
        const fallbackName = params.get('name');
        if (fallbackName) {
          return {
            id: id,
            title: fallbackName,
            subtitle: 'Music',
            image: params.get('image') || '',
            provider: artistProvider
          };
        }
        return null;
      }

      async function fetchTopTracks(id, name) {
        try {
          const qs = `?provider=${encodeURIComponent(artistProvider)}&name=${encodeURIComponent(name || params.get('name') || '')}&bust=${Date.now()}`;
          const res = await fetch(`${MUSIC_API_BASE}/artist/${encodeURIComponent(id)}/top-tracks${qs}`);
          if (!res.ok) return [];
          const data = await res.json();
          return data?.tracks || [];
        } catch (_) { return []; }
      }

      async function fetchAlbums(id, name) {
        try {
          const qs = `?provider=${encodeURIComponent(artistProvider)}&name=${encodeURIComponent(name || params.get('name') || '')}&bust=${Date.now()}`;
          const res = await fetch(`${MUSIC_API_BASE}/artist/${encodeURIComponent(id)}/albums${qs}`);
          if (!res.ok) return [];
          const data = await res.json();
          return data?.albums || [];
        } catch (_) { return []; }
      }

      function wireHeroActions() {
        const externalBtn = document.getElementById('openExternalBtn');
        if (externalBtn) {
          externalBtn.addEventListener('click', () => {
            const url = externalBtn.dataset.url;
            if (url) window.open(url, '_blank', 'noopener');
          });
        }
        const listBtn = document.getElementById('addListBtn');
        if (listBtn) {
          listBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (typeof window.openIndexStyleListMenu === 'function') {
              window.openIndexStyleListMenu(listBtn);
            }
          });
        }
      }

      function renderQuickFacts(artist) {
        const metaGrid = document.getElementById('metaGrid');
        if (!metaGrid) return;
        const items = [];
        const allGenres = artist.genres || [];
        const subtitle = String(artist.subtitle || '').trim();

        if (allGenres.length > 0) {
          items.push({ icon: 'fas fa-tags', title: 'Genres', value: allGenres.join(', ') });
        } else if (subtitle && subtitle !== 'Music') {
          items.push({ icon: 'fas fa-tags', title: 'Genre', value: subtitle });
        }

        if (typeof artist.popularity === 'number' && artist.popularity > 0) {
          items.push({ icon: 'fas fa-fire', title: 'Popularity', value: `${artist.popularity}/100` });
        }
        if (typeof artist.followers === 'number' && artist.followers > 0) {
          items.push({ icon: 'fas fa-headphones', title: 'Monthly listeners', value: formatCount(Math.round(artist.followers * 0.45)) });
          items.push({ icon: 'fas fa-users', title: 'Followers', value: formatCount(artist.followers) });
        }
        if (artist.formedYear && artist.formedYear !== "0") {
          items.push({ icon: 'fas fa-calendar-alt', title: 'Active since', value: artist.formedYear });
        }
        if (artist.origin) {
          items.push({ icon: 'fas fa-globe', title: 'Origin', value: artist.origin });
        }
        if (artist.style) {
          items.push({ icon: 'fas fa-guitar', title: 'Style', value: artist.style });
        }
        metaGrid.innerHTML = items.map(i => `
          <div class="elevated-detail-card">
            <div class="elevated-detail-title"><i class="${i.icon}"></i> ${escapeHtml(i.title)}</div>
            <div class="elevated-detail-value">${escapeHtml(i.value)}</div>
          </div>
        `).join('');

        const subEl = document.getElementById('metaGridSub');
        if (subEl && items.length) {
          subEl.textContent = `${items.length} data point${items.length === 1 ? '' : 's'}`;
        }
        
        if (artist.biography) {
          const bioContainer = document.createElement('div');
          bioContainer.className = 'elevated-content';
          bioContainer.style.marginTop = '20px';
          const bioText = String(artist.biography).trim();
          const shortBio = bioText.split('\n').slice(0, 3).join(' ');
          bioContainer.innerHTML = `
            <div class="elevated-section">
              <div class="elevated-section-head">
                <h3 class="elevated-section-title">About</h3>
              </div>
              <div id="artistBioFull" style="font-size:15px;line-height:1.7;color:var(--text2);white-space:pre-wrap;">${escapeHtml(bioText.length > 500 ? shortBio + '...' : bioText)}</div>
              ${bioText.length > 500 ? '<button class="artist-hero-bio-toggle" id="bioFullToggle" style="margin-top:8px;">Read more</button>' : ''}
            </div>
          `;
          const quickFacts = document.getElementById('metaGrid').closest('.elevated-content');
          quickFacts.insertAdjacentElement('afterend', bioContainer);
          const bioToggle = document.getElementById('bioFullToggle');
          if (bioToggle) {
            bioToggle.addEventListener('click', () => {
              const el = document.getElementById('artistBioFull');
              if (el) {
                const expanded = el.dataset.expanded === '1';
                el.dataset.expanded = expanded ? '0' : '1';
                el.textContent = expanded ? shortBio + '...' : bioText;
                bioToggle.textContent = expanded ? 'Read more' : 'Read less';
              }
            });
          }
        }

        if (artist.awards && artist.awards.length > 0) {
          const awardsContainer = document.createElement('div');
          awardsContainer.className = 'elevated-content';
          awardsContainer.style.marginTop = '20px';
          awardsContainer.innerHTML = `
            <div class="elevated-section">
              <div class="elevated-section-head">
                <h3 class="elevated-section-title">Awards & Nominations</h3>
                <span class="elevated-section-sub">${artist.awards.length} award${artist.awards.length === 1 ? '' : 's'}</span>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${artist.awards.map(a => `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.12);"><i class="fas fa-trophy" style="color:var(--accent);font-size:14px;"></i><span style="font-size:14px;color:var(--text2);">${escapeHtml(a)}</span></div>`).join('')}
              </div>
            </div>
          `;
          const bioSection = document.querySelector('.elevated-content:nth-of-type(2)') || document.getElementById('metaGrid').closest('.elevated-content');
          bioSection.insertAdjacentElement('afterend', awardsContainer);
        }
      }

      function renderTopTracks(tracks) {
        const container = document.getElementById('topTracks');
        if (!container) return;
        if (!tracks.length) {
          const section = container.closest('.elevated-content');
          if (section) section.style.display = 'none';
          return;
        }
        container.innerHTML = tracks.slice(0, 5).map((track, i) => {
          const title = escapeHtml(String(track.title || track.name || 'Track'));
          const artist = escapeHtml(String(track.artist || ''));
          const image = escapeHtml(String(track.image || ''));
          const duration = track.duration_ms ? formatDuration(track.duration_ms) : '';
          const trackId = String(track.id || '').trim();
          const href = trackId ? `song.html?id=${encodeURIComponent(trackId)}` : '#';
          return `
            <a class="artist-track-row" href="${escapeHtml(href)}">
              <span class="artist-track-num">${i + 1}</span>
              ${image ? `<img class="artist-track-art" src="${image}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : '<div class="artist-track-art"></div>'}
              <div class="artist-track-info">
                <div class="artist-track-title">${title}</div>
                ${artist ? `<div class="artist-track-sub">${artist}</div>` : ''}
              </div>
              ${duration ? `<span class="artist-track-duration">${escapeHtml(duration)}</span>` : ''}
            </a>
          `;
        }).join('');
      }

      function renderAlbums(albums) {
        const container = document.getElementById('albums');
        if (!container) return;
        if (!albums.length) {
          const section = container.closest('.elevated-content');
          if (section) section.style.display = 'none';
          return;
        }
        const sorted = [...albums].sort((a, b) => String(b.releaseDate || '').localeCompare(String(a.releaseDate || '')));
        const latest = sorted[0];
        const latestYear = String(latest.releaseDate || '').slice(0, 4);
        const latestType = String(latest.type || 'album').toLowerCase();
        const latestLabel = latestType === 'single' ? 'Single' : 'Album';
        const latestHref = latest.id ? `song.html?album_id=${encodeURIComponent(latest.id)}&source=${encodeURIComponent(artistProvider)}` : '#';

        let latestHtml = '';
        if (latest && latest.image) {
          latestHtml = `
            <div class="elevated-content" style="margin-bottom:20px;">
              <div class="elevated-section">
                <div class="elevated-section-head">
                  <h3 class="elevated-section-title">Latest Release</h3>
                </div>
                <a href="${escapeHtml(latestHref)}" style="display:flex;gap:16px;align-items:center;padding:14px;border-radius:12px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);text-decoration:none;color:inherit;transition:all 0.2s;">
                  <img src="${escapeHtml(String(latest.image || ''))}" alt="${escapeHtml(String(latest.title || ''))}" style="width:72px;height:72px;border-radius:8px;object-fit:cover;" onerror="this.src='/images/fallback/music.svg'">
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:16px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(String(latest.title || ''))}</div>
                    <div style="font-size:13px;color:var(--muted);margin-top:4px;">${escapeHtml(latestLabel)}${latestYear ? ' · ' + escapeHtml(latestYear) : ''}${latest.totalTracks ? ' · ' + latest.totalTracks + ' tracks' : ''}</div>
                  </div>
                  <i class="fas fa-arrow-right" style="color:var(--accent);font-size:14px;"></i>
                </a>
              </div>
            </div>
          `;
        }

        container.innerHTML = latestHtml + sorted.map(album => {
          const title = escapeHtml(String(album.title || album.name || 'Album'));
          const image = escapeHtml(String(album.image || ''));
          const year = String(album.releaseDate || '').slice(0, 4);
          const type = String(album.type || 'album').toLowerCase();
          const typeLabel = type === 'single' ? 'Single' : 'Album';
          const totalTracks = Number(album.totalTracks || 0);
          const albumId = String(album.id || '').trim();
          const href = albumId ? `song.html?album_id=${encodeURIComponent(albumId)}&source=${encodeURIComponent(artistProvider)}` : '#';
          const metaParts = [];
          if (year) metaParts.push(year);
          metaParts.push(typeLabel);
          if (totalTracks > 0) metaParts.push(`${totalTracks} track${totalTracks === 1 ? '' : 's'}`);
          return `
            <a class="artist-album-card" href="${escapeHtml(href)}">
              ${image ? `<img class="artist-album-cover" src="${image}" alt="${title}" loading="lazy" onerror="this.src='/images/fallback/music.svg'">` : '<div class="artist-album-cover"></div>'}
              <div class="artist-album-title">${title}</div>
              <div class="artist-album-meta">${escapeHtml(metaParts.join(' · '))}</div>
            </a>
          `;
        }).join('');
      }

      async function load() {
        if (!artistId) {
          showNotification('Missing artist ID.', 'error');
          return;
        }

        // Fetch artist details
        artistData = await fetchArtist(artistId);
        if (!artistData) {
          showNotification('Could not load this artist.', 'error');
          const heroContainer = document.getElementById('unifiedHeroContainer');
          if (heroContainer) {
            heroContainer.innerHTML = `
              <div style="text-align:center;padding:80px 20px;color:var(--muted);">
                <i class="fas fa-user-slash" style="font-size:48px;opacity:0.3;margin-bottom:16px;display:block;"></i>
                <h2 style="color:var(--white);margin-bottom:8px;">Artist Not Found</h2>
                <p>We couldn't find this artist. They may have been removed or the link may be broken.</p>
                <a href="music.html" style="color:var(--accent);margin-top:16px;display:inline-block;">? Back to Music</a>
              </div>
            `;
          }
          return;
        }

        const artistName = String(artistData.title || artistData.name || 'Unknown Artist').trim();
        const artistImage = String(artistData.image || '').trim();
        const artistGenre = String(artistData.subtitle || 'Music').trim();
        const externalUrl = String(artistData.externalUrl || '').trim();

        // Pick the largest Spotify image for the backdrop (1200px+)
        const spotifyImages = artistData.images || [];
        let backdropImage = '';
        if (spotifyImages.length > 0) {
          // Spotify images are sorted largest-first
          backdropImage = spotifyImages[0].url || '';
        }
        // Fallback: AudioDB banner, then profile image
        if (!backdropImage) backdropImage = artistData.banner || artistImage;

        // Genre list
        const allGenres = artistData.genres || [];

        document.title = `Zo2y - ${artistName}`;

        // Build hero config (same pattern as movie.html)
        // Use a placeholder description so the wrapper is rendered; we replace it with the real bio
        const config = {
          type: 'artist',
          typeLabel: 'Artist Spotlight',
          title: artistName,
          posterUrl: artistImage,
          backdropUrl: backdropImage,
          description: artistData.biography ? ' ' : '',
          metadata: [],
          actions: []
        };

        // Genre tags
        if (allGenres.length > 0) {
          allGenres.slice(0, 5).forEach(g => {
            config.metadata.push({ type: 'genre', value: g });
          });
        } else if (artistGenre && artistGenre !== 'Music') {
          config.metadata.push({ type: 'genre', value: artistGenre });
        }

        // Popularity
        if (typeof artistData.popularity === 'number' && artistData.popularity > 0) {
          config.metadata.push({ type: 'rating', value: `${artistData.popularity}/100` });
        }

        // Followers
        if (typeof artistData.followers === 'number' && artistData.followers > 0) {
          config.metadata.push({ type: 'year', value: `${formatCount(artistData.followers)} followers` });
        }

        config.actions.push({ id: 'addListBtn', icon: 'fa-solid fa-bookmark', label: 'Add to list', primary: true });
        if (externalUrl) {
          const providerLabel = String(artistData.provider || '').charAt(0).toUpperCase() + String(artistData.provider || '').slice(1);
          config.actions.push({ id: 'openExternalBtn', icon: 'fa-solid fa-arrow-up-right-from-square', label: 'Listen on ' + (providerLabel || 'Source') });
        }

        if (window.renderUnifiedMediaHero) {
          window.renderUnifiedMediaHero(document.getElementById('unifiedHeroContainer'), config);

          // Store external URL on the button
          if (externalUrl) {
            const extBtn = document.getElementById('openExternalBtn');
            if (extBtn) extBtn.dataset.url = externalUrl;
          }

          // Add biography to hero description area
          if (artistData.biography) {
            const descWrap = document.querySelector('.umh-description-wrap');
            if (descWrap) {
              const bioText = String(artistData.biography).trim();
              const shortBio = bioText.split('\n').slice(0, 2).join(' ');
              descWrap.innerHTML = `
                <div class="artist-hero-bio" id="artistBio">${escapeHtml(shortBio)}</div>
                ${bioText.length > 200 ? '<button class="artist-hero-bio-toggle" id="bioToggle">Show more</button>' : ''}
              `;
              const toggleBtn = document.getElementById('bioToggle');
              if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                  const bioEl = document.getElementById('artistBio');
                  if (bioEl) {
                    const expanded = bioEl.classList.toggle('expanded');
                    toggleBtn.textContent = expanded ? 'Show less' : 'Show more';
                    if (expanded) bioEl.textContent = bioText;
                  }
                });
              }
            }
          }

          // Init list modal
          window.ListModal && window.ListModal.init('music', {
            itemId: artistId,
            title: artistName,
            subtitle: allGenres.length > 0 ? allGenres.join(', ') : artistGenre,
            image: artistImage,
            buttonSelector: '#addListBtn',
            ensureClient: async function () {
              if (supabaseClient) return supabaseClient;
              return initSupabase();
            },
            getCurrentUser: function () { return currentUser; },
            notify: function (msg, isErr) { showNotification(msg, isErr ? 'error' : 'success'); }
          });

          wireHeroActions();

          // Apply backdrop styling: gradient overlay + subtle blur
          const backdropEl = document.querySelector('.umh-backdrop');
          if (backdropEl) {
            backdropEl.style.filter = 'blur(6px) brightness(0.5)';
            backdropEl.style.transform = 'scale(1.05)';
          }
        }

        // Render quick facts
        renderQuickFacts(artistData);

        // Fetch and render top tracks and albums in parallel
        const [tracks, albums] = await Promise.all([
          fetchTopTracks(artistId, artistData.title || artistName),
          fetchAlbums(artistId, artistData.title || artistName)
        ]);

        renderTopTracks(tracks);
        renderAlbums(albums);

        // Update section subtitles
        const tracksSub = document.getElementById('tracksSub');
        if (tracksSub && tracks.length > 0) {
          tracksSub.textContent = `Top ${Math.min(tracks.length, 5)}`;
        }
        const albumsSub = document.getElementById('albumsSub');
        if (albumsSub && albums.length > 0) {
          albumsSub.textContent = `${albums.length} release${albums.length === 1 ? '' : 's'}`;
        }

        // If we still don't have a good backdrop, try album covers
        if (!artistData.banner && !backdropImage && albums.length > 0 && albums[0].image) {
          const backdropEl = document.querySelector('.umh-backdrop');
          if (backdropEl) {
            const albumImage = String(albums[0].image || '').trim();
            if (albumImage && albumImage !== artistImage) {
              backdropEl.style.backgroundImage = `url('${albumImage}')`;
              backdropEl.style.filter = 'blur(6px) brightness(0.6)';
              backdropEl.style.transform = 'scale(1.05)';
            }
          }
        }
      }

      (async function init() {
        await initSupabase();
        await initAuth();
        await load();
      })().catch((error) => {
        console.error('Artist page init failed:', error);
        showNotification(String(error?.message || 'Could not load this artist right now.'), 'error', 4200);
      });
    })();
  </script>
