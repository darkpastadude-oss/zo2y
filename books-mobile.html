  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {
        var GOOGLE_BOOKS_PROXY_BASE = '/api/books';
        var API_PAGE_SIZE = 40;
        var supabaseClient = null;
        var currentUser = null;
        var searchDebounceTimer = null;
        var activeRequestController = null;
        var BOOKS_PAGE_SIZE = 18;

        var BOOK_GENRES = [
          'Fiction', 'Non-fiction', 'Fantasy', 'Thriller', 'Romance',
          'Science Fiction', 'Mystery', 'Horror', 'Biography', 'History',
          'Self-Help', 'Science', 'Young Adult', 'Classics', 'Poetry',
          'Drama', 'Humor', 'Travel'
        ];

        var state = {
          books: [],
          search: '',
          genre: '',
          sort: 'popular',
          page: 1,
          totalPages: 1,
          listStatusMap: new Map(),
          pendingQuickOps: new Set()
        };

        function escapeHtml(value) {
          return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function showToast(message, isError) {
          var el = document.createElement('div');
          el.style.position = 'fixed'; el.style.top = '12px'; el.style.right = '12px';
          el.style.zIndex = '9999'; el.style.background = isError ? '#dc2626' : '#f59e0b';
          el.style.color = '#fff'; el.style.padding = '8px 12px';
          el.style.borderRadius = '8px'; el.style.fontSize = '12px';
          el.textContent = message;
          document.body.appendChild(el);
          setTimeout(function () { el.remove(); }, 2000);
        }

        function computeGridPageSize() {
          var grid = document.getElementById('booksGrid');
          if (!grid) return 18;
          try {
            var cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;
            return cols * 3;
          } catch (_) { return 18; }
        }

        function initFilters() {
          var genreSelect = document.getElementById('genre');
          if (genreSelect) {
            BOOK_GENRES.forEach(function (g) {
              var opt = document.createElement('option');
              opt.value = g.toLowerCase();
              opt.textContent = g;
              genreSelect.appendChild(opt);
            });
          }
        }

        function shuffleArray(array) {
          var arr = array.slice();
          for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = arr[i];
            arr[i] = arr[j];
            arr[j] = tmp;
          }
          return arr;
        }

        async function loadBooks() {
          var query = String(state.search || '').trim();

          if (activeRequestController) activeRequestController.abort();
          activeRequestController = new AbortController();
          var signal = activeRequestController.signal;

          BOOKS_PAGE_SIZE = computeGridPageSize();

          var allBooks = [];
          var booksMap = {};

          function addBooks(batch) {
            (batch || []).forEach(function (b) {
              var id = String(b.id || '').trim();
              if (id && !booksMap[id]) {
                booksMap[id] = true;
                allBooks.push(b);
              }
            });
          }

          try {
            if (!query) {
              var popUrl = GOOGLE_BOOKS_PROXY_BASE + '/popular?limit=' + API_PAGE_SIZE + '&page=1&language=en' + (state.genre ? '&subject=' + encodeURIComponent(state.genre) : '');
              var popRes = await fetch(popUrl, { signal: signal });
              if (popRes.ok) {
                var popJson = await popRes.json();
                addBooks(Array.isArray(popJson?.books) ? popJson.books : []);
              }
              var popUrl2 = GOOGLE_BOOKS_PROXY_BASE + '/popular?limit=' + API_PAGE_SIZE + '&page=2&language=en' + (state.genre ? '&subject=' + encodeURIComponent(state.genre) : '');
              var popRes2 = await fetch(popUrl2, { signal: signal });
              if (popRes2.ok) {
                var popJson2 = await popRes2.json();
                addBooks(Array.isArray(popJson2?.books) ? popJson2.books : []);
              }
              allBooks = shuffleArray(allBooks);
              if (state.sort === 'name') {
                allBooks.sort(function (a, b) { return (a.title || '').localeCompare(b.title || ''); });
              } else if (state.sort === 'released') {
                allBooks.sort(function (a, b) { return (b.year || 0) - (a.year || 0); });
              }
            } else {
              var searchQuery = query + (state.genre ? ' subject:' + state.genre : '');
              var url = GOOGLE_BOOKS_PROXY_BASE + '/search?q=' + encodeURIComponent(searchQuery) + '&limit=' + API_PAGE_SIZE + '&page=1&language=en&orderBy=relevance';
              var res = await fetch(url, { signal: signal });
              if (res.ok) {
                var json = await res.json();
                addBooks(Array.isArray(json?.books) ? json.books : []);
              }
            }
          } catch (err) {
            if (err?.name === 'AbortError') return;
          }

          if (signal.aborted) return;

          state.totalPages = Math.max(1, Math.ceil(allBooks.length / BOOKS_PAGE_SIZE));
          state.books = allBooks.slice((state.page - 1) * BOOKS_PAGE_SIZE, state.page * BOOKS_PAGE_SIZE);
          renderGrid();
        }

        async function ensureSupabase() {
          if (supabaseClient) return supabaseClient;
          var authRuntime = window.ZO2Y_AUTH || null;
          if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
            await authRuntime.waitForSupabase(8000);
          } else {
            var startedAt = Date.now();
            while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
              await new Promise(function (resolve) { setTimeout(resolve, 40); });
            }
          }
          if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
            supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
            if (supabaseClient) return supabaseClient;
          }
          if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
            supabaseClient = window.supabase.createClient(
              window.__ZO2Y_SUPABASE_CONFIG.url,
              window.__ZO2Y_SUPABASE_CONFIG.key,
              { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
            );
            window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
            return supabaseClient;
          }
          return null;
        }

        async function initAuthUi() {
          var client = await ensureSupabase();
          if (!client) return;
          var loginBtn = document.getElementById('loginBtn');
          var signupBtn = document.getElementById('signupBtn');
          var profileBtn = document.getElementById('profileBtn');
          var result = await client.auth.getUser();
          currentUser = result?.data?.user || null;
          if (currentUser) {
            if (loginBtn) loginBtn.style.display = 'none';
            if (signupBtn) signupBtn.style.display = 'none';
            if (profileBtn) {
              profileBtn.style.display = 'inline-flex';
              profileBtn.innerHTML = '<i class="fas fa-user"></i>';
            }
          } else {
            if (loginBtn) loginBtn.style.display = 'inline-flex';
            if (signupBtn) signupBtn.style.display = 'inline-flex';
            if (profileBtn) profileBtn.style.display = 'none';
          }
        }

        async function loadListStatus() {
          state.listStatusMap = new Map();
          if (!currentUser?.id || !state.books.length) return;
          var client = await ensureSupabase();
          if (!client) return;
          var ids = state.books.map(function (b) { return b.id; }).filter(Boolean);
          if (!ids.length) return;
          var result = await client.from('book_list_items')
            .select('book_id, list_type')
            .eq('user_id', currentUser.id)
            .in('book_id', ids);
          (result?.data || []).forEach(function (row) {
            var id = String(row.book_id || '');
            if (!id) return;
            if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, read: false, toread: false });
            var bucket = state.listStatusMap.get(id);
            if (row.list_type in bucket) bucket[row.list_type] = true;
          });
        }

        function getBookListStatus(bookId) {
          var id = String(bookId || '').trim();
          var empty = { favorites: false, read: false, toread: false };
          if (!id) return empty;
          if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { ...empty });
          return state.listStatusMap.get(id);
        }

        function renderGrid() {
          var grid = document.getElementById('booksGrid');
          if (!grid) return;
          if (!state.books.length) {
            grid.innerHTML = '<div class="empty">No books found.</div>';
            updatePagination();
            return;
          }
          grid.innerHTML = state.books.map(function (book) {
            var coverUrl = book.cover || book.coverUrl || '/images/fallback/book.svg';
            var year = book.year ? String(book.year) : '';
            var author = book.author || book.authors || 'Unknown Author';
            return '<article class="card" data-id="' + escapeHtml(book.id) + '">'
              + '<div class="card-media">'
              + '<img src="' + escapeHtml(coverUrl) + '" alt="' + escapeHtml(book.title) + '" loading="lazy" onerror="this.onerror=null; this.parentNode.innerHTML=\'<div class=\\\\\'card-media-fallback\\\\\'><i class=\\\\\'fa-solid fa-book\\\\\'></i></div>\';">'
              + '</div>'
              + '<div class="card-meta">'
              + '<span class="card-type"><i class="fa-solid fa-book"></i> Book</span>'
              + '<div class="card-meta-top"><p class="card-title">' + escapeHtml(book.title) + '</p></div>'
              + '<p class="card-sub">' + escapeHtml(author) + '</p>'
              + '<p class="card-extra">' + (year ? escapeHtml(year) : '') + '</p>'
              + '<div class="card-actions">'
              + '<button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>'
              + '</div></div></article>';
          }).join('');
          wireGridActions();
          updatePagination();
        }

        function updatePagination() {
          var prevBtn = document.getElementById('prevPageBtn');
          var nextBtn = document.getElementById('nextPageBtn');
          var info = document.getElementById('pageInfo');
          if (state.page > state.totalPages) state.page = state.totalPages;
          if (state.page < 1) state.page = 1;
          if (prevBtn) prevBtn.disabled = state.page <= 1;
          if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
          if (info) info.textContent = 'Page ' + state.page + ' of ' + state.totalPages;
        }

        async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
          var bookId = String(itemId || '').trim();
          if (!bookId) return { ok: false, saved: false };
          var book = state.books.find(function (r) { return String(r.id || '').trim() === bookId; });
          if (!book) return { ok: false, saved: false };
          var client = await ensureSupabase();
          if (!client || !currentUser?.id) { window.location.href = 'login.html'; return { ok: false, saved: false }; }
          var status = getBookListStatus(bookId);
          if (!(listType in status)) return { ok: false, saved: false };
          var previousSaved = !!status[listType];
          var nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
          var opKey = bookId + ':' + listType;
          if (state.pendingQuickOps.has(opKey)) return { ok: false, saved: previousSaved };
          state.pendingQuickOps.add(opKey);
          status[listType] = nextSaved;
          try {
            if (nextSaved) {
              var res = await client.from('book_list_items').insert({ user_id: currentUser.id, book_id: bookId, list_type: listType });
              if (res.error && String(res.error.code || '') !== '23505') throw res.error;
              showToast('Added to list');
            } else {
              var delRes = await client.from('book_list_items').delete().eq('user_id', currentUser.id).eq('book_id', bookId).eq('list_type', listType);
              if (delRes.error) throw delRes.error;
              showToast('Removed from list');
            }
            return { ok: true, saved: nextSaved };
          } catch (error) {
            status[listType] = previousSaved;
            showToast('Could not update list', true);
            return { ok: false, saved: previousSaved };
          } finally {
            state.pendingQuickOps.delete(opKey);
          }
        }

        function wireGridActions() {
          document.querySelectorAll('.menu-btn').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
              e.stopPropagation();
              var card = btn.closest('.card');
              if (!card) return;
              if (typeof window.openIndexStyleListMenu === 'function') window.openIndexStyleListMenu(card);
            });
          });
          document.querySelectorAll('.card').forEach(function (card) {
            card.addEventListener('click', function (e) {
              if (e.target.closest('.menu-btn')) return;
              var id = String(card.getAttribute('data-id') || '').trim();
              if (!id) return;
              window.location.href = 'book.html?id=' + encodeURIComponent(id);
            });
          });
        }

        function debounceSearch(query) {
          if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
          searchDebounceTimer = setTimeout(async function () {
            state.search = query;
            state.page = 1;
            await loadBooks();
            await loadListStatus();
            renderGrid();
          }, 400);
        }

        async function executeSearch(query) {
          if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
          state.search = query;
          state.page = 1;
          await loadBooks();
          await loadListStatus();
          renderGrid();
        }

        async function loadPage() {
          try {
            await initAuthUi();
            await loadBooks();
            await loadListStatus();
            renderGrid();
          } catch (_err) {
            var grid = document.getElementById('booksGrid');
            if (grid) grid.innerHTML = '<div class="empty">Books feed unavailable right now.</div>';
          }
        }

        var qInput = document.getElementById('q');
        var clearBtn = document.getElementById('booksClearBtn');
        if (qInput && clearBtn) {
          qInput.addEventListener('input', function (e) {
            var query = String(e.target.value || '').trim();
            clearBtn.classList.toggle('show', !!query);
            debounceSearch(query);
          });
          qInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
              executeSearch(String(e.target.value || '').trim());
            }
          });
          clearBtn.addEventListener('click', function () {
            qInput.value = '';
            clearBtn.classList.remove('show');
            if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
            executeSearch('');
          });
        }

        document.getElementById('booksSearchBtn')?.addEventListener('click', async function () {
          var query = String(document.getElementById('q')?.value || '').trim();
          if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
          executeSearch(query);
        });

        document.getElementById('booksFilterBtn')?.addEventListener('click', function () {
          document.getElementById('booksFilterModal')?.classList.add('show');
        });
        document.getElementById('booksFilterCloseBtn')?.addEventListener('click', function () {
          document.getElementById('booksFilterModal')?.classList.remove('show');
        });
        document.getElementById('genre')?.addEventListener('change', function (e) {
          state.genre = String(e.target.value || '').trim();
        });
        document.getElementById('sort')?.addEventListener('change', function (e) {
          state.sort = String(e.target.value || 'popular').trim();
        });
        document.getElementById('refresh')?.addEventListener('click', async function () {
          document.getElementById('booksFilterModal')?.classList.remove('show');
          state.page = 1;
          await loadBooks();
          await loadListStatus();
          renderGrid();
        });
        document.getElementById('prevPageBtn')?.addEventListener('click', async function () {
          if (state.page <= 1) return;
          state.page -= 1;
          await loadBooks();
          await loadListStatus();
          renderGrid();
        });
        document.getElementById('nextPageBtn')?.addEventListener('click', async function () {
          if (state.page >= state.totalPages) return;
          state.page += 1;
          await loadBooks();
          await loadListStatus();
          renderGrid();
        });

        if (window.initUniversalSearch) {
          var initSearch = function () {
            window.initUniversalSearch({ input: '#globalSearch', fallbackRoute: 'books.html' });
          };
          if (typeof window.requestIdleCallback === 'function') {
            window.requestIdleCallback(initSearch, { timeout: 1500 });
          } else {
            window.setTimeout(initSearch, 0);
          }
        }

        if (window.initIndexStyleListMenu) {
          window.initIndexStyleListMenu({
            mediaType: 'book',
            itemIdAttr: 'data-id',
            getVisibleItemIds: function () {
              return Array.from(document.querySelectorAll('.card[data-id]')).map(function (c) { return c.getAttribute('data-id'); }).filter(Boolean);
            },
            getQuickStatusForItem: function (itemId) {
              var key = String(itemId || '').trim();
              var status = state.listStatusMap.get(key);
              return status ? { ...status } : null;
            },
            ensureClient: async function () {
              if (supabaseClient) return supabaseClient;
              await ensureSupabase();
              return supabaseClient;
            },
            getCurrentUser: function () { return currentUser; },
            notify: function (message, isError) { showToast(message, !!isError); },
            toggleDefaultList: async function (opts) { return toggleDefaultList(opts.itemId, opts.listType, opts.card, opts.nextSaved); }
          });
        }

        initFilters();
        loadPage();
      });
    })();
  </script>
  <script src="js/production-runtime.js?v=20260602a" defer></script>
</body>
