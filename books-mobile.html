  <style>
    :root {
      --category-hero-image: url("https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=800&q=80");
    }
    .container { width: calc(100% - 16px); margin: 0 auto; }
    .page-shell { margin-top: 14px; display: grid; gap: 12px; padding-bottom: 18px; }
    .hero { display: none !important; }

    .books-shell { gap: 12px; }
    .books-shell .books-discover-wrap { display: grid; gap: 12px; }
    .books-shell .book-section { border-radius: 16px; box-shadow: 0 10px 28px rgba(0,0,0,0.22); }
    .books-shell .book-section .section-head { padding: 12px 14px; }
    .books-shell .book-section .section-head h2 { font-size: 18px; }
    .books-shell .book-section .section-head p { font-size: 12px; }
    .books-shell .book-section .grid.book-grid {
      padding: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .books-shell .card { border-radius: 12px; min-height: 260px; }
    .books-shell .card-media { background: linear-gradient(135deg, #102545 0%, #0b1c35 100%); }
    .books-shell .card-media img { object-fit: cover; display: block; }
    .books-shell .card-meta { padding: 2px; }
    .books-shell .card-title { font-size: 13px; line-height: 1.25; }
    .books-shell .card-sub { font-size: 11px; }
    .books-shell .card-extra { font-size: 10px; }

    .books-shell .controls {
      grid-template-columns: minmax(0, 1fr) 52px 52px;
      gap: 10px;
    }
    .books-shell .controls input,
    .books-shell .controls select { height: 52px; }
    .books-shell .controls button,
    .books-shell .pager button { height: 52px; }
    .books-shell .control-icon-btn { width: 52px; }
    .books-shell .search-input-wrap input { padding-right: 44px; }

    .books-shell #booksFlatSection .pagination {
      padding: 10px 14px 14px;
      gap: 10px;
    }
    .books-shell #booksFlatSection .page-btn { min-width: 40px; height: 34px; }
    .books-shell #booksFlatSection .page-info { font-size: 12px; }

    .books-shell .book-empty-state { padding: 36px 16px; }
    .books-shell .book-empty-state i { font-size: 32px; }
    .books-shell .book-empty-state h3 { font-size: 16px; }
    .books-shell .book-empty-state p { font-size: 12px; }

    .books-shell .books-mode-tab { padding: 6px 14px; font-size: 12px; }
    .books-shell .books-genre-chip { padding: 4px 11px; font-size: 11px; }
    .books-shell .books-genre-chips { gap: 5px; }
    .books-shell .section-more-btn { height: 30px; padding: 0 10px; font-size: 11px; }
    .books-shell .card-edition-badge { font-size: 9px; padding: 2px 7px; top: 6px; right: 6px; }

    .books-shell .filter-modal-card { width: calc(100% - 24px); max-width: 380px; }
    .books-shell .filter-year-group input { height: 44px; font-size: 13px; }
  </style>

<body>
  <header class="zo2y-shared-header" role="banner" data-shared-header="1">
    <div class="zo2y-shared-header-inner">
      <a class="zo2y-shared-brand" href="index.html" aria-label="Home">
        <img src="/file.svg" alt="Logo" decoding="async" />
      </a>
      <div class="nav-search zo2y-shared-search">
        <input id="globalSearch" class="nav-search-input zo2y-shared-search-input" type="search" placeholder="Search..." aria-label="Search" />
        <button id="globalSearchBtn" class="nav-search-btn zo2y-shared-search-btn" type="button" aria-label="Search"><i class="fas fa-search"></i></button>
        <div id="globalSearchSuggest" class="search-suggest zo2y-shared-suggest"></div>
      </div>
      <div class="zo2y-shared-auth">
        <a class="zo2y-shared-btn" href="login.html" id="loginBtn">Login</a>
        <a class="zo2y-shared-btn zo2y-shared-btn-primary" href="sign-up.html" id="signupBtn">Sign Up</a>
        <a class="zo2y-shared-btn hidden" href="profile.html" id="profileBtn">Profile</a>
      </div>
    </div>
  </header>

  <main class="container page-shell">
    <section class="hero">
      <h1>books</h1>
      <p>Discover trending books across all genres and save them to your book lists.</p>
      <div class="mt-2 text-xs text-muted opacity-86">sources: Google Books + Open Library. <a href="credits.html" class="text-accent">all credits</a></div>
      <div class="hero-actions">
        <!-- Refresh removed -->
      </div>
    </section>
    <section class="controls">
      <div class="books-search-wrap">
        <input id="q" class="search-input" placeholder="Search books, authors, genres...">
        <button id="booksClearSearchBtn" class="books-clear-btn" type="button" aria-label="Clear search"><i class="fas fa-times"></i></button>
      </div>
      <button id="booksSearchBtn" class="control-icon-btn" type="button" aria-label="Search books"><i class="fas fa-search"></i></button>
      <button id="booksFilterBtn" class="control-icon-btn" type="button" aria-label="Open book filters"><i class="fas fa-sliders-h"></i></button>
    </section>
    <div class="control-modal" id="booksFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter books</div>
          <button class="control-modal-close" id="booksFilterCloseBtn" type="button" aria-label="Close book filters">&times;</button>
        </div>
        <div class="control-modal-grid">
          <select id="genre"><option value="">All Genres</option></select>
          <select id="sort">
            <option value="popular">popular right now</option>
            <option value="name">Name A-Z</option>
            <option value="released">Release Date</option>
          </select>
          <button id="refresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2>popular books right now</h2>
        <p>Trending books across all genres.</p>
      </div>
      <div class="grid" id="booksGrid"><div class="book-loader"><div class="spinner"></div><span>Loading books...</span></div></div>
      <div class="pagination">
        <button class="page-btn" id="prevPageBtn" type="button" disabled><i class="fas fa-chevron-left"></i></button>
        <div class="page-info" id="pageInfo">Page 1 of 1</div>
        <button class="page-btn" id="nextPageBtn" type="button" disabled><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
                      </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>
