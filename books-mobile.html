<html lang="en">
<head>

  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --card-2: #172b58;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --white: #fff;
      --border: rgba(255,255,255,0.12);
      --surface: rgba(12, 26, 57, 0.84);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 18% -10%, rgba(245,158,11,0.18), transparent 35%),
        radial-gradient(circle at 88% -14%, rgba(53,103,194,0.25), transparent 42%),
        var(--bg);
      color: var(--white);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .container { width: calc(100% - 16px); margin: 0 auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    .brand { display: inline-flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 800; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }

    .search-wrap { flex: 1; min-width: 150px; position: relative; }
    .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; }
    .search {
      width: 100%; height: 38px; border-radius: 999px; border: 1px solid var(--border); background: var(--card);
      color: var(--white); padding: 0 12px 0 30px; outline: none; font-size: 14px;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.16); }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn {
      border: 1px solid var(--border); background: var(--card); color: var(--white); height: 36px; padding: 0 12px;
      border-radius: 10px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .btn-primary { background: var(--gradient); color: #0b1633; border: 0; }

    .page-shell { margin-top: 14px; display: grid; gap: 12px; padding-bottom: 18px; }

    .hero {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 16px;
      background:
        linear-gradient(120deg, rgba(10, 31, 56, 0.92), rgba(15, 44, 80, 0.7)),
        url("https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=800&q=80") center/cover;
      box-shadow: 0 10px 28px rgba(0,0,0,0.26);
    }
    .hero h1 { font-size: 26px; line-height: 1.1; }
    .hero p { color: #d3e5ff; margin-top: 8px; font-size: 14px; line-height: 1.4; }
    .hero-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

    .section {
      background: rgba(19, 35, 71, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    .section-head { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .section-head h2 { font-size: 18px; margin-bottom: 2px; }
    .section-head p { color: var(--muted); font-size: 12px; }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 52px;
      gap: 10px;
    }
    .controls input, .controls select {
      height: 52px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #10224a;
      color: #fff;
      padding: 0 18px;
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }
    .controls button, .pager button {
      height: 52px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      padding: 0;
      cursor: pointer;
    }
    .control-modal {
      position: fixed;
      inset: 0;
      z-index: 1700;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 10, 23, 0.72);
      backdrop-filter: blur(6px);
    }
    .control-modal.show {
      display: flex;
    }
    .control-modal-card {
      width: min(480px, 100%);
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(19, 35, 71, 0.98), rgba(11, 23, 50, 0.98));
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      padding: 16px;
    }
    .control-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .control-modal-title {
      font-size: 18px;
      font-weight: 800;
    }
    .control-modal-close {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff;
      cursor: pointer;
    }
    .control-modal-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .control-modal-grid select,
    .control-modal-action {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #10224a;
      color: #fff;
      padding: 0 14px;
      font-size: 14px;
    }
    .control-modal-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--card);
      color: #fff;
      cursor: pointer;
    }
    .control-icon-btn {
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .grid {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-2);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); }

    .card-media {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, #102545 0%, #0b1c35 100%);
      overflow: hidden;
    }
    .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-meta { padding: 8px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .card-title { font-size: 13px; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-sub { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-extra {
      color: #abc5e8;
      font-size: 11px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 28px;
      margin-top: auto;
      padding-top: 2px;
    }

    .card-actions {
      display: grid;
      grid-template-columns: auto auto;
      gap: 5px;
      margin-top: 5px;
      justify-content: end;
    }
    .icon-btn {
      height: 28px; width: 28px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,39,72,0.9); color: #d7e8ff; display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .menu {
      position: absolute;
      right: 8px;
      bottom: 38px;
      width: 170px;
      background: #0e284b;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
      padding: 6px;
      display: none;
      z-index: 12;
    }
    .menu.open { display: block; }
    .menu button {
      width: 100%; border: 1px solid var(--border); background: transparent; color: #eef4ff; border-radius: 6px;
      padding: 7px; font-size: 11px; margin-bottom: 5px; text-align: left; cursor: pointer;
    }
    .menu button:last-child { margin-bottom: 0; }
    .menu button:hover { border-color: var(--accent); color: var(--accent); }
    .menu button[data-saved="1"] { border-color: rgba(248,113,113,0.85); background: rgba(239,68,68,0.12); color: #fecaca; }

    .empty { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }

    .pagination {
      padding: 0 12px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .page-btn {
      min-width: 40px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 12px;
    }
    .page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .page-info {
      color: var(--muted);
      font-size: 12px;
    }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(6, 12, 28, 0.72); z-index: 240; padding: 16px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: min(380px, 100%); background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .modal-list { display: grid; gap: 6px; max-height: 240px; overflow-y: auto; padding: 4px 0; }
    .modal-list-item {
      display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px;
      border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); cursor: pointer;
    }
    .modal-list-item.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.12); }
    .modal-input { display: flex; gap: 6px; margin-top: 6px; }
    .modal-input input {
      flex: 1; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-2);
      color: var(--white); padding: 0 10px; font-size: 14px;
    }

    .menu-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      top: 0;
      left: 0;
      width: 100dvw;
      height: 100dvh;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      padding: 0;
      align-items: center;
      justify-content: center;
    }
    .menu-modal.active {
      display: flex;
    }
    .menu-modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
    }
    .menu-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .menu-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin: 0;
    }
    .menu-modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .menu-modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }
    .menu-modal-body {
      padding: 16px 20px;
    }
    .menu-quick-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .menu-quick-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-quick-item:hover {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }
    .menu-quick-item.active {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.15);
    }
    .menu-quick-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menu-quick-left i {
      width: 20px;
      color: var(--accent);
    }
    .menu-quick-left span {
      font-weight: 500;
    }
    .menu-quick-state {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }
    .menu-custom-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .menu-custom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .menu-create-list-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .menu-create-list-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .menu-custom-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .menu-custom-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-custom-item:hover {
      border-color: var(--accent);
    }
    .menu-custom-item.active {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }
    .menu-custom-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-custom-left i {
      width: 18px;
      color: var(--accent);
      font-size: 14px;
    }
    .menu-custom-left span {
      font-size: 14px;
    }
    .menu-custom-state {
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }
    .menu-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .menu-icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .menu-icon-option {
      height: 44px;
      border: 1px solid var(--border);
      background: var(--card-2);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .menu-icon-option:hover {
      border-color: var(--accent);
    }
    .menu-icon-option.selected {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.15);
    }
    .menu-icon-option i {
      font-size: 18px;
      color: var(--muted);
    }
    .menu-icon-option.selected i {
      color: var(--accent);
    }
    .menu-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .menu-btn {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-btn-secondary {
      background: var(--card-2);
      color: var(--white);
    }
    .menu-btn-secondary:hover {
      border-color: var(--accent);
    }
    .menu-btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      border: none;
    }
    .menu-btn-primary:hover {
      opacity: 0.9;
    }
    .authenticated-only {
      display: none;
    }
    body.authenticated .authenticated-only {
      display: block;
    }
  </style>

<body>
  <header class="zo2y-shared-header" role="banner" data-shared-header="1">
  <div class="zo2y-shared-header-inner">
    <a class="zo2y-shared-brand" href="index.html" aria-label="Home">
      <img src="/file.svg" alt="Logo" />
    </a>
    <div class="nav-search zo2y-shared-search">
      <input id="globalSearch" class="nav-search-input zo2y-shared-search-input" type="search" placeholder="Search..." aria-label="Search" />
      <button id="globalSearchBtn" class="nav-search-btn zo2y-shared-search-btn" type="button" aria-label="Search"><i class="fas fa-search"></i></button>
      <div id="globalSearchSuggest" class="search-suggest zo2y-shared-suggest"></div>
    </div>
    <div class="zo2y-shared-auth">
      <a class="zo2y-shared-btn" href="login.html" id="loginBtn">Login</a>
      <a class="zo2y-shared-btn zo2y-shared-btn-primary" href="sign-up.html" id="signupBtn">Sign Up</a>
      <a class="zo2y-shared-btn" href="profile.html" id="profileBtn" style="display:none;">Profile</a>
</div>
  </div>
</header>

  <main class="container page-shell">
    <section class="hero">
      <h1>books</h1>
      <p>Discover trending books across all genres and save them to your book lists.</p>
      <div style="margin-top:6px;font-size:11px;color:var(--muted);opacity:.86;">sources: Google Books + Open Library. <a href="credits.html" style="color:var(--accent);">all credits</a></div>
      <div class="hero-actions">
        <!-- Refresh removed -->
      </div>
    </section>
    <section class="controls">
      <input id="q" class="search-input" placeholder="Search books, authors, genres...">
      <button id="booksSearchBtn" class="control-icon-btn" type="button" aria-label="Search books"><i class="fas fa-search"></i></button>
      <button id="booksFilterBtn" class="control-icon-btn" type="button" aria-label="Open book filters"><i class="fas fa-sliders-h"></i></button>
    </section>
    <div class="control-modal" id="booksFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter books</div>
          <button class="control-modal-close" id="booksFilterCloseBtn" type="button" aria-label="Close book filters">&times;</button>
        </div>
        <div class="control-modal-grid">
          <select id="genre"><option value="">All Genres</option></select>
          <select id="sort">
            <option value="popular">popular right now</option>
            <option value="name">Name A-Z</option>
            <option value="released">Release Date</option>
          </select>
          <button id="refresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2>popular books right now</h2>
        <p>Trending books across all genres.</p>
      </div>
      <div class="grid" id="booksGrid"></div>
      <div class="pagination">
        <button class="page-btn" id="prevPageBtn" type="button" disabled><i class="fas fa-chevron-left"></i></button>
        <div class="page-info" id="pageInfo">Page 1 of 1</div>
        <button class="page-btn" id="nextPageBtn" type="button" disabled><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">

  <div id="createListModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content" style="max-width: 320px;">
      <div class="menu-modal-header">
        <h3>Create New List</h3>
        <button class="menu-modal-close" id="closeCreateModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body">
        <input type="text" id="newListNameInput" class="menu-input" placeholder="List name..." maxlength="50">

  <script>
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const GOOGLE_BOOKS_PROXY_BASE = '/api/books';
      const FALLBACK_BOOK_IMAGE = '/newlogo.webp';
      let BOOKS_PAGE_SIZE = 18;

    let supabaseClient = null;
    let currentUser = null;
    const state = {
      books: [],
      search: '',
      genre: '',
      sort: 'popular',
      page: 1,
      totalPages: 1,
      listStatusMap: new Map(),
      pendingQuickOps: new Set()
    };

    function computeGridPageSize() {
      const grid = document.getElementById('booksGrid');
      if (!grid) return 18;
      const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;
      const gridTop = grid.getBoundingClientRect().top;
      const footerSpace = 160;
      const availH = Math.max(220, window.innerHeight - gridTop - footerSpace);
      const approxCardH = 330;
      const rows = Math.max(2, Math.min(6, Math.floor(availH / approxCardH)));
      const visible = Math.max(cols * rows, cols * 2);
      const desired = Math.max(30, visible);
      const snapped = Math.ceil(desired / cols) * cols;
      return Math.min(54, Math.max(cols * 2, snapped));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(message, isError = false) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '12px';
      el.style.right = '12px';
      el.style.zIndex = '9999';
      el.style.background = isError ? '#dc2626' : '#f59e0b';
      el.style.color = '#fff';
      el.style.padding = '8px 12px';
      el.style.borderRadius = '8px';
      el.style.fontSize = '12px';
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    let searchDebounceTimer = null;
    let booksFetchAbort = null;
    function normalizeQuery(query) {
      return String(query || '').trim().replace(/\s+/g, ' ');
    }

    function getQueryVariations(query) {
      const normalized = normalizeQuery(query);
      if (!normalized) return [];
      
      const variations = [normalized];
      
      // Try without spaces for compound words
      if (normalized.includes(' ')) {
        variations.push(normalized.replace(/\s+/g, ''));
      }
      
      // Try with spaces if no spaces
      if (!normalized.includes(' ') && normalized.length > 3) {
        const spaced = normalized.replace(/([a-z])([A-Z])/g, '$1 $2').toLowerCase();
        if (spaced !== normalized.toLowerCase()) {
          variations.push(spaced);
        }
      }
      
      return [...new Set(variations)];
    }

    async function loadBooksWithFallback(queryOverride = '') {
      BOOKS_PAGE_SIZE = computeGridPageSize();
      const query = String(queryOverride || state.search || '').trim();
      let books = [];
      let apiTotalPages = 1;
      const apiLimit = 40;

      if (booksFetchAbort) booksFetchAbort.abort();
      booksFetchAbort = new AbortController();
      const signal = booksFetchAbort.signal;

      if (!query) {
        // Load popular books when no search query
        try {
          const url = `${GOOGLE_BOOKS_PROXY_BASE}/popular?subject=fiction&limit=${apiLimit}&page=1&orderBy=relevance`;
          const res = await fetch(url, { signal });
          if (res.ok) {
            const json = await res.json();
            console.log('Books API response:', json);
            books = Array.isArray(json?.books) ? json.books : (Array.isArray(json?.docs) ? json.docs : (Array.isArray(json) ? json : []));
            apiTotalPages = json?.totalPages || json?.total || 1;
          }
        } catch (_err) {
          console.error('Failed to load popular books', _err);
        }
      } else {
        // Try search with variations
        const variations = getQueryVariations(query);
        for (const variation of variations) {
          try {
            const url = `${GOOGLE_BOOKS_PROXY_BASE}/search?q=${encodeURIComponent(variation)}&limit=${apiLimit}`;
            const res = await fetch(url, { signal });
            if (res.ok) {
              const json = await res.json();
              console.log('Search API response:', json);
              const results = Array.isArray(json?.books) ? json.books : (Array.isArray(json?.docs) ? json.docs : (Array.isArray(json?.results) ? json.results : (Array.isArray(json) ? json : [])));
              if (results.length > 0) {
                books = results;
                apiTotalPages = json?.totalPages || json?.total || 1;
                break;
              }
            }
          } catch (_err) {
            console.error('Failed to load books with variation:', variation, _err);
          }
        }
      }

      state.books = books.map((book) => ({
        id: book.id || String(book.googleBooksId || book._googleVolumeId || ''),
        title: book.title || book.name || 'Unknown Book',
        authors: Array.isArray(book.authors) ? book.authors.join(', ') : (Array.isArray(book.author_name) ? book.author_name.join(', ') : (book.authors || book.author || 'Unknown Author')),
        description: book.description || '',
        coverUrl: book.thumbnail || book.cover || book.image || book.coverImage || '',
        publishedDate: book.publishedDate || book.published_date || '',
        pageCount: book.pageCount || book.page_count || 0
      })).filter((b) => b.id);
      
      state.totalPages = apiTotalPages;
    }

    function debounceSearch(query) {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(async () => {
        state.search = query;
        state.page = 1;
        await loadBooksWithFallback();
        await loadListStatus();
        renderGrid();
      }, 220);
    }

    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
        await authRuntime.waitForSupabase(8000);
      } else {
        const startedAt = Date.now();
        while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
          await new Promise((resolve) => setTimeout(resolve, 40));
        }
      }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
        supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        if (supabaseClient) return supabaseClient;
      }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(
          window.__ZO2Y_SUPABASE_CONFIG.url,
          window.__ZO2Y_SUPABASE_CONFIG.key,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
        );
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
        return supabaseClient;
      }
      return null;
    }

    async function initAuthUi() {
      const client = await ensureSupabase();
      if (!client) return;
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const profileBtn = document.getElementById('profileBtn');
      const { data } = await client.auth.getUser();
      currentUser = data?.user || null;

      if (currentUser) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (profileBtn) {
          profileBtn.style.display = 'inline-flex';
          profileBtn.innerHTML = '<i class="fas fa-user"></i>';
        }
      } else {
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (signupBtn) signupBtn.style.display = 'inline-flex';
        if (profileBtn) profileBtn.style.display = 'none';
      }
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    async function loadBooks(queryOverride = '') {
      const query = String(queryOverride || state.search || '').trim();
      
      // Use API directly with shuffling
      await loadBooksWithFallback(query);
      
      // Shuffle results if no search query
      if (!query) {
        state.books = shuffleArray(state.books);
      }
    }

    async function loadListStatus() {
      state.listStatusMap = new Map();
      if (!currentUser?.id || !state.books.length) return;
      const client = await ensureSupabase();
      if (!client) return;
      const ids = state.books.map((book) => book.id);
      if (!ids.length) return;
      const { data } = await client
        .from('book_list_items')
        .select('book_id, list_type')
        .eq('user_id', currentUser.id)
        .in('book_id', ids);
      (data || []).forEach((row) => {
        const id = String(row.book_id || '');
        if (!id) return;
        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, read: false, toread: false });
        const bucket = state.listStatusMap.get(id);
        if (row.list_type in bucket) bucket[row.list_type] = true;
      });
    }

    function getBookListStatus(bookId) {
      const id = String(bookId || '').trim();
      const empty = { favorites: false, read: false, toread: false };
      if (!id) return empty;
      if (!state.listStatusMap.has(id)) {
        state.listStatusMap.set(id, { ...empty });
      }
      return state.listStatusMap.get(id);
    }

    function getBookCardExtra(book) {
      const year = book.publishedDate ? new Date(book.publishedDate).getFullYear() : '';
      const pages = book.pageCount ? `${book.pageCount} pages` : '';
      const parts = [year, pages].filter(Boolean);
      return parts.join(' | ') || 'Book details';
    }

    function renderGrid() {
      const grid = document.getElementById('booksGrid');
      if (!grid) return;
      if (!state.books.length) {
        grid.innerHTML = '<div class="empty">No books found.</div>';
        updatePagination();
        return;
      }
      const start = (state.page - 1) * BOOKS_PAGE_SIZE;
      const visibleItems = state.books.slice(start, start + BOOKS_PAGE_SIZE);
      grid.innerHTML = visibleItems.map((book) => {
        const coverUrl = book.coverUrl || FALLBACK_BOOK_IMAGE;
        return `
        <article class="card" data-id="${escapeHtml(book.id)}">
          <div class="card-media">
            <img src="${escapeHtml(coverUrl)}" alt="${escapeHtml(book.title)}" loading="lazy">
          </div>
          <div class="card-meta">
            <p class="card-title">${escapeHtml(book.title)}</p>
            <p class="card-sub">${escapeHtml(book.authors)}</p>
            <p class="card-extra">${escapeHtml(getBookCardExtra(book))}</p>
            <div class="card-actions">
              <button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
        </article>
      `;
      }).join('');

      wireGridActions();
      updatePagination();
    }

    function updatePagination() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const info = document.getElementById('pageInfo');
      state.totalPages = Math.max(1, Math.ceil(state.books.length / BOOKS_PAGE_SIZE));
      if (state.page > state.totalPages) state.page = state.totalPages;
      if (state.page < 1) state.page = 1;
      if (prevBtn) prevBtn.disabled = state.page <= 1;
      if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
      if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;
    }

    async function upsertBookRecord(client, book) {
      if (!client || !book?.id) return false;
      const payload = {
        id: String(book.id),
        title: book.title || '',
        authors: book.authors || '',
        cover_url: book.coverUrl || '',
        updated_at: new Date().toISOString()
      };
      const { error } = await client.from('books').upsert(payload, { onConflict: 'id' });
      if (error) {
        console.error('Book upsert failed', error);
        return false;
      }
      return true;
    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
      const bookId = String(itemId || '').trim();
      if (!bookId) return { ok: false, saved: false };
      const book = state.books.find((row) => String(row.id || '').trim() === bookId);
      if (!book) return { ok: false, saved: false };

      const client = await ensureSupabase();
      if (!client || !currentUser?.id) {
        window.location.href = 'login.html';
        return { ok: false, saved: false };
      }

      const status = getBookListStatus(bookId);
      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];
      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
      const opKey = `${bookId}:${listType}`;
      if (state.pendingQuickOps.has(opKey)) {
        return { ok: false, saved: previousSaved };
      }

      state.pendingQuickOps.add(opKey);
      status[listType] = nextSaved;
      try {
        if (nextSaved) {
          const ok = await upsertBookRecord(client, book);
          if (!ok) throw new Error('Book upsert failed');
          const { error } = await client.from('book_list_items').insert({
            user_id: currentUser.id,
            book_id: bookId,
            list_type: listType
          });
          if (error && String(error.code || '') !== '23505') throw error;
          showToast('Added to list');
        } else {
          const { error } = await client
            .from('book_list_items')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('book_id', bookId)
            .eq('list_type', listType);
          if (error) throw error;
          showToast('Removed from list');
        }
        return { ok: true, saved: nextSaved };
      } catch (error) {
        console.error('Book list toggle failed', error);
        status[listType] = previousSaved;
        showToast('Could not update list', true);
        return { ok: false, saved: previousSaved };
      } finally {
        state.pendingQuickOps.delete(opKey);
      }
    }

    function wireGridActions() {
      document.querySelectorAll('.menu-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.card');
          if (!card) return;
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      });

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.menu-btn')) return;
          const id = String(card.getAttribute('data-id') || '').trim();
          if (!id) return;
          window.location.href = `book.html?id=${encodeURIComponent(id)}`;
        });
      });
    }

    async function loadPage() {
      try {
        await initAuthUi();
        await loadBooks();
        await loadListStatus();
        renderGrid();
      } catch (_err) {
        const grid = document.getElementById('booksGrid');
        if (grid) grid.innerHTML = '<div class="empty">Books feed unavailable right now.</div>';
      }
    }

    // Refresh removed.
    document.getElementById('booksSearchBtn')?.addEventListener('click', async () => {
      const query = String(document.getElementById('q')?.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('q')?.addEventListener('input', async (e) => {
      const query = String(e.target.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('q')?.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const query = String(e.target.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('booksFilterBtn')?.addEventListener('click', () => {
      document.getElementById('booksFilterModal')?.classList.add('show');
    });
    document.getElementById('booksFilterCloseBtn')?.addEventListener('click', () => {
      document.getElementById('booksFilterModal')?.classList.remove('show');
    });
    document.getElementById('genre')?.addEventListener('change', (e) => {
      state.genre = String(e.target.value || '').trim();
    });
    document.getElementById('sort')?.addEventListener('change', (e) => {
      state.sort = String(e.target.value || 'popular').trim();
    });
    document.getElementById('refresh')?.addEventListener('click', async () => {
      document.getElementById('booksFilterModal')?.classList.remove('show');
      await loadPage();
    });
    document.getElementById('prevPageBtn')?.addEventListener('click', () => {
      if (state.page <= 1) return;
      state.page -= 1;
      renderGrid();
    });
    document.getElementById('nextPageBtn')?.addEventListener('click', () => {
      if (state.page >= state.totalPages) return;
      state.page += 1;
      renderGrid();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initUniversalSearch) {
        const initSearch = () => window.initUniversalSearch({
          input: '#globalSearch',
          fallbackRoute: 'books-mobile.html'
        });
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(initSearch, { timeout: 1500 });
        } else {
          window.setTimeout(initSearch, 0);
        }
      }
      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'books',
          itemIdAttr: 'data-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-id]'))
              .map((card) => card.getAttribute('data-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '').trim();
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await ensureSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => currentUser,
          notify: (message, isError) => showToast(message, !!isError),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }
      loadPage();
    });
  </script>
