    .brand-hero.sports-hero {
      border: 1px solid var(--border);
      border-radius: 24px;

      overflow: hidden;
    }

<body data-nav-page="sports">
  <main class="container">
    <section class="brand-hero sports-hero" aria-label="Sports header">
      <h1>Sports</h1>
      <p>Browse teams from football, basketball, F1, UFC, and more. Save your favorites to your profile.</p>
    </section>

    <div class="controls sports-search-bar">
      <input id="sportsSearch" class="search-input" type="search" placeholder="Search teams, leagues, or sports..." />
      <button class="control-icon-btn" id="sportsSearchBtn" type="button" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="control-icon-btn" id="sportsFilterBtn" type="button" aria-label="Filters">
        <i class="fa-solid fa-sliders-h"></i>
      </button>
      <div class="sports-search-suggest" id="sportsSuggest" role="listbox"></div>
    </div>

    <div class="controls-meta">
      <span id="sportsCount">0 teams shown</span>
    </div>

    <div class="control-modal" id="sportsFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter teams</div>
          <button class="control-modal-close" id="sportsFilterClose" type="button">&times;</button>
        </div>
        <div class="sports-filter-grid">
          <label class="sports-filter-label">
            <span>Sport</span>
            <select id="filterSport"><option value="all">All sports</option></select>
          </label>
          <label class="sports-filter-label">
            <span>League</span>
            <select id="filterLeague"><option value="all">All leagues</option></select>
          </label>
        </div>
      </div>
    </div>

    <div class="sports-search-tags" id="sportsTags">
      <button class="sports-search-tag" type="button" data-q="Real Madrid">Real Madrid</button>
      <button class="sports-search-tag" type="button" data-q="Liverpool">Liverpool</button>
      <button class="sports-search-tag" type="button" data-q="NBA">NBA</button>
      <button class="sports-search-tag" type="button" data-q="NFL">NFL</button>
      <button class="sports-search-tag" type="button" data-q="Formula 1">Formula 1</button>
      <button class="sports-search-tag" type="button" data-q="UFC">UFC</button>
      <button class="sports-search-tag" type="button" data-q="Al Ahly">Al Ahly</button>
      <button class="sports-search-tag" type="button" data-q="Flamengo">Flamengo</button>
    </div>

    <section class="sports-results">
      <div class="sports-results-head">
        <h2 id="sportsTitle">All teams</h2>
        <p id="sportsSubtitle">Loading...</p>
      </div>
      <div class="sports-loading visible" id="sportsLoading">Loading teams...</div>
      <div class="sports-empty" id="sportsEmpty">No teams found. Try another search.</div>
      <div class="sports-grid" id="sportsGrid"></div>
    </section>
  </main>

  <div class="sports-toast" id="sportsToast"></div>
