<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started - Zo2y</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="top-stripe">
    <img src="zo2y.png" alt="Zo2y Logo" class="logo">
  </div>

  <div class="content">
    <h1>Get Started with Zo2y</h1>
    
    <h3>Sign in with your email</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="emailSignIn">Sign in</button>
    <button id="emailRegister">Register</button>
    
    <p id="status"></p>
  </div>

  <script src="get-started.js"></script>
</body>
</html>
