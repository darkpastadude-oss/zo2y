  <script>

      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};

      const SUPABASE_URL = String(supabaseConfig.url || '').trim();

      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();

      const FALLBACK_IMAGE = '/images/fallback/game.svg';

      let GAMES_PAGE_SIZE = 60;

      const RAWG_API_KEY = ''; // RAWG doesn't require API key for basic requests

      const RAWG_BASE = 'https://api.rawg.io/api';

    // Cache for fetched cover URLs to avoid repeated API calls

    const coverCache = new Map();

    let supabaseClient = null;

    let currentUser = null;

    const state = {

      games: [],

      search: '',

      genre: '',

      platform: '',

      sort: 'popular',

      page: 1,

      totalPages: 1,

      listStatusMap: new Map(),

      pendingQuickOps: new Set()

    };

    function computeGridPageSize() {

      const grid = document.getElementById('gamesGrid');

      if (!grid) return 18;

      const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;

      const rows = 3;

      return cols * rows;

    }

    function escapeHtml(value) {

      return String(value || '')

        .replace(/&/g, '&amp;')

        .replace(/</g, '&lt;')

        .replace(/>/g, '&gt;')

        .replace(/\"/g, '&quot;')

        .replace(/'/g, '&#039;');

    }

    function showToast(message, isError = false) {

      const el = document.createElement('div');

      el.style.position = 'fixed';

      el.style.top = '16px';

      el.style.right = '16px';

      el.style.zIndex = '9999';

      el.style.background = isError ? '#dc2626' : '#f59e0b';

      el.style.color = '#fff';

      el.style.padding = '10px 14px';

      el.style.borderRadius = '10px';

      el.style.fontSize = '13px';

      el.textContent = message;

      document.body.appendChild(el);

      setTimeout(() => el.remove(), 2200);

    }

    let searchDebounceTimer = null;

    function normalizeQuery(query) {

      return String(query || '').trim().replace(/\s+/g, ' ');

    }

    function getQueryVariations(query) {

      const normalized = normalizeQuery(query);

      if (!normalized) return [];

      const variations = [normalized];

      // Try without spaces for compound words

      if (normalized.includes(' ')) {

        variations.push(normalized.replace(/\s+/g, ''));

      }

      // Try with spaces if no spaces

      if (!normalized.includes(' ') && normalized.length > 3) {

        const spaced = normalized.replace(/([a-z])([A-Z])/g, '$1 $2').toLowerCase();

        if (spaced !== normalized.toLowerCase()) {

          variations.push(spaced);

        }

      }

      return [...new Set(variations)];

    }

    function isDateWithinAcceptableRange(dateString) {

      if (!dateString) return true;

      const date = new Date(dateString);

      if (isNaN(date.getTime())) return true;

      const now = new Date();

      const twoYearsFromNow = new Date(now.getFullYear() + 2, now.getMonth(), now.getDate());

      return date <= twoYearsFromNow;

    }

    function shuffleArray(array) {

      const arr = [...array];

      for (let i = arr.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [arr[i], arr[j]] = [arr[j], arr[i]];

      }

      return arr;

    }

    async function initGameFilters() {
      const client = await ensureSupabase();
      if (!client) return;
      
      const genreSelect = document.getElementById('genre');
      if (genreSelect) {
        try {
          const { data } = await client.from('games').select('extra').limit(500);
          const seen = new Map();
          (data || []).forEach(row => {
            const genres = row.extra?.genres || [];
            (Array.isArray(genres) ? genres : []).forEach(g => {
              if (g.slug && g.name && !seen.has(g.slug)) {
                seen.set(g.slug, g.name);
              }
            });
          });
          [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([slug, name]) => {
            const opt = document.createElement('option');
            opt.value = slug;
            opt.textContent = name;
            genreSelect.appendChild(opt);
          });
        } catch (e) {
          console.error('Failed to load game genres', e);
        }
      }
      
      const platformSelect = document.getElementById('platform');
      if (platformSelect) {
        try {
          const { data } = await client.from('games').select('extra').limit(500);
          const seen = new Map();
          (data || []).forEach(row => {
            const platforms = row.extra?.platforms || [];
            (Array.isArray(platforms) ? platforms : []).forEach(p => {
              if (p.slug && p.name && !seen.has(p.slug)) {
                seen.set(p.slug, p.name);
              }
            });
          });
          [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1])).forEach(([slug, name]) => {
            const opt = document.createElement('option');
            opt.value = slug;
            opt.textContent = name;
            platformSelect.appendChild(opt);
          });
        } catch (e) {
          console.error('Failed to load game platforms', e);
        }
      }
    }

    async function loadGamesWithFallback() {

      const query = String(state.search || '').trim();

      let games = [];

      let apiTotalPages = 1;

      GAMES_PAGE_SIZE = computeGridPageSize();

      const client = await ensureSupabase();

      if (!client) {

        state.games = [];

        state.totalPages = 1;

        return;

      }

      try {

        let dbQuery = client.from('games').select('*', { count: 'exact' });

        if (query) {

          // Try search with variations

          const variations = getQueryVariations(query);

          let found = false;

          for (const variation of variations) {

            try {

              let searchQuery = client.from('games').select('*', { count: 'exact' });

              searchQuery = searchQuery.ilike('title', `%${variation}%`);

              if (state.genre) {

                searchQuery = searchQuery.contains('extra', { genres: [{ slug: state.genre }] });

              }

              if (state.platform) {

                searchQuery = searchQuery.contains('extra', { platforms: [{ slug: state.platform }] });

              }

              if (state.sort === 'name') {

                searchQuery = searchQuery.order('title', { ascending: true });

              } else if (state.sort === 'released') {

                searchQuery = searchQuery.order('release_date', { ascending: false, nullsFirst: false });

              } else {

                searchQuery = searchQuery.order('rating_count', { ascending: false, nullsFirst: false }).order('rating', { ascending: false, nullsFirst: false });

              }

              // Fetch all results (no pagination) to sort by cover availability

              const { data, error, count } = await searchQuery;

              if (error) throw error;

              games = data || [];

               apiTotalPages = Math.max(1, Math.ceil((count || 0) / GAMES_PAGE_SIZE));

               found = true;

               break;

            } catch (_err) {

              console.error('Failed to search games with variation:', variation, _err);

            }

          }

          if (!found) {

            // Fallback to Wikipedia search if no results from Supabase
            const wikiGames = await window.__zo2yGamesShared?.searchGamesFromWikipedia(query);
            if (wikiGames && wikiGames.length) {
              games = wikiGames;
              apiTotalPages = Math.max(1, Math.ceil(games.length / GAMES_PAGE_SIZE));
              found = true;
            } else {
              state.games = [];
              state.totalPages = 1;
              return;
            }

          }

        } else {

          // Randomly choose between popular and newly released on each refresh

          const useNewlyReleased = Math.random() > 0.5;

          const effectiveSort = useNewlyReleased ? 'released' : 'popular';

          // Load all games when no search query (no pagination yet)

          if (state.genre) {

            dbQuery = dbQuery.contains('extra', { genres: [{ slug: state.genre }] });

          }

          if (state.platform) {

            dbQuery = dbQuery.contains('extra', { platforms: [{ slug: state.platform }] });

          }

          if (effectiveSort === 'name') {

            dbQuery = dbQuery.order('title', { ascending: true });

          } else if (effectiveSort === 'released') {

            dbQuery = dbQuery.order('release_date', { ascending: false, nullsFirst: false });

          } else {

            dbQuery = dbQuery.order('rating_count', { ascending: false, nullsFirst: false }).order('rating', { ascending: false, nullsFirst: false });

          }

          // Fetch all results (no pagination) to sort by cover availability

          const { data, error, count } = await dbQuery;

          if (error) throw error;

          games = data || [];

           apiTotalPages = Math.max(1, Math.ceil((count || 0) / GAMES_PAGE_SIZE));

         }

       } catch (_err) {

        console.error('Failed to load games', _err);

      }

      // Filter out non-video-game entries (e.g. football clubs stored in the games table)
      // Real video games have platforms, non-sports genres, or video game keywords in description
      games = games.filter((game) => {
        const extra = game.extra || {};
        const genres = Array.isArray(extra.genres) ? extra.genres : [];
        const platforms = Array.isArray(extra.platforms) ? extra.platforms : [];
        const description = String(game.description || '').trim().toLowerCase();
        const title = String(game.title || '').trim().toLowerCase();
        const hasPlatforms = platforms.length > 0;
        const hasNonSportsGenre = genres.length > 0 && genres.some((g) => {
          const slug = String(g?.slug || '').toLowerCase();
          return slug && slug !== 'sports';
        });
        const hasVideoGameText = description.includes('video game') || description.includes('developed by') || description.includes('published by') || description.includes('gameplay');
        const hasReleaseDate = !!game.release_date;
        const isSportsOnlyGenre = genres.length > 0 && genres.every((g) => String(g?.slug || '').toLowerCase() === 'sports');
        if (hasPlatforms) return true;
        if (hasNonSportsGenre) return true;
        if (hasVideoGameText) return true;
        if (isSportsOnlyGenre && hasReleaseDate) return true;
        return false;
      });

      // Map games with cover resolution
      // Handle both Supabase games and Wikipedia fallback games
      state.games = games.map((game) => {
        const isWiki = game.source === 'wikipedia';
        return {
          id: String(game.id || ''),
          name: game.title || game.name || humanizeGameSlug(game.slug) || 'Unknown Game',
          summary: game.description || game.summary || '',
          cover: resolveGameCover(game),
          firstReleaseDate: game.release_date || game.releaseDate || game.firstReleaseDate || '',
          rating: game.rating || 0,
          genres: Array.isArray(game.extra?.genres) ? game.extra.genres : (Array.isArray(game.genres) ? game.genres : []),
          source: game.source || 'supabase'
        };
      }).filter((g) => {
        // For Wikipedia games, don't filter by date range since dates might be incomplete
        if (g.source === 'wikipedia') return g.id && g.name;
        return g.id && isDateWithinAcceptableRange(g.firstReleaseDate);
      });

      // Front pages should be the games with locally sourced covers (official cover bucket).

      const isLocalCover = (url) => /\/game-assets\/covers-official\//.test(String(url || ''));

      if (!query) {

        const withCover = state.games.filter((g) => g.cover && g.cover !== FALLBACK_IMAGE);

        const localCovers = withCover.filter((g) => isLocalCover(g.cover));

        const otherCovers = withCover.filter((g) => !isLocalCover(g.cover));

        const noCover = state.games.filter((g) => !g.cover || g.cover === FALLBACK_IMAGE);

        // Shuffle the "front pages" pool for variety, but keep local covers first.

        const shouldShuffleFront = state.page <= 3;

        state.games = [

          ...(shouldShuffleFront ? shuffleArray(localCovers) : localCovers),

          ...(shouldShuffleFront ? shuffleArray(otherCovers) : otherCovers),

          ...noCover

        ];

      }

      // Apply pagination after sorting (page size computed from grid so we never end on partial rows)

      const rangeStart = (state.page - 1) * GAMES_PAGE_SIZE;

      const rangeEnd = rangeStart + GAMES_PAGE_SIZE;

      state.games = state.games.slice(rangeStart, rangeEnd);

      state.totalPages = apiTotalPages;

    }

    function debounceSearch(query) {

      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);

      searchDebounceTimer = setTimeout(async () => {

        state.search = query;

        state.page = 1;

        state.popularRotationKey = '';
        state.popularRotation = null;
        await loadGamesWithFallback();

        await loadListStatus();

        renderGrid();

      }, 400);

    }

    function toHttpsUrl(value) {

      const raw = String(value || '').trim();

      if (!raw) return '';

      if (raw.startsWith('//')) return `https:${raw}`;

      return raw.replace(/^http:\/\//i, 'https://');

    }

    function humanizeGameSlug(value) {

      return String(value || '')

        .trim()

        .replace(/[_-]+/g, ' ')

        .replace(/\b\w/g, (ch) => ch.toUpperCase())

        .trim();

    }

    async function fetchCoverFromRAWG(gameName) {

      if (!gameName) return '';

      // Check cache first

      const cacheKey = gameName.toLowerCase().trim();

      if (coverCache.has(cacheKey)) {

        return coverCache.get(cacheKey);

      }

      try {

        // Search for the game on RAWG

        const searchUrl = `${RAWG_BASE}/games?key=${RAWG_API_KEY}&search=${encodeURIComponent(gameName)}&page_size=1`;

        const response = await fetch(searchUrl);

        if (!response.ok) return '';

        const data = await response.json();

        if (!data.results || data.results.length === 0) return '';

        const game = data.results[0];

        const coverUrl = game.background_image || '';

        if (coverUrl) {

          coverCache.set(cacheKey, coverUrl);

          return coverUrl;

        }

      } catch (err) {

        console.error('Failed to fetch cover from RAWG:', err);

      }

      coverCache.set(cacheKey, '');

      return '';

    }

    function resolveGameCover(row) {

      // Try multiple cover sources

      const raw = String(row?.cover_url || row?.cover || row?.image || '').trim();

      if (raw && raw !== '[object Object]') {

        return toHttpsUrl(raw);

      }

      // Try IGDB cover

      const igdbCover = row?.extra?.cover?.url;

      if (igdbCover) {

        return toHttpsUrl(igdbCover.startsWith('//') ? `https:${igdbCover}` : igdbCover);

      }

      // Try Steam cover if steam_appid is available

      const steamAppId = row?.extra?.steam_appid || row?.steam_appid;

      if (steamAppId) {

        return `https://cdn.cloudflare.steamstatic.com/steam/apps/${steamAppId}/header.jpg`;

      }

      // No remote placeholder (keeps offline + avoids 3rd party outages). We'll hydrate covers via `/api/igdb` when possible.

      return '';

    }

    function handleImageError(img, gameName) {

      img.src = FALLBACK_IMAGE;

      img.alt = gameName || 'Game cover not available';

    }

    async function ensureSupabase() {

      if (supabaseClient) return supabaseClient;

      if (window.__ZO2Y_SUPABASE_CLIENT) {

        supabaseClient = window.__ZO2Y_SUPABASE_CLIENT;

        return supabaseClient;

      }

      if (!window.supabase) return null;

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {

        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storageKey: 'zo2y-auth-v2' }

      });

      window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;

      return supabaseClient;

    }

    async function initAuthUi() {

      const client = await ensureSupabase();

      if (!client) return;

      const loginBtn = document.getElementById('loginBtn');

      const signupBtn = document.getElementById('signupBtn');

      const profileBtn = document.getElementById('profileBtn');

      const { data } = await client.auth.getUser();

      currentUser = data?.user || null;

      if (currentUser) {

        if (loginBtn) loginBtn.style.display = 'none';

        if (signupBtn) signupBtn.style.display = 'none';

        if (profileBtn) {

          profileBtn.style.display = 'inline-flex';

          profileBtn.innerHTML = '<i class="fas fa-user"></i><span>Profile</span>';

        }

      } else {

        if (loginBtn) loginBtn.style.display = 'inline-flex';

        if (signupBtn) signupBtn.style.display = 'inline-flex';

        if (profileBtn) profileBtn.style.display = 'none';

      }

    }

    async function loadGames() {

      await loadGamesWithFallback();

    }

    async function loadListStatus() {

      state.listStatusMap = new Map();

      if (!currentUser?.id || !state.games.length) return;

      const client = await ensureSupabase();

      if (!client) return;

      const ids = state.games.map((game) => game.id);

      if (!ids.length) return;

      const { data } = await client

        .from('game_list_items')

        .select('game_id, list_type')

        .eq('user_id', currentUser.id)

        .in('game_id', ids);

      (data || []).forEach((row) => {

        const id = String(row.game_id || '');

        if (!id) return;

        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, played: false, backlog: false });

        const bucket = state.listStatusMap.get(id);

        if (row.list_type in bucket) bucket[row.list_type] = true;

      });

    }

    function getGameListStatus(gameId) {

      const id = String(gameId || '').trim();

      const empty = { favorites: false, played: false, backlog: false };

      if (!id) return empty;

      if (!state.listStatusMap.has(id)) {

        state.listStatusMap.set(id, { ...empty });

      }

      return state.listStatusMap.get(id);

    }

    function getGameCardExtra(game) {

      const genres = (game.genres || []).slice(0, 2).map(g => g.name || g).join(', ') || 'Video Game';

      const rating = game.rating ? `${game.rating.toFixed(1)}/5` : '';

      const parts = [genres, rating].filter(Boolean);

      return parts.join(' | ') || 'Game details';

    }

    function renderGameSpotlight(game) {

      const section = document.getElementById('gamesSpotlight');

      if (!section || !game) return;

      const bg = document.getElementById('gamesSpotlightBg');

      const titleEl = document.getElementById('gamesSpotlightTitle');

      const metaEl = document.getElementById('gamesSpotlightMeta');

      const summaryEl = document.getElementById('gamesSpotlightSummary');

      const imgEl = document.getElementById('gamesSpotlightImage');

      const openEl = document.getElementById('gamesSpotlightOpen');

      const coverUrl = game.cover || FALLBACK_IMAGE;

      const year = game.firstReleaseDate ? new Date(game.firstReleaseDate).getFullYear() : 'TBD';

      const rating = game.rating ? `${game.rating.toFixed(1)}/5` : '';

      const genres = (game.genres || []).slice(0, 2).map(g => g.name || g).join(', ') || 'Video Game';

      section.hidden = false;

      if (bg) bg.style.backgroundImage = `linear-gradient(120deg, rgba(8,14,31,0.76), rgba(10,19,39,0.38)), url("${coverUrl}")`;

      if (titleEl) titleEl.textContent = game.name || 'Game Title';

      if (metaEl) metaEl.textContent = [year, rating].filter(Boolean).join(' | ') || 'Game details';

      if (summaryEl) summaryEl.textContent = genres || 'No description available.';

      if (imgEl) {

        imgEl.src = coverUrl;

        imgEl.alt = `${game.name || 'Game'} cover`;

      }

      if (openEl) openEl.href = `game.html?id=${encodeURIComponent(game.id)}`;

    }

    function renderGrid() {
      const grid = document.getElementById('gamesGrid');
      const spotlight = document.getElementById('gamesSpotlight');
      if (!grid) return;
      if (spotlight) spotlight.hidden = true;
      if (!state.games.length) {
        grid.innerHTML = '<div class="empty">No games found.</div>';
        updatePagination();
        return;
      }
      grid.innerHTML = state.games.map((game) => {
        const coverUrl = game.cover || FALLBACK_IMAGE;
        const hasCover = coverUrl && coverUrl !== FALLBACK_IMAGE;
        const year = game.firstReleaseDate ? new Date(game.firstReleaseDate).getFullYear() : 'TBD';
        return `
        <article class="card" data-id="${escapeHtml(game.id)}">
          <div class="card-media">
            ${hasCover ? `<img src="${escapeHtml(coverUrl)}" alt="${escapeHtml(game.name)}" loading="lazy" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'card-media-fallback\\'><i class=\\'fa-solid fa-gamepad\\'></i></div>';">` : '<div class="card-media-fallback"><i class="fa-solid fa-gamepad"></i></div>'}
          </div>
          <div class="card-meta">
            <span class="card-type"><i class="fa-solid fa-gamepad"></i> Game</span>
            <div class="card-meta-top">
              <p class="card-title">${escapeHtml(game.name)}</p>
            </div>
            <p class="card-sub">${escapeHtml(year)}</p>
            <p class="card-extra">${escapeHtml(getGameCardExtra(game))}</p>
            <div class="card-actions">
              <button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
        </article>
      `;
      }).join('');
      wireGridActions();
      updatePagination();
      hydrateMissingCovers();
    }

    let coverHydrateAbort = null;
    const coverHydrateTried = new Set();

    async function hydrateMissingCovers() {

      // Fill missing covers on demand for visible items (no local seeding/storage).

      const api = window.__zo2yGamesShared;

      if (!api?.fetchCoverForTitle && !api?.searchGamesFromWikipedia) return;

      if (coverHydrateAbort) coverHydrateAbort.abort();

      coverHydrateAbort = new AbortController();

      const signal = coverHydrateAbort.signal;

      const runBatch = async () => {

        const candidates = state.games

          .filter((g) => !g.name || g.name === 'Unknown Game' || !g.cover || g.cover === FALLBACK_IMAGE)

          .filter((g) => {

            const key = String(g?.name || g?.id || '').trim().toLowerCase();

            return key && !coverHydrateTried.has(key);

          })

          .slice(0, Math.max(18, Math.min(60, GAMES_PAGE_SIZE)));

        if (!candidates.length) return false;

        let filled = 0;

        await Promise.all(

          candidates.map(async (g) => {

            const key = String(g?.name || g?.id || '').trim().toLowerCase();

            if (key) coverHydrateTried.add(key);

            const searchTitle = String(g.name || humanizeGameSlug(g.id)).trim();

            if ((!g.name || g.name === 'Unknown Game') && api.searchGamesFromWikipedia && searchTitle) {

              try {

                const wikiGames = await api.searchGamesFromWikipedia(searchTitle, signal, 1);

                const wikiGame = Array.isArray(wikiGames) ? wikiGames[0] : null;

                if (wikiGame) {

                  const wikiTitle = String(wikiGame.title || wikiGame.name || '').trim();

                  const wikiCover = resolveGameCover(wikiGame);

                  if (wikiTitle) g.name = wikiTitle;

                  if (wikiCover && (!g.cover || g.cover === FALLBACK_IMAGE)) g.cover = wikiCover;

                }

              } catch (_err) {}

            }

            if ((!g.cover || g.cover === FALLBACK_IMAGE) && api.fetchCoverForTitle && searchTitle) {

              const cover = await api.fetchCoverForTitle(String(g.name || searchTitle).trim(), signal);

              if (cover) g.cover = cover;

            }

            if ((!g.cover || g.cover === FALLBACK_IMAGE) && (!g.name || g.name === 'Unknown Game')) return;

            filled += 1;

            const card = document.querySelector(`.card[data-id="${CSS.escape(String(g.id))}"]`);

            const img = card ? card.querySelector('img') : null;
            const titleEl = card ? card.querySelector('.card-name, .card-title') : null;

            if (img && g.cover && img.getAttribute('src') === FALLBACK_IMAGE) {

              img.setAttribute('src', g.cover);

              }

            if (titleEl && g.name) {

              titleEl.textContent = g.name;

            }

          })

        );

        return filled > 0;

      };

      // Keep trying a couple batches while the browser is idle to maximize filled covers.

      for (let i = 0; i < 6; i += 1) {

        const did = await runBatch();

        if (!did) break;

        await new Promise((resolve) => {

          if (typeof window.requestIdleCallback === 'function') window.requestIdleCallback(() => resolve(), { timeout: 650 });

          else window.setTimeout(resolve, 120);

        });

      }

    }

    function updatePagination() {

      const prevBtn = document.getElementById('prevPageBtn');

      const nextBtn = document.getElementById('nextPageBtn');

      const info = document.getElementById('pageInfo');

      if (state.page > state.totalPages) state.page = state.totalPages;

      if (state.page < 1) state.page = 1;

      if (prevBtn) prevBtn.disabled = state.page <= 1;

      if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;

      if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;

    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {

      const gameId = String(itemId || '').trim();

      if (!gameId) return { ok: false, saved: false };

      const game = state.games.find((row) => String(row.id || '').trim() === gameId);

      if (!game) return { ok: false, saved: false };

      const client = await ensureSupabase();

      if (!client || !currentUser?.id) {

        window.location.href = 'login.html';

        return { ok: false, saved: false };

      }

      const status = getGameListStatus(gameId);

      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];

      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;

      const opKey = `${gameId}:${listType}`;

      if (state.pendingQuickOps.has(opKey)) {

        return { ok: false, saved: previousSaved };

      }

      state.pendingQuickOps.add(opKey);

      status[listType] = nextSaved;

      try {

        if (nextSaved) {

          const { error } = await client.from('game_list_items').insert({

            user_id: currentUser.id,

            game_id: gameId,

            list_type: listType

          });

          if (error && String(error.code || '') !== '23505') throw error;

          showToast('Added to list');

        } else {

          const { error } = await client

            .from('game_list_items')

            .delete()

            .eq('user_id', currentUser.id)

            .eq('game_id', gameId)

            .eq('list_type', listType);

          if (error) throw error;

          showToast('Removed from list');

        }

        return { ok: true, saved: nextSaved };

      } catch (error) {

        console.error('Game list toggle failed', error);

        status[listType] = previousSaved;

        showToast('Could not update list', true);

        return { ok: false, saved: previousSaved };

      } finally {

        state.pendingQuickOps.delete(opKey);

      }

    }

    function wireGridActions() {

      document.querySelectorAll('.menu-btn').forEach((btn) => {

        btn.addEventListener('click', (e) => {

          e.stopPropagation();

          const card = btn.closest('.card');

          if (!card) return;

          if (typeof window.openIndexStyleListMenu === 'function') {

            window.openIndexStyleListMenu(card);

          }

        });

      });

      });

      document.querySelectorAll('.card').forEach((card) => {

        card.addEventListener('click', (e) => {

          if (e.target.closest('.menu-btn')) return;

          const id = String(card.getAttribute('data-id') || '').trim();

          if (!id) return;

          window.location.href = `game.html?id=${encodeURIComponent(id)}`;

        });

      });

    }

    async function loadPage() {

      try {

        await initAuthUi();

        await loadGames();

        await loadListStatus();

        renderGrid();

      } catch (_err) {

        const grid = document.getElementById('gamesGrid');

        if (grid) grid.innerHTML = '<div class="empty">Games feed unavailable right now.</div>';

      }

    }

    // Refresh Picks removed.

    document.getElementById('gamesSearchBtn')?.addEventListener('click', async () => {

      const query = String(document.getElementById('q')?.value || '').trim();

      debounceSearch(query);

    });

    document.getElementById('q')?.addEventListener('input', async (e) => {

      const query = String(e.target.value || '').trim();

      debounceSearch(query);

    });

    document.getElementById('gamesFilterBtn')?.addEventListener('click', () => {

      document.getElementById('gamesFilterModal')?.classList.add('show');

    });

    document.getElementById('gamesFilterCloseBtn')?.addEventListener('click', () => {

      document.getElementById('gamesFilterModal')?.classList.remove('show');

    });

    document.getElementById('genre')?.addEventListener('change', (e) => {

      state.genre = String(e.target.value || '').trim();

    });

    document.getElementById('platform')?.addEventListener('change', (e) => {

      state.platform = String(e.target.value || '').trim();

    });

    document.getElementById('sort')?.addEventListener('change', (e) => {

      state.sort = String(e.target.value || 'popular').trim();

    });

    document.getElementById('refresh')?.addEventListener('click', async () => {

      document.getElementById('gamesFilterModal')?.classList.remove('show');

      await loadPage();

    });

    document.getElementById('prevPageBtn')?.addEventListener('click', async () => {

      if (state.page <= 1) return;

      state.page -= 1;

      await loadGames();

      await loadListStatus();

      renderGrid();

    });

    document.getElementById('nextPageBtn')?.addEventListener('click', async () => {

      if (state.page >= state.totalPages) return;

      state.page += 1;

      await loadGames();

      await loadListStatus();

      renderGrid();

    });

    document.addEventListener('DOMContentLoaded', () => {

      if (window.initUniversalSearch) {

        const initSearch = () => window.initUniversalSearch({

          input: '#globalSearch',

          fallbackRoute: 'games.html'

        });

        if (typeof window.requestIdleCallback === 'function') {

          window.requestIdleCallback(initSearch, { timeout: 1500 });

        } else {

          window.setTimeout(initSearch, 0);

        }

      }

      if (window.initIndexStyleListMenu) {

        window.initIndexStyleListMenu({

          mediaType: 'game',

          itemIdAttr: 'data-id',

          getVisibleItemIds: () =>

            Array.from(document.querySelectorAll('.card[data-id]'))

              .map((card) => card.getAttribute('data-id'))

              .filter(Boolean),

          getQuickStatusForItem: (itemId) => {

            const key = String(itemId || '').trim();

            const status = state.listStatusMap.get(key);

            return status ? { ...status } : null;

          },

          ensureClient: async () => {

            if (supabaseClient) return supabaseClient;

            await ensureSupabase();

            return supabaseClient;

          },

          getCurrentUser: () => currentUser,

          notify: (message, isError) => showToast(message, !!isError),

          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>

            toggleDefaultList(itemId, listType, card, nextSaved)

        });

      }

      initGameFilters().then(() => loadPage());

    });

  </script>
