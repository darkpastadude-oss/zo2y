<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/auth-gate.js?v=20260428a"></script>
  <script src="/js/bootstrap-auth.js?v=20260425a" defer></script>
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex" />
  <title>Zo2y - Games</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script>
    // Allow games browsing even when IGDB is not configured by accepting a Wikipedia-only backend.
    window.ZO2Y_REQUIRE_IGDB = false;
  </script>
  <script src="js/igdb-client.js?v=20260311c"></script>
  <script src="js/list-utils.js?v=20260422a"></script>
  <script src="js/index-list-menu-adapter.js?v=20260317b"></script>
  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --glass: rgba(255,255,255,0.03);
      --white: #ffffff;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      --surface: rgba(19, 35, 71, 0.6);
      --radial-glow: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      --info: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      background: var(--radial-glow);
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0 12px, rgba(255, 184, 77, 0) 12px 24px);
      opacity: 0.25;
      pointer-events: none;
      z-index: -3;
    }

    a { color: inherit; text-decoration: none; }

    /* Header to match index/game */
    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 14px 16px;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      gap: 12px;
    }

    .logo {
      height: 40px;
      width: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .logo:hover { transform: scale(1.05); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav a.ghost {
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .nav a.ghost:hover { color: var(--accent); background: rgba(245, 158, 11, 0.05); }

    .account-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .account-btn:hover { border-color: var(--accent); color: var(--accent); }

    .account-btn.logged-in {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 28px;
      margin: 0 0 8px 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .media-spotlight {
      max-width: 1200px;
      margin: 18px auto 0;
      padding: 0 20px;
    }

    .media-spotlight[hidden] {
      display: none;
    }

    .media-spotlight-shell {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--border);
        min-height: 298px;
        max-height: 298px;
      display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(214px, 21vw, 282px);
      gap: 0;
      align-items: stretch;
      background: linear-gradient(140deg, rgba(16, 31, 64, 0.96), rgba(8, 19, 41, 0.92));
    }

    .media-spotlight-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(8,14,31,0.74), rgba(10,19,39,0.40));
      background-size: cover;
      background-position: center center;
      transform: scale(1.02);
    }

    .media-spotlight-copy,
    .media-spotlight-poster { position: relative; z-index: 1; }

    .media-spotlight-copy {
      padding: 22px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: flex-start;
      min-width: 0;
    }

    .media-spotlight-kicker { display: none; }

    .media-spotlight-copy h2 { margin: 0; font-size: clamp(22px, 2.8vw, 30px); line-height: 1.05; max-width: 12ch; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .media-spotlight-meta,
    .media-spotlight-summary { margin: 0; color: var(--muted); line-height: 1.45; }

    .media-spotlight-meta {
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .media-spotlight-summary {
      font-size: 14px;
      max-width: 36ch;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .media-spotlight-poster {
        padding: 16px 10px;
      display: grid;
      place-items: center;
      overflow: hidden;
      height: 100%;
      min-height: 100%;
      border-left: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(11, 22, 49, 0.72), rgba(8, 16, 36, 0.9));
    }

    .media-spotlight-poster img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center center;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      padding: 0;
    }

    .media-spotlight-actions { margin-top: auto; display: flex; gap: 10px; padding-top: 4px; }

    .controls {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 20px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px 56px;
      gap: 12px;
      align-items: center;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      height: 56px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #10224a;
      color: var(--white);
      outline: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    .filter-select {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
      min-width: 200px;
      font-size: 16px;
    }

    .small-input {
      max-width: 140px;
    }

    .chip-row {
      max-width: 1200px;
      margin: 10px auto 0;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-launch-btn,
    .search-submit-btn {
      width: 56px;
      min-width: 56px;
      height: 56px;
      justify-content: center;
      padding: 0;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      cursor: pointer;
    }

    .filter-launch-btn:hover,
    .filter-launch-btn:focus-visible,
    .search-submit-btn:hover,
    .search-submit-btn:focus-visible {
      border-color: var(--accent);
    }

    .filter-launch-btn i,
    .search-submit-btn i {
      margin: 0;
    }

    .filter-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .filter-form-grid > * {
      min-width: 0;
      max-width: 100%;
    }

    .filter-form-grid .search-input,
    .filter-form-grid .filter-select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      max-width: 1110px;
      margin: 24px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 202px));
      gap: 16px;
      align-items: stretch;
      justify-content: center;
      justify-items: stretch;
    }

    .card {
      background: var(--card);
      border: none;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 300px;
      transition: all 0.2s ease;
      position: relative;
          }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.menu-open,
    .card.menu-open:hover {
      transform: none;
      overflow: visible;
    }

    .card .card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      background: #0f1f40;
      background-size: cover;
      background-position: center center;
      overflow: hidden;
    }

    .card .card-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(9, 18, 36, 0.2) 0%, rgba(9, 18, 36, 0.45) 100%);
      opacity: 0.6;
      pointer-events: none;
    }

    .card .card-media img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      background: transparent;
      padding: 0;
      filter: none;
    }

    .card .card-media.game-media {
      background-color: #111f41;
      background-size: cover;
      background-position: center;
    }

    .card .card-media.game-media img {
      object-fit: contain;
      object-position: center center;
      padding: 8px;
    }

    .card .card-media.game-media.portrait-poster img {
      object-fit: cover;
      object-position: center center;
      padding: 0;
    }

    .card .card-media.game-media.plain-logo {
      background: transparent !important;
      background-image: none !important;
    }

    .card .card-media.game-media.plain-logo::before,
    .card .card-media.game-media.plain-logo::after {
      display: none;
    }

    .card .card-media.game-media.plain-logo img {
      padding: 0;
      filter: none;
    }

    .card .card-media.game-media::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.12), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(9, 18, 36, 0.18) 0%, rgba(9, 18, 36, 0.72) 100%);
      z-index: 0;
      pointer-events: none;
    }

    .card-body {
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      margin: 0;
      order: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
      margin-top: 2px;
    }

    .empty {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      color: var(--muted);
      text-align: center;
    }

    .pagination {
      padding: 0 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .page-btn {
      min-width: 44px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .page-info {
      color: var(--muted);
      font-size: 13px;
    }

    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      order: 3;
      margin-top: auto;
    }

    .card-menu-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(19, 35, 71, 0.9);
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .menu-btn:hover { border-color: var(--accent); color: var(--accent); }

    .list-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .list-menu.open { display: flex; }

    .list-menu-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    .list-menu-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

    .list-action {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: all 0.2s ease;
      margin-bottom: 6px;
    }

    .list-action:last-child { margin-bottom: 0; }
    .list-action:hover { border-color: var(--accent); color: var(--accent); }
    .list-action.active {
      background: rgba(245, 158, 11, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 2000;
      box-shadow: var(--shadow);
    }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--error); color: white; }
    .notification.info { background: var(--info); color: white; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
    }
    .modal-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
      margin-bottom: 12px;
    }
    .modal-list-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .modal-list-actions { display: inline-flex; gap: 6px; align-items: center; }
    .list-edit-btn {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .list-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-list-item.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.12);
    }
    .modal-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .modal-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
    }
    .icon-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .icon-option {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-option.selected { border-color: var(--accent); color: var(--accent); }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-info {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 202px)); justify-content: center; }
    }

    @media (max-width: 780px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 202px)); justify-content: center; }
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 22px; }
      .grid { gap: 12px; }
      .card .card-media { aspect-ratio: 2 / 3; }
    }

    .menu-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .menu-modal.active {
      display: flex;
    }

    .menu-modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    @keyframes menuFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .menu-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .menu-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin: 0;
    }

    .menu-modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .menu-modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }

    .menu-modal-body {
      padding: 16px 20px;
    }

    .menu-quick-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .menu-custom-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .menu-custom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

<body>

  <div class="controls">

    <script>
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const IGDB_PROXY_BASE = '/api/igdb';
      const FALLBACK_GAME_IMAGE = '/newlogo.webp';
      const API_PAGE_SIZE = 50;
      let GAMES_PAGE_SIZE = 30;

    function computeGridPageSize() {
      const grid = document.getElementById('gamesGrid');
      if (!grid) return 18;
      const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;
      const rows = 3;
      return cols * rows;
    }

    let supabaseClient = null;
    let currentUser = null;
    const state = {
      games: [],
      search: '',
      page: 1,
      totalPages: 1,
      listStatusMap: new Map(),
      pendingQuickOps: new Set()
    };

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(message, isError = false) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '16px';
      el.style.right = '16px';
      el.style.zIndex = '9999';
      el.style.background = isError ? '#dc2626' : '#f59e0b';
      el.style.color = '#fff';
      el.style.padding = '10px 14px';
      el.style.borderRadius = '10px';
      el.style.fontSize = '13px';
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    let searchDebounceTimer = null;

    async function loadGamesWithFallback(queryOverride = '') {
      const query = String(queryOverride || state.search || '').trim();
      let games = [];
      let apiTotalResults = null;

      GAMES_PAGE_SIZE = computeGridPageSize();
      const startIndex = (state.page - 1) * GAMES_PAGE_SIZE;
      const withinOffset = startIndex % GAMES_PAGE_SIZE;

      const client = await ensureSupabase();
      if (client) {
        try {
          let supabaseQuery = client
            .from('games')
            .select('*', { count: 'exact', head: false })
            .order('rating', { ascending: false, nullsFirst: false })
            .order('rating_count', { ascending: false, nullsFirst: false })
            .range(startIndex, startIndex + GAMES_PAGE_SIZE - 1);

          if (query) {
            supabaseQuery = supabaseQuery.ilike('title', `%${query}%`);
          }

          const { data, error, count } = await supabaseQuery;
          if (!error && Array.isArray(data)) {
            games = data;
            apiTotalResults = count;
          }
        } catch (_err) {
          console.error('Failed to load games from Supabase', _err);
        }
      }

      if (games.length === 0) {
        try {
          for (let p = 1; p <= 6 && games.length < withinOffset + GAMES_PAGE_SIZE; p += 1) {
            const url = `${IGDB_PROXY_BASE}/games?sort=popularity desc&limit=${API_PAGE_SIZE}&offset=${(p - 1) * API_PAGE_SIZE}`;
            const res = await fetch(url);
            if (!res.ok) break;
            const json = await res.json();
            if (apiTotalResults == null && typeof json?.count === 'number') apiTotalResults = json.count;
            const batch = Array.isArray(json?.data) ? json.data : (Array.isArray(json) ? json : []);
            games = games.concat(batch);
            if (!batch.length) break;
          }
        } catch (_err) {
          console.error('Failed to load popular games from IGDB', _err);
        }
      }

      state.games = games.map((game) => ({
        id: String(game.id || ''),
        name: game.name || game.title || 'Unknown Game',
        summary: game.summary || game.description || '',
        coverUrl: game.cover_url || game.cover ? `https://images.igdb.com/igdb/image/upload/t_cover_big/${game.cover}.jpg` : '',
        heroUrl: game.hero_url || '',
        rating: game.rating || 0,
        releaseDate: game.release_date || (game.first_release_date ? new Date(game.first_release_date * 1000).getFullYear() : '')
      })).filter((g) => g.id);

      const seen = new Set();
      state.games = state.games.filter(game => {
        if (seen.has(game.id)) return false;
        seen.add(game.id);
        return true;
      });

      state.games.sort((a, b) => {
        const aHasCover = !!a.coverUrl;
        const bHasCover = !!b.coverUrl;
        if (aHasCover && !bHasCover) return -1;
        if (!aHasCover && bHasCover) return 1;
        return 0;
      });

      state.games = state.games.slice(withinOffset, withinOffset + GAMES_PAGE_SIZE);

      if (typeof apiTotalResults === 'number' && Number.isFinite(apiTotalResults) && apiTotalResults > 0) {
        state.totalPages = Math.max(1, Math.ceil(apiTotalResults / GAMES_PAGE_SIZE));
      } else {
        state.totalPages = 1;
      }

      fetchWikipediaCovers();
    }

    async function fetchWikipediaCovers() {
      const gamesWithoutCovers = state.games.filter(g => !g.coverUrl && g.name);
      if (gamesWithoutCovers.length === 0) return;

      for (const game of gamesWithoutCovers.slice(0, 10)) {
        try {
          const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(game.name + ' video game')}&format=json&origin=*`;
          const searchRes = await fetch(searchUrl);
          if (!searchRes.ok) continue;
          const searchJson = await searchRes.json();
          const results = searchJson?.query?.search || [];
          if (results.length === 0) continue;

          const pageTitle = results[0].title;
          const imageUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle)}`;
          const imageRes = await fetch(imageUrl);
          if (!imageRes.ok) continue;
          const imageJson = await imageRes.json();
          
          if (imageJson?.originalimage?.source) {
            game.coverUrl = imageJson.originalimage.source;
          } else if (imageJson?.thumbnail?.source) {
            game.coverUrl = imageJson.thumbnail.source.replace(/\/\d+px-/, '/500px-');
          }
        } catch (_err) {
          console.error('Failed to fetch Wikipedia cover for', game.name, _err);
        }
      }

      renderGrid();
    }

    function debounceSearch(query) {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(async () => {
        state.search = query;
        state.page = 1;
        await loadGamesWithFallback();
        await loadListStatus();
        renderGrid();
      }, 400);
    }

    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
        await authRuntime.waitForSupabase(8000);
      } else {
        const startedAt = Date.now();
        while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
          await new Promise((resolve) => setTimeout(resolve, 40));
        }
      }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
        supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        if (supabaseClient) return supabaseClient;
      }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(
          window.__ZO2Y_SUPABASE_CONFIG.url,
          window.__ZO2Y_SUPABASE_CONFIG.key,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
        );
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
        return supabaseClient;
      }
      return null;
    }

    async function initAuthUi() {
      const client = await ensureSupabase();
      if (!client) return;
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const profileBtn = document.getElementById('profileBtn');
      const { data } = await client.auth.getUser();
      currentUser = data?.user || null;

      if (currentUser) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (profileBtn) {
          profileBtn.style.display = 'inline-flex';
          profileBtn.innerHTML = '<i class="fas fa-user"></i><span>Profile</span>';
        }
      } else {
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (signupBtn) signupBtn.style.display = 'inline-flex';
        if (profileBtn) profileBtn.style.display = 'none';
      }
    }

    async function loadListStatus() {
      state.listStatusMap = new Map();
      if (!currentUser?.id || !state.games.length) return;
      const client = await ensureSupabase();
      if (!client) return;
      const ids = state.games.map((game) => game.id);
      if (!ids.length) return;
      const { data } = await client
        .from('game_list_items')
        .select('game_id, list_type')
        .eq('user_id', currentUser.id)
        .in('game_id', ids);
      (data || []).forEach((row) => {
        const id = String(row.game_id || '');
        if (!id) return;
        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, played: false, toplay: false });
        const bucket = state.listStatusMap.get(id);
        if (row.list_type in bucket) bucket[row.list_type] = true;
      });
    }

    function getGameListStatus(gameId) {
      const id = String(gameId || '').trim();
      const empty = { favorites: false, played: false, topplay: false };
      if (!id) return empty;
      if (!state.listStatusMap.has(id)) {
        state.listStatusMap.set(id, { ...empty });
      }
      return state.listStatusMap.get(id);
    }

    function getGameCardExtra(game) {
      const year = game.releaseDate || '';
      const rating = game.rating ? `Rating: ${game.rating.toFixed(1)}` : '';
      const parts = [year, rating].filter(Boolean);
      return parts.join(' | ') || 'Game details';
    }

    function renderGrid() {
      const grid = document.getElementById('gamesGrid');
      if (!grid) return;
      if (!state.games.length) {
        grid.innerHTML = '<div class="empty">No games found.</div>';
        updatePagination();
        return;
      }
      grid.innerHTML = state.games.map((game) => {
        const coverUrl = game.coverUrl || FALLBACK_GAME_IMAGE;
        return `
        <article class="card" data-id="${escapeHtml(game.id)}">
          <div class="card-media">
            <img src="${escapeHtml(coverUrl)}" alt="${escapeHtml(game.name)}" loading="lazy">
          </div>
          <div class="card-meta">
            <p class="card-title">${escapeHtml(game.name)}</p>
            <p class="card-sub">${escapeHtml(game.releaseDate)}</p>
            <p class="card-extra">${escapeHtml(getGameCardExtra(game))}</p>
            <div class="card-actions">
              <button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
        </article>
      `;
      }).join('');

      wireGridActions();
      updatePagination();
    }

    function updatePagination() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const info = document.getElementById('pageInfo');
      if (state.page > state.totalPages) state.page = state.totalPages;
      if (state.page < 1) state.page = 1;
      if (prevBtn) prevBtn.disabled = state.page <= 1;
      if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
      if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;
    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
      const gameId = String(itemId || '').trim();
      if (!gameId) return { ok: false, saved: false };
      const game = state.games.find((row) => String(row.id || '').trim() === gameId);
      if (!game) return { ok: false, saved: false };

      const client = await ensureSupabase();
      if (!client || !currentUser?.id) {
        window.location.href = 'login.html';
        return { ok: false, saved: false };
      }

      const status = getGameListStatus(gameId);
      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];
      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
      const opKey = `${gameId}:${listType}`;
      if (state.pendingQuickOps.has(opKey)) {
        return { ok: false, saved: previousSaved };
      }

      state.pendingQuickOps.add(opKey);
      status[listType] = nextSaved;
      try {
        if (nextSaved) {
          const { error } = await client.from('game_list_items').insert({
            user_id: currentUser.id,
            game_id: gameId,
            list_type: listType
          });
          if (error && String(error.code || '') !== '23505') throw error;
          showToast('Added to list');
        } else {
          const { error } = await client
            .from('game_list_items')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('game_id', gameId)
            .eq('list_type', listType);
          if (error) throw error;
          showToast('Removed from list');
        }
        return { ok: true, saved: nextSaved };
      } catch (error) {
        console.error('Game list toggle failed', error);
        status[listType] = previousSaved;
        showToast('Could not update list', true);
        return { ok: false, saved: previousSaved };
      } finally {
        state.pendingQuickOps.delete(opKey);
      }
    }

    function wireGridActions() {
      document.querySelectorAll('.menu-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.card');
          if (!card) return;
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      });

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.menu-btn')) return;
          const id = String(card.getAttribute('data-id') || '').trim();
          if (!id) return;
          window.location.href = `game.html?id=${encodeURIComponent(id)}`;
        });
      });
    }

    async function loadPage() {
      try {
        await initAuthUi();
        await loadGamesWithFallback();
        await loadListStatus();
        renderGrid();
      } catch (_err) {
        const grid = document.getElementById('gamesGrid');
        if (grid) grid.innerHTML = '<div class="empty">Games feed unavailable right now.</div>';
      }
    }

    document.getElementById('searchSubmitBtn')?.addEventListener('click', async () => {
      const query = String(document.getElementById('searchInput')?.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('searchInput')?.addEventListener('input', async (e) => {
      const query = String(e.target.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('filterToggleBtn')?.addEventListener('click', () => {
      document.getElementById('filterModal')?.classList.add('active');
    });
    document.getElementById('closeFilterModalBtn')?.addEventListener('click', () => {
      document.getElementById('filterModal')?.classList.remove('active');
    });
    document.getElementById('prevPageBtn')?.addEventListener('click', async () => {
      if (state.page <= 1) return;
      state.page -= 1;
      await loadGamesWithFallback();
      await loadListStatus();
      renderGrid();
    });
    document.getElementById('nextPageBtn')?.addEventListener('click', async () => {
      if (state.page >= state.totalPages) return;
      state.page += 1;
      await loadGamesWithFallback();
      await loadListStatus();
      renderGrid();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initUniversalSearch) {
        const initSearch = () => window.initUniversalSearch({
          input: '#globalSearch',
          fallbackRoute: 'games.html'
        });
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(initSearch, { timeout: 1500 });
        } else {
          window.setTimeout(initSearch, 0);
        }
      }
      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'game',
          itemIdAttr: 'data-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-id]'))
              .map((card) => card.getAttribute('data-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '').trim();
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await ensureSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => currentUser,
          notify: (message, isError) => showToast(message, !!isError),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }
      loadPage();
    });
  </script>
