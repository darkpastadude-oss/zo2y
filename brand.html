<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/js/auth-gate.js?v=20260418h"></script>
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex" />
  <title>Brand Details ? Zo2y</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/pages/brand.css?v=20260316b" />
  <link rel="stylesheet" href="css/shared-header.css?v=20260319b" />
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <meta name="theme-color" content="#0b1633" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260308a" />
  <script src="/js/mobile-webapp.js?v=20260322r" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/list-utils.js?v=20260317b" defer></script>
  <script src="js/index-list-menu-adapter.js?v=20260317b" defer></script>
  <script src="js/review-interactions.js?v=20260308a" defer></script>
<script src="js/shared-header.js?v=20260415b" defer></script>
  <script src="js/pages/brand.js?v=20260322a" defer></script>
</head>
<body data-nav-page="">
  <main class="container">
    <section class="hero" id="brandHero">
      <div class="hero-logo">
        <img id="brandLogo" src="/newlogo.webp" alt="Brand logo" />
      </div>
      <div>
        <h1 class="hero-title" id="brandName">Loading...</h1>
        <div class="hero-meta" id="brandMeta"></div>
        <div class="hero-desc" id="brandDescription"></div>
        <div class="hero-actions">
          <button class="action-btn brand-menu-btn" id="brandMenuBtn" aria-label="Add to list">
            <i class="fas fa-ellipsis-v"></i>
          </button>
          <a class="action-btn" id="brandWebsite" target="_blank" rel="noopener"><i class="fa-solid fa-link"></i> Official site</a>
        </div>
      </div>
    </section>

    <section class="section" id="brandAbout">
      <h2>About</h2>
      <div id="brandAboutBody">Loading brand details...</div>
    </section>

    <section id="reviews-section" class="section reviews">
      <h2>Brand Reviews</h2>
      <div class="reviews-sort-controls" id="reviewsSortControls" style="display: none;">
        <span class="sort-label">Sort by:</span>
        <select class="sort-select" id="sortSelect">
          <option value="latest">Latest</option>
          <option value="highest">Highest Rated</option>
          <option value="lowest">Lowest Rated</option>
        </select>
      </div>
      <div class="reviews-stats" id="reviewsStats">
        <div class="reviews-loading">Loading reviews...</div>
      </div>
      <div class="reviews-container" id="reviewsList"></div>
      <div class="review-form-section">
        <h3>Share Your Thoughts</h3>
        <form id="review-form" style="display: none;">
          <div class="rating-input">
            <label>Your Rating:</label>
            <div class="stars-rating">
              <span class="star" data-rating="1"></span>
              <span class="star" data-rating="2"></span>
              <span class="star" data-rating="3"></span>
              <span class="star" data-rating="4"></span>
              <span class="star" data-rating="5"></span>
            </div>
            <span class="rating-text" id="ratingText">Select your rating</span>
          </div>
          <div class="comment-input">
            <textarea id="review-comment" placeholder="What did you think of this brand?" rows="4" maxlength="500"></textarea>
            <div class="char-count">
              <span id="charCount">0</span>/500 characters
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn submit-review-btn">
              <span class="btn-text">Submit Review</span>
            </button>
            <button type="button" class="btn secondary cancel-edit-btn" style="display: none;">Cancel Edit</button>
          </div>
        </form>
        <div id="auth-prompt" class="auth-prompt">
          <div class="auth-icon"><i class="fas fa-lock"></i></div>
          <p>Please <a href="login.html" class="auth-link">sign in</a> to review brands</p>
        </div>
      </div>
    </section>
  </main>

  <div id="brandActionCard" class="card" style="display:none;" data-item-id="">
    <div class="card-title"></div>
    <div class="card-meta"></div>
    <img src="" alt="" />
  </div>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
            <button class="menu-create-list-btn" id="menuCreateListBtn">
              <i class="fas fa-plus"></i> New
            </button>
          </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="createListModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content" style="max-width: 320px;">
      <div class="menu-modal-header">
        <h3>Create New List</h3>
        <button class="menu-modal-close" id="closeCreateModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body">
        <input type="text" id="newListNameInput" class="menu-input" placeholder="List name..." maxlength="50">
        <div class="menu-icon-grid">
          <button class="menu-icon-option selected" data-icon="fas fa-list"><i class="fas fa-list"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-heart"><i class="fas fa-heart"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-star"><i class="fas fa-star"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-bookmark"><i class="fas fa-bookmark"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-shirt"><i class="fas fa-shirt"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-burger"><i class="fas fa-burger"></i></button>
        </div>
        <div class="menu-modal-actions">
          <button class="menu-btn menu-btn-secondary" id="cancelCreateBtn">Cancel</button>
          <button class="menu-btn menu-btn-primary" id="saveNewListBtn">Create List</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
