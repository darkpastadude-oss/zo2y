<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zo2y - Sign Up</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family:sans-serif;}
  body {background:#fff; display:flex; justify-content:center; align-items:center; height:100vh;}
  .form-container {
    background:#fff; padding:40px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:320px; text-align:center; border-top:6px solid #FF6F00; position:relative;
  }
  .home-button {
    position:absolute; top:-40px; left:50%; transform:translateX(-50%);
    background:#FF6F00; color:#fff; border:none; border-radius:30px; padding:10px 20px;
    cursor:pointer; transition: transform 0.3s, box-shadow 0.3s;
  }
  .home-button:hover {transform:scale(1.05); box-shadow:0 8px 20px rgba(255,111,0,0.5);}
  .form-container img {width:80px; margin-bottom:20px;}
  .form-container h2 {margin-bottom:20px; color:#333;}
  .form-container input {
    width:100%; padding:12px 15px; margin:10px 0; border:1px solid #ccc; border-radius:10px;
    font-size:1rem; transition: border 0.3s;
  }
  .form-container input:focus {border-color:#FF6F00; outline:none;}
  .form-container button {
    width:100%; padding:12px; margin-top:20px; background:#FF6F00; border:none; border-radius:30px;
    color:#fff; font-size:1rem; cursor:pointer; transition: transform 0.3s, box-shadow 0.3s;
  }
  .form-container button:hover {transform:scale(1.05); box-shadow:0 8px 20px rgba(255,111,0,0.5);}
  .form-container .link {margin-top:15px; display:block; color:#FF6F00; text-decoration:none;}
  .form-container .link:hover {text-decoration:underline;}
</style>
</head>
<body>

<div class="form-container">
  <button class="home-button" onclick="window.location.href='index.html'">Home</button>
  <img src="zo2y.png" alt="Zo2y Logo">
  <h2>Create Your Account</h2>
  <input type="text" placeholder="Full Name" id="name" required>
  <input type="email" placeholder="Email" id="email" required>
  <input type="password" placeholder="Password" id="password" required>
  <button onclick="signup()">Sign Up</button>
  <a href="login.html" class="link">Already have an account? Login</a>
</div>

<script>
function signup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  if(!name || !email || !password){
    alert('Please fill in all fields.');
    return;
  }
  alert('Account created successfully!');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
