<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <script src="/js/auth-gate.js?v=20260417a"></script>
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex" />
<title>Zo2y - Sign Up</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/pages/auth-entry.css?v=20260417a">
  <meta name="theme-color" content="#0b1633" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
</head>
<body data-auth-variant="signup">
<div class="auth-entry-shell auth-entry-shell-signup">
  <section class="auth-entry-panel">
    <div class="auth-panel-topbar">
      <a class="auth-entry-home" href="index.html" aria-label="Back to landing">
        <img src="/newlogo.webp" alt="Zo2y home">
      </a>
      <a class="auth-topbar-link" href="login.html">log in</a>
    </div>
    <div class="auth-panel-card auth-panel-card-signup auth-card">
      <h2>Sign up</h2>

      <div id="errorMessage" class="message error"></div>
      <div id="successMessage" class="message success"></div>
      <div class="auth-invite-banner" id="authInviteBanner" hidden></div>

      <button class="google-btn" id="googleSignup">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <form id="signupForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Full name" id="fullName" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" id="email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password" required minlength="8">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-user-plus"></i> <span>Sign up with Email</span>
        </button>
      </form>

      <div class="alt-link">
        Already have an account? <a href="login.html" id="altLoginLink">Log in</a>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/referral-utils.js?v=20260319a"></script>
<script>
(function() {
  'use strict';
  
  // Supabase configuration
  const SUPABASE_URL = 'https://gfkhjbztayjyojsgdpgk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma2hqYnp0YXlqeW9qc2dkcGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwOTYyNjQsImV4cCI6MjA3NTY3MjI2NH0.WUb2yDAwCeokdpWCPeH13FE8NhWF6G8e6ivTsgu6b2s';
  
  const STORAGE_KEY = 'zo2y-auth-v1';
  const LEGACY_STORAGE_KEY = 'sb-gfkhjbztayjyojsgdpgk-auth-token';
  const PERSIST_STORAGE_KEY = 'zo2y-auth-persist-v1';
  const DURABLE_STORAGE_KEY = 'zo2y-auth-durable-v1';
  const POST_AUTH_BOOTSTRAP_KEY = 'zo2y_post_auth_bootstrap_v1';
  function getAuthStorageKeys(key) {
    const value = String(key || '').trim();
    if (!value) return [];
    if (value === STORAGE_KEY || value === LEGACY_STORAGE_KEY || value === PERSIST_STORAGE_KEY) {
      return [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY];
    }
    return [value];
  }
  const bootstrapAuthStorageBridge = window.__ZO2Y_AUTH_STORAGE_BRIDGE || {
    getItem(key) {
      const keys = getAuthStorageKeys(key);
      for (const candidate of keys) {
        try {
          const localValue = window.localStorage ? window.localStorage.getItem(candidate) : null;
          if (localValue !== null && localValue !== undefined && localValue !== '') return localValue;
        } catch (_err) {}
      }
      for (const candidate of keys) {
        try {
          const sessionValue = window.sessionStorage ? window.sessionStorage.getItem(candidate) : null;
          if (sessionValue !== null && sessionValue !== undefined && sessionValue !== '') return sessionValue;
        } catch (_err) {}
      }
      return null;
    },
    setItem(key, value) {
      const keys = getAuthStorageKeys(key);
      keys.forEach((candidate) => {
        try {
          if (window.localStorage) window.localStorage.setItem(candidate, value);
        } catch (_err) {}
      });
      keys.forEach((candidate) => {
        try {
          if (window.sessionStorage) window.sessionStorage.setItem(candidate, value);
        } catch (_err) {}
      });
    },
    removeItem(key) {
      const keys = getAuthStorageKeys(key);
      keys.forEach((candidate) => {
        try {
          if (window.sessionStorage) window.sessionStorage.removeItem(candidate);
        } catch (_err) {}
      });
      keys.forEach((candidate) => {
        try {
          if (window.localStorage) window.localStorage.removeItem(candidate);
        } catch (_err) {}
      });
    }
  };
  window.__ZO2Y_AUTH_STORAGE_BRIDGE = bootstrapAuthStorageBridge;

  // Initialize Supabase
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      storage: bootstrapAuthStorageBridge,
      storageKey: STORAGE_KEY,
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false  // Important: Don't auto-detect on signup page
    }
  });
  
  // DOM Elements
  const signupForm = document.getElementById('signupForm');
  const fullNameInput = document.getElementById('fullName');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const googleSignup = document.getElementById('googleSignup');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');
  const referralUtils = window.ZO2Y_REFERRALS || null;
  const activeReferral = referralUtils ? referralUtils.captureReferralFromLocation(window.location.search) : '';
  let verifiedUserPromise = null;
  const AUTH_DEBUG_KEY = 'zo2y_auth_debug';
  function safeGetAuthStorage(key) {
    const keys = getAuthStorageKeys(key);
    for (const candidate of keys) {
      try {
        const localValue = window.localStorage ? window.localStorage.getItem(candidate) : null;
        if (localValue !== null && localValue !== undefined && localValue !== '') return localValue;
      } catch (_err) {}
    }
    for (const candidate of keys) {
      try {
        const sessionValue = window.sessionStorage ? window.sessionStorage.getItem(candidate) : null;
        if (sessionValue !== null && sessionValue !== undefined && sessionValue !== '') return sessionValue;
      } catch (_err) {}
    }
    return null;
  }

  function safeSetAuthStorage(key, value) {
    const keys = getAuthStorageKeys(key);
    let wroteAny = false;
    keys.forEach((candidate) => {
      try {
        if (window.localStorage) {
          window.localStorage.setItem(candidate, value);
          wroteAny = true;
        }
      } catch (_err) {}
    });
    keys.forEach((candidate) => {
      try {
        if (window.sessionStorage) {
          window.sessionStorage.setItem(candidate, value);
          wroteAny = true;
        }
      } catch (_err) {}
    });
    return wroteAny;
  }

  function safeRemoveAuthStorage(key) {
    const keys = getAuthStorageKeys(key);
    keys.forEach((candidate) => {
      try {
        if (window.sessionStorage) window.sessionStorage.removeItem(candidate);
      } catch (_err) {}
    });
    keys.forEach((candidate) => {
      try {
        if (window.localStorage) window.localStorage.removeItem(candidate);
      } catch (_err) {}
    });
  }

  function authDebugEnabled() {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('debug_auth') === '1') {
        if (window.localStorage) window.localStorage.setItem(AUTH_DEBUG_KEY, '1');
        return true;
      }
    } catch (_err) {}
    try {
      return !!(window.localStorage && window.localStorage.getItem(AUTH_DEBUG_KEY) === '1');
    } catch (_err) {
      return false;
    }
  }

  function previewSession(session) {
    return session ? {
      hasAccessToken: !!session.access_token,
      hasRefreshToken: !!session.refresh_token,
      userId: String(session.user?.id || '').trim() || null,
      email: String(session.user?.email || '').trim() || null,
      provider: String(session.user?.app_metadata?.provider || session.user?.user_metadata?.provider || '').trim() || null,
      expiresAt: session.expires_at || null
    } : null;
  }

  function getAuthStoragePresence() {
    const keys = [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY, DURABLE_STORAGE_KEY, POST_AUTH_BOOTSTRAP_KEY];
    const state = {};
    keys.forEach((key) => {
      let local = false;
      let session = false;
      try {
        local = !!(window.localStorage && window.localStorage.getItem(key));
      } catch (_err) {}
      try {
        session = !!(window.sessionStorage && window.sessionStorage.getItem(key));
      } catch (_err) {}
      state[key] = { local, session };
    });
    return state;
  }

  function authDebug(label, payload) {
    if (!authDebugEnabled()) return;
    if (payload === undefined) {
      console.log('[ZO2Y AUTH][signup]', label);
      return;
    }
    console.log('[ZO2Y AUTH][signup]', label, payload);
  }

  function persistSessionSnapshot(session) {
    if (!session || typeof session !== 'object') return false;
    try {
      const payload = JSON.stringify(session);
      safeSetAuthStorage(STORAGE_KEY, payload);
      safeSetAuthStorage(LEGACY_STORAGE_KEY, payload);
      safeSetAuthStorage(PERSIST_STORAGE_KEY, payload);
      try {
        localStorage.setItem(DURABLE_STORAGE_KEY, JSON.stringify({
          session,
          createdAt: Date.now()
        }));
      } catch (_err) {}
      if (typeof window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT === 'function') {
        window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT();
      }
      authDebug('persistSessionSnapshot', {
        session: previewSession(session),
        storage: getAuthStoragePresence()
      });
      return true;
    } catch (_err) {
      authDebug('persistSessionSnapshot:error', {
        message: String(_err?.message || _err || '')
      });
      return false;
    }
  }

  function readStoredSessionSnapshot() {
    const keys = [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY];
    for (const key of keys) {
      try {
        const raw = safeGetAuthStorage(key);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        const session = parsed?.currentSession || parsed?.session || parsed;
        if (session?.access_token && session?.refresh_token) return session;
      } catch (_err) {}
    }
    try {
      const raw = localStorage.getItem(DURABLE_STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const session = parsed?.session || parsed?.currentSession || parsed;
      if (session?.access_token && session?.refresh_token) return session;
    } catch (_err) {}
    return null;
  }

  async function restoreSessionFromStorage(clientOverride = null) {
    const storedSession = readStoredSessionSnapshot();
    if (!storedSession?.access_token || !storedSession?.refresh_token) return null;
    const authClient = clientOverride || getPreferredOAuthClient();
    if (!authClient?.auth || typeof authClient.auth.setSession !== 'function') return null;
    try {
      const { data } = await authClient.auth.setSession({
        access_token: storedSession.access_token,
        refresh_token: storedSession.refresh_token
      });
      const session = data?.session || null;
      if (session?.access_token && session?.refresh_token) {
        persistSessionSnapshot(session);
      }
      return session;
    } catch (_err) {
      return null;
    }
  }

  function persistPendingPostAuthBootstrap(payload) {
    if (!payload || typeof payload !== 'object') return false;
    try {
      localStorage.setItem(POST_AUTH_BOOTSTRAP_KEY, JSON.stringify({
        ...payload,
        createdAt: Date.now()
      }));
      return true;
    } catch (_err) {
      return false;
    }
  }

  const initialNextPath = sanitizeNextPath(new URLSearchParams(window.location.search).get('next') || safeGetAuthStorage('postAuthRedirect') || 'index.html');

  function analyticsTrack(eventName, properties = {}, essential = false) {
    try {
      if (window.ZO2Y_ANALYTICS && typeof window.ZO2Y_ANALYTICS.track === 'function') {
        window.ZO2Y_ANALYTICS.track(eventName, properties, essential ? { essential: true } : {});
      }
    } catch (_err) {}
  }

  function analyticsMarkFirstAction(eventName, properties = {}) {
    try {
      if (window.ZO2Y_ANALYTICS && typeof window.ZO2Y_ANALYTICS.markFirstAction === 'function') {
        window.ZO2Y_ANALYTICS.markFirstAction(eventName, properties, { essential: true });
      } else {
        analyticsTrack(eventName, properties, true);
      }
    } catch (_err) {}
  }

  function sanitizeNextPath(raw) {
    const value = String(raw || '').trim();
    if (!value) return 'index.html';
    if (/^https?:\/\//i.test(value) || value.startsWith('//')) return 'index.html';
    if (value.startsWith('/')) return value.slice(1) || 'index.html';
    return value;
  }

  function getPostAuthRedirect() {
    return sanitizeNextPath(new URLSearchParams(window.location.search).get('next') || safeGetAuthStorage('postAuthRedirect') || initialNextPath || 'index.html');
  }

  function getHashParams() {
    const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    return new URLSearchParams(hash);
  }

  function buildPostAuthRedirectTarget(rawNext) {
    const safeNext = sanitizeNextPath(rawNext || 'index.html');
    try {
      const targetUrl = new URL(safeNext, window.location.origin);
      targetUrl.searchParams.set('auth_return', '1');
      targetUrl.searchParams.set('authv', '20260325c');
      return `${targetUrl.pathname.replace(/^\//, '')}${targetUrl.search}${targetUrl.hash}`;
    } catch (_err) {
      return safeNext;
    }
  }

  function decorateReferralLinks() {
    const inviteBanner = document.getElementById('authInviteBanner');
    const safeReferral = referralUtils ? referralUtils.getStoredReferral() : activeReferral;
    if (inviteBanner) {
      if (safeReferral) {
        inviteBanner.hidden = false;
        inviteBanner.innerHTML = `<i class="fas fa-user-group"></i><span>You are joining Zo2y through @${safeReferral}'s invite link.</span>`;
      } else {
        inviteBanner.hidden = true;
      }
    }

    const loginLink = document.getElementById('altLoginLink');
    if (loginLink && referralUtils) {
      loginLink.href = referralUtils.appendReferralToHref('login.html', {
        referral: safeReferral,
        next: getPostAuthRedirect()
      });
    }

    document.querySelectorAll('.auth-entry-home').forEach((link) => {
      if (!referralUtils) return;
      link.href = referralUtils.appendReferralToHref('index.html', {
        referral: safeReferral,
        next: 'index.html'
      });
    });
  }

  decorateReferralLinks();

  async function waitForStableSession(timeoutMs = 2400) {
    const startedAt = Date.now();
    while ((Date.now() - startedAt) < timeoutMs) {
      const user = await getVerifiedUser();
      if (user?.id) return user;
      await new Promise((resolve) => setTimeout(resolve, 100));
    }
    return null;
  }

  async function ensureProfileBootstrap(userOverride = null, clientOverride = null) {
    const user = userOverride?.id ? userOverride : await getVerifiedUser();
    authDebug('ensureProfileBootstrap:start', {
      userId: String(user?.id || '').trim() || null
    });
    if (!user?.id || typeof window.__ZO2Y_ENSURE_AUTH_PROFILE !== 'function') {
      return false;
    }
    try {
      const result = await window.__ZO2Y_ENSURE_AUTH_PROFILE(clientOverride || supabase, user);
      authDebug('ensureProfileBootstrap:result', {
        ok: !!(result && result.ok !== false),
        created: !!result?.created
      });
      return !!(result && result.ok !== false);
    } catch (_err) {
      authDebug('ensureProfileBootstrap:error', {
        message: String(_err?.message || _err || '')
      });
      return false;
    }
  }

  function getPreferredOAuthClient() {
    const sharedClient = window.__ZO2Y_SUPABASE_CLIENT;
    if (sharedClient?.auth && typeof sharedClient.auth.getSession === 'function') {
      authDebug('getPreferredOAuthClient', { client: 'shared' });
      return sharedClient;
    }
    authDebug('getPreferredOAuthClient', { client: 'page-local' });
    return supabase;
  }

  async function resolveStableOAuthSession(client, fallbackSession = null) {
    const fallback = fallbackSession?.access_token && fallbackSession?.refresh_token
      ? fallbackSession
      : null;
    authDebug('resolveStableOAuthSession:start', {
      fallback: previewSession(fallback)
    });
    if (!client?.auth || typeof client.auth.getSession !== 'function') {
      return fallback;
    }
    try {
      const { data } = await client.auth.getSession();
      const liveSession = data?.session || null;
      if (liveSession?.access_token && liveSession?.refresh_token) {
        authDebug('resolveStableOAuthSession:live-session', previewSession(liveSession));
        return liveSession;
      }
    } catch (_err) {
      authDebug('resolveStableOAuthSession:error', {
        message: String(_err?.message || _err || '')
      });
    }
    authDebug('resolveStableOAuthSession:fallback', previewSession(fallback));
    return fallback;
  }

  function persistGoogleOAuthSession(session) {
    let wroteAny = false;
    if (typeof window.__ZO2Y_PERSIST_SESSION_SNAPSHOT === 'function') {
      try {
        wroteAny = window.__ZO2Y_PERSIST_SESSION_SNAPSHOT(session) || wroteAny;
      } catch (_err) {}
    }
    wroteAny = persistSessionSnapshot(session) || wroteAny;
    authDebug('persistGoogleOAuthSession', {
      wroteAny,
      session: previewSession(session),
      storage: getAuthStoragePresence()
    });
    return wroteAny;
  }

  async function finalizeAuthRedirect(sessionOverride = null, clientOverride = null) {
    authDebug('finalizeAuthRedirect:start', {
      session: previewSession(sessionOverride),
      next: getPostAuthRedirect(),
      storage: getAuthStoragePresence()
    });
    if (sessionOverride) persistSessionSnapshot(sessionOverride);
    let stableUser = sessionOverride?.user || null;
    if (!stableUser?.id) {
      stableUser = await waitForStableSession(2400);
    }
    if (stableUser?.id) {
      await ensureProfileBootstrap(stableUser, clientOverride || supabase);
    }
    const nextPath = getPostAuthRedirect();
    safeRemoveAuthStorage('oauthFlow');
    safeRemoveAuthStorage('postAuthRedirect');
    authDebug('finalizeAuthRedirect:replace', {
      stableUserId: String(stableUser?.id || '').trim() || null,
      target: buildPostAuthRedirectTarget(nextPath)
    });
    window.location.replace(buildPostAuthRedirectTarget(nextPath));
  }

  async function completeGoogleSignupFromReturn() {
    const params = new URLSearchParams(window.location.search);
    const hashParams = getHashParams();
    authDebug('completeGoogleSignupFromReturn:start', {
      search: window.location.search,
      hashKeys: Array.from(hashParams.keys()),
      storage: getAuthStoragePresence()
    });
    const oauthError = params.get('error_description') || params.get('error') || hashParams.get('error_description') || hashParams.get('error');
    if (oauthError) {
      authDebug('completeGoogleSignupFromReturn:oauth-error', { oauthError });
      throw new Error(String(oauthError).trim() || 'Google signup failed.');
    }

    const code = params.get('code');
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const authClient = getPreferredOAuthClient();
    let session = null;

    if (code) {
      authDebug('completeGoogleSignupFromReturn:exchange-code', {
        hasCode: true,
        flow: params.get('flow') || safeGetAuthStorage('oauthFlow') || null
      });
      const { data, error } = await authClient.auth.exchangeCodeForSession(code);
      if (error) throw error;
      session = data?.session || null;
    } else if (accessToken && refreshToken) {
      authDebug('completeGoogleSignupFromReturn:set-session-from-hash', {
        hasAccessToken: true,
        hasRefreshToken: true
      });
      const { data, error } = await authClient.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      if (error) throw error;
      session = data?.session || null;
    }
    authDebug('completeGoogleSignupFromReturn:session-after-exchange', previewSession(session));

    if (!session?.access_token || !session?.refresh_token || !session?.user?.id) {
      throw new Error('Google signup did not return a usable session.');
    }

    session = await resolveStableOAuthSession(authClient, session);
    authDebug('completeGoogleSignupFromReturn:stable-session', previewSession(session));
    if (!session?.access_token || !session?.refresh_token || !session?.user?.id) {
      throw new Error('Google signup did not persist a usable session.');
    }

    try {
      localStorage.setItem(getOnboardingPendingKey(session.user.id), '1');
    } catch (_err) {}
    persistPendingPostAuthBootstrap({
      flow: 'signup',
      userId: session.user.id,
      email: String(session?.user?.email || '').trim(),
      fullName: String(session?.user?.user_metadata?.full_name || session?.user?.user_metadata?.name || '').trim()
    });
    persistGoogleOAuthSession(session);
    void triggerWelcomeEmail(session);
    await finalizeAuthRedirect(session, authClient);
  }

  function getOnboardingPendingKey(userId) {
    return `zo2y_onboarding_pending_v1_${String(userId || '').trim()}`;
  }

  async function triggerWelcomeEmail(session) {
    const accessToken = String(session?.access_token || '').trim();
    if (!accessToken) return;
    try {
      await fetch('/api/emails/welcome/trigger', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({
          appUrl: window.location.origin,
          flow: 'signup'
        })
      });
    } catch (_err) {}
  }
  
  // Helper functions
  function showError(msg, allowHtml = false) {
    console.error('Error:', msg);
    if (allowHtml) {
      errorMessage.innerHTML = msg;
    } else {
      errorMessage.textContent = msg;
    }
    errorMessage.classList.add('show');
    successMessage.classList.remove('show');
    setTimeout(() => errorMessage.classList.remove('show'), 5000);
  }
  
  function showSuccess(msg) {
    console.log('Success:', msg);
    successMessage.textContent = msg;
    successMessage.classList.add('show');
    errorMessage.classList.remove('show');
  }
  
  function showLoading() {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<div class="loading"></div>';
  }
  
  function hideLoading() {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> <span>Create Account</span>';
  }

  function clearStoredAuthSnapshots() {
    safeRemoveAuthStorage(STORAGE_KEY);
    safeRemoveAuthStorage(LEGACY_STORAGE_KEY);
    safeRemoveAuthStorage(PERSIST_STORAGE_KEY);
    try {
      localStorage.removeItem(DURABLE_STORAGE_KEY);
    } catch (_err) {}
  }

  async function clearActiveAuthSessionForSwitch() {
    clearStoredAuthSnapshots();
    try {
      await supabase.auth.signOut({ scope: 'local' });
    } catch (_err) {}
    try {
      const authClient = getPreferredOAuthClient();
      if (authClient && authClient.auth && typeof authClient.auth.signOut === 'function') {
        await authClient.auth.signOut({ scope: 'local' });
      }
    } catch (_err) {}
  }

  function shouldClearStoredAuthSnapshotsForError(error) {
    const message = String(error?.message || '').trim().toLowerCase();
    const code = String(error?.code || '').trim().toLowerCase();
    if (!message && !code) return false;
    if (message.includes('refresh token already used') || message.includes('already been used')) return false;
    return (
      message.includes('invalid refresh token') ||
      message.includes('refresh token not found') ||
      message.includes('invalid grant') ||
      message.includes('session missing') ||
      message.includes('session not found') ||
      message.includes('user from sub claim in jwt does not exist') ||
      code === 'refresh_token_not_found' ||
      code === 'session_not_found'
    );
  }

  async function getVerifiedUser() {
    if (verifiedUserPromise) return verifiedUserPromise;
    verifiedUserPromise = (async () => {
      const authClient = getPreferredOAuthClient();
      let { data: { session } } = await authClient.auth.getSession();
      authDebug('getVerifiedUser:getSession', previewSession(session));
      if (!session) {
        session = await restoreSessionFromStorage(authClient);
        authDebug('getVerifiedUser:restored-session', previewSession(session));
        if (!session) return null;
      }
      const { data: userData, error: userError } = await authClient.auth.getUser();
      authDebug('getVerifiedUser:getUser', {
        userId: String(userData?.user?.id || '').trim() || null,
        error: String(userError?.message || '').trim() || null
      });
      if (!userError && userData?.user) {
        return userData.user;
      }
      if (userError && shouldClearStoredAuthSnapshotsForError(userError)) {
        clearStoredAuthSnapshots();
        return null;
      }
      const { data: refreshed, error: refreshError } = await authClient.auth.refreshSession();
      if (!refreshError && refreshed?.session?.user) {
        persistSessionSnapshot(refreshed.session);
        return refreshed.session.user;
      }
      if (refreshError && shouldClearStoredAuthSnapshotsForError(refreshError)) {
        clearStoredAuthSnapshots();
      }
      return null;
    })();
    try {
      return await verifiedUserPromise;
    } finally {
      verifiedUserPromise = null;
    }
  }
  
  // Check if already logged in
  (async () => {
    try {
      const nativeOauthReturn = new URLSearchParams(window.location.search).get('native_oauth') === '1';
      const hashParams = getHashParams();
      if (
        nativeOauthReturn &&
        (
          new URLSearchParams(window.location.search).has('code') ||
          new URLSearchParams(window.location.search).has('error') ||
          new URLSearchParams(window.location.search).has('error_description') ||
          hashParams.has('access_token') ||
          hashParams.has('error') ||
          hashParams.has('error_description')
        )
      ) {
        googleSignup.disabled = true;
        googleSignup.innerHTML = '<div class="loading"></div> Signing up...';
        await completeGoogleSignupFromReturn();
        return;
      }
      await clearActiveAuthSessionForSwitch();
    } catch (error) {
      console.error('Session check error:', error);
    }
  })();
  
  // Email signup
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const fullName = fullNameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    console.log('Signup attempt:', email);
    
    // Validation
    if (!fullName || !email || !password) {
      showError('All fields are required');
      analyticsTrack('signup_validation_error', { reason: 'missing_fields', path: window.location.pathname });
      return;
    }
    
    if (password.length < 8) {
      showError('Password must be at least 8 characters');
      analyticsTrack('signup_validation_error', { reason: 'password_short', path: window.location.pathname });
      return;
    }
    
    if (!/\S+@\S+\.\S+/.test(email)) {
      showError('Please enter a valid email address');
      analyticsTrack('signup_validation_error', { reason: 'invalid_email', path: window.location.pathname });
      return;
    }
    
    showLoading();
    
    try {
      console.log('Calling Supabase signUp...');
      
      const signupResponse = await fetch('/api/auth/password-signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          fullName,
          email,
          password
        })
      });

      const signupPayload = await signupResponse.json().catch(() => ({}));
      if (!signupResponse.ok || !signupPayload?.success) {
        const message = String(signupPayload?.message || 'Signup failed').trim();
        analyticsTrack('signup_error', { method: 'password', message: message.slice(0, 180) }, true);
        if (/already registered/i.test(message)) {
          showError('This email is already registered. Please log in instead.');
        } else {
          showError(message);
        }
        hideLoading();
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error || !data?.session?.user?.id) {
        const message = String(error?.message || 'Account was created, but automatic sign-in failed. Please log in.').trim();
        analyticsTrack('signup_error', { method: 'password_signin_after_signup', message: message.slice(0, 180) }, true);
        showError(message);
        hideLoading();
        return;
      }

      console.log('Auto-login successful');
      analyticsTrack('signup_success', { method: 'password', auto_login: true, path: window.location.pathname }, true);
      analyticsMarkFirstAction('first_signup_success', { method: 'password' });
      try {
        localStorage.setItem(getOnboardingPendingKey(data.session.user.id), '1');
      } catch (_err) {}
      persistPendingPostAuthBootstrap({
        flow: 'signup',
        userId: data.session.user.id,
        email,
        fullName
      });
      persistSessionSnapshot(data.session);
      void triggerWelcomeEmail(data.session);
      showSuccess('Account created! Redirecting...');
      signupForm.reset();
      await finalizeAuthRedirect(data.session);
      
    } catch (error) {
      console.error('Unexpected error:', error);
      analyticsTrack('signup_error', { method: 'password', message: String(error?.message || 'unknown').slice(0, 180) }, true);
      showError('An unexpected error occurred. Please try again.');
      hideLoading();
    }
  });
  
  // Google signup
  googleSignup.addEventListener('click', async () => {
    try {
      const btn = googleSignup;
      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div> Signing up...';
      
      console.log('Starting Google OAuth...');
      analyticsTrack('signup_google_start', { path: window.location.pathname }, true);
      
      // Store that this is a signup flow
      const nextPath = getPostAuthRedirect();
      const callbackUrl = new URL('/sign-up.html', window.location.origin);
      callbackUrl.searchParams.set('native_oauth', '1');
      callbackUrl.searchParams.set('flow', 'signup');
      callbackUrl.searchParams.set('next', nextPath);
      authDebug('google-button:redirect-start', {
        redirectTo: callbackUrl.toString(),
        storage: getAuthStoragePresence()
      });
      safeSetAuthStorage('oauthFlow', 'signup');
      safeSetAuthStorage('postAuthRedirect', nextPath);
      
      await clearActiveAuthSessionForSwitch();
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: callbackUrl.toString(),
          queryParams: {
            prompt: 'select_account'
          }
        }
      });
      
      if (error) {
        console.error('Google OAuth error:', error);
        analyticsTrack('signup_google_error', { message: String(error.message || 'unknown').slice(0, 180) }, true);
        showError('Google signup failed: ' + error.message);
        btn.disabled = false;
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign up with Google';
      }
      
    } catch (error) {
      console.error('Google error:', error);
      analyticsTrack('signup_google_error', { message: String(error?.message || 'unknown').slice(0, 180) }, true);
      showError('Google signup failed. Please try again.');
      googleSignup.disabled = false;
      googleSignup.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign up with Google';
    }
  });

  window.__ZO2Y_SIGNUP_AUTH_DEBUG = function () {
    const snapshot = readStoredSessionSnapshot();
    return {
      page: 'signup',
      debugEnabled: authDebugEnabled(),
      location: {
        search: window.location.search,
        hash: window.location.hash
      },
      storage: getAuthStoragePresence(),
      oauthFlow: safeGetAuthStorage('oauthFlow'),
      postAuthRedirect: safeGetAuthStorage('postAuthRedirect'),
      sessionPreview: previewSession(snapshot)
    };
  };
  
})();
</script>
