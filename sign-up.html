<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
<script src="/js/auth-gate.js?v=20260424a"></script>
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex" />
<title>Zo2y - Sign Up</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/pages/auth-entry.css?v=20260417a">
  <meta name="theme-color" content="#0b1633" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
</head>
<body data-auth-variant="signup">
<div class="auth-entry-shell auth-entry-shell-signup">
  <section class="auth-entry-panel">
    <div class="auth-panel-topbar">
      <a class="auth-entry-home" href="index.html" aria-label="Back to landing">
        <img src="/newlogo.webp" alt="Zo2y home">
      </a>
      <a class="auth-topbar-link" href="login.html">log in</a>
    </div>
    <div class="auth-panel-card auth-panel-card-signup auth-card">
      <h2>Sign up</h2>

      <div id="errorMessage" class="message error"></div>
      <div id="successMessage" class="message success"></div>
      <div class="auth-invite-banner" id="authInviteBanner" hidden></div>

      <button class="google-btn" id="googleSignup">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <form id="signupForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Full name" id="fullName" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" id="email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password" required minlength="8">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-user-plus"></i> <span>Sign up with Email</span>
        </button>
      </form>

      <div class="alt-link">
        Already have an account? <a href="login.html" id="altLoginLink">Log in</a>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/referral-utils.js?v=20260319a"></script>
<script src="js/pages/auth-signup.js?v=20260424a"></script>
  <script src="js/production-runtime.js?v=20260307a" defer></script>
</body>
</html>
