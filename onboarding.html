<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="/js/auth-gate.js?v=20260418l"></script>
  <meta name="robots" content="noindex,nofollow" />
  <title>Zo2y - Onboarding</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <meta name="theme-color" content="#0b1633" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260329b" />
  <script src="/js/mobile-webapp.js?v=20260329b" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root{
      --bg:#0b1633;
      --card:#132347;
      --muted:#8ca3c7;
      --accent:#f59e0b;
      --white:#fff;
      --border:rgba(255,255,255,.1);
      --gradient:linear-gradient(135deg,#f59e0b 0%,#ffb84d 100%);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-25% 0 0 0;
      background:radial-gradient(circle at 50% 0%, rgba(245,158,11,.16), transparent 62%);
      pointer-events:none;
      z-index:-2;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:repeating-linear-gradient(135deg, rgba(245,158,11,.08) 0 12px, rgba(255,184,77,0) 12px 24px);
      opacity:.22;
      pointer-events:none;
      z-index:-3;
    }
    .shell{
      width:min(560px,100%);
      border:1px solid var(--border);
      border-radius:22px;
      background:rgba(19,35,71,.86);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      padding:18px;
      text-transform:lowercase;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .brand img{
      width:36px;
      height:36px;
      border-radius:12px;
      object-fit:cover;
      background:#0f1f40;
    }
    .signout{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#eaf2ff;
      cursor:pointer;
    }
    .signout:hover{border-color:rgba(245,158,11,.45);color:var(--accent)}
    h1{
      margin:10px 0 6px;
      font-size:26px;
      letter-spacing:-.03em;
      line-height:1.05;
    }
    .sub{
      margin:0 0 14px;
      color:#d7e7ff;
      font-size:14px;
      line-height:1.55;
      text-transform:none;
    }
    .row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 160px;
      gap:12px;
      align-items:center;
    }
    .input{
      width:100%;
      height:56px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:#10224a;
      color:#fff;
      padding:0 16px;
      outline:none;
      font-size:16px;
      text-transform:none;
    }
    .input:focus{
      border-color:rgba(245,158,11,.6);
      box-shadow:0 0 0 3px rgba(245,158,11,.16);
    }
    .btn{
      height:56px;
      border-radius:18px;
      border:1px solid rgba(245,158,11,.35);
      background:var(--gradient);
      color:#0b1633;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-transform:lowercase;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-transform:none;
    }
    .status{
      min-height:20px;
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      text-transform:none;
    }
    .status.error{color:#ffb4b4}
    .status.success{color:#b9ffe4}

    @media (prefers-reduced-motion: no-preference){
      body::after{animation:zo2yDrift 16s linear infinite}
      .shell{animation:zo2yEnter .46s cubic-bezier(.2,.9,.2,1) both}
      .btn{transition:transform .18s ease, filter .18s ease}
      .btn:not(:disabled):hover{transform:translateY(-1px);filter:saturate(1.08)}
      .btn:not(:disabled):active{transform:translateY(0)}
    }

    @keyframes zo2yEnter{
      from{opacity:0;transform:translateY(10px) scale(.99)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes zo2yDrift{
      0%{transform:translate3d(-2%, -1%, 0)}
      50%{transform:translate3d(2%, 1%, 0)}
      100%{transform:translate3d(-2%, -1%, 0)}
    }
    @media (max-width: 520px){
      .row{grid-template-columns:1fr}
      .btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand">
        <img src="/file.svg" alt="logo" />
        <span>zo2y</span>
      </div>
      <button class="signout" id="signOutBtn" type="button" aria-label="sign out">
        <i class="fas fa-right-from-bracket"></i>
        <span>sign out</span>
      </button>
    </div>

    <h1>choose username</h1>
    <p class="sub">pick a handle for your profile link.</p>

    <div class="row">
      <input id="usernameInput" class="input" type="text" autocomplete="off" spellcheck="false"
        placeholder="username" maxlength="30" aria-label="username" />
      <button id="saveBtn" class="btn" type="button">
        <i class="fas fa-check"></i>
        <span>continue</span>
      </button>
    </div>

    <div class="hint">3-30 chars. letters, numbers, underscore. no spaces.</div>
    <div id="status" class="status"></div>
  </div>

  <script src="js/pages/auth-onboarding.js?v=20260424a"></script>
</body>
</html>
