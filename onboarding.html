  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --white: #fff;
      --border: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -25% 0 0 0;
      background: radial-gradient(circle at 50% 0%, rgba(245,158,11,.14), transparent 62%);
      pointer-events: none;
      z-index: -1;
    }

    .card {
      width: min(460px, 100%);
      background: rgba(19,35,71,.88);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      padding: 32px 28px 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -.03em;
      margin-bottom: 28px;
    }
    .brand img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #0f1f40;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .input {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: #0e1e3d;
      color: #fff;
      padding: 0 16px;
      outline: none;
      font-size: 16px;
      font-family: inherit;
    }
    .input:focus {
      border-color: rgba(245,158,11,.55);
      box-shadow: 0 0 0 3px rgba(245,158,11,.12);
    }
    .input::placeholder {
      color: rgba(255,255,255,.3);
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .btn {
      width: 100%;
      height: 52px;
      padding: 0 22px;
      margin-top: 20px;
      border-radius: 14px;
      border: 0;
      background: linear-gradient(135deg,#f59e0b 0%,#ffb84d 100%);
      color: #0b1633;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .status {
      min-height: 20px;
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }
    .status.error { color: #ffb4b4; }
    .status.success { color: #b9ffe4; }

    .signout-row {
      text-align: center;
      margin-top: 20px;
    }
    .signout-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .signout-link:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .card { padding: 24px 18px 22px; }
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { animation: cardIn .5s cubic-bezier(.16,1,.3,1) both; }
      .btn { transition: transform .15s, box-shadow .15s; }
      .btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,.25); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/newlogo.webp" alt="Zo2y" />
      <span>zo2y</span>
    </div>

    <div class="title">choose your username</div>
    <div class="subtitle">This is how you'll appear across Zo2y. Make it yours.</div>

    <input id="usernameInput" class="input" type="text" autocomplete="username" autocapitalize="off" spellcheck="false"
      placeholder="your username" maxlength="30" aria-label="username" />
    <div class="hint">3&ndash;30 letters, numbers, or underscores. No spaces.</div>

    <button id="saveBtn" class="btn" type="button">
      <i class="fas fa-check"></i>
      <span>save &amp; continue</span>
    </button>

    <div id="status" class="status"></div>

    <div class="signout-row">
      <button class="signout-link" id="signOutBtn" type="button">
        <i class="fas fa-right-from-bracket"></i>
        <span>sign out</span>
      </button>
    </div>
  </div>

  <script src="/js/list-utils.js?v=20260617b" defer></script>
  <script src="js/pages/auth-onboarding.js?v=20260617b" defer></script>
</body>
