  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --white: #fff;
      --border: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      margin: 0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -25% 0 0 0;
      background: radial-gradient(circle at 50% 0%, rgba(245,158,11,.14), transparent 62%);
      pointer-events: none;
      z-index: -1;
    }

    .card {
      width: min(480px, 100%);
      background: rgba(19,35,71,.88);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      padding: 28px 24px 24px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -.03em;
    }
    .brand img {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: #0f1f40;
    }
    .signout {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: #d7e7ff;
      font-size: 13px;
      cursor: pointer;
    }
    .signout:hover { border-color: rgba(245,158,11,.4); color: var(--accent); }

    .step-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
    }
    .step-dot.active { background: var(--accent); }
    .step-dot.done { background: rgba(245,158,11,.45); }

    .step-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .step-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }
    .step-sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input {
      flex: 1;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: #0e1e3d;
      color: #fff;
      padding: 0 16px;
      outline: none;
      font-size: 16px;
    }
    .input:focus {
      border-color: rgba(245,158,11,.55);
      box-shadow: 0 0 0 3px rgba(245,158,11,.12);
    }

    .btn {
      height: 52px;
      padding: 0 22px;
      border-radius: 14px;
      border: 0;
      background: linear-gradient(135deg,#f59e0b 0%,#ffb84d 100%);
      color: #0b1633;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm {
      height: 40px;
      padding: 0 18px;
      font-size: 14px;
      border-radius: 12px;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,.1);
      color: #d7e7ff;
      font-weight: 600;
    }
    .btn-ghost:hover { border-color: rgba(245,158,11,.35); color: var(--accent); }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      min-height: 20px;
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }
    .status.error { color: #ffb4b4; }
    .status.success { color: #b9ffe4; }

    .steps {
      position: relative;
      overflow: hidden;
    }
    .step-pane {
      display: none;
      animation: fadeSlideIn .35s cubic-bezier(.16,1,.3,1);
    }
    .step-pane.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .team-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .team-chip:hover {
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.15);
    }
    .team-chip.selected {
      background: rgba(245,158,11,.14);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(245,158,11,.25);
    }
    .team-chip .check {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .team-chip.selected .check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .team-chip .check i {
      font-size: 10px;
      color: #0b1633;
      display: none;
    }
    .team-chip.selected .check i { display: block; }

    .step-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }
    .step-footer-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .team-grid { grid-template-columns: 1fr; }
      .input-wrap { flex-direction: column; }
      .input-wrap .btn { width: 100%; }
      .step-footer { flex-direction: column; align-items: stretch; }
      .step-footer-right { margin-left: 0; }
      .step-footer .btn { width: 100%; }
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { animation: cardIn .5s cubic-bezier(.16,1,.3,1) both; }
      .btn { transition: transform .15s, box-shadow .15s; }
      .btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,.25); }
      .team-chip { transition: background .15s, border-color .15s; }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="brand">
        <img src="/file.svg" alt="" />
        <span>zo2y</span>
      </div>
      <button class="signout" id="signOutBtn" type="button" aria-label="sign out">
        <i class="fas fa-right-from-bracket"></i>
        <span>sign out</span>
      </button>
    </div>

    <div class="step-dots">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
    </div>

    <div class="steps">
      <!-- Step 1: Username -->
      <div class="step-pane active" id="step1">
        <div class="step-label">step 1 of 2</div>
        <div class="step-title">pick your username</div>
        <div class="step-sub">This is how you&rsquo;ll appear across Zo2y. Make it yours.</div>

        <div class="input-wrap">
          <input id="usernameInput" class="input" type="text" autocomplete="username" autocapitalize="off" spellcheck="false"
            placeholder="your username" maxlength="30" aria-label="username" />
          <button id="toTeamsBtn" class="btn" type="button">
            <span>next</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        <div class="hint">3&ndash;30 letters, numbers, or underscores. No spaces.</div>
      </div>

      <!-- Step 2: Teams -->
      <div class="step-pane" id="step2">
        <div class="step-label">step 2 of 2</div>
        <div class="step-title">follow some teams</div>
        <div class="step-sub">Select teams you care about so your feed stays interesting.</div>

        <div class="team-grid" id="teamGrid">
          <!-- populated by JS -->
        </div>

        <div id="status" class="status"></div>

        <div class="step-footer">
          <button class="btn btn-ghost btn-sm" id="backBtn" type="button">
            <i class="fas fa-arrow-left"></i>
            <span>back</span>
          </button>
          <div class="step-footer-right">
            <button class="btn btn-ghost btn-sm" id="skipBtn" type="button">
              <span>skip</span>
            </button>
            <button class="btn btn-sm" id="saveBtn" type="button">
              <i class="fas fa-check"></i>
              <span>done</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/list-utils.js?v=20260601b" defer></script>
  <script src="js/pages/auth-onboarding.js?v=20260601b" defer></script>
  <script defer>
    (function () {
      // Step navigation state
      var currentStep = 1;

      function showStep(n) {
        currentStep = n;
        document.getElementById('step1').classList.toggle('active', n === 1);
        document.getElementById('step2').classList.toggle('active', n === 2);
        document.getElementById('dot1').className = 'step-dot' + (n === 1 ? ' active' : ' done');
        document.getElementById('dot2').className = 'step-dot' + (n === 2 ? ' active' : '');
      }

      // Team data n++ no images, just text chips
      var TEAMS = [
        'Real Madrid', 'Barcelona', 'Manchester City', 'Liverpool',
        'PSG', 'Arsenal', 'LA Lakers', 'Golden State Warriors',
        'Kansas City Chiefs', 'Boston Celtics', 'Chicago Bulls',
        'Ferrari', 'Red Bull Racing', 'New York Yankees', 'Dodgers',
        'Al Nassr', 'Inter Miami', 'AC Milan'
      ];

      function shuffle(a) {
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
        }
        return a;
      }

      function renderTeams() {
        var grid = document.getElementById('teamGrid');
        if (!grid) return;
        var shuffled = shuffle(TEAMS.slice());
        var selected = (function () {
          try { return JSON.parse(localStorage.getItem('onboardingSports') || '[]'); } catch (e) { return []; }
        })();

        grid.innerHTML = '';
        shuffled.forEach(function (name) {
          var chip = document.createElement('div');
          chip.className = 'team-chip' + (selected.indexOf(name) !== -1 ? ' selected' : '');
          chip.innerHTML = '<div class="check"><i class="fas fa-check"></i></div><span>' + name + '</span>';
          chip.onclick = function () {
            chip.classList.toggle('selected');
            var cur = (function () {
              try { return JSON.parse(localStorage.getItem('onboardingSports') || '[]'); } catch (e) { return []; }
            })();
            var idx = cur.indexOf(name);
            if (chip.classList.contains('selected')) {
              if (idx === -1) cur.push(name);
            } else {
              if (idx > -1) cur.splice(idx, 1);
            }
            try { localStorage.setItem('onboardingSports', JSON.stringify(cur)); } catch (e) {}
          };
          grid.appendChild(chip);
        });
      }

      // Wire step nav
      document.getElementById('toTeamsBtn').addEventListener('click', function () {
        showStep(2);
      });

      document.getElementById('backBtn').addEventListener('click', function () {
        showStep(1);
      });

      document.addEventListener('DOMContentLoaded', renderTeams);
    })();
  </script>
