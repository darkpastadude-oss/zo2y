<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="/js/auth-gate.js?v=20260418j"></script>
  <meta name="robots" content="noindex,nofollow" />
  <title>Zo2y - Onboarding</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <meta name="theme-color" content="#0b1633" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260329b" />
  <script src="/js/mobile-webapp.js?v=20260329b" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root{
      --bg:#0b1633;
      --card:#132347;
      --muted:#8ca3c7;
      --accent:#f59e0b;
      --white:#fff;
      --border:rgba(255,255,255,.1);
      --gradient:linear-gradient(135deg,#f59e0b 0%,#ffb84d 100%);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-25% 0 0 0;
      background:radial-gradient(circle at 50% 0%, rgba(245,158,11,.16), transparent 62%);
      pointer-events:none;
      z-index:-2;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:repeating-linear-gradient(135deg, rgba(245,158,11,.08) 0 12px, rgba(255,184,77,0) 12px 24px);
      opacity:.22;
      pointer-events:none;
      z-index:-3;
    }
    .shell{
      width:min(560px,100%);
      border:1px solid var(--border);
      border-radius:22px;
      background:rgba(19,35,71,.86);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      padding:18px;
      text-transform:lowercase;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .brand img{
      width:36px;
      height:36px;
      border-radius:12px;
      object-fit:cover;
      background:#0f1f40;
    }
    .signout{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#eaf2ff;
      cursor:pointer;
    }
    .signout:hover{border-color:rgba(245,158,11,.45);color:var(--accent)}
    h1{
      margin:10px 0 6px;
      font-size:26px;
      letter-spacing:-.03em;
      line-height:1.05;
    }
    .sub{
      margin:0 0 14px;
      color:#d7e7ff;
      font-size:14px;
      line-height:1.55;
      text-transform:none;
    }
    .row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 160px;
      gap:12px;
      align-items:center;
    }
    .input{
      width:100%;
      height:56px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:#10224a;
      color:#fff;
      padding:0 16px;
      outline:none;
      font-size:16px;
      text-transform:none;
    }
    .input:focus{
      border-color:rgba(245,158,11,.6);
      box-shadow:0 0 0 3px rgba(245,158,11,.16);
    }
    .btn{
      height:56px;
      border-radius:18px;
      border:1px solid rgba(245,158,11,.35);
      background:var(--gradient);
      color:#0b1633;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-transform:lowercase;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-transform:none;
    }
    .status{
      min-height:20px;
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      text-transform:none;
    }
    .status.error{color:#ffb4b4}
    .status.success{color:#b9ffe4}
    @media (max-width: 520px){
      .row{grid-template-columns:1fr}
      .btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand">
        <img src="/file.svg" alt="logo" />
        <span>zo2y</span>
      </div>
      <button class="signout" id="signOutBtn" type="button" aria-label="sign out">
        <i class="fas fa-right-from-bracket"></i>
        <span>sign out</span>
      </button>
    </div>

    <h1>choose username</h1>
    <p class="sub">pick a handle for your profile link.</p>

    <div class="row">
      <input id="usernameInput" class="input" type="text" autocomplete="off" spellcheck="false"
        placeholder="username" maxlength="30" aria-label="username" />
      <button id="saveBtn" class="btn" type="button">
        <i class="fas fa-check"></i>
        <span>continue</span>
      </button>
    </div>

    <div class="hint">3-30 chars. letters, numbers, underscore. no spaces.</div>
    <div id="status" class="status"></div>
  </div>

  <script>
    (function () {
      const RESERVED = new Set([
        'admin','api','app','auth','authcallback','blog','book','books','country','edit','explore','game','games',
        'help','home','index','login','movie','movies','music','new','privacy','profile','resetpassword','reviews',
        'search','settings','signup','support','terms','travel','tv','tvshow','tvshows','updatepassword','user','users','zo2y'
      ]);

      const NEEDS_KEY_PREFIX = 'zo2y_needs_username_v1_';
      const PENDING_PREFIX = 'zo2y_onboarding_pending_v1_';
      const SESSION_PREFIX = 'zo2y_onboarding_session_v1_';

      const els = {
        username: document.getElementById('usernameInput'),
        save: document.getElementById('saveBtn'),
        status: document.getElementById('status'),
        signOut: document.getElementById('signOutBtn')
      };

      function setStatus(msg, type) {
        if (!els.status) return;
        els.status.className = 'status' + (type ? (' ' + type) : '');
        els.status.textContent = msg || '';
      }

      function getNext() {
        try {
          const params = new URLSearchParams(window.location.search);
          const next = String(params.get('next') || '').trim();
          if (!next) return 'index.html';
          const lower = next.toLowerCase();
          if (lower.startsWith('http://') || lower.startsWith('https://') || lower.startsWith('//')) return 'index.html';
          if (next.startsWith('/')) return next.slice(1) || 'index.html';
          return next;
        } catch (_err) {
          return 'index.html';
        }
      }

      function normalize(value) {
        // hard strip whitespace first so users can't even leave a space
        const noSpaces = String(value || '').replace(/\s+/g, '');
        return noSpaces
          .replace(/^@+/, '')
          .toLowerCase()
          .replace(/[^a-z0-9_]+/g, '_')
          .replace(/_+/g, '_')
          .replace(/^_+|_+$/g, '')
          .slice(0, 30);
      }

      function isValid(value) {
        return /^[a-z0-9_]{3,30}$/.test(String(value || ''));
      }

      function waitForSupabase() {
        return new Promise((resolve) => {
          let tries = 0;
          const t = setInterval(() => {
            tries += 1;
            if (window.supabase && typeof window.supabase.createClient === 'function') {
              clearInterval(t);
              resolve(true);
              return;
            }
            if (tries > 240) {
              clearInterval(t);
              resolve(false);
            }
          }, 50);
        });
      }

      async function getClient() {
        await waitForSupabase();
        if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
          const c = window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
          if (c) return c;
        }
        if (window.supabase && window.supabase.createClient) {
          const SUPABASE_URL = 'https://gfkhjbztayjyojsgdpgk.supabase.co';
          const SUPABASE_KEY = 'sb_publishable_2J1YezYMq3A-lNP6sUIKPg_Kv5XFXx8';
          return window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storageKey: 'zo2y-auth-v1' }
          });
        }
        return null;
      }

      function clearFlags(userId) {
        try { localStorage.removeItem(PENDING_PREFIX + userId); } catch (_e) {}
        try { localStorage.removeItem(NEEDS_KEY_PREFIX + userId); } catch (_e2) {}
        try { sessionStorage.removeItem(SESSION_PREFIX + userId); } catch (_e3) {}
      }

      async function requireUser(client) {
        const { data } = await client.auth.getSession();
        const session = data ? data.session : null;
        const user = session ? session.user : null;
        if (!user || !user.id) {
          window.location.replace('login.html?next=' + encodeURIComponent('onboarding.html'));
          return null;
        }
        return user;
      }

      async function checkAvailable(client, username, userId) {
        const { data, error } = await client.from('user_profiles').select('id').eq('username', username).limit(2);
        if (error) throw error;
        const taken = Array.isArray(data) && data.some((row) => String(row && row.id || '') !== String(userId || ''));
        return !taken;
      }

      async function ensureProfile(client, user) {
        if (typeof window.__ZO2Y_ENSURE_AUTH_PROFILE === 'function') {
          try { await window.__ZO2Y_ENSURE_AUTH_PROFILE(client, user); } catch (_err) {}
        }
      }

      async function init() {
        setStatus('loading...', '');
        const client = await getClient();
        if (!client) {
          setStatus('could not load auth. refresh.', 'error');
          return;
        }
        const user = await requireUser(client);
        if (!user) return;
        await ensureProfile(client, user);
        setStatus('', '');
        if (els.username) els.username.focus();

        // keep a tiny breadcrumb for debugging
        window.__ZO2Y_ONBOARDING_DEBUG = { userId: user.id, next: getNext() };

        // wire handlers
        if (els.save) {
          els.save.addEventListener('click', async () => {
            const username = normalize(els.username ? els.username.value : '');
            if (!username) return setStatus('enter a username.', 'error');
            if (!isValid(username)) return setStatus('use 3-30 chars: a-z 0-9 _.', 'error');
            if (RESERVED.has(username.replace(/_/g, ''))) return setStatus('reserved username.', 'error');
            els.save.disabled = true;
            try {
              setStatus('checking...', '');
              const ok = await checkAvailable(client, username, user.id);
              if (!ok) return setStatus('taken.', 'error');
              setStatus('saving...', '');
              const { error } = await client.from('user_profiles').update({ username }).eq('id', user.id);
              if (error) throw error;

              // Persist the chosen handle into auth metadata so all pages can display it without extra DB lookups.
              try {
                if (client?.auth && typeof client.auth.updateUser === 'function') {
                  await client.auth.updateUser({ data: { zo2y_username: username } });
                }
              } catch (_metaErr) {}
              clearFlags(user.id);
              setStatus('saved. redirecting...', 'success');
              window.location.replace(getNext());
            } catch (err) {
              setStatus(String((err && err.message) || 'could not save.'), 'error');
            } finally {
              els.save.disabled = false;
            }
          });
        }
      }

      if (els.username) {
        els.username.addEventListener('keydown', (e) => {
          if (e.key === ' ') {
            e.preventDefault();
            return;
          }
          if (e.key === 'Enter') {
            e.preventDefault();
            if (els.save) els.save.click();
          }
        });
        els.username.addEventListener('input', () => {
          const before = String(els.username.value || '');
          const after = normalize(before);
          if (after !== before) els.username.value = after;
          if (!after) return setStatus('', '');
          if (!isValid(after)) return setStatus('letters, numbers, underscore only.', 'error');
          if (RESERVED.has(after.replace(/_/g, ''))) return setStatus('reserved username.', 'error');
          setStatus('', '');
        });
      }

      if (els.signOut) {
        els.signOut.addEventListener('click', async () => {
          try {
            const client = await getClient();
            if (client) await client.auth.signOut({ scope: 'local' });
          } catch (_err) {}
          try { if (typeof window.__ZO2Y_MARK_EXPLICIT_SIGNOUT === 'function') window.__ZO2Y_MARK_EXPLICIT_SIGNOUT(); } catch (_err2) {}
          window.location.replace('login.html');
        });
      }

      // start
      init();
    })();
  </script>
</body>
</html>
