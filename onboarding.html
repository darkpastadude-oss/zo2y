  <style>
    :root{
      --bg:#0b1633;
      --card:#132347;
      --muted:#8ca3c7;
      --accent:#f59e0b;
      --white:#fff;
      --border:rgba(255,255,255,.1);
      --gradient:linear-gradient(135deg,#f59e0b 0%,#ffb84d 100%);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
    }
    body::before{
      content:"";
      position:fixed;
      inset:-25% 0 0 0;
      background:radial-gradient(circle at 50% 0%, rgba(245,158,11,.16), transparent 62%);
      pointer-events:none;
      z-index:-2;
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:repeating-linear-gradient(135deg, rgba(245,158,11,.08) 0 12px, rgba(255,184,77,0) 12px 24px);
      opacity:.22;
      pointer-events:none;
      z-index:-3;
    }
    .shell{
      width:min(560px,100%);
      border:1px solid var(--border);
      border-radius:22px;
      background:rgba(19,35,71,.86);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      padding:18px;
      text-transform:lowercase;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .brand img{
      width:36px;
      height:36px;
      border-radius:12px;
      object-fit:cover;
      background:#0f1f40;
    }
    .signout{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:#eaf2ff;
      cursor:pointer;
    }
    .signout:hover{border-color:rgba(245,158,11,.45);color:var(--accent)}
    h1{
      margin:10px 0 6px;
      font-size:26px;
      letter-spacing:-.03em;
      line-height:1.05;
    }
    .sub{
      margin:0 0 14px;
      color:#d7e7ff;
      font-size:14px;
      line-height:1.55;
      text-transform:none;
    }
    .row{
      display:grid;
      grid-template-columns:minmax(0,1fr) 160px;
      gap:12px;
      align-items:center;
    }
    .input{
      width:100%;
      height:56px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:#10224a;
      color:#fff;
      padding:0 16px;
      outline:none;
      font-size:16px;
      text-transform:none;
    }
    .input:focus{
      border-color:rgba(245,158,11,.6);
      box-shadow:0 0 0 3px rgba(245,158,11,.16);
    }
    .btn{
      height:56px;
      border-radius:18px;
      border:1px solid rgba(245,158,11,.35);
      background:var(--gradient);
      color:#0b1633;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      text-transform:lowercase;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-transform:none;
    }
    .status{
      min-height:20px;
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      text-transform:none;
    }
    .status.error{color:#ffb4b4}
    .status.success{color:#b9ffe4}

    @media (prefers-reduced-motion: no-preference){
      body::after{animation:zo2yDrift 16s linear infinite}
      .shell{animation:zo2yEnter .46s cubic-bezier(.2,.9,.2,1) both}
      .btn{transition:transform .18s ease, filter .18s ease}
      .btn:not(:disabled):hover{transform:translateY(-1px);filter:saturate(1.08)}
      .btn:not(:disabled):active{transform:translateY(0)}
    }

    @keyframes zo2yEnter{
      from{opacity:0;transform:translateY(10px) scale(.99)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes zo2yDrift{
      0%{transform:translate3d(-2%, -1%, 0)}
      50%{transform:translate3d(2%, 1%, 0)}
      100%{transform:translate3d(-2%, -1%, 0)}
    }
    @media (max-width: 520px){
      .row{grid-template-columns:1fr}
      .btn{width:100%}
    }
  </style>

<body>
  <div class="shell">
    <!-- Add sports loading script similar to index.html -->
    <script type="application/ld+json">
      {

        "image": "https://zo2y.com/images/zo2y-search-illustration.png"
      }
    </script>

     <!-- Load and display popular sports teams in onboarding -->
     <script>
       (function() {
         var TEAMS = [
           { title: 'Real Madrid', image: 'https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg' },
           { title: 'Barcelona', image: 'https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg' },
           { title: 'Manchester City', image: 'https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg' },
           { title: 'Liverpool', image: 'https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg' },
           { title: 'Paris Saint-Germain', image: 'https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg' },
           { title: 'Los Angeles Lakers', image: 'https://upload.wikimedia.org/wikipedia/en/3/3c/Los_Angeles_Lakers_logo.svg' },
           { title: 'Golden State Warriors', image: 'https://upload.wikimedia.org/wikipedia/en/0/01/Golden_State_Warriors_logo.svg' },
           { title: 'Kansas City Chiefs', image: 'https://upload.wikimedia.org/wikipedia/en/e/e1/Kansas_City_Chiefs_logo.svg' },
           { title: 'Ferrari', image: 'https://upload.wikimedia.org/wikipedia/en/e/e8/Scuderia_Ferrari_logo.svg' },
           { title: 'Boston Celtics', image: 'https://upload.wikimedia.org/wikipedia/en/8/8f/Boston_Celtics.svg' },
           { title: 'Chicago Bulls', image: 'https://upload.wikimedia.org/wikipedia/en/6/67/Chicago_Bulls_logo.svg' },
           { title: 'Arsenal', image: 'https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg' }
         ];

         function render() {
           var grid = document.getElementById('onboardingSportsGrid');
           if (!grid) return;
           var shuffled = TEAMS.slice().sort(function() { return Math.random() - 0.5; });
           var count = Math.min(8, shuffled.length);
           grid.innerHTML = '';
           for (var i = 0; i < count; i++) {
             var team = shuffled[i];
             var card = document.createElement('div');
             card.className = 'onboarding-team-card';
             card.innerHTML = '<img src="' + (team.image || '/images/fallback/sports.svg') + '" alt="' + (team.title || 'Sports') + '" class="team-logo" onerror="this.onerror=null;this.src=\'/images/fallback/sports.svg\'"><div class="team-name">' + (team.title || 'Sports') + '</div>';
             (function(t) {
               card.onclick = function() {
                 card.classList.toggle('selected');
                 var selected = JSON.parse(localStorage.getItem('onboardingSports') || '[]');
                 var name = t.title || 'Sports';
                 var idx = selected.indexOf(name);
                 if (card.classList.contains('selected')) {
                   if (idx === -1) selected.push(name);
                 } else {
                   if (idx > -1) selected.splice(idx, 1);
                 }
                 localStorage.setItem('onboardingSports', JSON.stringify(selected));
               };
             })(team);
             grid.appendChild(card);
           }
         }

         if (document.readyState === 'loading') {
           document.addEventListener('DOMContentLoaded', render);
         } else {
           render();
         }
       })();
     </script>
    <style>
      .onboarding-team-card {
        text-align: center;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 12px;
        width: 80px;
        cursor: pointer;
        transition: all 0.2s ease;
        border: 2px solid transparent;
      }
      
      .onboarding-team-card:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
      }
      
      .onboarding-team-card.selected {
        background: rgba(245,158,11,0.2);
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      
      .onboarding-team-card .team-logo {
        width: 48px;
        height: 48px;
        object-fit: contain;
        margin-bottom: 8px;
      }
      
      .onboarding-team-card .team-name {
        font-size: 12px;
        color: var(--white);
        font-weight: 600;
      }
    </style>
    <div class="top">
      <div class="brand">
        <img src="/file.svg" alt="logo" />
        <span>zo2y</span>
      </div>
      <button class="signout" id="signOutBtn" type="button" aria-label="sign out">
        <i class="fas fa-right-from-bracket"></i>
        <span>sign out</span>
      </button>
    </div>

    <h1>finish your setup</h1>
    <p class="sub">pick your username once and Zo2y will use it everywhere.</p>

     <div class="row">
       <input id="usernameInput" class="input" type="text" autocomplete="username" autocapitalize="off" spellcheck="false"
         placeholder="your username" maxlength="30" aria-label="username" />
       <button id="saveBtn" class="btn" type="button">
         <i class="fas fa-check"></i>
         <span>continue</span>
       </button>
     </div>

     <div class="hint">Use 3 to 30 letters, numbers, or underscores. No spaces.</div>
     
     <!-- Sports selection -->
     <div class="row" style="margin-top: 20px;">
       <div style="flex-basis: 100%; grid-column: 1 / -1;">
         <h3 style="margin: 0 0 10px 0; color: var(--white); font-size: 18px;">Pick your favorite teams</h3>
         <p style="margin: 0 0 15px 0; color: var(--muted); font-size: 14px;">Select teams to follow in your feed</p>
         <div id="onboardingSportsGrid" class="sports-grid" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
           <!-- Sports teams will be populated here -->
         </div>
       </div>
     </div>
     
     <div id="status" class="status"></div>
  </div>

<script src="js/pages/auth-onboarding.js?v=20260531b" defer></script>
