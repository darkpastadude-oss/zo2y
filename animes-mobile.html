  <style>
    :root { --bg: #0b1633; --card: #132347; --card-2: #172b58; --muted: #8ca3c7; --accent: #f59e0b; --white: #fff; --border: rgba(255,255,255,0.12); --surface: rgba(12, 26, 57, 0.84); --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: radial-gradient(circle at 18% -10%, rgba(245,158,11,0.18), transparent 35%), radial-gradient(circle at 88% -14%, rgba(53,103,194,0.25), transparent 42%), var(--bg); color: var(--white); font-family: "Inter", system-ui, sans-serif; }
    .container { width: calc(100% - 16px); margin: 0 auto; }
    header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px) saturate(180%); background: var(--surface); border-bottom: 1px solid var(--border); }
    .header-inner { min-height: 60px; display: flex; align-items: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; }
    .brand { display: inline-flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 800; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
    .search-wrap { flex: 1; min-width: 150px; position: relative; }
    .search { width: 100%; height: 38px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); color: var(--white); padding: 0 12px 0 30px; outline: none; font-size: 14px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn { border: 1px solid var(--border); background: var(--card); color: var(--white); height: 36px; padding: 0 12px; border-radius: 10px; font-size: 12px; cursor: pointer; }
    .btn-primary { background: var(--gradient); color: #0b1633; border: 0; }
    .page-shell { margin-top: 14px; display: grid; gap: 12px; padding-bottom: 18px; }
    .hero { border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; background: linear-gradient(120deg, rgba(10, 31, 56, 0.92), rgba(15, 44, 80, 0.7)), url("https://images.unsplash.com/photo-1593784991095-a205069470b6?auto=format&fit=crop&w=800&q=80") center/cover; }
    .hero h1 { font-size: 26px; line-height: 1.1; }
    .hero p { color: #d3e5ff; margin-top: 8px; font-size: 14px; }
    .section { background: rgba(19, 35, 71, 0.9); border: 1px solid var(--border); border-radius: 16px; }
    .section-head { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .section-head h2 { font-size: 18px; }
    .controls { display: grid; grid-template-columns: minmax(0, 1fr) 52px 52px; gap: 10px; }
    .controls input, .controls select { height: 52px; border: 1px solid var(--border); border-radius: 18px; background: #10224a; color: #fff; padding: 0 18px; font-size: 16px; -webkit-appearance: none; appearance: none; }
    .controls button, .pager button { height: 52px; border: 1px solid var(--border); border-radius: 18px; background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%); color: #0b1633; padding: 0; cursor: pointer; }
    .control-modal { position: fixed; inset: 0; z-index: 1700; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(4, 10, 23, 0.72); backdrop-filter: blur(6px); }
    .control-modal.show { display: flex; }
    .control-modal-card { width: min(480px, 100%); border-radius: 18px; border: 1px solid var(--border); background: linear-gradient(180deg, rgba(19, 35, 71, 0.98), rgba(11, 23, 50, 0.98)); box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42); padding: 16px; }
    .control-modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .control-modal-title { font-size: 18px; font-weight: 800; }
    .control-modal-close { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: #fff; cursor: pointer; }
    .control-modal-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .control-modal-grid select, .control-modal-action { width: 100%; height: 48px; border-radius: 14px; border: 1px solid var(--border); background: #10224a; color: #fff; padding: 0 14px; font-size: 14px; }
    .control-modal-action { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--card); color: #fff; cursor: pointer; }
    .control-icon-btn { width: 52px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .grid { padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 160px)); gap: 12px; }
    .card { border-radius: 12px; overflow: hidden; background: var(--card-2); display: flex; flex-direction: column; }
    .card-media { aspect-ratio: 2/3; background: linear-gradient(135deg, #102545 0%, #0b1c35 100%); overflow: hidden; }
    .card-media img { width: 100%; height: 100%; object-fit: cover; }
    .card-meta { padding: 2px; display: flex; flex-direction: column; gap: 1px; flex: 1; }

    .card-type {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #dbe7ff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 2px 6px;
      margin-bottom: 2px;
      width: fit-content;
    }

    .card-meta-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 2px;
    }

    .card-name {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-title { font-size: 12px; font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-sub { color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-extra { color: #abc5e8; font-size: 10px; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: auto; }
    .card-actions { display: grid; grid-template-columns: auto auto; gap: 5px; margin-top: 1px; justify-content: end; }
    .icon-btn { height: 28px; width: 28px; border-radius: 8px; border: 1px solid var(--border); background: rgba(15,39,72,0.9); color: #d7e8ff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .pagination { padding: 0 12px 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .page-btn { min-width: 40px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--white); cursor: pointer; font-size: 12px; }
    .empty { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }

    .menu-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      top: 0;
      left: 0;
      width: 100dvw;
      height: 100dvh;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      padding: 0;
      align-items: center;
      justify-content: center;
    }
    .menu-modal.active {
      display: flex;
    }
    .menu-modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
    }
    .menu-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .menu-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin: 0;
    }
    .menu-modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .menu-modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }
    .menu-modal-body {
      padding: 16px 20px;
    }
    .menu-quick-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .menu-quick-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-quick-item:hover {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }
    .menu-quick-item.active {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.15);
    }
    .menu-quick-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menu-quick-left i {
      width: 20px;
      color: var(--accent);
    }
    .menu-quick-left span {
      font-weight: 500;
    }
    .menu-quick-state {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }
    .menu-custom-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .menu-custom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .menu-create-list-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    .menu-create-list-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .menu-custom-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .menu-custom-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-custom-item:hover {
      border-color: var(--accent);
    }
    .menu-custom-item.active {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }
    .menu-custom-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-custom-left i {
      width: 18px;
      color: var(--accent);
      font-size: 14px;
    }
    .menu-custom-left span {
      font-size: 14px;
    }
    .menu-custom-state {
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }
    .menu-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .menu-icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .menu-icon-option {
      height: 44px;
      border: 1px solid var(--border);
      background: var(--card-2);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .menu-icon-option:hover {
      border-color: var(--accent);
    }
    .menu-icon-option.selected {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.15);
    }
    .menu-icon-option i {
      font-size: 18px;
      color: var(--muted);
    }
    .menu-icon-option.selected i {
      color: var(--accent);
    }
    .menu-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .menu-btn {
      flex: 1;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .menu-btn-secondary {
      background: var(--card-2);
      color: var(--white);
    }
    .menu-btn-secondary:hover {
      border-color: var(--accent);
    }
    .menu-btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      border: none;
    }
    .menu-btn-primary:hover {
      opacity: 0.9;
    }
    .authenticated-only {
      display: none;
    }
    body.authenticated .authenticated-only {
      display: block;
    }
    .hero {
      display: none !important;
    }

  </style>

<body>
  <header class="zo2y-shared-header" data-shared-header="1">
  <div class="zo2y-shared-header-inner">
    <a class="zo2y-shared-brand" href="index.html"><img src="/file.svg" alt="Logo" decoding="async" /></a>
    <div class="zo2y-shared-auth">
      <a class="zo2y-shared-btn" href="login.html" id="loginBtn">Login</a>
      <a class="zo2y-shared-btn zo2y-shared-btn-primary" href="sign-up.html" id="signupBtn">Sign Up</a>
      <a class="zo2y-shared-btn hidden" href="profile.html" id="profileBtn">Profile</a>
    </div>
  </div>
</header>
  <main class="container page-shell">
    <section class="hero">
      <h1>anime</h1>
      <p>Discover trending anime from around the world and save them to your anime lists.</p>
      <div class="mt-2 text-xs text-muted">source: TMDB. <a href="credits.html" class="text-accent">all credits</a></div>
      <div class="hero-actions"><!-- Refresh removed --></div>
    </section>
    <section class="controls">
      <input id="q" class="search-input" placeholder="Search anime, genres, years...">
      <button id="animesSearchBtn" class="control-icon-btn" type="button" aria-label="Search anime"><i class="fas fa-search"></i></button>
      <button id="animesFilterBtn" class="control-icon-btn" type="button" aria-label="Open anime filters"><i class="fas fa-sliders-h"></i></button>
    </section>
    <div class="control-modal" id="animesFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter anime</div>
          <button class="control-modal-close" id="animesFilterCloseBtn" type="button" aria-label="Close anime filters">&times;</button>
        </div>
        <div class="control-modal-grid">
          <select id="genre"><option value="">All Genres</option></select>
          <select id="year"><option value="">All Years</option></select>
          <select id="sort">
            <option value="popular">popular right now</option>
            <option value="name">Name A-Z</option>
            <option value="released">Release Date</option>
          </select>
          <button id="refresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
      </div>
    </div>
    <section class="section">
      <div class="section-head">
        <h2>popular anime right now</h2>
      </div>
      <div class="grid" id="animesGrid"></div>
      <div class="pagination"><button class="page-btn" id="prevPageBtn" disabled><i class="fas fa-chevron-left"></i></button><div class="page-info" id="pageInfo">Page 1 of 1</div><button class="page-btn" id="nextPageBtn" disabled><i class="fas fa-chevron-right"></i></button></div>
    </section>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
                      </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>
