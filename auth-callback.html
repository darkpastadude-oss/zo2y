<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<link rel="icon" href="/newlogo.webp" type="image/webp" />

  <style>
    :root {
      color-scheme: dark;
    }
    body {
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.16), transparent 24%),
        linear-gradient(180deg, #09142d 0%, #0b1633 100%);
      color: white;
      font-family: 'Manrope', system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      transition: background 180ms ease, color 180ms ease;
    }
    body.auth-callback-error {
      background:
        radial-gradient(circle at top, rgba(248, 113, 113, 0.14), transparent 24%),
        linear-gradient(180deg, #1a1222 0%, #140f1d 100%);
    }
    .callback-shell {
      text-align: center;
      width: min(calc(100% - 32px), 340px);
      padding: 24px 22px;
      border-radius: 24px;
      background: rgba(11, 22, 51, 0.42);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(14px);
    }
    .callback-logo {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      margin: 0 auto 18px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.2);
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #f59e0b;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-family: 'Space Grotesk', 'Manrope', system-ui, sans-serif;
    }
    .callback-copy {
      margin: 0;
      color: rgba(232, 239, 255, 0.78);
      font-size: 14px;
      line-height: 1.5;
    }
    .error {
      color: #fecaca;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    body.auth-callback-error .error {
      display: block;
    }
    .debug {
      margin-top: 20px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      display: none;
    }
    .debug.show { display: block; }
    .debug-line { margin-bottom: 5px; color: #00ff00; }
    .debug-error { color: #ff0000; }
  </style>

<body>
  <div class="callback-shell">
    <img class="callback-logo" src="/newlogo.webp" alt="Zo2y">
    <div class="spinner"></div>
    <h1>Signing you in</h1>
    <p id="statusText" class="callback-copy">Just a second while we open your account.</p>
    <p id="errorText" class="error"></p>
    <div id="debugConsole" class="debug"></div>
  </div>
  <script>
    (async function () {
      const SUPABASE_URL = 'https://gfkhjbztayjyojsgdpgk.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma2hqYnp0YXlqeW9qc2dkcGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwOTYyNjQsImV4cCI6MjA3NTY3MjI2NH0.WUb2yDAwCeokdpWCPeH13FE8NhWF6G8e6ivTsgu6b2s';
      const STORAGE_KEY = 'zo2y-auth-v1';
      const LEGACY_STORAGE_KEY = 'sb-gfkhjbztayjyojsgdpgk-auth-token';
      const PERSIST_STORAGE_KEY = 'zo2y-auth-persist-v1';
      const DURABLE_STORAGE_KEY = 'zo2y-auth-durable-v1';
      const POST_AUTH_BOOTSTRAP_KEY = 'zo2y_post_auth_bootstrap_v1';
      const statusText = document.getElementById('statusText');
      const errorText = document.getElementById('errorText');
      const debugConsole = document.getElementById('debugConsole');

      function getAuthStorageKeys(key) {
        const value = String(key || '').trim();
        if (!value) return [];
        if (value === STORAGE_KEY || value === LEGACY_STORAGE_KEY || value === PERSIST_STORAGE_KEY) {
          return [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY];
        }
        return [value];
      }

      function safeGetAuthStorage(key) {
        const keys = getAuthStorageKeys(key);
        for (const candidate of keys) {
          try {
            const localValue = window.localStorage ? window.localStorage.getItem(candidate) : null;
            if (localValue !== null && localValue !== undefined && localValue !== '') return localValue;
          } catch (_err) {}
        }
        for (const candidate of keys) {
          try {
            const sessionValue = window.sessionStorage ? window.sessionStorage.getItem(candidate) : null;
            if (sessionValue !== null && sessionValue !== undefined && sessionValue !== '') return sessionValue;
          } catch (_err) {}
        }
        return null;
      }

      function safeRemoveAuthStorage(key) {
        const keys = getAuthStorageKeys(key);
        keys.forEach((candidate) => {
          try {
            if (window.sessionStorage) window.sessionStorage.removeItem(candidate);
          } catch (_err) {}
        });
        keys.forEach((candidate) => {
          try {
            if (window.localStorage) window.localStorage.removeItem(candidate);
          } catch (_err) {}
        });
      }

      function safeSetAuthStorage(key, value) {
        const keys = getAuthStorageKeys(key);
        keys.forEach((candidate) => {
          try {
            if (window.localStorage) {
              window.localStorage.setItem(candidate, value);
            }
          } catch (_err) {}
        });
        keys.forEach((candidate) => {
          try {
            if (window.sessionStorage) {
              window.sessionStorage.setItem(candidate, value);
            }
          } catch (_err) {}
        });
      }

        function persistSessionSnapshot(session) {
          if (!session || typeof session !== 'object') return false;
          try {
            const payload = JSON.stringify(session);
            safeSetAuthStorage(STORAGE_KEY, payload);
            safeSetAuthStorage(LEGACY_STORAGE_KEY, payload);
            safeSetAuthStorage(PERSIST_STORAGE_KEY, payload);
            try {
              localStorage.setItem(DURABLE_STORAGE_KEY, JSON.stringify({
                session,
                createdAt: Date.now()
              }));
            } catch (_err) {}
            if (typeof window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT === 'function') {
              window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT();
            }
            return true;
          } catch (_err) {
            return false;
          }
        }

      const authStorageBridge = window.__ZO2Y_AUTH_STORAGE_BRIDGE || {
        getItem(key) {
          return safeGetAuthStorage(key);
        },
        setItem(key, value) {
          safeSetAuthStorage(key, value);
        },
        removeItem(key) {
          safeRemoveAuthStorage(key);
        }
      };
      window.__ZO2Y_AUTH_STORAGE_BRIDGE = authStorageBridge;

      function persistPendingPostAuthBootstrap(payload) {
        if (!payload || typeof payload !== 'object') return false;
        try {
          localStorage.setItem(POST_AUTH_BOOTSTRAP_KEY, JSON.stringify({
            ...payload,
            createdAt: Date.now()
          }));
          return true;
        } catch (_err) {
          return false;
        }
      }

      const params = new URLSearchParams(window.location.search);
      const storedNext = safeGetAuthStorage('postAuthRedirect');
      const next = sanitizeNextPath(params.get('next') || storedNext || 'index.html');
      const flowParam = String(params.get('flow') || '').trim().toLowerCase();
      const referralUtils = window.ZO2Y_REFERRALS || null;
      const activeReferral = referralUtils ? referralUtils.captureReferralFromLocation(window.location.search) : '';
      const debugEnabled = window.location.search.includes('debug=true');
      if (debugEnabled) debugConsole.classList.add('show');

      function log(msg, isError = false) {
        console.log(msg);
        if (debugEnabled) {
          const line = document.createElement('div');
          line.className = isError ? 'debug-line debug-error' : 'debug-line';
          line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
          debugConsole.appendChild(line);
          debugConsole.scrollTop = debugConsole.scrollHeight;
        }
      }

      function sendAnalyticsEvent(eventName, properties = {}) {
        const payload = {
          event: String(eventName || '').trim().toLowerCase(),
          properties,
          context: {
            page_url: window.location.href,
            path: window.location.pathname,
            referrer: document.referrer || '',
            user_agent: navigator.userAgent || ''
          }
        };
        if (!payload.event) return;
        try {
          const body = JSON.stringify(payload);
          if (navigator.sendBeacon) {
            const blob = new Blob([body], { type: 'application/json' });
            if (navigator.sendBeacon('/api/analytics/track', blob)) return;
          }
          void fetch('/api/analytics/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body,
            keepalive: true
          }).catch(() => {});
        } catch (_err) {}
      }

      function sanitizeNextPath(raw) {
        const value = String(raw || '').trim();
        if (!value) return 'index.html';
        if (/^https?:\/\//i.test(value) || value.startsWith('//')) return 'index.html';
        if (value.startsWith('/')) return value.slice(1) || 'index.html';
        return value;
      }

      function getHashParams() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
        return new URLSearchParams(hash);
      }

      function buildPostAuthRedirectTarget(rawNext) {
        const safeNext = sanitizeNextPath(rawNext || 'index.html');
        try {
          const targetUrl = new URL(safeNext, window.location.origin);
          targetUrl.searchParams.set('auth_return', '1');
          targetUrl.searchParams.set('authv', '20260325c');
          return `${targetUrl.pathname.replace(/^\//, '')}${targetUrl.search}${targetUrl.hash}`;
        } catch (_err) {
          return safeNext;
        }
      }

      function redirectToApp(rawNext, delayMs = 0) {
        statusText.textContent = 'Opening Zo2y...';
        safeRemoveAuthStorage('postAuthRedirect');
        safeRemoveAuthStorage('oauthFlow');
        const target = buildPostAuthRedirectTarget(rawNext);
        log(`Redirecting to: ${target}`);
        if (delayMs <= 0) {
          window.location.replace(target);
          return;
        }
        setTimeout(() => {
          window.location.replace(target);
        }, delayMs);
      }

      function decodeJwtPayload(token) {
        try {
          const parts = String(token || '').split('.');
          if (parts.length < 2) return null;
          const base64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
          const padded = base64.padEnd(base64.length + ((4 - (base64.length % 4)) % 4), '=');
          return JSON.parse(atob(padded));
        } catch (_err) {
          return null;
        }
      }

      async function waitForTokenClockSkew(accessToken) {
        const payload = decodeJwtPayload(accessToken);
        const issuedAt = Number(payload?.iat || 0);
        if (!issuedAt) return;
        const now = Math.floor(Date.now() / 1000);
        const skewSeconds = issuedAt - now;
        if (skewSeconds <= 1) return;
        const waitMs = Math.min(6000, (skewSeconds + 1) * 1000);
        log(`Token clock skew detected (${skewSeconds}s). Waiting ${waitMs}ms...`);
        await new Promise((resolve) => setTimeout(resolve, waitMs));
      }

      function buildSessionFromHashTokens(accessToken, refreshToken, hashParams) {
        const payload = decodeJwtPayload(accessToken);
        if (!payload?.sub || !accessToken || !refreshToken) return null;
        return {
          access_token: accessToken,
          refresh_token: refreshToken,
          token_type: String(hashParams?.get('token_type') || 'bearer').trim() || 'bearer',
          expires_at: Number(hashParams?.get('expires_at') || payload?.exp || 0) || null,
          expires_in: Number(hashParams?.get('expires_in') || 0) || null,
          user: {
            id: String(payload.sub || '').trim(),
            aud: payload.aud,
            role: payload.role,
            email: payload.email || '',
            phone: payload.phone || '',
            app_metadata: payload.app_metadata || {},
            user_metadata: payload.user_metadata || {},
            session_id: payload.session_id || '',
            is_anonymous: payload.is_anonymous === true
          }
        };
      }

      const RESERVED_USERNAMES = new Set([
        'admin', 'api', 'app', 'auth', 'authcallback', 'blog', 'book', 'books',
        'country', 'edit', 'explore', 'game', 'games', 'help', 'home', 'index',
        'login', 'movie', 'movies', 'music', 'new', 'privacy', 'profile',
        'resetpassword', 'reviews', 'search', 'settings', 'signup', 'support',
        'terms', 'travel', 'tv', 'tvshow', 'tvshows', 'updatepassword', 'user',
        'users', 'zo2y'
      ]);

      function cleanUsername(value) {
        const base = String(value || '')
          .trim()
          .replace(/^@+/, '')
          .toLowerCase()
          .replace(/[\u0027\u2019]/g, '')
          .replace(/\s+/g, '_')
          .replace(/[^a-z0-9_]/g, '_')
          .replace(/_+/g, '_')
          .replace(/^_+|_+$/g, '')
          .slice(0, 30);
        if (!base) return 'user';
        if (base.length < 3) return cleanUsername(`user_${base}`);
        if (RESERVED_USERNAMES.has(base.replace(/_/g, ''))) return `${base.slice(0, 24)}_user`.slice(0, 30);
        return base;
      }

      function usernameWithSuffix(base, suffix) {
        const normalizedSuffix = cleanUsername(suffix).slice(0, 8) || 'user';
        const limit = Math.max(3, 30 - normalizedSuffix.length - 1);
        return `${base.slice(0, limit)}_${normalizedSuffix}`;
      }

      async function waitForVerifiedUser(client, accessTokenHint = '') {
        let refreshAttempted = false;
        for (let attempt = 0; attempt < 3; attempt += 1) {
          const { data: sessionData } = await client.auth.getSession();
          const session = sessionData?.session || null;
          if (!session) {
            if (attempt < 2) {
              await new Promise((resolve) => setTimeout(resolve, 140));
              continue;
            }
            return null;
          }

          const { data: userData, error: userError } = await client.auth.getUser();
          if (!userError && userData?.user) return userData.user;

          const errorMessage = String(userError?.message || '').toLowerCase();
          const invalidSession =
            userError?.status === 401 ||
            errorMessage.includes('jwt') ||
            errorMessage.includes('token') ||
            errorMessage.includes('session') ||
            errorMessage.includes('unauthorized');
          const futureIssued =
            errorMessage.includes('issued in the future') ||
            errorMessage.includes('clock for skew') ||
            errorMessage.includes('clock skew');

          if (futureIssued) {
            await waitForTokenClockSkew(accessTokenHint || session?.access_token || '');
            if (attempt < 2) {
              await new Promise((resolve) => setTimeout(resolve, 160));
              continue;
            }
          }

          if (invalidSession) {
            if (!refreshAttempted) {
              refreshAttempted = true;
              const { data: refreshed, error: refreshError } = await client.auth.refreshSession();
              if (!refreshError && refreshed?.session?.user) return refreshed.session.user;
            }
          }

          if (attempt < 2) {
            await new Promise((resolve) => setTimeout(resolve, 140));
          }
        }
        return null;
      }

      async function ensureSessionStored(client, timeoutMs = 2400) {
        const startedAt = Date.now();
        while ((Date.now() - startedAt) < timeoutMs) {
          const { data: sessionData } = await client.auth.getSession();
          const session = sessionData?.session || null;
          if (session?.access_token && session?.refresh_token) return session;
          await new Promise((resolve) => setTimeout(resolve, 120));
        }
        return null;
      }

      function getOnboardingPendingKey(userId) {
        return `zo2y_onboarding_pending_v1_${String(userId || '').trim()}`;
      }

      async function ensureUserProfile(client, user) {
        try {
          log('Checking if profile exists...');
          const { data: existingProfile, error: checkError } = await client
            .from('user_profiles')
            .select('id, username, full_name')
            .eq('id', user.id)
            .maybeSingle();

          if (existingProfile) {
            log(`Profile found: ${existingProfile.username || '(no username)'}`);
            const existingUsername = cleanUsername(existingProfile.username || '');
            const needsUsernameRepair = !existingProfile.username || existingUsername !== existingProfile.username;
            const existingDisplayName = String(existingProfile.full_name || '').trim();
            if (!needsUsernameRepair && existingDisplayName) {
              return { ok: true, created: false };
            }

            const userData = user.user_metadata || {};
            const emailPrefix = String(user.email || '').split('@')[0] || 'user';
            const repairedUsername = cleanUsername(
              existingProfile.username ||
              userData.preferred_username ||
              userData.user_name ||
              userData.full_name ||
              userData.name ||
              emailPrefix
            );
            const repairedDisplayName = String(existingProfile.full_name || userData.full_name || userData.name || emailPrefix || repairedUsername).slice(0, 80);
            const { error: repairError } = await client
              .from('user_profiles')
              .update({
                username: repairedUsername,
                full_name: repairedDisplayName || repairedUsername,
                updated_at: new Date().toISOString()
              })
              .eq('id', user.id);

            if (repairError) {
              log(`Profile repair warning: ${repairError.message}`, true);
            } else {
              log(`Profile normalized: ${repairedUsername}`);
            }
            return { ok: true, created: false };
          }

          if (checkError) {
            log(`Profile lookup warning: ${checkError.message}`, true);
          }

          const userData = user.user_metadata || {};
          const emailPrefix = String(user.email || '').split('@')[0] || 'user';
          const baseUsername = cleanUsername(
            userData.preferred_username ||
            userData.user_name ||
            userData.full_name ||
            userData.name ||
            emailPrefix
          );
          const displayName = String(userData.full_name || userData.name || emailPrefix || baseUsername).slice(0, 80);
          const idSuffix = String(user.id || '').replace(/-/g, '').slice(0, 6) || 'user';
          const usernameCandidates = [
            baseUsername,
            usernameWithSuffix(baseUsername, idSuffix),
            usernameWithSuffix(baseUsername, `${idSuffix}${Date.now().toString().slice(-2)}`)
          ];

          for (const username of usernameCandidates) {
            const profileData = {
              id: user.id,
              username,
              full_name: displayName || username
            };

            const { error: createError } = await client
              .from('user_profiles')
              .insert([profileData]);

            if (!createError) {
              log(`Profile created with username: ${username}`);
              return { ok: true, created: true };
            }

            const createMessage = String(createError.message || '').toLowerCase();
            const maybeDuplicate = createMessage.includes('duplicate') || createMessage.includes('unique');
            if (!maybeDuplicate) {
              log(`Profile creation error: ${createError.message}`, true);
              return { ok: false, created: false };
            }

            const { data: raceProfile } = await client
              .from('user_profiles')
              .select('id')
              .eq('id', user.id)
              .maybeSingle();

            if (raceProfile?.id) {
              log('Profile already created by another request.');
              return { ok: true, created: false };
            }
          }

          log('Could not create a unique username for profile.', true);
          return { ok: false, created: false };
        } catch (error) {
          log(`Profile setup error: ${error.message}`, true);
          return { ok: false, created: false };
        }
      }

      async function triggerWelcomeEmail(session, flow, logFn) {
        const accessToken = String(session?.access_token || '').trim();
        if (!accessToken) {
          logFn('Skipping welcome email trigger: missing session access token.', true);
          return;
        }

        try {
          const response = await fetch('/api/emails/welcome/trigger', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify({
              appUrl: window.location.origin,
              flow: flow || null
            })
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            logFn(`Welcome email trigger failed: ${payload?.message || response.status}`, true);
            return;
          }

          if (payload?.status === 'sent') {
            logFn('Welcome email sent.');
          } else {
            logFn('Welcome email already sent earlier.');
          }
        } catch (error) {
          logFn(`Welcome email trigger error: ${error.message}`, true);
        }
      }

      async function persistReferralMetadata(client, user, flow, logFn) {
        const referral = activeReferral || (referralUtils ? referralUtils.getStoredReferral() : '');
        const safeReferral = String(referral || '').trim().toLowerCase();
        if (!safeReferral || !user?.id) return;
        if (String(user?.user_metadata?.referred_by_username || '').trim().toLowerCase() === safeReferral) {
          if (referralUtils) referralUtils.markReferralConsumed(user.id, safeReferral);
          return;
        }
        if (referralUtils && referralUtils.getConsumedReferral(user.id) === safeReferral) return;
        try {
          const { error } = await client.auth.updateUser({
            data: {
              referred_by_username: safeReferral
            }
          });
          if (error) {
            logFn(`Referral metadata sync skipped: ${error.message}`, true);
            return;
          }
          if (referralUtils) referralUtils.markReferralConsumed(user.id, safeReferral);
          sendAnalyticsEvent('referral_captured', {
            flow: flow || 'unknown',
            referral_username: safeReferral
          }, true);
          logFn(`Referral saved from @${safeReferral}.`);
        } catch (error) {
          logFn(`Referral metadata sync failed: ${error.message}`, true);
        }
      }

      async function finishAuthenticatedRedirect(client, user, session, flow, nextPath, logFn) {
        logFn(`Authenticated user: ${user.id}`);
        statusText.textContent = 'Opening Zo2y...';
        const profileResult = await ensureUserProfile(client, user);
        if (flow === 'signup' || profileResult?.created) {
          try {
            localStorage.setItem(getOnboardingPendingKey(user.id), '1');
          } catch (_err) {}
        }

        const backgroundTasks = [
          persistReferralMetadata(client, user, flow, logFn)
        ];
        if (flow === 'signup') {
          backgroundTasks.push(triggerWelcomeEmail(session, flow, logFn));
        }
        Promise.allSettled(backgroundTasks).catch(() => {});

        sendAnalyticsEvent('oauth_callback_success', {
          flow: flow || 'unknown',
          created_profile: !!profileResult?.created,
          next: nextPath
        });
        if (flow === 'signup') {
          sendAnalyticsEvent('signup_success', {
            method: 'google',
            created_profile: !!profileResult?.created
          });
        } else if (flow === 'login') {
          sendAnalyticsEvent('login_success', {
            method: 'google'
          });
        }

        redirectToApp(nextPath, flow === 'signup' ? 30 : 40);
      }

      try {
        log('Initializing auth callback...');
        if (!window.supabase || !window.supabase.createClient) {
          throw new Error('Auth library unavailable');
        }

        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
          auth: {
            storage: authStorageBridge,
            storageKey: STORAGE_KEY,
            persistSession: true,
            autoRefreshToken: true,
            // Handle callback tokens manually so we can tolerate small mobile clock skew.
            detectSessionInUrl: false
          }
        });

        const oauthFlow = flowParam || String(safeGetAuthStorage('oauthFlow') || '').trim().toLowerCase();
        const oauthError = params.get('error_description') || params.get('error');
        if (oauthError) {
          sendAnalyticsEvent('oauth_callback_error', {
            flow: oauthFlow || 'unknown',
            message: String(oauthError).slice(0, 180)
          });
          throw new Error(oauthError);
        }

        const code = params.get('code');
        const hashParams = getHashParams();
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        let exchangeError = null;
        let resolvedSession = null;
        const manualHashSession = buildSessionFromHashTokens(accessToken, refreshToken, hashParams);

        if (code) {
          statusText.textContent = 'Finalizing secure sign-in...';
          log('Auth code found, exchanging for session...');
          const { data, error } = await client.auth.exchangeCodeForSession(code);
          if (data?.session?.access_token && data?.session?.refresh_token) {
            resolvedSession = data.session;
            persistSessionSnapshot(data.session);
          }
          if (error) {
            exchangeError = error;
            log(`Exchange warning: ${error.message}`, true);
          }
        } else if (accessToken && refreshToken) {
          statusText.textContent = 'Finalizing secure sign-in...';
          log('Token hash found, setting session...');
          if (manualHashSession?.user?.id) {
            resolvedSession = manualHashSession;
            persistSessionSnapshot(manualHashSession);
          }
          await waitForTokenClockSkew(accessToken);
          const { data, error } = await client.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if (error) {
            if (!manualHashSession?.user?.id) throw error;
            log(`Session hydration warning: ${error.message}`, true);
          }
          if (data?.session?.access_token && data?.session?.refresh_token) {
            resolvedSession = data.session;
            persistSessionSnapshot(data.session);
          } else if (!resolvedSession && manualHashSession?.user?.id) {
            client.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken
            }).then(({ data: asyncData }) => {
              if (asyncData?.session?.access_token && asyncData?.session?.refresh_token) {
                persistSessionSnapshot(asyncData.session);
              }
            }).catch(() => {});
          }
        } else {
          log('No code/hash provided, verifying existing session...');
        }

        const storedSession = resolvedSession || await ensureSessionStored(client);
        const finalSession = storedSession || manualHashSession;
        if (!finalSession) {
          if (exchangeError) throw exchangeError;
          throw new Error('Authentication was not completed. Please sign in again.');
        }
        persistSessionSnapshot(finalSession);
        if (oauthFlow === 'signup' && finalSession?.user?.id) {
          try {
            localStorage.setItem(getOnboardingPendingKey(finalSession.user.id), '1');
          } catch (_err) {}
          persistPendingPostAuthBootstrap({
            flow: 'signup',
            userId: finalSession.user.id,
            email: String(finalSession?.user?.email || '').trim(),
            fullName: String(finalSession?.user?.user_metadata?.full_name || finalSession?.user?.user_metadata?.name || '').trim()
          });
        }

        if ((oauthFlow === 'login' || oauthFlow === 'signup') && finalSession?.user?.id) {
          await waitForTokenClockSkew(finalSession?.access_token || accessToken || '');
          let directUser = await waitForVerifiedUser(client, finalSession?.access_token || accessToken || '');
          if (!directUser && finalSession?.user?.id) {
            log('Verified user fetch still pending. Using session user from callback payload.');
            directUser = finalSession.user;
          }
          if (directUser?.id) {
            await finishAuthenticatedRedirect(client, directUser, finalSession, oauthFlow, next, log);
            return;
          }
          const onboardingName = String(
            finalSession?.user?.user_metadata?.full_name ||
            finalSession?.user?.user_metadata?.name ||
            ''
          ).trim();
          persistPendingPostAuthBootstrap({
            flow: oauthFlow || 'login',
            userId: finalSession.user.id,
            email: String(finalSession?.user?.email || '').trim(),
            fullName: onboardingName
          });
          log('Verified user fetch still pending. Continuing with manual session bootstrap.');
          redirectToApp(next, oauthFlow === 'signup' ? 30 : 80);
          return;
        }

        const sessionUser = finalSession?.user?.id ? finalSession.user : null;
        await waitForTokenClockSkew(finalSession?.access_token || accessToken || '');
        let user = await waitForVerifiedUser(client, finalSession?.access_token || accessToken || '');
        if (!user && sessionUser?.id) {
          log('Verified user fetch still pending. Using session user from callback payload.');
          user = sessionUser;
        }
        if (!user) {
          if ((oauthFlow === 'login' || oauthFlow === 'signup') && finalSession?.user?.id) {
            log('Verified user fetch still pending. Continuing with manual session bootstrap.');
            redirectToApp(next, 80);
            return;
          }
          throw new Error('Authentication was not completed. Please sign in again.');
        }

        await finishAuthenticatedRedirect(client, user, finalSession, oauthFlow, next, log);
      } catch (err) {
        const msg = (err && err.message) ? err.message : 'Authentication failed';
        const oauthFlow = flowParam || String(safeGetAuthStorage('oauthFlow') || '').trim().toLowerCase();
        sendAnalyticsEvent('oauth_callback_error', {
          flow: oauthFlow || 'unknown',
          message: String(msg).slice(0, 180)
        });
        log(`Fatal error: ${msg}`, true);
        document.body.classList.add('auth-callback-error');
        statusText.textContent = 'We could not finish signing you in.';
        errorText.textContent = msg;
        setTimeout(() => {
          window.location.replace('login.html');
        }, 2500);
      }
    })();
  </script>
