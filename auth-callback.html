<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex">
  <title>Processing Authentication - Zo2y</title>
  <link rel="icon" href="/favicon.ico?v=20260307a" type="image/x-icon">
  <meta name="theme-color" content="#0b1633">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zo2y">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/newlogo.webp">
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260308a">
  <script src="/js/vercel-analytics.js?v=20260307a" defer></script>
  <script src="/js/auth-gate.js?v=20260424d"></script>
  <script src="/js/mobile-webapp.js?v=20260315e" defer></script>
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a">
  <style>
    body {
      background: #0b1633;
      color: white;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: #132347;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      width: min(calc(100% - 24px), 400px);
      margin: 30px auto 24px;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #f59e0b;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #fca5a5;
      margin-top: 12px;
      font-size: 14px;
    }
    .debug {
      margin-top: 20px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      display: none;
    }
    .debug.show { display: block; }
    .debug-line { margin-bottom: 5px; color: #00ff00; }
    .debug-error { color: #ff0000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Completing Authentication...</h2>
    <p id="statusText">Please wait while we set up your account.</p>
    <p id="errorText" class="error" style="display:none;"></p>
    <div id="debugConsole" class="debug"></div>
  </div>
  <script src="/js/pages/auth-callback.js?v=20260424d" defer></script>
</body>
</html>
