  <script>
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const TMDB_PROXY_BASE = '/api/tmdb';
      const POSTER_BASE = 'https://image.tmdb.org/t/p/w500';
      const BACKDROP_BASE = 'https://image.tmdb.org/t/p/w1280';
    const TMDB_PAGE_SIZE = 20;
    let MOVIES_PAGE_SIZE = 30;

    function computeGridPageSize() {
      const grid = document.getElementById('moviesGrid');
      if (!grid) return 18;
      const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;
      const rows = 3;
      return cols * rows;
    }

    let supabaseClient = null;
    let currentUser = null;
    const state = {
      movies: [],
      allMovies: [],
      search: '',
      genre: '',
      year: '',
      sort: 'popular',
      offset: 0,
      totalItems: 0,
      hasMore: true,
      loading: false,
      listStatusMap: new Map(),
      pendingQuickOps: new Set(),
      _poolCache: null,
      _poolCacheKey: '',
      _poolCacheMeta: null
    };

    function invalidatePoolCache() {
      state._poolCache = null;
      state._poolCacheKey = '';
      state._poolCacheMeta = null;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(message, isError = false) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '16px';
      el.style.right = '16px';
      el.style.zIndex = '9999';
      el.style.background = isError ? '#dc2626' : '#f59e0b';
      el.style.color = '#fff';
      el.style.padding = '10px 14px';
      el.style.borderRadius = '10px';
      el.style.fontSize = '13px';
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2200);
    }

    let searchDebounceTimer = null;
    function normalizeQuery(query) {
      return String(query || '').trim().replace(/\s+/g, ' ');
    }

    function getQueryVariations(query) {
      const normalized = normalizeQuery(query);
      if (!normalized) return [];
      
      const variations = [normalized];
      
      // Try without spaces for compound words
      if (normalized.includes(' ')) {
        variations.push(normalized.replace(/\s+/g, ''));
      }
      
      // Try with spaces if no spaces
      if (!normalized.includes(' ') && normalized.length > 3) {
        const spaced = normalized.replace(/([a-z])([A-Z])/g, '$1 $2').toLowerCase();
        if (spaced !== normalized.toLowerCase()) {
          variations.push(spaced);
        }
      }
      
      return [...new Set(variations)];
    }

    function isDateWithinAcceptableRange(dateString) {
      if (!dateString) return true;
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return true;
      const now = new Date();
      const twoYearsFromNow = new Date(now.getFullYear() + 2, now.getMonth(), now.getDate());
      return date <= twoYearsFromNow;
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    async function initFilters() {
      const genreSelect = document.getElementById('genre');
      if (genreSelect) {
        try {
          const res = await fetch(`${TMDB_PROXY_BASE}/genre/movie/list?language=en`);
          const json = await res.json();
          if (Array.isArray(json.genres)) {
            json.genres.forEach(g => {
              const opt = document.createElement('option');
              opt.value = String(g.id);
              opt.textContent = g.name;
              genreSelect.appendChild(opt);
            });
          }
        } catch (e) {
          console.error('Failed to load genres', e);
        }
      }
      const yearSelect = document.getElementById('year');
      if (yearSelect) {
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1900; y--) {
          const opt = document.createElement('option');
          opt.value = String(y);
          opt.textContent = String(y);
          yearSelect.appendChild(opt);
        }
      }
    }

    async function loadMoviesWithFallback(queryOverride = '', append = false) {
      if (state.loading) return;
      const query = String(queryOverride || state.search || '').trim();

      state.loading = true;
      const sentinel = document.getElementById('scrollSentinel');
      const grid = document.getElementById('moviesGrid');

      if (!append) {
        state.movies = [];
        state.allMovies = [];
        state.offset = 0;
        state.hasMore = true;
        if (grid) grid.innerHTML = Skel ? Skel.grid(MOVIES_PAGE_SIZE || 30, 4) : '';
        invalidatePoolCache();
      } else if (sentinel) {
        sentinel.innerHTML = '<div class="loading-spinner"></div>';
      }

      MOVIES_PAGE_SIZE = computeGridPageSize();
      let movies = [];
      let apiTotalResults = null;
      let apiTotalPages = 1;

      try {
        if (!query && !state.genre && !state.year) {
          const poolCacheKey = 'popular|' + (state.sort || 'popular');
          if (!append && state._poolCacheKey === poolCacheKey && state._poolCache && state._poolCache.length >= MOVIES_PAGE_SIZE) {
            movies = state._poolCache;
            if (state._poolCacheMeta) {
              apiTotalResults = state._poolCacheMeta.totalResults;
              apiTotalPages = state._poolCacheMeta.totalPages;
            }
          } else {
            const startPage = append ? Math.floor(state.offset / TMDB_PAGE_SIZE) + 1 : 1;
            const endPage = startPage + 9;
            const pool = [];
            let fetchedTotalResults = null;
            let fetchedTotalPages = 1;
            for (let p = startPage; p <= endPage; p += 1) {
              try {
                const url = `${TMDB_PROXY_BASE}/movie/popular?language=en-US&page=${p}`;
                const res = await fetch(url);
                if (!res.ok) break;
                const json = await res.json();
                if (fetchedTotalResults == null) fetchedTotalResults = Number(json?.total_results ?? null);
                fetchedTotalPages = json?.total_pages || fetchedTotalPages || 1;
                const batch = Array.isArray(json?.results) ? json.results : [];
                pool.push(...batch);
                if (!batch.length || p >= fetchedTotalPages) break;
              } catch (_) { break; }
            }
            if (append) {
              state.allMovies = state.allMovies.concat(pool);
            } else {
              state.allMovies = pool;
              state._poolCache = pool;
              state._poolCacheKey = poolCacheKey;
              state._poolCacheMeta = { totalResults: fetchedTotalResults, totalPages: fetchedTotalPages };
            }
            movies = state.allMovies;
            apiTotalResults = fetchedTotalResults;
            apiTotalPages = fetchedTotalPages;
            if (!pool.length) {
              try {
                const fallbackPool = [];
                for (let p = startPage; p <= endPage; p += 1) {
                  try {
                    const url = `${TMDB_PROXY_BASE}/trending/movie/week?page=${p}`;
                    const res = await fetch(url);
                    if (!res.ok) break;
                    const json = await res.json();
                    if (apiTotalResults == null) apiTotalResults = Number(json?.total_results ?? null);
                    apiTotalPages = json?.total_pages || apiTotalPages || 1;
                    const batch = Array.isArray(json?.results) ? json.results : [];
                    fallbackPool.push(...batch);
                    if (!batch.length) break;
                  } catch (_) { break; }
                }
                if (append) {
                  state.allMovies = state.allMovies.concat(fallbackPool);
                } else {
                  state.allMovies = fallbackPool;
                }
                movies = state.allMovies;
              } catch (_) {}
            }
          }
        } else if (query) {
          if (!append) {
            const variations = getQueryVariations(query);
            for (const variation of variations) {
              try {
                const url = `${TMDB_PROXY_BASE}/search/multi?query=${encodeURIComponent(variation)}&page=1`;
                const res = await fetch(url);
                if (res.ok) {
                  const json = await res.json();
                  const results = Array.isArray(json?.results) ? json.results : [];
                  const movieResults = results.filter((item) => item.media_type === 'movie');
                  if (movieResults.length > 0) {
                    movies = movieResults;
                    apiTotalResults = Number(json?.total_results ?? null);
                    apiTotalPages = json?.total_pages || 1;
                    break;
                  }
                }
              } catch (_) {}
            }
            if (movies.length === 0) {
              for (const variation of variations) {
                try {
                  const url = `${TMDB_PROXY_BASE}/search/movie?query=${encodeURIComponent(variation)}&page=1`;
                  const res = await fetch(url);
                  if (res.ok) {
                    const json = await res.json();
                    const results = Array.isArray(json?.results) ? json.results : [];
                    if (results.length > 0) {
                      movies = results;
                      apiTotalResults = Number(json?.total_results ?? null);
                      apiTotalPages = json?.total_pages || 1;
                      break;
                    }
                  }
                } catch (_) {}
              }
            }
            state.allMovies = movies;
          } else {
            const nextPage = Math.floor(state.offset / TMDB_PAGE_SIZE) + 1;
            if (nextPage <= 500) {
              const variations = getQueryVariations(query);
              const pool = [];
              for (const variation of variations) {
                for (let p = nextPage; p <= Math.min(nextPage + 9, 500); p += 1) {
                  try {
                    const url = `${TMDB_PROXY_BASE}/search/multi?query=${encodeURIComponent(variation)}&page=${p}`;
                    const res = await fetch(url);
                    if (!res.ok) break;
                    const json = await res.json();
                    if (apiTotalResults == null) apiTotalResults = Number(json?.total_results ?? null);
                    apiTotalPages = json?.total_pages || apiTotalPages || 1;
                    const results = Array.isArray(json?.results) ? json.results : [];
                    const movieResults = results.filter((item) => item.media_type === 'movie');
                    pool.push(...movieResults);
                    if (!results.length || p >= apiTotalPages) break;
                  } catch (_) { break; }
                }
                if (pool.length) break;
              }
              state.allMovies = state.allMovies.concat(pool);
              movies = state.allMovies;
            } else {
              movies = state.allMovies;
            }
          }
        } else {
          if (!append) {
            const params = new URLSearchParams({ language: 'en-US', page: '1' });
            if (state.genre) params.set('with_genres', state.genre);
            if (state.year) params.set('primary_release_year', state.year);
            if (state.sort === 'released') params.set('sort_by', 'primary_release_date.desc');
            else if (state.sort === 'name') params.set('sort_by', 'original_title.asc');
            else params.set('sort_by', 'popularity.desc');
            const pool = [];
            for (let p = 1; p <= 10; p += 1) {
              params.set('page', String(p));
              try {
                const url = `${TMDB_PROXY_BASE}/discover/movie?${params.toString()}`;
                const res = await fetch(url);
                if (!res.ok) break;
                const json = await res.json();
                if (apiTotalResults == null) apiTotalResults = Number(json?.total_results ?? null);
                apiTotalPages = json?.total_pages || apiTotalPages || 1;
                const batch = Array.isArray(json?.results) ? json.results : [];
                pool.push(...batch);
                if (!batch.length || p >= apiTotalPages) break;
              } catch (_) { break; }
            }
            state.allMovies = pool;
            movies = pool;
          } else {
            const startPage = Math.floor(state.offset / TMDB_PAGE_SIZE) + 1;
            const endPage = startPage + 9;
            const params = new URLSearchParams({ language: 'en-US', page: String(startPage) });
            if (state.genre) params.set('with_genres', state.genre);
            if (state.year) params.set('primary_release_year', state.year);
            if (state.sort === 'released') params.set('sort_by', 'primary_release_date.desc');
            else if (state.sort === 'name') params.set('sort_by', 'original_title.asc');
            else params.set('sort_by', 'popularity.desc');
            const pool = [];
            for (let p = startPage; p <= endPage; p += 1) {
              params.set('page', String(p));
              try {
                const url = `${TMDB_PROXY_BASE}/discover/movie?${params.toString()}`;
                const res = await fetch(url);
                if (!res.ok) break;
                const json = await res.json();
                if (apiTotalResults == null) apiTotalResults = Number(json?.total_results ?? null);
                apiTotalPages = json?.total_pages || apiTotalPages || 1;
                const batch = Array.isArray(json?.results) ? json.results : [];
                pool.push(...batch);
                if (!batch.length || p >= apiTotalPages) break;
              } catch (_) { break; }
            }
            state.allMovies = state.allMovies.concat(pool);
            movies = state.allMovies;
          }
        }
      } catch (_err) {
        console.error('Failed to load movies', _err);
      }

      const _seenMovies = new Set();
      const filtered = movies.filter(m => {
        const id = String(m.id || '');
        if (!id || _seenMovies.has(id)) return false;
        _seenMovies.add(id);
        return true;
      }).map((movie) => ({
        id: String(movie.id || ''),
        title: movie.title || movie.name || 'Unknown Movie',
        overview: movie.overview || '',
        posterPath: movie.poster_path || '',
        backdropPath: movie.backdrop_path || '',
        releaseDate: movie.release_date || '',
        voteAverage: movie.vote_average || 0,
        genreIds: Array.isArray(movie.genre_ids) ? movie.genre_ids : []
      })).filter((m) => m.id && isDateWithinAcceptableRange(m.releaseDate));

      if (!append) {
        state.totalItems = filtered.length;
        state.movies = filtered.slice(0, MOVIES_PAGE_SIZE);
        state.offset = state.movies.length;
      } else {
        if (Number.isFinite(apiTotalResults) && apiTotalResults > 0) {
          state.totalItems = apiTotalResults;
        } else {
          state.totalItems = Math.max(state.totalItems, filtered.length);
        }
        const newItems = filtered.slice(state.offset, state.offset + MOVIES_PAGE_SIZE);
        state.movies = state.movies.concat(newItems);
        state.offset = state.movies.length;
      }
      state.hasMore = state.offset < state.totalItems && filtered.length > state.offset;
      state.loading = false;
      if (sentinel) sentinel.innerHTML = state.hasMore ? '' : '';
    }

    function debounceSearch(query) {
      if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(async () => {
        state.search = query;
        invalidatePoolCache();
        await loadMoviesWithFallback();
        
        renderGrid();
      }, 400);
    }

    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
        await authRuntime.waitForSupabase(8000);
      } else {
        const startedAt = Date.now();
        while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
          await new Promise((resolve) => setTimeout(resolve, 40));
        }
      }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
        supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        if (supabaseClient) return supabaseClient;
      }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(
          window.__ZO2Y_SUPABASE_CONFIG.url,
          window.__ZO2Y_SUPABASE_CONFIG.key,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
        );
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
        return supabaseClient;
      }
      return null;
    }

    async function initAuthUi() {
      const client = await ensureSupabase();
      if (!client) return;
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const profileBtn = document.getElementById('profileBtn');
      const { data } = await client.auth.getUser();
      currentUser = data?.user || null;

      if (currentUser) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (profileBtn) {
          profileBtn.style.display = 'inline-flex';
          profileBtn.innerHTML = '<i class="fas fa-user"></i><span>Profile</span>';
        }
      } else {
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (signupBtn) signupBtn.style.display = 'inline-flex';
        if (profileBtn) profileBtn.style.display = 'none';
      }
    }

    async function loadMovies(queryOverride = '') {
      await loadMoviesWithFallback(queryOverride);
    }

    async function loadListStatus() {
      state.listStatusMap = new Map();
      if (!currentUser?.id || !state.movies.length) return;
      const client = await ensureSupabase();
      if (!client) return;
      const ids = state.movies.map((movie) => movie.id);
      if (!ids.length) return;
      const { data } = await client
        .from('list_items')
        .select('item_id, list_type')
        .eq('user_id', currentUser.id)
        .eq('media_type', 'movie')
        .in('item_id', ids);
      (data || []).forEach((row) => {
        const id = String(row.item_id || '');
        if (!id) return;
        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, watched: false, watchlist: false });
        const bucket = state.listStatusMap.get(id);
        if (row.list_type in bucket) bucket[row.list_type] = true;
      });
    }

    function getMovieListStatus(movieId) {
      const id = String(movieId || '').trim();
      const empty = { favorites: false, watched: false, watchlist: false };
      if (!id) return empty;
      if (!state.listStatusMap.has(id)) {
        state.listStatusMap.set(id, { ...empty });
      }
      return state.listStatusMap.get(id);
    }

    function getMovieCardExtra(movie) {
      return '';
    }

    function renderMovieSpotlight(movie) {
      const section = document.getElementById('moviesSpotlight');
      if (!section || !movie) return;
      const bg = document.getElementById('moviesSpotlightBg');
      const titleEl = document.getElementById('moviesSpotlightTitle');
      const metaEl = document.getElementById('moviesSpotlightMeta');
      const summaryEl = document.getElementById('moviesSpotlightSummary');
      const imgEl = document.getElementById('moviesSpotlightImage');
      const openEl = document.getElementById('moviesSpotlightOpen');
      
      const posterUrl = movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '/images/fallback/movie.svg';
      const backdropUrl = movie.backdropPath ? `${BACKDROP_BASE}${movie.backdropPath}` : posterUrl;
      const year = movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD';
      const rating = movie.voteAverage ? `Rating: ${movie.voteAverage.toFixed(1)}/10` : '';
      
      section.hidden = false;
      if (bg) bg.style.backgroundImage = `linear-gradient(120deg, rgba(8,14,31,0.76), rgba(10,19,39,0.38)), url("${backdropUrl}")`;
      if (titleEl) titleEl.textContent = movie.title || 'Movie Title';
      if (metaEl) metaEl.textContent = [year, rating].filter(Boolean).join(' | ') || 'Movie details';
      if (summaryEl) summaryEl.textContent = movie.overview || 'No description available.';
      if (imgEl) {
        imgEl.src = posterUrl;
        imgEl.alt = `${movie.title || 'Movie'} poster`;
      }
      if (openEl) openEl.href = `movie.html?id=${encodeURIComponent(movie.id)}`;
    }

    let _moviesLastRendered = 0;

    function renderGrid(append) {
      const grid = document.getElementById('moviesGrid');
      const spotlight = document.getElementById('moviesSpotlight');
      if (!grid) return;
      
      if (spotlight) spotlight.hidden = true;
      
      if (!state.movies.length && !append) {
        grid.innerHTML = '<div class="empty">No movies found.</div>';
        _moviesLastRendered = 0;
        return;
      }
      const renderItems = append ? state.movies.slice(_moviesLastRendered) : state.movies;
      const html = renderItems.map((movie) => {
        let posterUrl = '';
        if (movie.posterPath) {
          posterUrl = `${POSTER_BASE}${movie.posterPath}`;
        } else if (movie.backdropPath) {
          posterUrl = `${BACKDROP_BASE}${movie.backdropPath}`;
        }
        const hasCover = posterUrl && posterUrl !== '/images/fallback/movie.svg';
        return `
        <article class="card" data-id="${escapeHtml(movie.id)}">
          <div class="card-media">
            ${hasCover ? `<img src="${escapeHtml(posterUrl)}" alt="${escapeHtml(movie.title)}" loading="lazy" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'card-media-fallback\\'><i class=\\'fa-solid fa-film\\'></i></div>';">` : '<div class="card-media-fallback"><i class="fa-solid fa-film"></i></div>'}
          </div>
          <div class="card-meta">
            <span class="card-type"><i class="fa-solid fa-film"></i> Movie</span>
            <div class="card-meta-top">
              <p class="card-name">${escapeHtml(movie.title)}</p>
              <div class="card-menu-wrap">
                <button class="card-menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
              </div>
            </div>
            <p class="card-sub">${escapeHtml(movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD')}</p>
            <p class="card-extra">${escapeHtml(getMovieCardExtra(movie))}</p>
          </div>
        </article>
      `;
      }).join('');

      if (append) {
        grid.insertAdjacentHTML('beforeend', html);
      } else {
        grid.innerHTML = html;
      }
      wireGridActions();
      _moviesLastRendered = state.movies.length;
    }

    function setupInfiniteScroll() {
      const sentinel = document.getElementById('scrollSentinel');
      if (!sentinel) return;
      const observer = new IntersectionObserver((entries) => {
        for (const entry of entries) {
          if (entry.isIntersecting && !state.loading && state.hasMore) {
            loadMoviesWithFallback('', true).then(() => loadListStatus()).then(() => renderGrid(true));
          }
        }
      }, { rootMargin: '400px' });
      observer.observe(sentinel);
    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
      const movieId = String(itemId || '').trim();
      if (!movieId) return { ok: false, saved: false };
      const movie = state.movies.find((row) => String(row.id || '').trim() === movieId);
      if (!movie) return { ok: false, saved: false };

      const client = await ensureSupabase();
      if (!client || !currentUser?.id) {
        window.location.href = 'login.html';
        return { ok: false, saved: false };
      }

      const status = getMovieListStatus(movieId);
      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];
      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
      const opKey = `${movieId}:${listType}`;
      if (state.pendingQuickOps.has(opKey)) {
        return { ok: false, saved: previousSaved };
      }

      state.pendingQuickOps.add(opKey);
      status[listType] = nextSaved;
      try {
        if (nextSaved) {
          const { error } = await client.from('list_items').insert({
            user_id: currentUser.id,
            item_id: movieId,
            media_type: 'movie',
            list_type: listType
          });
          if (error) {
            if (String(error.code || '') === '23505') return;
            throw error;
          }
          showToast('Added to list');
        } else {
          const { error } = await client
            .from('list_items')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('item_id', movieId)
            .eq('media_type', 'movie')
            .eq('list_type', listType);
          if (error) throw error;
          showToast('Removed from list');
        }
        return { ok: true, saved: nextSaved };
      } catch (error) {
        console.error('Movie list toggle failed', error);
        status[listType] = previousSaved;
        showToast('Could not update list', true);
        return { ok: false, saved: previousSaved };
      } finally {
        state.pendingQuickOps.delete(opKey);
      }
    }

    function wireGridActions() {
      document.querySelectorAll('.card-menu-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.card');
          if (!card) return;
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      });

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-menu-btn')) return;
          const id = String(card.getAttribute('data-id') || '').trim();
          if (!id) return;
          window.location.href = `movie.html?id=${encodeURIComponent(id)}`;
        });
      });
    }

    async function loadPage() {
      try {
        await initAuthUi();
        await loadMoviesWithFallback();
        
        renderGrid();
      } catch (_err) {
        const grid = document.getElementById('moviesGrid');
        if (grid) grid.innerHTML = '<div class="empty">Movies feed unavailable right now.</div>';
      }
    }

    // Refresh removed.
    document.getElementById('moviesSearchBtn')?.addEventListener('click', async () => {
      const query = String(document.getElementById('q')?.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('q')?.addEventListener('input', async (e) => {
      const query = String(e.target.value || '').trim();
      debounceSearch(query);
    });
    document.getElementById('moviesFilterBtn')?.addEventListener('click', () => {
      document.getElementById('moviesFilterModal')?.classList.add('show');
    });
    document.getElementById('moviesFilterCloseBtn')?.addEventListener('click', () => {
      document.getElementById('moviesFilterModal')?.classList.remove('show');
    });
    document.getElementById('genre')?.addEventListener('change', async (e) => {
      state.genre = String(e.target.value || '').trim();
      invalidatePoolCache();
      await loadMoviesWithFallback();
      
      renderGrid();
    });
    document.getElementById('year')?.addEventListener('change', async (e) => {
      state.year = String(e.target.value || '').trim();
      invalidatePoolCache();
      await loadMoviesWithFallback();
      
      renderGrid();
    });
    document.getElementById('sort')?.addEventListener('change', async (e) => {
      state.sort = String(e.target.value || 'popular').trim();
      invalidatePoolCache();
      await loadMoviesWithFallback();
      
      renderGrid();
    });
    document.getElementById('refresh')?.addEventListener('click', async () => {
      invalidatePoolCache();
      document.getElementById('moviesFilterModal')?.classList.remove('show');
      await loadPage();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initUniversalSearch) {
        const initSearch = () => window.initUniversalSearch({
          input: '#globalSearch',
          fallbackRoute: 'movies.html'
        });
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(initSearch, { timeout: 1500 });
        } else {
          window.setTimeout(initSearch, 0);
        }
      }
      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'movie',
          itemIdAttr: 'data-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-id]'))
              .map((card) => card.getAttribute('data-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '').trim();
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await ensureSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => currentUser,
          notify: (message, isError) => showToast(message, !!isError),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }
      initFilters().then(() => loadPage()).then(() => setupInfiniteScroll());
    });

    window.debugMoviesPage = function() {
      console.log(`=== Movies: ${state.movies.length} rendered / ${state.totalItems} total, offset=${state.offset}, hasMore=${state.hasMore} ===`);
      state.movies.slice(0, 10).forEach((m, i) => {
        console.log(`  ${i + 1}. ${m.title} (${m.releaseDate || 'N/A'}) [id:${m.id}]`);
      });
      return state.movies.map(m => `${m.title} (${m.releaseDate || 'N/A'})`);
    };
  </script>
