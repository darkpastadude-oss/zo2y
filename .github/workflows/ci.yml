name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check API handlers
        run: |
          for file in $(git ls-files 'api/*.js' 'api/**/*.js'); do
            node --check "$file"
          done

      - name: Syntax check backend
        run: |
          for file in $(git ls-files 'backend/index.js' 'backend/routes/*.js' 'backend/lib/*.js' 'backend/lib/**/*.js'); do
            node --check "$file"
          done

      - name: Syntax check frontend runtime and smoke script
        run: |
          node --check js/production-runtime.js
          node --check scripts/smoke-check.mjs
