  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --card-2: #172b58;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --white: #fff;
      --border: rgba(255,255,255,0.12);
      --surface: rgba(12, 26, 57, 0.84);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 18% -10%, rgba(245,158,11,0.18), transparent 35%),
        radial-gradient(circle at 88% -14%, rgba(53,103,194,0.25), transparent 42%),
        var(--bg);
      color: var(--white);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .container { width: calc(100% - 16px); margin: 0 auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    .brand { display: inline-flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 800; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }

    .search-wrap { flex: 1; min-width: 150px; position: relative; }
    .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; }
    .search {
      width: 100%; height: 38px; border-radius: 999px; border: 1px solid var(--border); background: var(--card);
      color: var(--white); padding: 0 12px 0 30px; outline: none; font-size: 14px;
    }
    .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.16); }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn {
      border: 1px solid var(--border); background: var(--card); color: var(--white); height: 36px; padding: 0 12px;
      border-radius: 10px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .btn-primary { background: var(--gradient); color: #0b1633; border: 0; }

    .page-shell { margin-top: 14px; display: grid; gap: 12px; padding-bottom: 18px; }

    .hero {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 16px;
      background:
        linear-gradient(120deg, rgba(10, 31, 56, 0.92), rgba(15, 44, 80, 0.7)),
        url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=800&q=80") center/cover;
      box-shadow: 0 10px 28px rgba(0,0,0,0.26);
    }
    .hero h1 { font-size: 26px; line-height: 1.1; }
    .hero p { color: #d3e5ff; margin-top: 8px; font-size: 14px; line-height: 1.4; }
    .hero-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

    .section {
      background: rgba(19, 35, 71, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      overflow: hidden;
    }
    .section-head { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .section-head h2 { font-size: 18px; margin-bottom: 2px; }
    .section-head p { color: var(--muted); font-size: 12px; }

    .section-search {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .section-search input {
      flex: 1;
      min-width: 150px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--white);
      padding: 0 10px;
      outline: none;
      font-size: 14px;
    }
    .section-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.16);
    }

    .grid {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-2);
      min-height: 260px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); }

    .card-media {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, #102545 0%, #0b1c35 100%);
      overflow: hidden;
    }
    .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-meta { padding: 8px; display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .card-title { font-size: 13px; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-sub { color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-extra {
      color: #abc5e8;
      font-size: 11px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 28px;
      margin-top: auto;
      padding-top: 2px;
    }

    .card-actions {
      display: grid;
      grid-template-columns: auto auto;
      gap: 5px;
      margin-top: 5px;
      justify-content: end;
    }
    .icon-btn {
      height: 28px; width: 28px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(15,39,72,0.9); color: #d7e8ff; display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .menu {
      position: absolute;
      right: 8px;
      bottom: 38px;
      width: 170px;
      background: #0e284b;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
      padding: 6px;
      display: none;
      z-index: 12;
    }
    .menu.open { display: block; }
    .menu button {
      width: 100%; border: 1px solid var(--border); background: transparent; color: #eef4ff; border-radius: 6px;
      padding: 7px; font-size: 11px; margin-bottom: 5px; text-align: left; cursor: pointer;
    }
    .menu button:last-child { margin-bottom: 0; }
    .menu button:hover { border-color: var(--accent); color: var(--accent); }
    .menu button[data-saved="1"] { border-color: rgba(248,113,113,0.85); background: rgba(239,68,68,0.12); color: #fecaca; }

    .empty { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }

    .pagination {
      padding: 0 12px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .page-btn {
      min-width: 40px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 12px;
    }
    .page-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .page-info {
      color: var(--muted);
      font-size: 12px;
    }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(6, 12, 28, 0.72); z-index: 240; padding: 16px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: min(380px, 100%); background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .modal-list { display: grid; gap: 6px; max-height: 240px; overflow-y: auto; padding: 4px 0; }
    .modal-list-item {
      display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px;
      border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); cursor: pointer;
    }
    .modal-list-item.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.12); }
    .modal-input { display: flex; gap: 6px; margin-top: 6px; }
    .modal-input input {
      flex: 1; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-2);
      color: var(--white); padding: 0 10px; font-size: 14px;
    }
  </style>

<body>

  <script>
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const TMDB_PROXY_BASE = '/api/tmdb';
      const POSTER_BASE = 'https://image.tmdb.org/t/p/w500';
      const BACKDROP_BASE = 'https://image.tmdb.org/t/p/w1280';
    const MOVIES_PAGE_SIZE = 20;

    let supabaseClient = null;
    let currentUser = null;
    const state = {
      movies: [],
      currentQuery: '',
      page: 1,
      totalPages: 1,
      listStatusMap: new Map(),
      pendingQuickOps: new Set()
    };

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(message, isError = false) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '12px';
      el.style.right = '12px';
      el.style.zIndex = '9999';
      el.style.background = isError ? '#dc2626' : '#f59e0b';
      el.style.color = '#fff';
      el.style.padding = '8px 12px';
      el.style.borderRadius = '8px';
      el.style.fontSize = '12px';
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
        await authRuntime.waitForSupabase(8000);
      } else {
        const startedAt = Date.now();
        while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
          await new Promise((resolve) => setTimeout(resolve, 40));
        }
      }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
        supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        if (supabaseClient) return supabaseClient;
      }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(
          window.__ZO2Y_SUPABASE_CONFIG.url,
          window.__ZO2Y_SUPABASE_CONFIG.key,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
        );
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
        return supabaseClient;
      }
      return null;
    }

    async function initAuthUi() {
      const client = await ensureSupabase();
      if (!client) return;
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const profileBtn = document.getElementById('profileBtn');
      const { data } = await client.auth.getUser();
      currentUser = data?.user || null;

      if (currentUser) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (profileBtn) {
          profileBtn.style.display = 'inline-flex';
          profileBtn.innerHTML = '<i class="fas fa-user"></i>';
        }
      } else {
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (signupBtn) signupBtn.style.display = 'inline-flex';
        if (profileBtn) profileBtn.style.display = 'none';
      }
    }

    async function loadMovies(queryOverride = '') {
      const query = String(queryOverride || state.currentQuery || '').trim();
      let movies = [];

      try {
        const endpoint = query ? 'search/movie' : 'trending/movie/week';
        const params = query ? { query, page: 1 } : {};
        const url = `${TMDB_PROXY_BASE}/${endpoint}?${new URLSearchParams(params).toString()}`;
        const res = await fetch(url);
        if (res.ok) {
          const json = await res.json();
          movies = Array.isArray(json?.results) ? json.results : [];
        }
      } catch (_err) {
        console.error('Failed to load movies', _err);
      }

      state.movies = movies.map((movie) => ({
        id: String(movie.id || ''),
        title: movie.title || movie.name || 'Unknown Movie',
        overview: movie.overview || '',
        posterPath: movie.poster_path || '',
        backdropPath: movie.backdrop_path || '',
        releaseDate: movie.release_date || '',
        voteAverage: movie.vote_average || 0,
        genreIds: Array.isArray(movie.genre_ids) ? movie.genre_ids : []
      })).filter((m) => m.id);
      
      state.page = 1;
      state.totalPages = Math.max(1, Math.ceil(state.movies.length / MOVIES_PAGE_SIZE));
    }

    async function loadListStatus() {
      state.listStatusMap = new Map();
      if (!currentUser?.id || !state.movies.length) return;
      const client = await ensureSupabase();
      if (!client) return;
      const ids = state.movies.map((movie) => movie.id);
      if (!ids.length) return;
      const { data } = await client
        .from('movie_list_items')
        .select('movie_id, list_type')
        .eq('user_id', currentUser.id)
        .in('movie_id', ids);
      (data || []).forEach((row) => {
        const id = String(row.movie_id || '');
        if (!id) return;
        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, watched: false, watchlist: false });
        const bucket = state.listStatusMap.get(id);
        if (row.list_type in bucket) bucket[row.list_type] = true;
      });
    }

    function getMovieListStatus(movieId) {
      const id = String(movieId || '').trim();
      const empty = { favorites: false, watched: false, watchlist: false };
      if (!id) return empty;
      if (!state.listStatusMap.has(id)) {
        state.listStatusMap.set(id, { ...empty });
      }
      return state.listStatusMap.get(id);
    }

    function getMovieCardExtra(movie) {
      const year = movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD';
      const rating = movie.voteAverage ? `Rating: ${movie.voteAverage.toFixed(1)}/10` : '';
      const parts = [year, rating].filter(Boolean);
      return parts.join(' | ') || 'Movie details';
    }

    function renderGrid() {
      const grid = document.getElementById('moviesGrid');
      if (!grid) return;
      if (!state.movies.length) {
        grid.innerHTML = '<div class="empty">No movies found.</div>';
        updatePagination();
        return;
      }
      const start = (state.page - 1) * MOVIES_PAGE_SIZE;
      const visibleItems = state.movies.slice(start, start + MOVIES_PAGE_SIZE);
      grid.innerHTML = visibleItems.map((movie) => {
        const posterUrl = movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '/newlogo.webp';
        return `
        <article class="card" data-id="${escapeHtml(movie.id)}">
          <div class="card-media">
            <img src="${escapeHtml(posterUrl)}" alt="${escapeHtml(movie.title)}" loading="lazy">
          </div>
          <div class="card-meta">
            <p class="card-title">${escapeHtml(movie.title)}</p>
            <p class="card-sub">${escapeHtml(movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD')}</p>
            <p class="card-extra">${escapeHtml(getMovieCardExtra(movie))}</p>
            <div class="card-actions">
              <button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
        </article>
      `;
      }).join('');

      wireGridActions();
      updatePagination();
    }

    function updatePagination() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const info = document.getElementById('pageInfo');
      state.totalPages = Math.max(1, Math.ceil(state.movies.length / MOVIES_PAGE_SIZE));
      if (state.page > state.totalPages) state.page = state.totalPages;
      if (state.page < 1) state.page = 1;
      if (prevBtn) prevBtn.disabled = state.page <= 1;
      if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
      if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;
    }

    async function upsertMovieRecord(client, movie) {
      if (!client || !movie?.id) return false;
      const payload = {
        id: String(movie.id),
        title: movie.title || '',
        poster_url: movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '',
        updated_at: new Date().toISOString()
      };
      const { error } = await client.from('movies').upsert(payload, { onConflict: 'id' });
      if (error) {
        console.error('Movie upsert failed', error);
        return false;
      }
      return true;
    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
      const movieId = String(itemId || '').trim();
      if (!movieId) return { ok: false, saved: false };
      const movie = state.movies.find((row) => String(row.id || '').trim() === movieId);
      if (!movie) return { ok: false, saved: false };

      const client = await ensureSupabase();
      if (!client || !currentUser?.id) {
        window.location.href = 'login.html';
        return { ok: false, saved: false };
      }

      const status = getMovieListStatus(movieId);
      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];
      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
      const opKey = `${movieId}:${listType}`;
      if (state.pendingQuickOps.has(opKey)) {
        return { ok: false, saved: previousSaved };
      }

      state.pendingQuickOps.add(opKey);
      status[listType] = nextSaved;
      try {
        if (nextSaved) {
          const ok = await upsertMovieRecord(client, movie);
          if (!ok) throw new Error('Movie upsert failed');
          const { error } = await client.from('movie_list_items').insert({
            user_id: currentUser.id,
            movie_id: movieId,
            list_type: listType
          });
          if (error && String(error.code || '') !== '23505') throw error;
          showToast('Added to list');
        } else {
          const { error } = await client
            .from('movie_list_items')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('movie_id', movieId)
            .eq('list_type', listType);
          if (error) throw error;
          showToast('Removed from list');
        }
        return { ok: true, saved: nextSaved };
      } catch (error) {
        console.error('Movie list toggle failed', error);
        status[listType] = previousSaved;
        showToast('Could not update list', true);
        return { ok: false, saved: previousSaved };
      } finally {
        state.pendingQuickOps.delete(opKey);
      }
    }

    function wireGridActions() {
      document.querySelectorAll('.menu-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.card');
          if (!card) return;
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      });

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.menu-btn')) return;
          const id = String(card.getAttribute('data-id') || '').trim();
          if (!id) return;
          window.location.href = `movie.html?id=${encodeURIComponent(id)}`;
        });
      });
    }

    async function loadPage() {
      try {
        await initAuthUi();
        await loadMovies(state.currentQuery);
        await loadListStatus();
        renderGrid();
      } catch (_err) {
        const grid = document.getElementById('moviesGrid');
        if (grid) grid.innerHTML = '<div class="empty">Movies feed unavailable right now.</div>';
      }
    }

    document.getElementById('refreshMoviesBtn')?.addEventListener('click', loadPage);
    document.getElementById('searchMoviesBtn')?.addEventListener('click', async () => {
      state.currentQuery = String(document.getElementById('moviesPageSearch')?.value || '').trim();
      await loadPage();
    });
    document.getElementById('clearMoviesSearchBtn')?.addEventListener('click', async () => {
      const input = document.getElementById('moviesPageSearch');
      if (input) input.value = '';
      state.currentQuery = '';
      await loadPage();
    });
    document.getElementById('moviesPageSearch')?.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      state.currentQuery = String(e.target.value || '').trim();
      await loadPage();
    });
    document.getElementById('prevPageBtn')?.addEventListener('click', () => {
      if (state.page <= 1) return;
      state.page -= 1;
      renderGrid();
    });
    document.getElementById('nextPageBtn')?.addEventListener('click', () => {
      if (state.page >= state.totalPages) return;
      state.page += 1;
      renderGrid();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initUniversalSearch) {
        const initSearch = () => window.initUniversalSearch({
          input: '#globalSearch',
          fallbackRoute: 'movies-mobile.html'
        });
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(initSearch, { timeout: 1500 });
        } else {
          window.setTimeout(initSearch, 0);
        }
      }
      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'movies',
          itemIdAttr: 'data-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-id]'))
              .map((card) => card.getAttribute('data-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '').trim();
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await ensureSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => currentUser,
          notify: (message, isError) => showToast(message, !!isError),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }
      loadPage();
    });
  </script>
  <script src="js/production-runtime.js?v=20260307a" defer></script>
