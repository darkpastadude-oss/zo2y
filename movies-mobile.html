<body>
  <header class="zo2y-shared-header" role="banner" data-shared-header="1">
  <div class="zo2y-shared-header-inner">
    <a class="zo2y-shared-brand" href="index.html" aria-label="Home">
      <img src="/file.svg" alt="Logo" decoding="async" />
    </a>
    <div class="nav-search zo2y-shared-search">
      <input id="globalSearch" class="nav-search-input zo2y-shared-search-input" type="search" placeholder="Search..." aria-label="Search" />
      <button id="globalSearchBtn" class="nav-search-btn zo2y-shared-search-btn" type="button" aria-label="Search"><i class="fas fa-search"></i></button>
      <div id="globalSearchSuggest" class="search-suggest zo2y-shared-suggest"></div>
    </div>
    <div class="zo2y-shared-auth">
      <a class="zo2y-shared-btn" href="login.html" id="loginBtn">Login</a>
      <a class="zo2y-shared-btn zo2y-shared-btn-primary" href="sign-up.html" id="signupBtn">Sign Up</a>
      <a class="zo2y-shared-btn hidden" href="profile.html" id="profileBtn">Profile</a>
</div>
  </div>
</header>

  <main class="container page-shell">
    <section class="hero">
      <h1>movies</h1>
      <p>Discover trending movies from around the world and save them to your movie lists.</p>
      <div class="mt-2 text-xs text-muted opacity-86">source: TMDB. <a href="credits.html" class="text-accent">all credits</a></div>
      <div class="hero-actions">
        <!-- Refresh removed -->
      </div>
    </section>
    <section class="controls">
      <input id="q" class="search-input" placeholder="Search movies, genres, years...">
      <button id="moviesSearchBtn" class="control-icon-btn" type="button" aria-label="Search movies"><i class="fas fa-search"></i></button>
      <button id="moviesFilterBtn" class="control-icon-btn" type="button" aria-label="Open movie filters"><i class="fas fa-sliders-h"></i></button>
    </section>
    <div class="control-modal" id="moviesFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter movies</div>
          <button class="control-modal-close" id="moviesFilterCloseBtn" type="button" aria-label="Close movie filters">&times;</button>
        </div>
        <div class="control-modal-grid">
          <select id="genre"><option value="">All Genres</option></select>
          <select id="year"><option value="">All Years</option></select>
          <select id="sort">
            <option value="popular">popular right now</option>
            <option value="name">Name A-Z</option>
            <option value="released">Release Date</option>
          </select>
          <button id="refresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Refresh</button>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2>popular movies right now</h2>
        <p>Trending movies across all genres.</p>
      </div>
      <div class="grid" id="moviesGrid"></div>
      <div class="pagination">
        <button class="page-btn" id="prevPageBtn" type="button" disabled><i class="fas fa-chevron-left"></i></button>
        <div class="page-info" id="pageInfo">Page 1 of 1</div>
        <button class="page-btn" id="nextPageBtn" type="button" disabled><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
                      </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>
