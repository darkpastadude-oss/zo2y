  <script>
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const TMDB_PROXY_BASE = '/api/tmdb';
      const POSTER_BASE = 'https://image.tmdb.org/t/p/w500';
      const BACKDROP_BASE = 'https://image.tmdb.org/t/p/w1280';
      let MOVIES_PAGE_SIZE = 18;

    let supabaseClient = null;
    let currentUser = null;
    const state = {
      movies: [],
      search: '',
      genre: '',
      year: '',
      sort: 'popular',
      page: 1,
      totalPages: 1,
      listStatusMap: new Map(),
      pendingQuickOps: new Set()
    };

    function computeGridPageSize() {
      const grid = document.getElementById('moviesGrid');
      if (!grid) return 18;
      const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length || 1;
      const gridTop = grid.getBoundingClientRect().top;
      const footerSpace = 160;
      const availH = Math.max(220, window.innerHeight - gridTop - footerSpace);
      const approxCardH = 330;
      const rows = Math.max(2, Math.min(6, Math.floor(availH / approxCardH)));
      const visible = Math.max(cols * rows, cols * 2);
      const desired = Math.max(30, visible);
      const snapped = Math.ceil(desired / cols) * cols;
      return Math.min(54, Math.max(cols * 2, snapped));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function isDateWithinAcceptableRange(dateString) {
      if (!dateString) return true;
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return true;
      const now = new Date();
      const twoYearsFromNow = new Date(now.getFullYear() + 2, now.getMonth(), now.getDate());
      return date <= twoYearsFromNow;
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const TOP_POPULAR_MOVIE_IDS = [
      '27205', '155', '238', '497', '680', '550', '278', '299534', '239', '122',
      '19995', '157336', '603', '354912', '299536', '1552', '475557', '533535', '872585', '569094',
      '438631', '940551', '787699', '848538', '921636', '1072790', '1011985', '968051', '866398',
      '572802', '848378'
    ];

    function showToast(message, isError = false) {
      const el = document.createElement('div');
      el.style.position = 'fixed';
      el.style.top = '12px';
      el.style.right = '12px';
      el.style.zIndex = '9999';
      el.style.background = isError ? '#dc2626' : '#f59e0b';
      el.style.color = '#fff';
      el.style.padding = '8px 12px';
      el.style.borderRadius = '8px';
      el.style.fontSize = '12px';
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
        await authRuntime.waitForSupabase(8000);
      } else {
        const startedAt = Date.now();
        while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
          await new Promise((resolve) => setTimeout(resolve, 40));
        }
      }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
        supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        if (supabaseClient) return supabaseClient;
      }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(
          window.__ZO2Y_SUPABASE_CONFIG.url,
          window.__ZO2Y_SUPABASE_CONFIG.key,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
        );
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
        return supabaseClient;
      }
      return null;
    }

    async function initAuthUi() {
      const client = await ensureSupabase();
      if (!client) return;
      const loginBtn = document.getElementById('loginBtn');
      const signupBtn = document.getElementById('signupBtn');
      const profileBtn = document.getElementById('profileBtn');
      const { data } = await client.auth.getUser();
      currentUser = data?.user || null;

      if (currentUser) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (signupBtn) signupBtn.style.display = 'none';
        if (profileBtn) {
          profileBtn.style.display = 'inline-flex';
          profileBtn.innerHTML = '<i class="fas fa-user"></i>';
        }
      } else {
        if (loginBtn) loginBtn.style.display = 'inline-flex';
        if (signupBtn) signupBtn.style.display = 'inline-flex';
        if (profileBtn) profileBtn.style.display = 'none';
      }
    }

    async function loadMovies(queryOverride = '') {
      MOVIES_PAGE_SIZE = computeGridPageSize();
      const query = String(queryOverride || state.currentQuery || '').trim();
      let movies = [];

      try {
        if (query) {
          const url = `${TMDB_PROXY_BASE}/search/movie?query=${encodeURIComponent(query)}&page=1`;
          const res = await fetch(url);
          if (res.ok) {
            const json = await res.json();
            movies = Array.isArray(json?.results) ? json.results : [];
          }
        } else {
          // Proper shuffling: shuffle *current popular* movies (not discover sorting).
          const pool = [];
          for (let p = 1; p <= 4; p += 1) {
            const res = await fetch(`${TMDB_PROXY_BASE}/movie/popular?language=en-US&page=${p}`);
            if (!res.ok) break;
            const json = await res.json();
            const batch = Array.isArray(json?.results) ? json.results : [];
            pool.push(...batch);
            if (!batch.length) break;
          }

          if (!pool.length) {
            const fallback = await fetch(`${TMDB_PROXY_BASE}/trending/movie/week?page=1`);
            if (fallback.ok) {
              const json = await fallback.json();
              pool.push(...(Array.isArray(json?.results) ? json.results : []));
            }
          }

          movies = shuffleArray(pool);
        }
      } catch (_err) {
        console.error('Failed to load movies', _err);
      }

      state.movies = movies.map((movie) => ({
        id: String(movie.id || ''),
        title: movie.title || movie.name || 'Unknown Movie',
        overview: movie.overview || '',
        posterPath: movie.poster_path || '',
        backdropPath: movie.backdrop_path || '',
        releaseDate: movie.release_date || '',
        voteAverage: movie.vote_average || 0,
        genreIds: Array.isArray(movie.genre_ids) ? movie.genre_ids : []
      })).filter((m) => m.id && isDateWithinAcceptableRange(m.releaseDate));
      
      state.page = 1;
      state.totalPages = Math.max(1, Math.ceil(state.movies.length / MOVIES_PAGE_SIZE));
    }

    async function loadListStatus() {
      state.listStatusMap = new Map();
      if (!currentUser?.id || !state.movies.length) return;
      const client = await ensureSupabase();
      if (!client) return;
      const ids = state.movies.map((movie) => movie.id);
      if (!ids.length) return;
      const { data } = await client
        .from('movie_list_items')
        .select('movie_id, list_type')
        .eq('user_id', currentUser.id)
        .in('movie_id', ids);
      (data || []).forEach((row) => {
        const id = String(row.movie_id || '');
        if (!id) return;
        if (!state.listStatusMap.has(id)) state.listStatusMap.set(id, { favorites: false, watched: false, watchlist: false });
        const bucket = state.listStatusMap.get(id);
        if (row.list_type in bucket) bucket[row.list_type] = true;
      });
    }

    function getMovieListStatus(movieId) {
      const id = String(movieId || '').trim();
      const empty = { favorites: false, watched: false, watchlist: false };
      if (!id) return empty;
      if (!state.listStatusMap.has(id)) {
        state.listStatusMap.set(id, { ...empty });
      }
      return state.listStatusMap.get(id);
    }

    function getMovieCardExtra(movie) {
      return '';
    }

    function renderMovieSpotlight(movie) {
      const section = document.getElementById('moviesSpotlight');
      if (!section || !movie) return;
      const bg = document.getElementById('moviesSpotlightBg');
      const titleEl = document.getElementById('moviesSpotlightTitle');
      const metaEl = document.getElementById('moviesSpotlightMeta');
      const summaryEl = document.getElementById('moviesSpotlightSummary');
      const imgEl = document.getElementById('moviesSpotlightImage');
      const openEl = document.getElementById('moviesSpotlightOpen');
      
      const posterUrl = movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '/images/fallback/movie.svg';
      const backdropUrl = movie.backdropPath ? `${BACKDROP_BASE}${movie.backdropPath}` : posterUrl;
      const year = movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD';
      const rating = movie.voteAverage ? `Rating: ${movie.voteAverage.toFixed(1)}/10` : '';
      
      section.hidden = false;
      if (bg) bg.style.backgroundImage = `linear-gradient(120deg, rgba(8,14,31,0.76), rgba(10,19,39,0.38)), url("${backdropUrl}")`;
      if (titleEl) titleEl.textContent = movie.title || 'Movie Title';
      if (metaEl) metaEl.textContent = [year, rating].filter(Boolean).join(' | ') || 'Movie details';
      if (summaryEl) summaryEl.textContent = movie.overview || 'No description available.';
      if (imgEl) {
        imgEl.src = posterUrl;
        imgEl.alt = `${movie.title || 'Movie'} poster`;
      }
      if (openEl) openEl.href = `movie.html?id=${encodeURIComponent(movie.id)}`;
    }

    function renderGrid() {
      const grid = document.getElementById('moviesGrid');
      const spotlight = document.getElementById('moviesSpotlight');
      if (!grid) return;
      
      // Spotlight disabled (always show grid).
      if (spotlight) spotlight.hidden = true;
      
      if (!state.movies.length) {
        grid.innerHTML = '<div class="empty">No movies found.</div>';
        updatePagination();
        return;
      }
      const start = (state.page - 1) * MOVIES_PAGE_SIZE;
      const visibleItems = state.movies.slice(start, start + MOVIES_PAGE_SIZE);
      grid.innerHTML = visibleItems.map((movie) => {
        const posterUrl = movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '/images/fallback/movie.svg';
        return `
        <article class="card" data-id="${escapeHtml(movie.id)}">
          <div class="card-media">
            <img src="${escapeHtml(posterUrl)}" alt="${escapeHtml(movie.title)}" loading="lazy" onerror="this.src='/images/fallback/movie.svg'">
          </div>
          <div class="card-meta">
            <span class="card-type"><i class="fa-solid fa-film"></i> Movie</span>
            <div class="card-meta-top">
              <p class="card-title">${escapeHtml(movie.title)}</p>
            </div>
            <p class="card-sub">${escapeHtml(movie.releaseDate ? new Date(movie.releaseDate).getFullYear() : 'TBD')}</p>
            <p class="card-extra">${escapeHtml(getMovieCardExtra(movie))}</p>
            <div class="card-actions">
              <button class="icon-btn menu-btn" type="button" aria-label="Open list menu"><i class="fas fa-ellipsis-v"></i></button>
            </div>
          </div>
        </article>
      `;
      }).join('');

      wireGridActions();
      updatePagination();
    }

    function updatePagination() {
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const info = document.getElementById('pageInfo');
      state.totalPages = Math.max(1, Math.ceil(state.movies.length / MOVIES_PAGE_SIZE));
      if (state.page > state.totalPages) state.page = state.totalPages;
      if (state.page < 1) state.page = 1;
      if (prevBtn) prevBtn.disabled = state.page <= 1;
      if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
      if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;
    }

    async function upsertMovieRecord(client, movie) {
      if (!client || !movie?.id) return false;
      const payload = {
        id: String(movie.id),
        title: movie.title || '',
        poster_url: movie.posterPath ? `${POSTER_BASE}${movie.posterPath}` : '',
        updated_at: new Date().toISOString()
      };
      const { error } = await client.from('movies').upsert(payload, { onConflict: 'id' });
      if (error) {
        console.error('Movie upsert failed', error);
        return false;
      }
      return true;
    }

    async function toggleDefaultList(itemId, listType, _card, forcedNextSaved) {
      const movieId = String(itemId || '').trim();
      if (!movieId) return { ok: false, saved: false };
      const movie = state.movies.find((row) => String(row.id || '').trim() === movieId);
      if (!movie) return { ok: false, saved: false };

      const client = await ensureSupabase();
      if (!client || !currentUser?.id) {
        window.location.href = 'login.html';
        return { ok: false, saved: false };
      }

      const status = getMovieListStatus(movieId);
      if (!(listType in status)) return { ok: false, saved: false };

      const previousSaved = !!status[listType];
      const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
      const opKey = `${movieId}:${listType}`;
      if (state.pendingQuickOps.has(opKey)) {
        return { ok: false, saved: previousSaved };
      }

      state.pendingQuickOps.add(opKey);
      status[listType] = nextSaved;
      try {
        if (nextSaved) {
          const ok = await upsertMovieRecord(client, movie);
          if (!ok) throw new Error('Movie upsert failed');
          const { error } = await client.from('movie_list_items').insert({
            user_id: currentUser.id,
            movie_id: movieId,
            list_type: listType
          });
          if (error && String(error.code || '') !== '23505') throw error;
          showToast('Added to list');
        } else {
          const { error } = await client
            .from('movie_list_items')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('movie_id', movieId)
            .eq('list_type', listType);
          if (error) throw error;
          showToast('Removed from list');
        }
        return { ok: true, saved: nextSaved };
      } catch (error) {
        console.error('Movie list toggle failed', error);
        status[listType] = previousSaved;
        showToast('Could not update list', true);
        return { ok: false, saved: previousSaved };
      } finally {
        state.pendingQuickOps.delete(opKey);
      }
    }

    function wireGridActions() {
      document.querySelectorAll('.menu-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const card = btn.closest('.card');
          if (!card) return;
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      });

      document.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.menu-btn')) return;
          const id = String(card.getAttribute('data-id') || '').trim();
          if (!id) return;
          window.location.href = `movie.html?id=${encodeURIComponent(id)}`;
        });
      });
    }

    async function loadPage() {
      try {
        await initAuthUi();
        await loadMovies();
        await loadListStatus();
        renderGrid();
      } catch (_err) {
        const grid = document.getElementById('moviesGrid');
        if (grid) grid.innerHTML = '<div class="empty">Movies feed unavailable right now.</div>';
      }
    }

    // Refresh removed.
    document.getElementById('moviesSearchBtn')?.addEventListener('click', async () => {
      state.search = String(document.getElementById('q')?.value || '').trim();
      await loadPage();
    });
    document.getElementById('q')?.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      state.search = String(e.target.value || '').trim();
      await loadPage();
    });
    document.getElementById('moviesFilterBtn')?.addEventListener('click', () => {
      document.getElementById('moviesFilterModal')?.classList.add('show');
    });
    document.getElementById('moviesFilterCloseBtn')?.addEventListener('click', () => {
      document.getElementById('moviesFilterModal')?.classList.remove('show');
    });
    document.getElementById('genre')?.addEventListener('change', (e) => {
      state.genre = String(e.target.value || '').trim();
    });
    document.getElementById('year')?.addEventListener('change', (e) => {
      state.year = String(e.target.value || '').trim();
    });
    document.getElementById('sort')?.addEventListener('change', (e) => {
      state.sort = String(e.target.value || 'popular').trim();
    });
    document.getElementById('refresh')?.addEventListener('click', async () => {
      document.getElementById('moviesFilterModal')?.classList.remove('show');
      await loadPage();
    });
    document.getElementById('prevPageBtn')?.addEventListener('click', () => {
      if (state.page <= 1) return;
      state.page -= 1;
      renderGrid();
    });
    document.getElementById('nextPageBtn')?.addEventListener('click', () => {
      if (state.page >= state.totalPages) return;
      state.page += 1;
      renderGrid();
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.initUniversalSearch) {
        const initSearch = () => window.initUniversalSearch({
          input: '#globalSearch',
          fallbackRoute: 'movies-mobile.html'
        });
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(initSearch, { timeout: 1500 });
        } else {
          window.setTimeout(initSearch, 0);
        }
      }
      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'movies',
          itemIdAttr: 'data-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-id]'))
              .map((card) => card.getAttribute('data-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '').trim();
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await ensureSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => currentUser,
          notify: (message, isError) => showToast(message, !!isError),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }
      loadPage();
    });
  </script>
