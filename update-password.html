<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
<script src="/js/auth-gate.js?v=20260424f"></script>
<meta name="robots" content="noindex,nofollow" />
<title>Zo2y - Set New Password</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary-color: #4285F4;
  --secondary-color: #f59e0b;
  --bg-color: #0b1633;
  --card-color: #132347;
  --text-primary: #fff;
  --text-secondary: #cbd5e1;
  --border-color: rgba(255,255,255,0.1);
  --shadow: 0 10px 30px rgba(0,0,0,0.3);
  --transition: all 0.3s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body {
  background: var(--bg-color);
  min-height: 100vh;
  color: var(--text-primary);
  background-image:
    radial-gradient(circle at 20% 80%, rgba(66,133,244,0.1) 0%, transparent 20%),
    radial-gradient(circle at 80% 20%, rgba(245,158,11,0.1) 0%, transparent 20%);
}
.auth-topbar { width: min(100%, 450px); margin: 20px auto 0; padding: 0 20px; }
.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border-color);
  background: var(--card-color);
  color: var(--text-primary);
  text-decoration: none;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 600;
}
.auth-container { width: min(100%, 450px); margin: 28px auto 24px; padding: 0 20px; }
.auth-card {
  background: var(--card-color);
  padding: 40px;
  border-radius: 20px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.05);
}
.logo-header { text-align: center; margin-bottom: 28px; }
.logo-header h1 {
  color: var(--secondary-color);
  font-size: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.logo-header img { height: 40px; border-radius: 8px; }
.logo-header p { color: var(--text-secondary); font-size: 0.95rem; }
.auth-card h2 { text-align: center; margin-bottom: 24px; font-size: 1.7rem; }
.message { padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 18px; display: none; }
.message.show { display: block; }
.message.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
.message.success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }
.auth-card form { display: flex; flex-direction: column; gap: 16px; }
.input-group { position: relative; }
.input-group i {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
}
.input-group input {
  width: 100%;
  padding: 16px 15px 16px 50px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  background: rgba(11,22,51,0.5);
  color: var(--text-primary);
  font-size: 1rem;
  outline: none;
}
.submit-btn {
  padding: 16px;
  background: linear-gradient(135deg,var(--primary-color),#357ae8);
  border: none;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}
.submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 1s ease-in-out infinite;
}
.helper-text {
  margin-top: 18px;
  color: var(--text-secondary);
  font-size: 0.92rem;
  line-height: 1.5;
}
.helper-text a { color: var(--secondary-color); text-decoration: none; font-weight: 600; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<meta name="theme-color" content="#0b1633" />
<meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Zo2y" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
<link rel="stylesheet" href="/js/mobile-app.css?v=20260308a" />
<script src="/js/mobile-webapp.js?v=20260424b" defer></script>
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
</head>
<body>
<div class="auth-topbar">
  <a class="home-btn" href="index.html"><i class="fas fa-home"></i> Home</a>
</div>

<div class="auth-container">
  <div class="logo-header">
    <h1><img src="/file.svg" alt="Logo"></h1>
    <p>Finish securing your account</p>
  </div>

  <div class="auth-card">
    <h2>Set a new password</h2>
    <div id="errorMessage" class="message error"></div>
    <div id="successMessage" class="message success"></div>

    <form id="resetForm">
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="New password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="input-group">
        <i class="fas fa-check"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-shield-alt"></i> <span>Update Password</span>
      </button>
    </form>

    <p class="helper-text" id="helperText">
      Use at least 8 characters. If this link has expired, request another reset from <a href="login.html">login</a>.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/pages/auth-update-password.js?v=20260424b"></script>
<script src="js/production-runtime.js?v=20260307a" defer></script>
</body>
</html>
