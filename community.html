<body data-nav-page="community">

    <!-- Shared Navigation Header -->
    <header class="shared-header" id="sharedHeader">
        <div class="header-container">
            <a href="index.html" class="header-logo">
                <img src="/newlogo.webp" alt="zo2y logo" width="32" height="32">
                <span>zo2y</span>
            </a>
            <nav class="header-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> home</a>
                <a href="community.html" class="nav-link active"><i class="fas fa-globe"></i> community</a>
                <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> profile</a>
            </nav>
        </div>
    </header>

    <!-- Main Community Page Shell -->
    <main class="community-main">
        
        <!-- 1. Compact Header & Visible Search Shell -->
        <div class="community-header-compact">
            <div class="container">
                <div class="community-header-row">
                    <h1 class="community-title-sm">community</h1>
                </div>

                <!-- 2. Search Shell (Clean Input with Integrated Icon) -->
                <div class="community-search-bar-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="community-search-input" placeholder="search media, people, collections..." readonly>
                </div>
            </div>
        </div>

        <!-- 3. Navigation Chips Shell (Single Line Horizontal Scroll, Discover Active Only) -->
        <div class="community-nav-bar">
            <div class="container">
                <div class="community-nav-tabs" role="tablist">
                    <button class="community-tab-btn active" type="button">
                        <i class="fas fa-compass"></i> discover
                    </button>
                    <button class="community-tab-btn disabled" type="button" disabled aria-disabled="true">
                        <i class="fas fa-star"></i> reviews
                    </button>
                    <button class="community-tab-btn disabled" type="button" disabled aria-disabled="true">
                        <i class="fas fa-layer-group"></i> lists
                    </button>
                    <button class="community-tab-btn disabled" type="button" disabled aria-disabled="true">
                        <i class="fas fa-users"></i> people
                    </button>
                    <button class="community-tab-btn disabled" type="button" disabled aria-disabled="true">
                        <i class="fas fa-user-check"></i> following
                    </button>
                </div>
            </div>
        </div>

        <!-- 4. Layout Container Shell -->
        <div class="container community-content" id="communityDiscoveryFeed">
            
            <!-- Phase 2A: Spotlight Component Layout (Shared Skeleton System, Zero Hardcoded Data) -->
            <div class="skel-spotlight community-spotlight-skel" id="communitySpotlight">
                <div class="skel skel-backdrop"></div>
                <div class="skel-content">
                    <div class="skel skel-kicker" style="width:90px;height:18px;border-radius:10px"></div>
                    <div class="skel skel-title" style="width:50%;height:24px;border-radius:6px;margin:4px 0"></div>
                    <div class="skel skel-line skel-line-lg" style="width:75%;height:14px"></div>
                    <div class="skel-buttons" style="margin-top:6px">
                        <div class="skel skel-btn" style="width:130px;height:32px;border-radius:10px"></div>
                    </div>
                </div>
            </div>

            <!-- Shared Skeleton Rail Shell (Establishes Exact Canvas Height) -->
            <div class="skel-rail">
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel skel-line skel-line-sm"></div>
                    </div>
                </div>
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel skel-line skel-line-sm"></div>
                    </div>
                </div>
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel skel-line skel-line-sm"></div>
                    </div>
                </div>
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel skel-line skel-line-sm"></div>
                    </div>
                </div>
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel skel-line skel-line-sm"></div>
                    </div>
                </div>
                <div class="skel-card-poster">
                    <div class="skel skel-poster"></div>
                    <div class="skel-meta">
                        <div class="skel skel-line skel-line-lg"></div>
                        <div class="skel-line skel-line-sm"></div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script src="js/shared-header.js" defer></script>
