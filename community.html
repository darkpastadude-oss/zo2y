    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/shared-header.css">
    <link rel="stylesheet" href="css/pages/profile.css">
    <link rel="stylesheet" href="css/pages/community.css">
    <link rel="stylesheet" href="css/global-lowercase.css">

<body data-nav-page="community">

    <!-- Global Header -->
    <header class="shared-header" id="sharedHeader">
        <div class="header-container">
            <a href="index.html" class="header-logo">
                <img src="/newlogo.webp" alt="zo2y logo" width="32" height="32">
                <span>zo2y</span>
            </a>
            <nav class="header-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> home</a>
                <a href="community.html" class="nav-link active"><i class="fas fa-globe"></i> community</a>
                <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> profile</a>
            </nav>
        </div>
    </header>

    <!-- Main Community Shell -->
    <main class="community-main">
        
        <!-- Compact Header & Search Toggle -->
        <div class="community-header-compact">
            <div class="container">
                <div class="community-header-row">
                    <h1 class="community-title-sm">community</h1>
                    <button class="community-search-toggle-btn" id="communitySearchToggleBtn" aria-label="search toggle">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <!-- Sleek Expandable Search Bar (40px high) -->
                <div class="community-search-bar-wrap" id="communitySearchBarWrap">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="community-search-input" placeholder="search media & people" readonly>
                </div>
            </div>
        </div>

        <!-- Scrollable Navigation Chips -->
        <div class="community-nav-bar">
            <div class="container">
                <div class="community-nav-tabs" role="tablist">
                    <button class="community-tab-btn active" type="button">
                        <i class="fas fa-compass"></i> discover
                    </button>
                    <button class="community-tab-btn" type="button">
                        <i class="fas fa-star"></i> reviews
                    </button>
                    <button class="community-tab-btn" type="button">
                        <i class="fas fa-layer-group"></i> lists
                    </button>
                    <button class="community-tab-btn" type="button">
                        <i class="fas fa-users"></i> people
                    </button>
                    <button class="community-tab-btn" type="button">
                        <i class="fas fa-user-check"></i> following
                    </button>
                </div>
            </div>
        </div>

        <!-- Content Area: Single New Releases Rail -->
        <div class="container community-content">
            
            <section class="pv2-rail">
                <div class="pv2-rail-header">
                    <h2 class="pv2-rail-title">
                        <i class="fas fa-fire"></i> new releases
                    </h2>
                    <span class="pv2-rail-viewall">see all <i class="fas fa-chevron-right"></i></span>
                </div>

                <!-- Reused Shared Rail Track with Exact Shared Skeleton System from index.html/profile.html -->
                <div class="pv2-rail-track" id="communityNewReleasesTrack">
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                    <div class="skel-card-poster">
                        <div class="skel skel-poster"></div>
                        <div class="skel-meta">
                            <div class="skel skel-line skel-line-lg"></div>
                            <div class="skel skel-line skel-line-sm"></div>
                        </div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="js/shared-header.js" defer></script>
    <script src="js/pages/community.js" defer></script>
</body>
</html>
