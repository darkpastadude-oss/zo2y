<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/js/auth-gate.js?v=20260428a"></script>
  <script src="/js/bootstrap-auth.js?v=20260425a" defer></script>
  <meta name="robots" content="index,follow" />
  <title>Fashion Brands ? Zo2y</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/pages/index.css?v=20260510g" />
  <link rel="stylesheet" href="css/pages/brands.css?v=20260517b" />
  <link rel="stylesheet" href="css/shared-header.css?v=20260430c" />
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <meta name="theme-color" content="#0b1633" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260308a" />
  <script src="/js/mobile-webapp.js?v=20260424b" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/list-utils.js?v=20260419a" defer></script>
<script src="js/index-list-menu-adapter.js?v=20260428a" defer></script>
  <script src="js/shared-header.js?v=20260428a" defer></script>
  <script src="js/did-you-mean.js?v=20260516a" defer></script>
  <script src="js/pages/brands.js?v=20260517b" defer></script>
  <style>
    .brand-hero {
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 34px);
      background:
        linear-gradient(120deg, rgba(10, 31, 56, 0.92), rgba(15, 44, 80, 0.7)),
        url("https://images.unsplash.com/photo-1445205170230-053b83016050?auto=format&fit=crop&w=1600&q=80") center/cover;
      box-shadow: 0 14px 36px rgba(0,0,0,0.26);
      margin-bottom: 20px;
    }
    .brand-hero h1 {
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.04;
      margin: 0 0 10px 0;
    }
    .brand-hero p {
      color: #d3e5ff;
      margin: 0;
      max-width: 650px;
      line-height: 1.45;
    }
  </style>
</head>
<body data-brand-type="fashion" data-nav-page="fashion">
  <main class="container">
    <section class="brand-hero">
      <h1>Fashion</h1>
      <p>Discover fashion brands from around the world and save your favorites to your profile.</p>
    </section>

    <div class="controls">
      <input id="brandSearch" class="search-input" type="search" placeholder="Search brands, styles, countries..." />
      <button class="control-icon-btn" id="brandSearchBtn" type="button" aria-label="Search fashion brands">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="control-icon-btn" id="brandFilterBtn" type="button" aria-label="Open fashion filters">
        <i class="fa-solid fa-sliders-h"></i>
      </button>
    </div>
    <div class="controls-meta">
      <span id="brandCount">0 brands shown</span>
      <span id="brandDidYouMean" class="did-you-mean"></span>
    </div>
    <div class="control-modal" id="brandFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter fashion brands</div>
          <button class="control-modal-close" id="brandFilterCloseBtn" type="button" aria-label="Close fashion filters">&times;</button>
        </div>
        <select id="brandCategory">
          <option value="all">All Fashion Brands</option>
        </select>
      </div>
    </div>

    <div class="brand-grid" id="brandGrid"></div>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
            <button class="menu-create-list-btn" id="menuCreateListBtn">
              <i class="fas fa-plus"></i> New
            </button>
          </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="createListModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content" style="max-width: 320px;">
      <div class="menu-modal-header">
        <h3>Create New List</h3>
        <button class="menu-modal-close" id="closeCreateModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body">
        <input type="text" id="newListNameInput" class="menu-input" placeholder="List name..." maxlength="50">
        <div class="menu-icon-grid">
          <button class="menu-icon-option selected" data-icon="fas fa-list"><i class="fas fa-list"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-heart"><i class="fas fa-heart"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-star"><i class="fas fa-star"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-bookmark"><i class="fas fa-bookmark"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-shirt"><i class="fas fa-shirt"></i></button>
        </div>
        <div class="menu-modal-actions">
          <button class="menu-btn menu-btn-secondary" id="cancelCreateBtn">Cancel</button>
          <button class="menu-btn menu-btn-primary" id="saveNewListBtn">Create List</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
