  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --glass: rgba(255,255,255,0.03);
      --white: #ffffff;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      --surface: rgba(19, 35, 71, 0.6);
      --radial-glow: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      --info: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      background: var(--radial-glow);
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0 12px, rgba(255, 184, 77, 0) 12px 24px);
      opacity: 0.25;
      pointer-events: none;
      z-index: -3;
    }

    a { color: inherit; text-decoration: none; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 12px 12px;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      gap: 10px;
    }

    .logo {
      height: 34px;
      width: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .logo:hover { transform: scale(1.05); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a.ghost {
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .nav a.ghost:hover { color: var(--accent); background: rgba(245, 158, 11, 0.05); }

    .account-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .account-btn:hover { border-color: var(--accent); color: var(--accent); }

    .account-btn.logged-in {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--accent);
    }

    .hero {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 12px;
    }

    .hero h1 {
      font-size: 20px;
      margin: 0 0 6px 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      max-width: 1200px;
      margin: 12px auto 0;
      padding: 0 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: center;
    }

    .search-input,
    .filter-select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
      font-size: 16px;
    }

    .full-span { grid-column: 1 / -1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s ease;
      justify-content: center;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip-row {
      max-width: 1200px;
      margin: 8px auto 0;
      padding: 0 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }

    .chip.active { border-color: var(--accent); color: var(--accent); }

    .grid {
      max-width: 1200px;
      margin: 16px auto 40px;
      padding: 0 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: none;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.menu-open,
    .card.menu-open:hover {
      transform: none;
      overflow: visible;
    }

    .card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      height: auto;
      object-fit: contain;
      display: block;
      background: #0f1f40;
    }

    .card-body {
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      line-height: 1.3;
      min-height: 32px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      order: 1;
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .card-desc {
      display: -webkit-box;
      font-size: 11px;
      color: #a9b9da;
      line-height: 1.3;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      order: 3;
      margin-top: auto;
    }

    .card-menu-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .menu-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(19, 35, 71, 0.9);
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .menu-btn:hover { border-color: var(--accent); color: var(--accent); }

    .list-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .list-menu.open { display: flex; }

    .list-menu-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    .list-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 3290;
      display: none;
    }
    .list-menu-backdrop.active { display: block; }

    .list-menu-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; }

    .list-action {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: all 0.2s ease;
      margin-bottom: 6px;
    }

    .list-action:last-child { margin-bottom: 0; }
    .list-action:hover { border-color: var(--accent); color: var(--accent); }
    .list-action.active {
      background: rgba(245, 158, 11, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .pagination {
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .page-btn {
      min-width: 40px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .page-info { color: var(--muted); font-size: 12px; }

    .notification {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 2000;
      box-shadow: var(--shadow);
    }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--error); color: white; }
    .notification.info { background: var(--info); color: white; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 16px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
    }
    .modal-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
      margin-bottom: 10px;
    }
    .modal-list-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
    }
    .modal-list-actions { display: inline-flex; gap: 6px; align-items: center; }
    .list-edit-btn {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .list-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-list-item.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.12);
    }
    .modal-input {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .modal-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
      font-size: 12px;
    }
    .icon-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .icon-option {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-option.selected { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 760px) {
      .card img {
        aspect-ratio: 2 / 3;
        object-fit: contain;
        background: #0f1f40;
      }
    }
  </style>

  <script>
    (function () {
      const SUPABASE_URL = 'https://gfkhjbztayjyojsgdpgk.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma2hqYnp0YXlqeW9qc2dkcGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwOTYyNjQsImV4cCI6MjA3NTY3MjI2NH0.WUb2yDAwCeokdpWCPeH13FE8NhWF6G8e6ivTsgu6b2s';
      const IGDB_PROXY_BASE = '/api/igdb';
      const IGDB_PAGE_SIZE = 50;

      const IGDB_FALLBACK_IMAGE = '/newlogo.webp';
      const IGDB_CACHE_TTL_MS = 1000 * 60 * 4;
      const IGDB_CACHE_MAX = 160;
      const igdbCache = new Map();
      const igdbInFlight = new Map();

      function normalizeGameImageUrl(value) {
        const raw = String(value || '').trim();
        if (!raw || raw === '[object Object]') return '';
        if (raw.startsWith('//')) return `https:${raw}`;
        if (raw.startsWith('http://')) return raw.replace(/^http:\/\//i, 'https://');
        return raw;
      }

      function pickPreferredCoverUrl(candidates = []) {
        const cleaned = candidates.map(normalizeGameImageUrl).filter(Boolean);
        return cleaned.find((url) => /wikimedia|wikipedia/.test(url)) || '';
      }

      function pickBackdropUrl(candidates = [], fallback = '') {
        const cleaned = candidates.map(normalizeGameImageUrl).filter(Boolean);
        const fallbackUrl = normalizeGameImageUrl(fallback);
        if (fallbackUrl) {
          const different = cleaned.find((url) => url !== fallbackUrl);
          return different || fallbackUrl;
        }
        return cleaned[0] || '';
      }

      function resolveGameImageSource(row) {
        const candidates = [
          row?.cover,
          row?.cover?.url,
          row?.cover_url
        ];
        const cover = pickPreferredCoverUrl(candidates);
        return cover || '';
      }

      function resolveGameHeroSource(row, fallback) {
        const hero = pickBackdropUrl([
          row?.hero_url,
          row?.hero,
          row?.background_image,
          ...(Array.isArray(row?.screenshots) ? row.screenshots : []),
          ...(Array.isArray(row?.short_screenshots) ? row.short_screenshots.map((entry) => entry?.image) : [])
        ], fallback);
        return hero || fallback || IGDB_FALLBACK_IMAGE;
      }

      function buildIgdbCacheKey(path, params = {}) {
        const pairs = Object.entries(params || {})
          .filter(([, value]) => value !== undefined && value !== null && value !== '')
          .map(([key, value]) => [String(key), String(value)]);
        pairs.sort((a, b) => a[0].localeCompare(b[0]) || a[1].localeCompare(b[1]));
        const query = pairs.map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`).join('&');
        return query ? `${path}?${query}` : String(path || '');
      }

      function readIgdbCache(key) {
        const entry = igdbCache.get(key);
        if (!entry) return null;
        if (entry.expiresAt <= Date.now()) {
          igdbCache.delete(key);
          return null;
        }
        return entry.data || null;
      }

      function writeIgdbCache(key, data, ttlMs = IGDB_CACHE_TTL_MS) {
        if (!key || !data) return;
        igdbCache.set(key, { data, expiresAt: Date.now() + ttlMs });
        while (igdbCache.size > IGDB_CACHE_MAX) {
          const firstKey = igdbCache.keys().next().value;
          if (!firstKey) break;
          igdbCache.delete(firstKey);
        }
      }

      async function fetchIgdbJson(path, params = {}, options = {}) {
        const cacheKey = buildIgdbCacheKey(path, params);
        const useCache = !options?.cacheBust;
        const reuseInFlight = useCache && !options?.signal;
        if (useCache) {
          const cached = readIgdbCache(cacheKey);
          if (cached) return cached;
          if (reuseInFlight && igdbInFlight.has(cacheKey)) return igdbInFlight.get(cacheKey);
        }

        const fetchPromise = (async () => {
          try {
            if (window.ZO2Y_IGDB && typeof window.ZO2Y_IGDB.request === 'function') {
              const data = await window.ZO2Y_IGDB.request(path, params, options?.signal ? { signal: options.signal } : undefined);
              if (useCache && data) writeIgdbCache(cacheKey, data);
              return data;
            }
            const url = new URL(`${IGDB_PROXY_BASE}${path}`, window.location.origin);
            Object.entries(params || {}).forEach(([key, value]) => {
              if (value === undefined || value === null || value === '') return;
              url.searchParams.set(key, String(value));
            });
            const res = await fetch(url.toString(), options?.signal ? { signal: options.signal } : undefined);
            if (!res.ok) return null;
            const data = await res.json();
            if (useCache && data) writeIgdbCache(cacheKey, data);
            return data;
          } catch (_err) {
            return null;
          }
        })();

        if (reuseInFlight) igdbInFlight.set(cacheKey, fetchPromise);
        try {
          return await fetchPromise;
        } finally {
          if (reuseInFlight) igdbInFlight.delete(cacheKey);
        }
      }
      const state = {
        genres: [],
        activeGenre: '',
        query: '',
        year: '',
        page: 1,
        totalPages: 1,
        hasMore: true,
        requestId: 0,
        currentUser: null,
        listStatusMap: new Map(),
        customLists: [],
        catalog: [],
        catalogSource: 'supabase',
        activeGameId: null,
        modalSelectedLists: new Set(),
        selectedIcon: 'fas fa-gamepad',
        pendingDefaultOps: new Set()
      };

      let supabaseClient = null;
      let loadGamesTimer = null;
      let igdbAbortController = null;
      let prefetchTimer = null;
      let prefetchKey = '';

      function scheduleGamesLoad(delayMs = 360) {
        if (loadGamesTimer) clearTimeout(loadGamesTimer);
        const effectiveDelay = isSlowNetwork() ? Math.max(420, delayMs) : delayMs;
        loadGamesTimer = setTimeout(() => {
          loadGames();
        }, effectiveDelay);
      }

      function isSlowNetwork() {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!connection) return false;
        if (connection.saveData) return true;
        const effectiveType = String(connection.effectiveType || '').toLowerCase();
        return effectiveType === 'slow-2g' || effectiveType === '2g' || effectiveType === '3g';
      }

      function getGamesPageSize() {
        return isSlowNetwork() ? 16 : 20;
      }

      function schedulePrefetch(nextPage, params = {}) {
        if (!Number.isFinite(nextPage) || nextPage <= 0) return;
        const key = JSON.stringify({ ...params, page: nextPage });
        if (key === prefetchKey) return;
        prefetchKey = key;
        if (prefetchTimer) clearTimeout(prefetchTimer);
        const run = () => {
          fetchIgdbPage({ ...params, page: nextPage }).catch(() => null);
        };
        if (typeof requestIdleCallback === 'function') {
          requestIdleCallback(run, { timeout: 1200 });
        } else {
          prefetchTimer = setTimeout(run, 350);
        }
      }

      function normalizeGameGenres(extra) {
        const rawGenres = Array.isArray(extra?.genres) ? extra.genres : [];
        const out = [];
        const seen = new Set();
        rawGenres.forEach((entry) => {
          const name = String(entry?.name || '').trim();
          const slug = String(entry?.slug || name).trim().toLowerCase().replace(/\s+/g, '-');
          if (!name || !slug || seen.has(slug)) return;
          seen.add(slug);
          out.push({ name, slug });
        });
        return out;
      }

      function normalizeTitleKey(value) {
        return String(value || '')
          .normalize('NFKD')
          .replace(/[\u0300-\u036f]/g, '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function titleMatchesQuery(title, query) {
        const titleKey = normalizeTitleKey(title);
        const queryKey = normalizeTitleKey(query);
        if (!queryKey) return true;
        if (titleKey.includes(queryKey)) return true;
        const compactTitle = titleKey.replace(/\s+/g, '');
        const compactQuery = queryKey.replace(/\s+/g, '');
        if (!compactQuery) return false;
        return compactTitle.includes(compactQuery);
      }

      function filterTitleMatches(rows = [], query = '') {
        const queryKey = normalizeTitleKey(query);
        if (!queryKey) return Array.isArray(rows) ? rows : [];
        return (Array.isArray(rows) ? rows : []).filter((row) => {
          const title = String(row?.title || row?.name || row?.slug || '').trim();
          return titleMatchesQuery(title, queryKey);
        });
      }

      function dedupeRowsById(rows = []) {
        const out = [];
        const seen = new Set();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          const rawId = row?.id;
          const key = Number.isFinite(Number(rawId)) ? String(rawId) : String(rawId || '').trim();
          if (!key || seen.has(key)) return;
          seen.add(key);
          out.push(row);
        });
        return out;
      }

      function scoreSearchMatch(title, query) {
        const cleanTitle = normalizeTitleKey(title);
        const cleanQuery = normalizeTitleKey(query);
        if (!cleanTitle || !cleanQuery) return 0;
        if (cleanTitle === cleanQuery) return 3;
        if (cleanTitle.startsWith(cleanQuery)) return 2;
        if (cleanTitle.includes(cleanQuery)) return 1;
        return 0;
      }

      function sortSearchResults(rows = [], query = '') {
        const cleanQuery = String(query || '').trim().toLowerCase();
        if (!cleanQuery) return Array.isArray(rows) ? rows : [];
        const list = Array.isArray(rows) ? rows.slice() : [];
        return list.sort((a, b) => {
          const aTitle = String(a?.title || a?.name || a?.slug || '').trim();
          const bTitle = String(b?.title || b?.name || b?.slug || '').trim();
          const scoreDiff = scoreSearchMatch(bTitle, cleanQuery) - scoreSearchMatch(aTitle, cleanQuery);
          if (scoreDiff !== 0) return scoreDiff;
          const aRating = Number(a?.rating || 0);
          const bRating = Number(b?.rating || 0);
          if (Number.isFinite(aRating) && Number.isFinite(bRating) && aRating !== bRating) {
            return bRating - aRating;
          }
          return aTitle.localeCompare(bTitle);
        });
      }
      function mapIgdbRowToCatalog(row) {
        if (!row) return null;
        const id = Number(row?.id || 0);
        if (!Number.isFinite(id) || id <= 0) return null;
        const title = String(row?.name || row?.title || row?.slug || 'Game').trim() || 'Game';
        const released = row?.released ? String(row.released).slice(0, 10) : '';
        const rating = Number(row?.rating || 0);
        const cover = resolveGameImageSource(row);
        const hero = resolveGameHeroSource(row, cover);
        return {
          id,
          title,
          description: String(row?.description || row?.summary || '').trim(),
          cover_url: cover,
          hero_url: hero || cover,
          release_date: released,
          rating: Number.isFinite(rating) ? rating : null,
          rating_count: Number(row?.ratings_count || row?.rating_count || 0),
          slug: String(row?.slug || '').trim(),
          source: String(row?.source || 'igdb').trim(),
          extra: {
            genres: Array.isArray(row?.genres) ? row.genres : [],
            platforms: Array.isArray(row?.platforms)
              ? row.platforms.map((entry) => entry?.platform?.name || entry?.name).filter(Boolean)
              : []
          }
        };
      }

      async function fetchIgdbCatalog(options = {}, requestOptions = {}) {
        try {
          const search = String(options.search || '').trim();
          const pageSize = Number(options.pageSize || IGDB_PAGE_SIZE);
          const page = Number(options.page || 1);
          const ordering = String(options.ordering || '-rating').trim();
          const popularityType = Number(options.popularityType || options.popularity_type || 0);
          const spotlight = !!options.spotlight;
          const titleOnly = !!options.title_only || !!options.search_title_only;
          const safeOrdering = search ? '' : ordering;
          const dates = String(options.dates || '').trim();
          const minRatingCount = Number(options.minRatingCount || options.min_rating_count || 0);
          const minFollows = Number(options.minFollows || options.min_follows || 0);
          const json = await fetchIgdbJson('/games', {
            search: search || undefined,
            ordering: safeOrdering || undefined,
            provider: 'wikipedia',
            popularity_type: popularityType > 0 ? Math.floor(popularityType) : undefined,
            dates: dates || undefined,
            spotlight: spotlight ? 1 : undefined,
            title_only: titleOnly && search ? 1 : undefined,
            min_rating_count: minRatingCount > 0 ? Math.floor(minRatingCount) : undefined,
            min_follows: minFollows > 0 ? Math.floor(minFollows) : undefined,
            page_size: Math.max(1, Math.min(pageSize, 200)),
            page: Math.max(1, page)
          }, requestOptions);
          if (!json) return [];
          const rows = Array.isArray(json?.results) ? json.results : (Array.isArray(json) ? json : []);
          return rows.map(mapIgdbRowToCatalog).filter(Boolean);
        } catch (_err) {
          return [];
        }
      }

      async function fetchIgdbPage(options = {}, requestOptions = {}) {
        try {
          const search = String(options.search || '').trim();
          const pageSize = Number(options.pageSize || 24);
          const page = Number(options.page || 1);
          const ordering = String(options.ordering || '-rating_count').trim();
          const popularityType = Number(options.popularityType || options.popularity_type || 0);
          const spotlight = !!options.spotlight;
          const titleOnly = !!options.title_only || !!options.search_title_only;
          const safeOrdering = search ? '' : ordering;
          const dates = String(options.dates || '').trim();
          const genres = String(options.genres || '').trim();
          const minRatingCount = Number(options.minRatingCount || options.min_rating_count || 0);
          const minFollows = Number(options.minFollows || options.min_follows || 0);
          const json = await fetchIgdbJson('/games', {
            search: search || undefined,
            ordering: safeOrdering || undefined,
            provider: 'wikipedia',
            popularity_type: popularityType > 0 ? Math.floor(popularityType) : undefined,
            dates: dates || undefined,
            genres: genres || undefined,
            spotlight: spotlight ? 1 : undefined,
            title_only: titleOnly && search ? 1 : undefined,
            min_rating_count: minRatingCount > 0 ? Math.floor(minRatingCount) : undefined,
            min_follows: minFollows > 0 ? Math.floor(minFollows) : undefined,
            page_size: Math.max(1, Math.min(pageSize, 50)),
            page: Math.max(1, page)
          }, requestOptions);
          if (!json) return null;
          const rows = Array.isArray(json?.results) ? json.results : [];
          const mapped = rows.map(mapIgdbRowToCatalog).filter(Boolean);
          return {
            rows: mapped,
            count: Number(json?.count || mapped.length || 0)
          };
        } catch (_err) {
          return null;
        }
      }

      function buildGenreCatalog() {
        const bySlug = new Map();
        state.catalog.forEach((item) => {
          normalizeGameGenres(item?.extra).forEach((genre) => {
            if (!bySlug.has(genre.slug)) bySlug.set(genre.slug, genre);
          });
        });
        state.genres = [...bySlug.values()].sort((a, b) => a.name.localeCompare(b.name));
      }

      function populateGenreSelect() {
        const select = document.getElementById('genreSelect');
        if (!select) return;
        const previous = state.activeGenre;
        select.innerHTML = '<option value="">All Genres</option>';
        state.genres.forEach((genre) => {
          const opt = document.createElement('option');
          opt.value = genre.slug;
          opt.textContent = genre.name;
          select.appendChild(opt);
        });
        if (previous && state.genres.some((genre) => genre.slug === previous)) {
          select.value = previous;
        } else {
          state.activeGenre = '';
          select.value = '';
        }
      }

      const GENRE_CACHE_KEY = 'zo2y_game_genres_cache_v2';
      const GENRE_CACHE_TTL_MS = 1000 * 60 * 60 * 12;

      function readCachedGenres() {
        try {
          const raw = localStorage.getItem(GENRE_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.items)) return null;
          if (Number(parsed.savedAt || 0) + GENRE_CACHE_TTL_MS < Date.now()) return null;
          return parsed.items;
        } catch (_err) {
          return null;
        }
      }

      function writeCachedGenres(items) {
        try {
          if (!Array.isArray(items) || !items.length) return;
          localStorage.setItem(GENRE_CACHE_KEY, JSON.stringify({
            savedAt: Date.now(),
            items
          }));
        } catch (_err) {}
      }

      async function loadGenreCatalog() {
        try {
          const cached = readCachedGenres();
          if (cached) {
            state.genres = cached;
            populateGenreSelect();
            return true;
          }
          const json = await fetchIgdbJson('/genres');
          if (!json) return false;
          const rows = Array.isArray(json?.results) ? json.results : [];
          state.genres = rows
            .map((row) => ({
              name: String(row?.name || '').trim(),
              slug: String(row?.slug || row?.name || '').trim().toLowerCase().replace(/\s+/g, '-')
            }))
            .filter((row) => row.name && row.slug)
            .sort((a, b) => a.name.localeCompare(b.name));
          populateGenreSelect();
          writeCachedGenres(state.genres);
          return state.genres.length > 0;
        } catch (_err) {
          return false;
        }
      }

      async function ensureGamesCatalogLoaded(force = false) {
        if (state.catalog.length && !force) return true;
        let rows = [];
        if (supabaseClient) {
          const { data, error } = await supabaseClient
            .from('games')
            .select('id,title,description,cover_url,hero_url,release_date,rating,rating_count,extra')
            .order('rating', { ascending: false, nullsFirst: false })
            .order('rating_count', { ascending: false, nullsFirst: false })
            .order('release_date', { ascending: false, nullsFirst: false })
            .limit(2000);
          if (!error && Array.isArray(data)) rows = data;
        }

        if (rows.length) {
          state.catalog = rows;
          state.catalogSource = 'supabase';
          buildGenreCatalog();
          populateGenreSelect();
          return true;
        }

        let igdbRows = await fetchIgdbCatalog({
          popularity_type: 1,
          ordering: '-follows',
          pageSize: IGDB_PAGE_SIZE,
          page: 1,
          min_rating_count: 50
        });
        if (!igdbRows.length) {
          igdbRows = await fetchIgdbCatalog({
            ordering: '-follows',
            pageSize: IGDB_PAGE_SIZE,
            page: 1,
            min_rating_count: 50
          });
        }
        if (igdbRows.length) {
          state.catalog = igdbRows;
          state.catalogSource = 'igdb';
          buildGenreCatalog();
          populateGenreSelect();
          return true;
        }

        state.catalog = [];
        return false;
      }

      function filterCatalogGames(catalogOverride) {
        const catalog = Array.isArray(catalogOverride) ? catalogOverride : state.catalog;
        const query = String(state.query || '').trim();
        const activeGenre = String(state.activeGenre || '').trim().toLowerCase();
        const year = String(state.year || '').trim();
        return catalog.filter((item) => {
          const title = String(item?.title || '').trim();
          if (!title) return false;

          if (query) {
            if (!titleMatchesQuery(title, query)) return false;
          }

          if (activeGenre) {
            const genres = normalizeGameGenres(item?.extra);
            if (!genres.some((genre) => genre.slug === activeGenre)) return false;
          }

          if (year) {
            const releaseYear = String(item?.release_date || '').slice(0, 4);
            if (releaseYear !== year) return false;
          }
          return true;
        });
      }


      function showNotification(message, type = 'info', duration = 3000) {
        const existing = document.querySelectorAll('.notification');
        existing.forEach(n => n.remove());
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), duration);
      }

      function renderListIcon(icon) {
        if (window.ListUtils) return ListUtils.renderListIcon(icon, 'fas fa-gamepad');
        if (!icon) return '<i class="fas fa-gamepad"></i>';
        if (icon.includes('fa-')) return `<i class="${icon}"></i>`;
        return icon;
      }

      async function initSupabase() {
        if (typeof supabase === 'undefined') {
          await new Promise(resolve => setTimeout(resolve, 500));
        }
        if (typeof supabase === 'undefined') return null;
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        return supabaseClient;
      }

      async function initAuth() {
        if (!supabaseClient) return;
        const { data: { user } } = await supabaseClient.auth.getUser();
        state.currentUser = user || null;
        await loadUserListStatus();
        supabaseClient.auth.onAuthStateChange((_event, session) => {
          state.currentUser = session?.user || null;
          loadUserListStatus();
        });
      }

      async function loadUserListStatus() {
        state.listStatusMap = new Map();
        if (!supabaseClient || !state.currentUser) return;
        const { data, error } = await supabaseClient
          .from('game_list_items')
          .select('game_id, list_type')
          .eq('user_id', state.currentUser.id);
        if (error) return;
        (data || []).forEach(row => {
          if (!state.listStatusMap.has(row.game_id)) {
            state.listStatusMap.set(row.game_id, { favorites: false, watched: false, watchlist: false });
          }
          if (row.list_type && state.listStatusMap.get(row.game_id)[row.list_type] !== undefined) {
            state.listStatusMap.get(row.game_id)[row.list_type] = true;
          }
        });
        updateAllCardMenus();
      }

      function updateAllCardMenus() {
        document.querySelectorAll('.card').forEach(card => {
          const gameId = Number(card.getAttribute('data-game-id'));
          if (!gameId) return;
          updateCardMenuUI(card, gameId);
        });
      }

      function updateCardMenuUI(card, gameId) {
        const status = state.listStatusMap.get(gameId) || { favorites: false, watched: false, watchlist: false };
        card.querySelectorAll('.list-action').forEach(btn => {
          const listType = btn.getAttribute('data-list');
          if (!listType) return;
          const isActive = !!status[listType];
          btn.classList.toggle('active', isActive);
          const stateEl = btn.querySelector('.list-action-state');
          if (stateEl) stateEl.textContent = isActive ? 'Saved' : 'Add';
        });
      }

      function renderFilters() {
        const row = document.getElementById('activeFilters');
        if (!row) return;
        row.innerHTML = '';
        updatePopularVisibility();
        const items = [];
        if (state.activeGenre) items.push({ label: state.activeGenre, type: 'genre' });
        if (state.query) items.push({ label: state.query, type: 'query' });
        if (state.year) items.push({ label: state.year, type: 'year' });
        items.forEach(item => {
          const chip = document.createElement('div');
          chip.className = 'chip active';
          chip.textContent = item.label;
          chip.onclick = () => {
            if (item.type === 'genre') state.activeGenre = '';
            if (item.type === 'query') state.query = '';
            if (item.type === 'year') state.year = '';
            document.getElementById('searchInput').value = state.query;
            document.getElementById('genreSelect').value = state.activeGenre;
            document.getElementById('yearInput').value = state.year;
            renderFilters();
            state.page = 1;
            loadGames();
          };
          row.appendChild(chip);
        });
      }

      function createGameCard(item, index = 0) {
        const gameTitle = item.title || item.slug || 'Untitled';
        const gameDate = item.release_date ? String(item.release_date).slice(0, 10) : '';
        const genreText = normalizeGameGenres(item.extra)
          .map((genre) => genre.name)
          .slice(0, 2)
          .join(' | ');
        const ratingValue = Number(item.rating || 0);
        const ratingText = Number.isFinite(ratingValue) && ratingValue > 0 ? `${ratingValue.toFixed(1)}/5` : '';
        const gameDesc = [genreText, ratingText].filter(Boolean).join(' | ') || String(item.description || '').trim() || 'Popular pick';
        const gameCover = resolveGameImageSource(item);
        // Skip entries that don't have a real cover image.
        if (!gameCover || gameCover === IGDB_FALLBACK_IMAGE || gameCover.includes('/newlogo.webp')) {
          return null;
        }

        const gameId = Number(item.id);
        if (!Number.isFinite(gameId)) return null;
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-game-id', gameId);
        const isPriority = Number.isFinite(index) && index < 4;
        card.innerHTML = `
          <img src="${gameCover}" alt="${gameTitle}" loading="${isPriority ? 'eager' : 'lazy'}" fetchpriority="${isPriority ? 'high' : 'auto'}" decoding="async" referrerpolicy="no-referrer" onerror="this.onerror=null;const c=this.closest('.card');if(c)c.remove();">
          <div class="card-body">
            <h3 class="card-title">${gameTitle}</h3>
            <div class="card-meta-row">
              <div class="card-meta">${gameDate}</div>
              <div class="card-menu-wrap">
                <button class="menu-btn" aria-label="Save to lists"><i class="fas fa-ellipsis-v"></i></button>
              </div>
            </div>
            <p class="card-desc">${gameDesc}</p>
          </div>
        `;
        card.onclick = (e) => {
          if (e.target.closest('.menu-btn')) return;
          window.location.href = `game.html?id=${encodeURIComponent(String(gameId))}`;
        };
        wireCardMenu(card, gameId);
        updateCardMenuUI(card, gameId);
        return card;
      }

      async function loadGames(options = {}) {
        const grid = document.getElementById('gamesGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;
        const requestId = ++state.requestId;
        if (igdbAbortController) {
          igdbAbortController.abort();
        }
        igdbAbortController = new AbortController();
        const signal = igdbAbortController.signal;
        if (state.page === 1) {
          grid.innerHTML = '<div class="empty">Loading games...</div>';
        }
        const pageSize = getGamesPageSize();
        const fetchLimitCap = isSlowNetwork() ? 30 : 50;
        const fetchPageSize = Math.min(pageSize * (state.query ? 3 : 2), fetchLimitCap);
        const dates = state.year ? `${state.year}-01-01,${state.year}-12-31` : '';
        const ordering = state.query ? '-rating' : '-follows';
        const minRatingCount = (!state.query && !state.activeGenre && !state.year) ? 50 : 0;
        const popularityType = (!state.query && !state.activeGenre && !state.year) ? 1 : 0;
        const igdbPayload = await fetchIgdbPage({
          page: state.page,
          pageSize: fetchPageSize,
          ordering,
          search: state.query,
          dates,
          genres: state.activeGenre,
          min_rating_count: minRatingCount,
          popularity_type: popularityType || undefined,
          title_only: state.query ? 1 : undefined
        }, { signal, cacheBust: options?.cacheBust });
        if (requestId !== state.requestId) return;

        if (igdbPayload) {
          state.catalogSource = 'igdb';

          const sortedResults = sortSearchResults(igdbPayload.rows || [], state.query);
          let filteredResults = filterTitleMatches(sortedResults, state.query);
          const totalMatches = Number(igdbPayload.count || 0);
          const totalPages = Math.max(1, Math.ceil(Math.max(totalMatches, filteredResults.length) / pageSize));
          if (filteredResults.length < pageSize && state.page < totalPages && !isSlowNetwork()) {
            const nextPayload = await fetchIgdbPage({
              page: state.page + 1,
              pageSize: fetchPageSize,
              ordering,
              search: state.query,
              dates,
              genres: state.activeGenre,
              min_rating_count: minRatingCount,
              popularity_type: popularityType || undefined,
              title_only: state.query ? 1 : undefined
            }, { cacheBust: options?.cacheBust });
            if (requestId !== state.requestId) return;
            if (nextPayload) {
              const nextSorted = sortSearchResults(nextPayload.rows || [], state.query);
              const nextFiltered = filterTitleMatches(nextSorted, state.query);
              filteredResults = dedupeRowsById([...filteredResults, ...nextFiltered]);
            }
          }
          const results = filteredResults.slice(0, pageSize);
          state.totalPages = totalPages;
          if (!results.length) {
            if (empty) empty.style.display = 'block';
            grid.innerHTML = '';
            state.hasMore = false;
            updatePagination();
            return;
          }

          const fragment = document.createDocumentFragment();
          let appended = 0;
          results.forEach((item, idx) => {
            const card = createGameCard(item, idx);
            if (card) {
              fragment.appendChild(card);
              appended += 1;
            }
          });
          grid.innerHTML = '';
          if (appended) {
            grid.appendChild(fragment);
            if (empty) empty.style.display = 'none';
          } else if (empty) {
            empty.style.display = 'block';
            empty.textContent = 'No official posters found for this search.';
          }

          state.hasMore = state.page < state.totalPages;
          updatePagination();
          if (state.page < state.totalPages) {
            schedulePrefetch(state.page + 1, {
              pageSize: fetchPageSize,
              ordering,
              search: state.query,
              dates,
              genres: state.activeGenre,
              min_rating_count: minRatingCount,
              popularity_type: popularityType || undefined,
              title_only: state.query ? 1 : undefined
            });
          }
          return;
        }

        if (empty) {
          empty.style.display = 'block';
          empty.textContent = 'IGDB is unavailable right now. Check your credentials and try again.';
        }
        grid.innerHTML = '';
        state.hasMore = false;
        updatePagination();
      }

      function wireCardMenu(card, gameId) {
        const menuBtn = card.querySelector('.menu-btn');
        if (!menuBtn) return;
        menuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (typeof window.openIndexStyleListMenu === 'function') {
            window.openIndexStyleListMenu(card);
          }
        });
      }

      function ensureListMenuBackdrop() {
        let backdrop = document.getElementById('listMenuBackdrop');
        if (!backdrop) {
          backdrop = document.createElement('div');
          backdrop.id = 'listMenuBackdrop';
          backdrop.className = 'list-menu-backdrop';
          backdrop.addEventListener('click', closeAllListMenus);
          document.body.appendChild(backdrop);
        }
        return backdrop;
      }

      function showListMenuBackdrop() {
        const backdrop = ensureListMenuBackdrop();
        backdrop.classList.add('active');
      }

      function hideListMenuBackdrop() {
        const backdrop = document.getElementById('listMenuBackdrop');
        if (backdrop) backdrop.classList.remove('active');
      }

      function closeAllListMenus() {
        document.querySelectorAll('.list-menu.open').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.card.menu-open').forEach(c => c.classList.remove('menu-open'));
        hideListMenuBackdrop();
      }

      async function toggleDefaultList(gameId, listType, card, forcedNextSaved) {
        if (!state.currentUser) {
          showNotification('Please sign in to save games', 'info');
          return { ok: false, saved: false };
        }
        if (!supabaseClient) return { ok: false, saved: false };
        const status = state.listStatusMap.get(gameId) || { favorites: false, watched: false, watchlist: false };
        const previousSaved = !!status[listType];
        const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
        const opKey = `${gameId}:${listType}`;
        if (state.pendingDefaultOps.has(opKey)) {
          return { ok: false, saved: previousSaved };
        }
        state.pendingDefaultOps.add(opKey);

        status[listType] = nextSaved;
        state.listStatusMap.set(gameId, status);
        if (card) updateCardMenuUI(card, gameId);

        try {
          if (nextSaved) {
            const { error } = await supabaseClient
              .from('game_list_items')
              .insert({ user_id: state.currentUser.id, game_id: gameId, list_type: listType });
            if (error) throw error;
            showNotification('Saved to list', 'success');
          } else {
            const { error } = await supabaseClient
              .from('game_list_items')
              .delete()
              .eq('user_id', state.currentUser.id)
              .eq('game_id', gameId)
              .eq('list_type', listType);
            if (error) throw error;
            showNotification('Removed from list', 'info');
          }
          return { ok: true, saved: nextSaved };
        } catch (_err) {
          status[listType] = previousSaved;
          state.listStatusMap.set(gameId, status);
          if (card) updateCardMenuUI(card, gameId);
          showNotification('Could not update list', 'error');
          return { ok: false, saved: previousSaved };
        } finally {
          state.pendingDefaultOps.delete(opKey);
        }
      }

      async function loadCustomLists() {
        if (!supabaseClient || !state.currentUser || !window.ListUtils) return [];
        return await ListUtils.loadCustomLists(supabaseClient, state.currentUser.id, 'game');
      }

      async function openGameListsModal(gameId) {
        if (!state.currentUser) {
          showNotification('Please sign in to manage lists', 'info');
          return;
        }
        state.activeGameId = gameId;
        const modal = document.getElementById('gameListsModal');
        const container = document.getElementById('gameListsContainer');
        if (!modal || !container) return;
        container.innerHTML = '<div class="chip">Loading...</div>';
        state.customLists = await loadCustomLists();
        const listIds = state.customLists.map(l => l.id);
        state.modalSelectedLists = window.ListUtils
          ? await ListUtils.loadCustomListMembership(supabaseClient, state.currentUser.id, 'game', gameId, listIds)
          : new Set();
        container.innerHTML = '';
        if (!state.customLists.length) {
          container.innerHTML = '<div class="chip">No custom lists yet.</div>';
        } else {
          state.customLists.forEach(list => {
            const item = document.createElement('div');
            item.className = 'modal-list-item' + (state.modalSelectedLists.has(list.id) ? ' active' : '');
            item.innerHTML = `
              <span>${renderListIcon(list.icon)} ${list.title}</span>
              <span class="modal-list-actions">
                <span>${state.modalSelectedLists.has(list.id) ? 'Saved' : 'Add'}</span>
                <button class="list-edit-btn" aria-label="Rename list"><i class="fas fa-pen"></i></button>
              </span>
            `;
            item.onclick = () => {
              if (state.modalSelectedLists.has(list.id)) {
                state.modalSelectedLists.delete(list.id);
              } else {
                state.modalSelectedLists.add(list.id);
              }
              item.classList.toggle('active');
              item.querySelector('.modal-list-actions span').textContent = state.modalSelectedLists.has(list.id) ? 'Saved' : 'Add';
            };
            const editBtn = item.querySelector('.list-edit-btn');
            if (editBtn) {
              editBtn.onclick = (e) => {
                e.stopPropagation();
                renameGameList(list.id, list.title);
              };
            }
            container.appendChild(item);
          });
        }
        modal.classList.add('active');
      }

      async function saveGameListChanges() {
        if (!supabaseClient || !state.currentUser || !state.activeGameId) return;
        if (window.ListUtils) {
          await ListUtils.saveCustomListChanges(
            supabaseClient,
            state.currentUser.id,
            'game',
            state.activeGameId,
            [...state.modalSelectedLists]
          );
        }
        showNotification('Lists updated', 'success');
        closeGameListsModal();
      }

      function closeGameListsModal() {
        const modal = document.getElementById('gameListsModal');
        if (modal) modal.classList.remove('active');
        state.activeGameId = null;
      }

      async function createGameList() {
        const input = document.getElementById('newGameListName');
        if (!input || !input.value.trim()) return;
        if (!supabaseClient || !state.currentUser) return;
        const title = input.value.trim();
        const modal = document.getElementById('gameListsModal');
        const tierState = window.ListUtils && modal
          ? ListUtils.readTierCreateState(modal)
          : { listKind: 'standard', maxRank: null };
        const data = window.ListUtils
          ? await ListUtils.createCustomList(supabaseClient, state.currentUser.id, 'game', {
            title,
            icon: state.selectedIcon || 'fas fa-gamepad',
          listKind: tierState.listKind,
          maxRank: tierState.maxRank
          })
          : null;
        if (!data) {
          showNotification('Could not create list', 'error');
          return;
        }
        input.value = '';
        if (window.ListUtils && modal) ListUtils.resetTierCreateState(modal);
        state.customLists.unshift(data);
        openGameListsModal(state.activeGameId);
      }

      async function renameGameList(listId, currentTitle) {
        const nextTitle = prompt('Rename list', currentTitle || '');
        if (!nextTitle || !nextTitle.trim()) return;
        if (!supabaseClient || !state.currentUser) return;
        const ok = window.ListUtils
          ? await ListUtils.renameCustomList(supabaseClient, state.currentUser.id, 'game', listId, nextTitle.trim())
          : false;
        if (!ok) {
          showNotification('Could not rename list', 'error');
          return;
        }
        state.customLists = state.customLists.map(l => l.id === listId ? { ...l, title: nextTitle.trim() } : l);
        openGameListsModal(state.activeGameId);
      }

      function wireUI() {
        const searchInput = document.getElementById('searchInput');
        const genreSelect = document.getElementById('genreSelect');
        const yearInput = document.getElementById('yearInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const closeListsBtn = document.getElementById('closeGameListsBtn');
        const saveListsBtn = document.getElementById('saveGameListsBtn');
        const createListBtn = document.getElementById('createGameListBtn');
        const iconOptions = document.querySelectorAll('#gameListIconOptions .icon-option');

        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            state.query = e.target.value.trim();
            renderFilters();
            state.page = 1;
            scheduleGamesLoad(380);
          });
        }
        if (genreSelect) {
          genreSelect.addEventListener('change', (e) => {
            state.activeGenre = e.target.value;
            renderFilters();
            state.page = 1;
            scheduleGamesLoad(320);
          });
        }
        if (yearInput) {
          yearInput.addEventListener('input', (e) => {
            state.year = e.target.value.trim();
            renderFilters();
            state.page = 1;
            scheduleGamesLoad(340);
          });
        }
        if (refreshBtn) refreshBtn.addEventListener('click', () => loadGames({ cacheBust: true }));
        if (prevBtn) {
          prevBtn.addEventListener('click', () => {
            if (state.page > 1) {
              state.page -= 1;
              loadGames();
            }
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener('click', () => {
            if (state.hasMore) {
              state.page += 1;
              loadGames();
            }
          });
        }
        if (closeListsBtn) closeListsBtn.addEventListener('click', closeGameListsModal);
        if (saveListsBtn) saveListsBtn.addEventListener('click', saveGameListChanges);
        if (createListBtn) createListBtn.addEventListener('click', createGameList);
        iconOptions.forEach(btn => {
          btn.addEventListener('click', () => {
            iconOptions.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            state.selectedIcon = btn.getAttribute('data-icon') || 'fas fa-gamepad';
          });
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeAllListMenus();
        });
      }

      function updatePagination() {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const info = document.getElementById('pageInfo');
        if (prevBtn) prevBtn.disabled = state.page <= 1;
        if (nextBtn) nextBtn.disabled = !state.hasMore;
        if (info) info.textContent = state.hasMore
          ? `Page ${state.page}+`
          : `Page ${state.page}`;
      }

      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'game',
          itemIdAttr: 'data-game-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-game-id]'))
              .map((card) => card.getAttribute('data-game-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const numeric = Number(itemId);
            const key = Number.isFinite(numeric) ? numeric : itemId;
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await initSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => state.currentUser,
          notify: (message, isError) => showNotification(message, isError ? 'error' : 'success'),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }

      (async function init() {
        await initSupabase();
        wireUI();
        await loadGenreCatalog();
        await initAuth();
        renderFilters();
        loadGames();
      })();
    })();
  </script>
