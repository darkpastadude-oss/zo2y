<html lang="en">

<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />

  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --glass: rgba(255,255,255,0.03);
      --white: #ffffff;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      --surface: rgba(19, 35, 71, 0.6);
      --radial-glow: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      --info: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      background: var(--radial-glow);
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0 12px, rgba(255, 184, 77, 0) 12px 24px);
      opacity: 0.25;
      pointer-events: none;
      z-index: -3;
    }

    a { color: inherit; text-decoration: none; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 12px 12px;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      gap: 10px;
    }

    .logo {
      height: 34px;
      width: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .logo:hover { transform: scale(1.05); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a.ghost {
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .nav a.ghost:hover { color: var(--accent); background: rgba(245, 158, 11, 0.05); }

    .account-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .account-btn:hover { border-color: var(--accent); color: var(--accent); }

    .account-btn.logged-in {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--accent);
    }

    .hero {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 12px;
    }

    .hero h1 {
      font-size: 20px;
      margin: 0 0 6px 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .media-spotlight {
      margin: 16px auto 0;
      padding: 0 16px;
    }

    .media-spotlight[hidden] {
      display: none;
    }

    .media-spotlight-shell {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
        min-height: 220px;
        max-height: 220px;
      display: grid;
        grid-template-columns: minmax(0, 1.02fr) minmax(128px, 0.98fr);
      gap: 0;
      background: linear-gradient(140deg, rgba(16, 31, 64, 0.96), rgba(8, 19, 41, 0.92));
    }

    .media-spotlight-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(8,14,31,0.78), rgba(10,19,39,0.42));
      background-size: cover;
      background-position: center center;
      transform: scale(1.02);
    }

    .media-spotlight-copy,
    .media-spotlight-poster { position: relative; z-index: 1; }

     .media-spotlight-copy {
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .media-spotlight-kicker { display: none; }

     .media-spotlight-copy h2 { margin: 0; font-size: 16px; line-height: 1.08; max-width: 11ch; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .media-spotlight-meta,
    .media-spotlight-summary { margin: 0; color: var(--muted); line-height: 1.35; }

    .media-spotlight-meta {
      font-size: 11px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .media-spotlight-summary {
      font-size: 12px;
      max-width: 22ch;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

     .media-spotlight-poster {
        padding: 10px 8px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(11, 22, 49, 0.72), rgba(8, 16, 36, 0.92));
    }

    .media-spotlight-poster img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center center;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
      padding: 0;
    }

    .media-spotlight-actions { margin-top: auto; display: flex; gap: 8px; padding-top: 2px; }

    .controls {
      max-width: 1200px;
      margin: 10px auto 0;
      padding: 0 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 52px;
      gap: 10px;
      align-items: center;
    }

    .search-input,
    .filter-select {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #10224a;
      color: var(--white);
      outline: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    .full-span { grid-column: 1 / -1; }

    .btn.filter-launch-btn,
    .btn.search-submit-btn {
      width: 52px;
      min-width: 52px;
      height: 52px;
      justify-content: center;
      padding: 0;
      border-radius: 16px;
      border: 1px solid rgba(245, 158, 11, 0.35);
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      flex: 0 0 auto;
    }

    .btn.filter-launch-btn:hover,
    .btn.filter-launch-btn:focus-visible,
    .btn.search-submit-btn:hover,
    .btn.search-submit-btn:focus-visible {
      border-color: rgba(245, 158, 11, 0.55);
      color: #0b1633;
    }

    .btn.filter-launch-btn i,
    .btn.search-submit-btn i {
      margin: 0;
    }

    .filter-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .filter-form-grid > * {
      min-width: 0;
      max-width: 100%;
    }

    .filter-form-grid .search-input,
    .filter-form-grid .filter-select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s ease;
      justify-content: center;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .chip-row {
      max-width: 1200px;
      margin: 8px auto 0;
      padding: 0 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }

    .chip.active { border-color: var(--accent); color: var(--accent); }

    .grid {
      max-width: 382px;
      margin: 16px auto 40px;
      padding: 0 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 114px));
      gap: 10px;
      justify-content: center;
      justify-items: stretch;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease;
      position: relative;
      width: 100%;
      max-width: 114px;
      min-width: 0;
      justify-self: center;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 114px));
        justify-content: center;
      }
      .card {
        max-width: 114px;
      }
    }

    .card.menu-open,
    .card.menu-open:hover {
      transform: none;
      overflow: visible;
    }

    .card .card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      background: #0f1f40;
      background-size: cover;
      background-position: center center;
      overflow: hidden;
    }

    .card .card-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(9, 18, 36, 0.1) 0%, rgba(9, 18, 36, 0.35) 100%);
      opacity: 0.35;
      pointer-events: none;
    }

    .card .card-media img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      background: transparent;
      padding: 0;
      filter: none;
    }

    .card .card-media.game-media {
      background-color: #111f41;
      background-size: cover;
      background-position: center;
    }

    .card .card-media.game-media img {
      object-fit: contain;
      object-position: center center;
      padding: 6px;
    }

    .card .card-media.game-media.portrait-poster img {
      object-fit: cover;
      object-position: center center;
      padding: 0;
    }

    .card .card-media.game-media.plain-logo {
      background: transparent !important;
      background-image: none !important;
    }

    .card .card-media.game-media.plain-logo::before,
    .card .card-media.game-media.plain-logo::after {
      display: none;
    }

    .card .card-media.game-media.plain-logo img {
      padding: 0;
      filter: none;
    }

    .card .card-media.game-media::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.12), rgba(255,255,255,0) 42%),
        linear-gradient(180deg, rgba(9, 18, 36, 0.18) 0%, rgba(9, 18, 36, 0.72) 100%);
      z-index: 0;
      pointer-events: none;
    }

    .card-body {
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 800;
      margin: 0;
      line-height: 1.35;
      min-height: 38px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      order: 1;
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
    }

    .card-desc {
      display: -webkit-box;
      font-size: 12px;
      color: #a9b9da;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      order: 3;
      margin-top: auto;
    }

    .card-menu-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .menu-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(19, 35, 71, 0.9);
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .menu-btn:hover { border-color: var(--accent); color: var(--accent); }

    .list-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .list-menu.open { display: flex; }

    .list-menu-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    .list-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 3290;
      display: none;
    }
    .list-menu-backdrop.active { display: block; }

    .list-menu-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; }

    .list-action {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: all 0.2s ease;
      margin-bottom: 6px;
    }

    .list-action:last-child { margin-bottom: 0; }
    .list-action:hover { border-color: var(--accent); color: var(--accent); }
    .list-action.active {
      background: rgba(245, 158, 11, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 12px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .pagination {
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .page-btn {
      min-width: 40px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .page-info { color: var(--muted); font-size: 12px; }

    .notification {
      position: fixed;
      top: 16px;
      right: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 2000;
      box-shadow: var(--shadow);
    }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--error); color: white; }
    .notification.info { background: var(--info); color: white; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 16px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
    }
    .modal-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
      margin-bottom: 10px;
    }
    .modal-list-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
    }
    .modal-list-actions { display: inline-flex; gap: 6px; align-items: center; }
    .list-edit-btn {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .list-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-list-item.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.12);
    }
    .modal-input {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .modal-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
      font-size: 12px;
    }
    .icon-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .icon-option {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-option.selected { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 760px) {
      .card .card-media { aspect-ratio: 2 / 3; }
    }
  </style>

  <script src="js/list-utils.js?v=20260419a"></script>
<script src="js/index-list-menu-adapter.js?v=20260428a"></script>
  <script>
    (function () {
      const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
      const SUPABASE_URL = String(supabaseConfig.url || '').trim();
      const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
      const IGDB_PROXY_BASE = '/api/igdb';
      const IGDB_PAGE_SIZE = 50;

      const IGDB_FALLBACK_IMAGE = '/newlogo.webp';
      const IGDB_CACHE_TTL_MS = 1000 * 60 * 4;
      const IGDB_CACHE_MAX = 160;
      const igdbCache = new Map();
      const igdbInFlight = new Map();

      function normalizeGameImageUrl(value) {
        const raw = String(value || '').trim();
        if (!raw || raw === '[object Object]') return '';
        if (raw.startsWith('//')) return `https:${raw}`;
        if (raw.startsWith('http://')) return raw.replace(/^http:\/\//i, 'https://');
        return raw;
      }

      function pickPreferredCoverUrl(candidates = []) {
        const cleaned = candidates.map(normalizeGameImageUrl).filter(Boolean);
        const likelyCovers = cleaned.filter((url) => !isLikelyBackdropGameUrl(url));
        const pool = likelyCovers.length ? likelyCovers : cleaned;
        const posterPool = pool.filter((url) => isLikelyPosterGameUrl(url));
        const preferredPool = posterPool.length ? posterPool : pool;
        return preferredPool.find((url) => /wikimedia|wikipedia/.test(url))
          || preferredPool.find((url) => /igdb|images\.igdb\.com/.test(url))
          || preferredPool.find((url) => /rawg|media\.rawg/.test(url))
          || preferredPool.find((url) => /\/game-assets\/covers-official\//.test(url))
          || preferredPool.find((url) => /\/game-assets\/covers\//.test(url))
          || pool.find((url) => /wikimedia|wikipedia/.test(url))
          || pool.find((url) => /igdb|images\.igdb\.com/.test(url))
          || pool.find((url) => /rawg|media\.rawg/.test(url))
          || pool.find((url) => /\/game-assets\/covers-official\//.test(url))
          || pool.find((url) => /\/game-assets\/covers\//.test(url))
          || pool[0]
          || '';
      }

      function pickBackdropUrl(candidates = [], fallback = '') {
        const cleaned = candidates.map(normalizeGameImageUrl).filter(Boolean);
        const fallbackUrl = normalizeGameImageUrl(fallback);
        if (fallbackUrl) {
          const different = cleaned.find((url) => url !== fallbackUrl);
          return different || fallbackUrl;
        }
        return cleaned[0] || '';
      }

      function getGameImportedFrom(row) {
        return String(row?.extra?.imported_from || row?.source || '').trim().toLowerCase();
      }

      function hasPosterOfficialGameCover(row) {
        const cover = normalizeGameImageUrl(row?.cover_url || row?.cover?.url || row?.cover);
        if (!cover || !/\/game-assets\/covers-official\//.test(cover)) return false;
        return Boolean(row?.extra?.official_cover_is_poster);
      }

      function isOfficialGameProviderRow(row) {
        const importedFrom = getGameImportedFrom(row);
        return importedFrom.includes('wikipedia') || importedFrom.includes('igdb');
      }

      function isLikelyBackdropGameUrl(url) {
        const value = String(url || '').trim().toLowerCase();
        if (!value) return false;
        return ['/heroes/', '/hero/', 'background', 'fanart', 'screenshot', 'screenshots', 'backdrop'].some((token) => value.includes(token));
      }

      function isLikelyPosterGameUrl(url) {
        const value = String(url || '').trim().toLowerCase();
        if (!value || isLikelyBackdropGameUrl(value)) return false;
        return [
          '/covers-official/',
          '/covers/',
          'cover',
          'boxart',
          'box-art',
          'poster',
          'front'
        ].some((token) => value.includes(token));
      }

      function resolveGameImageSource(row) {
        if (!row) return '';
        if (hasPosterOfficialGameCover(row)) {
          return pickPreferredCoverUrl([row?.cover_url, row?.cover?.url, row?.cover]);
        }
        return pickPreferredCoverUrl([
          row?.cover_url,
          row?.cover?.url,
          row?.cover,
          ...(Array.isArray(row?.extra?.local_covers) ? row.extra.local_covers : []),
          ...(Array.isArray(row?.extra?.covers) ? row.extra.covers : []),
          ...(Array.isArray(row?.extra?.official_covers) ? row.extra.official_covers : []),
          ...(Array.isArray(row?.extra?.cover_candidates) ? row.extra.cover_candidates : []),
          isOfficialGameProviderRow(row) ? '' : row?.hero_url,
          isOfficialGameProviderRow(row) ? '' : row?.hero,
          ...(Array.isArray(row?.screenshots) ? row.screenshots : []),
          ...(Array.isArray(row?.short_screenshots) ? row.short_screenshots.map((entry) => entry?.image) : [])
        ]);
      }

      function buildGameCoverFallbackChain(row, preferredCover = '', preferredHero = '') {
        const chain = [
          preferredCover,
          row?.cover_url,
          row?.cover?.url,
          row?.cover,
          ...(Array.isArray(row?.extra?.official_covers) ? row.extra.official_covers : []),
          ...(Array.isArray(row?.extra?.cover_candidates) ? row.extra.cover_candidates : []),
          ...(Array.isArray(row?.extra?.covers) ? row.extra.covers : []),
          ...(Array.isArray(row?.extra?.local_covers) ? row.extra.local_covers : []),
          preferredHero,
          row?.hero_url,
          row?.hero,
          row?.background_image,
          ...(Array.isArray(row?.extra?.screenshots) ? row.extra.screenshots : []),
          ...(Array.isArray(row?.extra?.local_screenshots) ? row.extra.local_screenshots : []),
          ...(Array.isArray(row?.screenshots) ? row.screenshots : []),
          ...(Array.isArray(row?.short_screenshots) ? row.short_screenshots.map((entry) => entry?.image) : []),
          IGDB_FALLBACK_IMAGE
        ]
          .map(normalizeGameImageUrl)
          .filter(Boolean);
        const seen = new Set();
        return chain.filter((url) => {
          if (seen.has(url)) return false;
          seen.add(url);
          return true;
        });
      }

      function resolveGameHeroSource(row, fallback) {
        const hero = pickBackdropUrl([
          row?.hero_url,
          row?.hero,
          row?.background_image,
          ...(Array.isArray(row?.extra?.local_screenshots) ? row.extra.local_screenshots : []),
          ...(Array.isArray(row?.extra?.screenshots) ? row.extra.screenshots : []),
          ...(Array.isArray(row?.screenshots) ? row.screenshots : []),
          ...(Array.isArray(row?.short_screenshots) ? row.short_screenshots.map((entry) => entry?.image) : [])
        ], fallback);
        return hero || fallback || IGDB_FALLBACK_IMAGE;
      }

      function isLikelyLogoOnlyGameArt(url) {
        const value = String(url || '').trim().toLowerCase();
        if (!value) return false;
        if (value.endsWith('.svg') || value.includes('.svg?')) return true;
        return ['logo', 'wordmark', 'transparent', 'icon', 'banner'].some((token) => value.includes(token));
      }

      function shouldUsePortraitPosterFit(item, cover) {
        const resolvedCover = normalizeGameImageUrl(cover);
        if (!resolvedCover || isLikelyLogoOnlyGameArt(resolvedCover)) return false;
        if (hasPosterOfficialGameCover(item)) return true;
        if (Boolean(item?.extra?.official_cover_is_poster)) return true;
        return isLikelyPosterGameUrl(resolvedCover);
      }

        function shouldUsePlainGameStage(item, cover, hero) {
          return isLikelyLogoOnlyGameArt(cover) || !hero || hero === cover;
        }

      function buildIgdbCacheKey(path, params = {}) {
        const pairs = Object.entries(params || {})
          .filter(([, value]) => value !== undefined && value !== null && value !== '')
          .map(([key, value]) => [String(key), String(value)]);
        pairs.sort((a, b) => a[0].localeCompare(b[0]) || a[1].localeCompare(b[1]));
        const query = pairs.map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`).join('&');
        return query ? `${path}?${query}` : String(path || '');
      }

      function readIgdbCache(key) {
        const entry = igdbCache.get(key);
        if (!entry) return null;
        if (entry.expiresAt <= Date.now()) {
          igdbCache.delete(key);
          return null;
        }
        return entry.data || null;
      }

      function writeIgdbCache(key, data, ttlMs = IGDB_CACHE_TTL_MS) {
        if (!key || !data) return;
        igdbCache.set(key, { data, expiresAt: Date.now() + ttlMs });
        while (igdbCache.size > IGDB_CACHE_MAX) {
          const firstKey = igdbCache.keys().next().value;
          if (!firstKey) break;
          igdbCache.delete(firstKey);
        }
      }

      async function fetchIgdbJson(path, params = {}, options = {}) {
        const cacheKey = buildIgdbCacheKey(path, params);
        const useCache = !options?.cacheBust;
        const reuseInFlight = useCache && !options?.signal;
        if (useCache) {
          const cached = readIgdbCache(cacheKey);
          if (cached) return cached;
          if (reuseInFlight && igdbInFlight.has(cacheKey)) return igdbInFlight.get(cacheKey);
        }

        const fetchPromise = (async () => {
          try {
            if (window.ZO2Y_IGDB && typeof window.ZO2Y_IGDB.request === 'function') {
              const data = await window.ZO2Y_IGDB.request(path, params, options?.signal ? { signal: options.signal } : undefined);
              if (useCache && data) writeIgdbCache(cacheKey, data);
              return data;
            }
            const url = new URL(`${IGDB_PROXY_BASE}${path}`, window.location.origin);
            Object.entries(params || {}).forEach(([key, value]) => {
              if (value === undefined || value === null || value === '') return;
              url.searchParams.set(key, String(value));
            });
            const res = await fetch(url.toString(), options?.signal ? { signal: options.signal } : undefined);
            if (!res.ok) return null;
            const data = await res.json();
            if (useCache && data) writeIgdbCache(cacheKey, data);
            return data;
          } catch (_err) {
            return null;
          }
        })();

        if (reuseInFlight) igdbInFlight.set(cacheKey, fetchPromise);
        try {
          return await fetchPromise;
        } finally {
          if (reuseInFlight) igdbInFlight.delete(cacheKey);
        }
      }
      const state = {
        genres: [],
        activeGenre: '',
        query: '',
        year: '',
        platform: '',
        page: 1,
        totalPages: 1,
        hasMore: true,
        requestId: 0,
        currentUser: null,
        listStatusMap: new Map(),
        customLists: [],
        catalog: [],
        catalogLoadedAll: false,
        catalogSource: 'supabase',
        activeGameId: null,
        modalSelectedLists: new Set(),
        selectedIcon: 'fas fa-gamepad',
        pendingDefaultOps: new Set(),
        searchSupplementCache: new Map()
      };

      let supabaseClient = null;
      let loadGamesTimer = null;
      let igdbAbortController = null;
      let prefetchTimer = null;
      let prefetchKey = '';
      let catalogLoadPromise = null;

      async function ensureSupabase() {
        if (supabaseClient) return supabaseClient;
        const authRuntime = window.ZO2Y_AUTH || null;
        if (authRuntime && typeof authRuntime.waitForSupabase === 'function') {
          await authRuntime.waitForSupabase(8000);
        } else {
          const startedAt = Date.now();
          while (!(window.supabase && typeof window.supabase.createClient === 'function') && (Date.now() - startedAt) < 8000) {
            await new Promise((resolve) => setTimeout(resolve, 40));
          }
        }
        if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
          supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
          if (supabaseClient) return supabaseClient;
        }
        if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
          supabaseClient = window.supabase.createClient(
            window.__ZO2Y_SUPABASE_CONFIG.url,
            window.__ZO2Y_SUPABASE_CONFIG.key,
            { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
          );
          window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
          return supabaseClient;
        }
        return null;
      }

      function scheduleGamesLoad(delayMs = 360) {
        if (loadGamesTimer) clearTimeout(loadGamesTimer);
        const effectiveDelay = isSlowNetwork() ? Math.max(120, delayMs) : Math.min(45, delayMs);
        loadGamesTimer = setTimeout(() => {
          loadGames();
        }, effectiveDelay);
      }

      function isSlowNetwork() {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!connection) return false;
        if (connection.saveData) return true;
        const effectiveType = String(connection.effectiveType || '').toLowerCase();
        return effectiveType === 'slow-2g' || effectiveType === '2g' || effectiveType === '3g';
      }

      function getGamesPageSize() {
        return isSlowNetwork() ? 16 : 20;
      }

      function schedulePrefetch(nextPage, params = {}) {
        if (!Number.isFinite(nextPage) || nextPage <= 0) return;
        const key = JSON.stringify({ ...params, page: nextPage });
        if (key === prefetchKey) return;
        prefetchKey = key;
        if (prefetchTimer) clearTimeout(prefetchTimer);
        const run = () => {
          fetchIgdbPage({ ...params, page: nextPage }).catch(() => null);
        };
        if (typeof requestIdleCallback === 'function') {
          requestIdleCallback(run, { timeout: 1200 });
        } else {
          prefetchTimer = setTimeout(run, 350);
        }
      }

      function normalizeGameGenres(extra) {
        const rawGenres = Array.isArray(extra?.genres) ? extra.genres : [];
        const out = [];
        const seen = new Set();
        rawGenres.forEach((entry) => {
          const name = String(entry?.name || '').trim();
          const slug = String(entry?.slug || name).trim().toLowerCase().replace(/\s+/g, '-');
          if (!name || !slug || seen.has(slug)) return;
          seen.add(slug);
          out.push({ name, slug });
        });
        return out;
      }

      const ROMAN_NUMERAL_MAP = {
        i: '1',
        ii: '2',
        iii: '3',
        iv: '4',
        v: '5',
        vi: '6',
        vii: '7',
        viii: '8',
        ix: '9',
        x: '10'
      };

      function normalizeTitleKey(value) {
        const normalized = String(value || '')
          .normalize('NFKD')
          .replace(/[\u0300-\u036f]/g, '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        if (!normalized) return '';
        return normalized
          .split(' ')
          .map((token) => ROMAN_NUMERAL_MAP[token] || token)
          .join(' ')
          .trim();
      }

      function normalizeFranchiseTitleKey(value) {
        return normalizeTitleKey(value)
          .replace(/\bvideo game\b/g, ' ')
          .replace(/\bthe\b/g, ' ')
          .replace(/\bmarvels\b/g, 'marvel ')
          .replace(/\bspider man\b/g, 'spiderman')
          .replace(/\bpokemon\b/g, 'pokemon')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function buildTitleEditionKey(row) {
        const titleKey = normalizeTitleKey(row?.title || row?.name || row?.slug || '');
        const yearKey = String(row?.release_date || '').slice(0, 4);
        if (!titleKey) return '';
        return `${titleKey}::${yearKey || 'na'}`;
      }

      function splitTitleTokens(value) {
        const normalized = normalizeTitleKey(value);
        if (!normalized) return [];
        return normalized.split(' ').filter(Boolean);
      }

      function buildAcronym(tokens = []) {
        return tokens.map((token) => token.slice(0, 1)).join('');
      }

      function isOneEditAway(a = '', b = '') {
        if (a === b) return true;
        if (Math.abs(a.length - b.length) > 1) return false;
        let i = 0;
        let j = 0;
        let edits = 0;
        while (i < a.length && j < b.length) {
          if (a[i] === b[j]) {
            i += 1;
            j += 1;
            continue;
          }
          edits += 1;
          if (edits > 1) return false;
          if (a.length > b.length) {
            i += 1;
          } else if (b.length > a.length) {
            j += 1;
          } else {
            i += 1;
            j += 1;
          }
        }
        if (i < a.length || j < b.length) edits += 1;
        return edits <= 1;
      }

      function isTransposition(a = '', b = '') {
        if (a.length !== b.length || a.length < 2) return false;
        const diffs = [];
        for (let i = 0; i < a.length; i += 1) {
          if (a[i] !== b[i]) diffs.push(i);
          if (diffs.length > 2) return false;
        }
        if (diffs.length !== 2) return false;
        if (diffs[1] !== diffs[0] + 1) return false;
        return a[diffs[0]] === b[diffs[1]] && a[diffs[1]] === b[diffs[0]];
      }

      function tokenMatchesQuery(titleToken, queryToken) {
        if (!titleToken || !queryToken) return false;
        if (titleToken.startsWith(queryToken)) return true;
        if (queryToken.length >= 3 && titleToken.includes(queryToken)) return true;
        if (queryToken.length >= 4 && isTransposition(titleToken, queryToken)) return true;
        if (queryToken.length >= 4 && isOneEditAway(titleToken, queryToken)) return true;
        return false;
      }

      function titleMatchesQuery(title, query) {
        const titleKey = normalizeTitleKey(title);
        const queryKey = normalizeTitleKey(query);
        const franchiseTitleKey = normalizeFranchiseTitleKey(title);
        const franchiseQueryKey = normalizeFranchiseTitleKey(query);
        if (!queryKey) return true;
        if (titleKey.includes(queryKey)) return true;
        if (franchiseQueryKey && franchiseTitleKey.includes(franchiseQueryKey)) return true;
        const compactTitle = titleKey.replace(/\s+/g, '');
        const compactQuery = queryKey.replace(/\s+/g, '');
        const compactFranchiseTitle = franchiseTitleKey.replace(/\s+/g, '');
        const compactFranchiseQuery = franchiseQueryKey.replace(/\s+/g, '');
        if (!compactQuery) return false;
        if (compactTitle.includes(compactQuery)) return true;
        if (compactFranchiseQuery && compactFranchiseTitle.includes(compactFranchiseQuery)) return true;
        const titleTokens = splitTitleTokens(titleKey);
        const queryTokens = splitTitleTokens(queryKey);
        if (!queryTokens.length) return true;
        if (queryTokens.length === 1) {
          const acronym = buildAcronym(titleTokens);
          if (acronym && (acronym === queryKey || acronym.startsWith(queryKey))) return true;
        }
        return queryTokens.every((token) => titleTokens.some((titleToken) => tokenMatchesQuery(titleToken, token)));
      }

      function filterTitleMatches(rows = [], query = '') {
        const queryKey = normalizeTitleKey(query);
        if (!queryKey) return Array.isArray(rows) ? rows : [];
        return (Array.isArray(rows) ? rows : []).filter((row) => {
          const title = String(row?.title || row?.name || row?.slug || '').trim();
          return titleMatchesQuery(title, queryKey);
        });
      }

      function dedupeRowsById(rows = []) {
        const out = [];
        const seen = new Set();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          const rawId = row?.id;
          const key = Number.isFinite(Number(rawId)) ? String(rawId) : String(rawId || '').trim();
          if (!key || seen.has(key)) return;
          seen.add(key);
          out.push(row);
        });
        return out;
      }

      function dedupeRowsByTitleEdition(rows = []) {
        const grouped = new Map();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          const key = buildTitleEditionKey(row);
          if (!key) return;
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(row);
        });
        return Array.from(grouped.values()).map((group) => sortGamesPosterFirst(group)[0]).filter(Boolean);
      }

      const SEARCH_TITLE_SUFFIX_NOISE = new Set([
        'version',
        'edition',
        'standard edition',
        'deluxe edition',
        'ultimate edition',
        'definitive edition',
        'game of the year edition',
        'goty edition'
      ]);

      const SEARCH_UNOFFICIAL_TOKENS = [
        'prototype',
        'demo',
        'tech demo',
        'fan game',
        'fangame',
        'fan made',
        'fan-made',
        'fan project',
        'fan remake',
        'rom hack',
        'hack',
        'mod',
        'modded',
        'custom map',
        'creative map',
        'creative 2.0',
        'creepy',
        'creepypasta',
        'but the',
        'pictures pack',
        'images pack',
        'soundtrack',
        'music',
        'field trip',
        'dream prototype',

      const UNOFFICIAL_GAME_PATTERNS = [
        /\bprototype\b/i,
        /\btech demo\b/i,
        /\bdemo\b/i,
        /\bfan\s?game\b/i,
        /\bfanmade\b/i,
        /\bfan[- ]made\b/i,
        /\bfan project\b/i,
        /\bfan remake\b/i,
        /\brom hack\b/i,
        /\bmod\b/i,
        /\bmodded\b/i,
        /\bcustom map\b/i,
        /\bcreative map\b/i,
        /\bcreative 2(?:\.0)?\b/i,
        /\bpictures pack\b/i,
        /\bimages pack\b/i,
        /\bwallpaper pack\b/i,
        /\bsoundtrack\b/i,
        /\bost\b/i,
        /\bupdate\s*\d+\b/i,
        /\bfield trip\b/i,
        /\bcreepy red\b/i,
        /\bradical red\b/i,
        /\bmeta fire\s?red\b/i,
        /\bace ?dragon\b/i,

      ];

      const STRICT_GAME_FRANCHISE_LIMITS = {
        fortnite: 2,
        overwatch: 2,
        undertale: 1
      };

      function normalizeSearchCanonicalTitleKey(value) {
        return normalizeFranchiseTitleKey(value)
          .replace(/\bversion\b/g, ' ')
          .replace(/\bedition\b/g, ' ')
          .replace(/\bstandard\b/g, ' ')
          .replace(/\bultimate\b/g, ' ')
          .replace(/\bdefinitive\b/g, ' ')
          .replace(/\bdeluxe\b/g, ' ')
          .replace(/\bgame of the year\b/g, ' ')
          .replace(/\bgoty\b/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function isLikelyUnofficialSearchResult(row, query = '') {
        const title = normalizeFranchiseTitleKey(row?.title || row?.name || row?.slug || '');
        const queryKey = normalizeFranchiseTitleKey(query);
        if (!title) return false;
        if (!queryKey || !title.includes(queryKey)) return false;
        if (SEARCH_UNOFFICIAL_TOKENS.some((token) => title.includes(token))) return true;
        if (title.includes(`${queryKey} s `) || title.includes(`${queryKey}s `)) return true;
        if (/[[(][^)]+[)\]]/.test(String(row?.title || '')) && !String(row?.source || '').toLowerCase().includes('wikipedia')) return true;
        return false;
      }

      function isLikelyRealGameRow(row) {
        const title = String(row?.title || row?.name || row?.slug || '').trim();
        if (!title) return false;
        if (UNOFFICIAL_GAME_PATTERNS.some((pattern) => pattern.test(title))) return false;
        const importedFrom = getGameImportedFrom(row);
        if (/[[(][^)]+[)\]]/.test(title) && importedFrom.includes('rawg')) return false;
        return true;
      }

      function getStrictGameFranchiseKey(row) {
        const titleKey = normalizeFranchiseTitleKey(row?.title || row?.name || row?.slug || '');
        if (!titleKey) return '';
        if (titleKey === 'fortnite' || titleKey.startsWith('fortnite ')) return 'fortnite';
        if (titleKey === 'overwatch' || titleKey.startsWith('overwatch ')) return 'overwatch';
        if (titleKey === 'undertale' || titleKey.startsWith('undertale ')) return 'undertale';
        return '';
      }

      function isAllowedStrictGameFranchiseRow(row, franchiseKey) {
        const titleKey = normalizeFranchiseTitleKey(row?.title || row?.name || row?.slug || '');
        if (!titleKey || !franchiseKey) return true;
        if (franchiseKey === 'fortnite') return titleKey === 'fortnite' || titleKey === 'fortnite battle royale';
        if (franchiseKey === 'undertale') return titleKey === 'undertale';
        if (franchiseKey === 'overwatch') return titleKey === 'overwatch' || titleKey === 'overwatch 2';
        return true;
      }

      function getStrictGameVariantKey(row, franchiseKey) {
        const titleKey = normalizeFranchiseTitleKey(row?.title || row?.name || row?.slug || '');
        if (franchiseKey === 'overwatch') return /\boverwatch 2\b/.test(titleKey) ? '2' : '1';
        return 'base';
      }

      function getStrictGameQueryKey(query = '') {
        const normalized = normalizeFranchiseTitleKey(query);
        if (normalized === 'fortnite') return 'fortnite';
        if (normalized === 'overwatch' || normalized === 'overwatch 2') return 'overwatch';
        if (normalized === 'undertale') return 'undertale';
        return '';
      }

      function matchesStrictGameQuery(row, query = '') {
        const strictKey = getStrictGameQueryKey(query);
        if (!strictKey) return true;
        return isAllowedStrictGameFranchiseRow(row, strictKey) && getStrictGameFranchiseKey(row) === strictKey;
      }

      function applyStrictGameFranchiseLimits(rows = [], query = '') {
        const list = Array.isArray(rows) ? rows.filter(Boolean) : [];
        if (!list.length) return [];
        const ordered = query
          ? list.slice().sort((a, b) => scoreSearchResultRow(b, query) - scoreSearchResultRow(a, query))
          : sortGamesPosterFirst(list);
        const kept = [];
        const counts = new Map();
        const seenVariants = new Set();
        ordered.forEach((row) => {
          const franchiseKey = getStrictGameFranchiseKey(row);
          if (!franchiseKey) {
            kept.push(row);
            return;
          }
          if (!isAllowedStrictGameFranchiseRow(row, franchiseKey)) return;
          const variantKey = `${franchiseKey}::${getStrictGameVariantKey(row, franchiseKey)}`;
          if (seenVariants.has(variantKey)) return;
          const currentCount = Number(counts.get(franchiseKey) || 0);
          const limit = Number(STRICT_GAME_FRANCHISE_LIMITS[franchiseKey] || 1);
          if (currentCount >= limit) return;
          counts.set(franchiseKey, currentCount + 1);
          seenVariants.add(variantKey);
          kept.push(row);
        });
        return kept;
      }

      function scoreSearchResultRow(row, query = '') {
        const title = String(row?.title || row?.name || row?.slug || '').trim();
        const titleKey = normalizeSearchCanonicalTitleKey(title);
        const queryKey = normalizeSearchCanonicalTitleKey(query);
        let score = scoreSearchMatch(title, query);
        if (queryKey && titleKey === queryKey) score += 1200;
        if (queryKey && titleKey.startsWith(`${queryKey} `)) {
          const suffix = titleKey.slice(queryKey.length).trim();
          if (!suffix || SEARCH_TITLE_SUFFIX_NOISE.has(suffix)) score += 700;
        }
        if (hasPosterOfficialGameCover(row)) score += 260;
        if (/\/game-assets\/covers\//.test(normalizeGameImageUrl(row?.cover_url))) score += 120;
        if (isOfficialGameProviderRow(row)) score += 80;
        if (isLikelyUnofficialSearchResult(row, query)) score -= 2000;
        score += Math.min(Number(row?.rating_count || 0), 5000) / 50;
        return score;
      }

      function buildSearchDedupKey(row, query = '') {
        const title = String(row?.title || row?.name || row?.slug || '').trim();
        const canonicalTitle = normalizeSearchCanonicalTitleKey(title);
        const queryKey = normalizeSearchCanonicalTitleKey(query);
        if (!canonicalTitle) return '';
        if (queryKey && (canonicalTitle === queryKey || canonicalTitle.startsWith(`${queryKey} `))) {
          const suffix = canonicalTitle.slice(queryKey.length).trim();
          if (!suffix || SEARCH_TITLE_SUFFIX_NOISE.has(suffix)) return `${queryKey}::query`;
        }
        return canonicalTitle;
      }

      function dedupeSearchResults(rows = [], query = '') {
        const list = Array.isArray(rows) ? rows.filter(Boolean) : [];
        if (!query) return applyStrictGameFranchiseLimits(dedupeRowsByTitleEdition(list));
        const grouped = new Map();
        list.forEach((row) => {
          const key = buildSearchDedupKey(row, query) || buildTitleEditionKey(row) || String(row?.id || '');
          if (!key) return;
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(row);
        });
        return applyStrictGameFranchiseLimits(Array.from(grouped.values()).map((group) => {
          return group.slice().sort((a, b) => scoreSearchResultRow(b, query) - scoreSearchResultRow(a, query))[0];
        }).filter(Boolean), query);
      }

      function scoreSearchMatch(title, query) {
        const cleanTitle = normalizeTitleKey(title);
        const cleanQuery = normalizeTitleKey(query);
        const franchiseTitle = normalizeFranchiseTitleKey(title);
        const franchiseQuery = normalizeFranchiseTitleKey(query);
        if (!cleanTitle || !cleanQuery) return 0;
        let score = 0;
        if (cleanTitle === cleanQuery) score += 1000;
        if (franchiseQuery && franchiseTitle === franchiseQuery) score += 950;
        if (cleanTitle.startsWith(cleanQuery)) score += 700;
        if (franchiseQuery && franchiseTitle.startsWith(franchiseQuery)) score += 650;
        if (cleanTitle.includes(cleanQuery)) score += 400;
        if (franchiseQuery && franchiseTitle.includes(franchiseQuery)) score += 320;
        const compactTitle = cleanTitle.replace(/\s+/g, '');
        const compactQuery = cleanQuery.replace(/\s+/g, '');
        if (compactTitle === compactQuery) score += 260;
        if (compactTitle.startsWith(compactQuery)) score += 220;
        const titleTokens = splitTitleTokens(cleanTitle);
        const queryTokens = splitTitleTokens(cleanQuery);
        const tokenHits = queryTokens.filter((token) => titleTokens.some((titleToken) => tokenMatchesQuery(titleToken, token))).length;
        score += tokenHits * 90;
        if (queryTokens.length && tokenHits === queryTokens.length) score += 180;
        if (queryTokens.length === 1) {
          const acronym = buildAcronym(titleTokens);
          if (acronym && acronym === compactQuery) score += 140;
        }
        return score;
      }

      function sortSearchResults(rows = [], query = '') {
        const cleanQuery = String(query || '').trim().toLowerCase();
        if (!cleanQuery) return sortGamesPosterFirst(rows);
        const list = Array.isArray(rows) ? rows.slice() : [];
        return list.sort((a, b) => {
          const aTitle = String(a?.title || a?.name || a?.slug || '').trim();
          const bTitle = String(b?.title || b?.name || b?.slug || '').trim();
          const scoreDiff = scoreSearchResultRow(b, cleanQuery) - scoreSearchResultRow(a, cleanQuery);
          if (scoreDiff !== 0) return scoreDiff;
          const countDiff = Number(b?.rating_count || 0) - Number(a?.rating_count || 0);
          if (countDiff !== 0) return countDiff;
          const dateDiff = String(b?.release_date || '').localeCompare(String(a?.release_date || ''));
          if (dateDiff !== 0) return dateDiff;
          const aRating = Number(a?.rating || 0);
          const bRating = Number(b?.rating || 0);
          if (Number.isFinite(aRating) && Number.isFinite(bRating) && aRating !== bRating) {
            return bRating - aRating;
          }
          return aTitle.localeCompare(bTitle);
        });
      }

      const SEARCH_ALIASES = {
        mario: 'super mario mario kart mario party paper mario mario tennis mario golf mario vs donkey kong',
        mariokart: 'mario kart',
        marioparty: 'mario party',
        pokemon: 'pokemon',
        ['pok' + '\u00e9' + 'mon']: 'pokemon',
        spiderman: 'spider man',
        gta: 'grand theft auto',
        gtav: 'grand theft auto v',
        gtas: 'grand theft auto san andreas',
        cod: 'call of duty',
        cs: 'counter strike',
        cs2: 'counter strike 2',
        csgo: 'counter strike global offensive',
        lol: 'league of legends',
        tlou: 'the last of us',
        tloz: 'the legend of zelda',
        r6: 'rainbow six',
        mk: 'mortal kombat',
        ac: 'assassins creed'
      };

      function getSearchFallbackQueries(query) {
        const raw = String(query || '').trim();
        if (!raw) return [];
        const normalized = normalizeTitleKey(raw);
        const compact = normalized.replace(/\s+/g, '');
        const variants = new Set();
        const alias = SEARCH_ALIASES[normalized] || SEARCH_ALIASES[compact] || '';
        if (alias && alias !== raw) variants.add(alias);
        if (normalized && normalized !== raw) variants.add(normalized);
        if (compact && compact !== normalized && compact !== raw) variants.add(compact);
        return [...variants].filter(Boolean);
      }

      function getSearchSupplementKey(query, activeGenre, year) {
        return [String(query || '').trim().toLowerCase(), String(activeGenre || '').trim().toLowerCase(), String(year || '').trim()].join('::');
      }

      async function fetchSearchSupplementGames(query, activeGenre = '', year = '') {
        if (!supabaseClient) return [];
        const rawQuery = String(query || '').trim();
        if (!rawQuery) return [];
        const cacheKey = getSearchSupplementKey(rawQuery, activeGenre, year);
        if (state.searchSupplementCache.has(cacheKey)) {
          return state.searchSupplementCache.get(cacheKey) || [];
        }
        const variants = [rawQuery, ...getSearchFallbackQueries(rawQuery)]
          .map((value) => String(value || '').trim())
          .filter(Boolean);
        const seenVariants = new Set();
        const uniqueVariants = variants.filter((value) => {
          const key = normalizeTitleKey(value);
          if (!key || seenVariants.has(key)) return false;
          seenVariants.add(key);
          return true;
        });
        const termQueue = [];
        uniqueVariants.slice(0, 2).forEach((variant) => {
          [variant, normalizeTitleKey(variant), normalizeFranchiseTitleKey(variant)]
            .map((value) => String(value || '').trim())
            .filter((value, index, array) => value && array.indexOf(value) === index)
            .slice(0, 2)
            .forEach((term) => {
              const escaped = term.replace(/[%_,]/g, ' ').trim();
              if (!escaped || termQueue.includes(escaped)) return;
              termQueue.push(escaped);
            });
        });
        const settled = await Promise.allSettled(termQueue.slice(0, 3).map(async (escaped) => {
          let queryBuilder = supabaseClient
            .from('games')
            .select('id,title,description,cover_url,hero_url,release_date,rating,rating_count,extra,source,slug')
            .or(`title.ilike.%${escaped}%,slug.ilike.%${escaped}%`)
            .order('rating_count', { ascending: false, nullsFirst: false })
            .order('rating', { ascending: false, nullsFirst: false })
            .order('release_date', { ascending: false, nullsFirst: false })
            .range(0, 119);
          if (year) {
            queryBuilder = queryBuilder.gte('release_date', `${year}-01-01`).lte('release_date', `${year}-12-31`);
          }
          const { data, error } = await queryBuilder;
          if (error || !Array.isArray(data)) return [];
          return data;
        }));
        const allRows = [];
        settled.forEach((result) => {
          if (result.status !== 'fulfilled' || !Array.isArray(result.value)) return;
          allRows.push(...result.value);
        });
        const filtered = filterCatalogGames(dedupeSearchResults(allRows, rawQuery));
        state.searchSupplementCache.set(cacheKey, filtered);
        return filtered;
      }

      async function fetchTargetedSearchPage(pageSize) {
        const query = String(state.query || '').trim();
        if (!query) return null;
        let supplement = await fetchSearchSupplementGames(query, state.activeGenre, state.year);
        if (supplement.length < Math.max(pageSize * 3, 60)) {
          const ready = state.catalogLoadedAll;
          if (ready) {
            const catalogMatches = filterCatalogGames(state.catalog);
            supplement = dedupeSearchResults([...supplement, ...catalogMatches], query);
          } else {
            void ensureGamesCatalogLoaded().catch(() => false);
          }
        }
        if (!supplement.length) {
          return {
            rows: [],
            count: 0,
            source: 'supabase-search'
          };
        }
        const ranked = sortSearchResults(dedupeSearchResults(supplement, query), query);
        const start = (Math.max(1, Number(state.page || 1)) - 1) * pageSize;
        return {
          rows: ranked.slice(start, start + pageSize),
          count: ranked.length,
          source: 'supabase-search'
        };
      }
      function mapIgdbRowToCatalog(row) {
        if (!row) return null;
        const id = Number(row?.id || 0);
        if (!Number.isFinite(id) || id <= 0) return null;
        const title = String(row?.name || row?.title || row?.slug || 'Game').trim() || 'Game';
        const released = row?.released ? String(row.released).slice(0, 10) : '';
        const rating = Number(row?.rating || 0);
        const cover = resolveGameImageSource(row);
        const hero = resolveGameHeroSource(row, cover);
        return {
          id,
          title,
          description: String(row?.description || row?.summary || '').trim(),
          cover_url: cover,
          hero_url: hero || cover,
          release_date: released,
          rating: Number.isFinite(rating) ? rating : null,
          rating_count: Number(row?.ratings_count || row?.rating_count || 0),
          slug: String(row?.slug || '').trim(),
          source: String(row?.source || 'igdb').trim(),
          extra: {
            genres: Array.isArray(row?.genres) ? row.genres : [],
            platforms: Array.isArray(row?.platforms)
              ? row.platforms.map((entry) => entry?.platform?.name || entry?.name).filter(Boolean)
              : []
          }
        };
      }

          }, requestOptions);

      function buildGenreCatalog() {
        const bySlug = new Map();
        state.catalog.forEach((item) => {
          normalizeGameGenres(item?.extra).forEach((genre) => {
            if (!bySlug.has(genre.slug)) bySlug.set(genre.slug, genre);

      function populateGenreSelect() {
        const select = document.getElementById('genreSelect');
        if (!select) return;
        const previous = state.activeGenre;
        select.innerHTML = '<option value="">All Genres</option>';
        state.genres.forEach((genre) => {

      const GENRE_CACHE_KEY = 'zo2y_game_genres_cache_v3';
      const GENRE_CACHE_TTL_MS = 1000 * 60 * 60 * 12;
      const GAMES_PAGE_CACHE_KEY = 'zo2y_games_featured_pages_cache_v1';
      const GAMES_PAGE_CACHE_TTL_MS = 1000 * 60 * 20;
      const POPULAR_GAMES_LOAD_SEED = (() => {
        try {
          if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
            const seedBuffer = new Uint32Array(1);
            window.crypto.getRandomValues(seedBuffer);
            return Number(seedBuffer[0] || 0) >>> 0;
          }
        } catch (_err) {}
        return ((Date.now() & 0xffffffff) ^ Math.floor(Math.random() * 0xffffffff)) >>> 0;
      })();

      function mulberry32(seed) {
        let a = Number(seed || 0) || 0;
        return function () {
          a |= 0;
          a = (a + 0x6D2B79F5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function shuffleInPlace(list, rand) {
        const arr = Array.isArray(list) ? list : [];
        const r = typeof rand === 'function' ? rand : Math.random;
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(r() * (i + 1));
          const tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      function shufflePopularGamesPool(rows, pageSize) {
        const pool = Array.isArray(rows) ? rows.slice() : [];
        const size = Math.max(1, Number(pageSize || 20)) || 20;
        if (pool.length <= size) return pool;

        const rand = mulberry32(POPULAR_GAMES_LOAD_SEED);
        const tiers = [
          Math.min(pool.length, Math.max(16, Math.floor(size * 1.25))),
          Math.min(pool.length, Math.max(48, Math.floor(size * 3))),
          Math.min(pool.length, Math.max(96, Math.floor(size * 5)))
        ];

        const out = [];
        let cursor = 0;
        tiers.forEach((end) => {
          if (end <= cursor) return;
          const chunk = pool.slice(cursor, end);
          shuffleInPlace(chunk, rand);
          out.push(...chunk);
          cursor = end;
        });
        if (cursor < pool.length) out.push(...pool.slice(cursor));
        return out;
      }

      function readCachedGenres() {
        try {
          const raw = localStorage.getItem(GENRE_CACHE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.items)) return null;
          if (Number(parsed.savedAt || 0) + GENRE_CACHE_TTL_MS < Date.now()) return null;
          return parsed.items;
        } catch (_err) {
          return null;
        }
      }

      function writeCachedGenres(items) {
        try {
          if (!Array.isArray(items) || !items.length) return;
          localStorage.setItem(GENRE_CACHE_KEY, JSON.stringify({
            savedAt: Date.now(),
            items
          }));
        } catch (_err) {}
      }

      function isPopularGamesBrowseState() {
        return !state.query && !state.activeGenre && !state.year && !state.platform;
      }

      function readCachedGamePages() {
        try {
          const raw = localStorage.getItem(GAMES_PAGE_CACHE_KEY);
          const parsed = raw ? JSON.parse(raw) : null;
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_err) {
          return {};
        }
      }

      function writeCachedGamePages(pages) {
        try {
          localStorage.setItem(GAMES_PAGE_CACHE_KEY, JSON.stringify(pages || {}));
        } catch (_err) {}
      }

      function readCachedFeaturedGamesPage(page) {
        const key = String(Math.max(1, Number(page || 1)));
        const pages = readCachedGamePages();
        const entry = pages?.[key];
        if (!entry || !Array.isArray(entry.rows) || !entry.rows.length) return null;
        const cachedAt = Number(entry.cachedAt || 0) || 0;
        if (!cachedAt || (cachedAt + GAMES_PAGE_CACHE_TTL_MS) < Date.now()) return null;
        return {
          rows: entry.rows.filter(Boolean),
          count: Number(entry.count || entry.rows.length) || entry.rows.length,
          source: 'supabase-fast-cache',
          cachedAt
        };
      }

      function writeCachedFeaturedGamesPage(page, payload) {
        const rows = Array.isArray(payload?.rows) ? payload.rows.filter(Boolean) : [];
        if (!rows.length) return;
        const key = String(Math.max(1, Number(page || 1)));
        const pages = readCachedGamePages();
        pages[key] = {
          rows,
          count: Number(payload?.count || rows.length) || rows.length,
          cachedAt: Date.now()
        };
        writeCachedGamePages(pages);
      }

      async function loadGenreCatalog() {
        try {
          const cached = readCachedGenres();
          if (cached) {
            state.genres = cached;
            populateGenreSelect();
            return true;
          }
          const ready = await ensureGamesCatalogLoaded();
          if (!ready) return false;
          writeCachedGenres(state.genres);
          return state.genres.length > 0;
        } catch (_err) {
          return false;
        }
      }

      async function ensureGamesCatalogLoaded(force = false) {
        if (state.catalogLoadedAll && state.catalog.length && !force) return true;
        if (catalogLoadPromise && !force) return catalogLoadPromise;
        const task = (async () => {
          let rows = [];
          if (supabaseClient) {
            const pageSize = 1000;
            let from = 0;
            while (true) {
              const { data, error } = await supabaseClient
                .from('games')
                .select('id,title,description,cover_url,hero_url,release_date,rating,rating_count,extra,source,slug')
                .order('rating', { ascending: false, nullsFirst: false })
                .order('rating_count', { ascending: false, nullsFirst: false })
                .order('release_date', { ascending: false, nullsFirst: false })
                .range(from, from + pageSize - 1);
              if (error || !Array.isArray(data) || !data.length) break;
              rows.push(...data);
              if (data.length < pageSize) break;
              from += data.length;
            }
            rows = sortGamesPosterFirst(dedupeRowsById(rows));
          }

          if (rows.length) {
            state.catalog = rows;
            state.catalogLoadedAll = true;
            state.catalogSource = 'supabase';
            buildGenreCatalog();
            populateGenreSelect();
            return true;
          }

          state.catalog = [];
          state.catalogLoadedAll = false;
          return false;
        })();
        if (!force) catalogLoadPromise = task;
        try {
          return await task;
        } finally {
          if (catalogLoadPromise === task) catalogLoadPromise = null;
        }
      }

      function queueCatalogRefreshForActiveSearch(querySnapshot = '') {
        const snapshot = normalizeTitleKey(querySnapshot);
        if (!snapshot || state.catalogLoadedAll) return;
        void ensureGamesCatalogLoaded().then((ready) => {
          if (!ready) return false;
          if (normalizeTitleKey(state.query || '') !== snapshot) return false;
          loadGames();
          return true;
        }).catch(() => false);
      }

      function hasRenderableGameArt(item) {
        const cover = resolveGameImageSource(item);
        return Boolean(cover && cover !== IGDB_FALLBACK_IMAGE && !cover.includes('/newlogo.webp'));
      }

      async function fetchFastFeaturedGamesPage(pageSize) {
        if (!supabaseClient) return null;
        const page = Math.max(1, Number(state.page || 1));
        const featuredPoolTarget = Math.max(100, pageSize * 4);
        const from = (page - 1) * featuredPoolTarget;
        const chunkSize = Math.max(60, Math.ceil(featuredPoolTarget / 2), pageSize * 3, 24);
        let cursor = from;
        let count = 0;
        const collected = [];
        for (let attempt = 0; attempt < 4 && collected.length < featuredPoolTarget; attempt += 1) {
          const { data, error, count: totalCount } = await supabaseClient
            .from('games')
            .select('id,title,description,cover_url,hero_url,release_date,rating,rating_count,extra,source,slug', { count: 'exact' })
            .order('rating_count', { ascending: false, nullsFirst: false })
            .order('rating', { ascending: false, nullsFirst: false })
            .order('release_date', { ascending: false, nullsFirst: false })
            .range(cursor, cursor + chunkSize - 1);
          if (error || !Array.isArray(data) || !data.length) break;
          count = Number(totalCount || count || 0);
          data.forEach((row) => {
            const title = String(row?.title || row?.name || row?.slug || '').trim();
            if (!title) return;
            collected.push(row);
          });
          if (data.length < chunkSize) break;
          cursor += data.length;
        }
        const deduped = dedupeRowsById(collected).slice(0, featuredPoolTarget);
        if (!deduped.length) return null;
        const payload = {
          rows: deduped.slice(0, featuredPoolTarget),
          count: Number(count || deduped.length),
          source: 'supabase-fast'
        };
        writeCachedFeaturedGamesPage(page, payload);
        return payload;
      }

      async function fetchLocalGamesPage(pageSize) {
        if (!supabaseClient) return null;
        if (state.query) {
          const currentQuery = String(state.query || '').trim();
          if (state.catalogLoadedAll && Array.isArray(state.catalog) && state.catalog.length) {
            const localResults = filterCatalogGames(state.catalog);
            if (localResults.length >= Math.max(1, pageSize) || String(state.query || '').trim().length < 3) {
              const start = (Math.max(1, Number(state.page || 1)) - 1) * pageSize;
              void fetchSearchSupplementGames(state.query, state.activeGenre, state.year).catch(() => []);
              return {
                rows: localResults.slice(start, start + pageSize),
                count: localResults.length,
                source: 'supabase-catalog-cache'
              };
            }
          }
          const targeted = await fetchTargetedSearchPage(pageSize);
          if (targeted) {
            queueCatalogRefreshForActiveSearch(currentQuery);
            return targeted;
          }
        }
        if (Math.max(1, Number(state.page || 1)) === 1 && !state.query && !state.activeGenre && !state.year && !state.platform) {
          const fast = await fetchFastFeaturedGamesPage(pageSize);
          if (fast?.rows?.length) return fast;
        }
        const ready = await ensureGamesCatalogLoaded();
        if (!ready) return null;
        const query = String(state.query || '').trim();
        let workingSet = Array.isArray(state.catalog) ? state.catalog.slice() : [];
        if (query) {
          const supplement = await fetchSearchSupplementGames(query, state.activeGenre, state.year);
          if (supplement.length) {
            workingSet = dedupeSearchResults([...supplement, ...workingSet], query);
          }
        }
        const filtered = filterCatalogGames(dedupeSearchResults(workingSet, query));
        const ranked = query ? sortSearchResults(filtered, query) : filtered;
        const start = (Math.max(1, Number(state.page || 1)) - 1) * pageSize;
        return {
          rows: ranked.slice(start, start + pageSize),
          count: ranked.length,
          source: 'supabase'
        };
      }

      function isPosterOfficialGameRow(row) {
        const cover = normalizeGameImageUrl(row?.cover_url || row?.cover?.url || row?.cover);
        if (!cover || !/\/covers-official\//.test(cover)) return false;
        return Boolean(row?.extra?.official_cover_is_poster);
      }

      function scoreResolvedGameCover(row) {
        const directCover = normalizeGameImageUrl(row?.cover_url || row?.cover?.url || row?.cover);
        const resolvedCover = resolveGameImageSource(row);
        if (!resolvedCover) return Number.NEGATIVE_INFINITY;
        let score = 0;
        if (hasPosterOfficialGameCover(row) || isPosterOfficialGameRow(row)) score += 900;
        if (/\/game-assets\/covers\//.test(resolvedCover)) score += 420;
        if (/\/game-assets\/covers-official\//.test(resolvedCover)) score += 520;
        if (/wikimedia|wikipedia/.test(resolvedCover)) score += 340;
        if (/igdb|images\.igdb\.com/.test(resolvedCover)) score += 240;
        if (/rawg|media\.rawg/.test(resolvedCover)) score += 120;
        if (directCover && resolvedCover === directCover) score += 110;
        if (isLikelyPosterGameUrl(resolvedCover)) score += 180;
        if (isLikelyBackdropGameUrl(resolvedCover)) score -= 700;
        if (isLikelyLogoOnlyGameArt(resolvedCover)) score -= 160;
        return score;
      }

      function sortGamesPosterFirst(rows) {
        const list = Array.isArray(rows) ? rows.slice() : [];
        return list.sort((a, b) => {
          const coverDiff = scoreResolvedGameCover(b) - scoreResolvedGameCover(a);
          if (coverDiff !== 0) return coverDiff;
          const aPoster = isPosterOfficialGameRow(a) ? 1 : 0;
          const bPoster = isPosterOfficialGameRow(b) ? 1 : 0;
          if (bPoster !== aPoster) return bPoster - aPoster;
          const dateDiff = String(b?.release_date || '').localeCompare(String(a?.release_date || ''));
          if (dateDiff !== 0) return dateDiff;
          const countDiff = Number(b?.rating_count || 0) - Number(a?.rating_count || 0);
          if (countDiff !== 0) return countDiff;
          const ratingDiff = Number(b?.rating || 0) - Number(a?.rating || 0);
          if (ratingDiff !== 0) return ratingDiff;
          return String(a?.title || '').localeCompare(String(b?.title || ''));
        });
      }

      function filterCatalogGames(catalogOverride) {
        const catalog = Array.isArray(catalogOverride) ? catalogOverride : state.catalog;
        const query = String(state.query || '').trim();
        const activeGenre = String(state.activeGenre || '').trim().toLowerCase();
        const year = String(state.year || '').trim();
        const platform = String(state.platform || '').trim().toLowerCase();
        const filtered = catalog.filter((item) => {
          const title = String(item?.title || '').trim();
          if (!title) return false;

          if (!isLikelyRealGameRow(item)) return false;
          if (!matchesStrictGameQuery(item, query)) return false;

          if (query) {
            if (!titleMatchesQuery(title, query)) return false;
            if (isLikelyUnofficialSearchResult(item, query)) return false;
          }

          if (activeGenre) {
            const genres = normalizeGameGenres(item?.extra);
            if (!genres.some((genre) => genre.slug === activeGenre)) return false;
          }

          if (year) {
            const releaseYear = String(item?.release_date || '').slice(0, 4);
            if (releaseYear !== year) return false;
          }
          if (platform) {
            const platforms = Array.isArray(item?.extra?.platforms) ? item.extra.platforms : [];
            if (!platforms.some((entry) => String(entry || '').trim().toLowerCase().includes(platform))) {
              return false;
            }
          }
          return true;
        });
        const deduped = query ? dedupeSearchResults(filtered, query) : applyStrictGameFranchiseLimits(dedupeRowsByTitleEdition(filtered));
        return query ? sortSearchResults(deduped, query) : sortGamesPosterFirst(deduped);
      }

      let pageSpotlightTimer = null;
      let pageSpotlightItems = [];
      let pageSpotlightIndex = 0;

      function pickGameSpotlightPool(items = []) {
        const seen = new Set();
        return (Array.isArray(items) ? items : []).filter((item) => {
          const key = String(item?.slug || item?.title || item?.id || '').trim().toLowerCase();
          const cover = resolveGameImageSource(item);
          if (!key || !cover || seen.has(key)) return false;
          seen.add(key);
          return true;
        }).slice(0, 12);
      }

      function renderGamePageSpotlight(item) {
