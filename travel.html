  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --card-2: #172b58;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --white: #fff;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: var(--bg); color: var(--white); font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { margin: 0; padding: 0 12px 18px; overflow-y: scroll; }
    a { color: inherit; text-decoration: none; }

    .hero {
      max-width: 1200px;
      margin: 12px auto 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(23,43,88,0.9), rgba(19,35,71,0.95));
      position: relative;
      overflow: hidden;
      padding: 18px;
      min-height: 260px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(240px, 360px);
      gap: 16px;
      isolation: isolate;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(104deg, rgba(6, 13, 28, 0.88) 0%, rgba(8, 16, 35, 0.62) 44%, rgba(13, 25, 52, 0.18) 100%),
        radial-gradient(circle at 88% 18%, rgba(34,211,238,0.18), transparent 28%),
        radial-gradient(circle at 74% 78%, rgba(34,197,94,0.16), transparent 24%);
      z-index: -1;
    }
    .hero-backdrop {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(9, 20, 44, 0.36), rgba(9, 20, 44, 0.72)),
        var(--hero-bg-image, linear-gradient(160deg, rgba(23,43,88,0.9), rgba(19,35,71,0.95)));
      background-size: cover;
      background-position: center center;
      transform: scale(1.03);
      z-index: -2;
    }
    .hero-copy {
      position: relative;
      z-index: 1;
      align-self: end;
      max-width: 620px;
    }
    .hero h1 { margin: 0 0 6px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; }
    .hero-note { margin-top: 8px; font-size: 12px; color: var(--muted); opacity: 0.86; }
    .hero-note a { color: var(--accent); }

    .hero-spotlight {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      align-self: stretch;
      align-content: end;
    }
    .hero-spotlight-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(8, 16, 35, 0.52);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(4, 10, 24, 0.18);
    }
    .hero-spotlight-card:first-child {
      background: rgba(8, 16, 35, 0.62);
      border-color: rgba(245, 158, 11, 0.34);
    }
    .hero-spotlight-thumb {
      width: 58px;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(16, 34, 74, 0.86);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .hero-spotlight-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-spotlight-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #cbd5e1;
    }
    .hero-spotlight-title { font-size: 15px; font-weight: 700; line-height: 1.2; color: #fff; }
    .hero-spotlight-meta { margin-top: 4px; font-size: 12px; color: var(--muted); line-height: 1.3; }
    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; min-height: 0; }
      .hero-spotlight { display: none !important; }
    }

    .controls {
      max-width: 1200px;
      margin: 12px auto 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px 56px;
      gap: 12px;
    }
    .controls input, .controls select {
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #10224a;
      color: #fff;
      padding: 0 18px;
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }
    .controls button {
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      color: #0b1633;
      padding: 0;
      cursor: pointer;
    }
    .control-icon-btn {
      width: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .control-modal {
      position: fixed;
      inset: 0;
      z-index: 1700;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(6, 12, 28, 0.72);
      backdrop-filter: blur(4px);
    }
    .control-modal.show { display: flex; }
    .control-modal-card {
      width: min(480px, 100%);
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(19, 35, 71, 0.98), rgba(11, 23, 50, 0.98));
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
      padding: 16px;
    }
    .control-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .control-modal-title { font-size: 18px; font-weight: 800; }
    .control-modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #fff; cursor: pointer;
    }
    .control-modal-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .control-modal-grid select,
    .control-modal-action {
      width: 100%; height: 48px; border-radius: 14px;
      border: 1px solid var(--border);
      background: #10224a; color: #fff; padding: 0 14px; font-size: 14px;
    }
    .control-modal-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--card);
      color: #fff;
      cursor: pointer;
    }

    .shell { max-width: 1200px; margin: 12px auto 0; padding: 12px; min-height: 220px; border: 1px solid var(--border); border-radius: 14px; background: linear-gradient(160deg, rgba(23,43,88,0.9), rgba(19,35,71,0.95)); }

    .travel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .travel-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0f2147;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.15s;
    }
    .travel-card:hover {
      border-color: rgba(245,158,11,0.4);
      transform: translateY(-2px);
    }

    .travel-card-media {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #10224a;
      overflow: hidden;
      position: relative;
    }
    .travel-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .travel-card-media-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(245,158,11,0.15), transparent 50%),
        linear-gradient(160deg, rgba(23,43,88,0.96), rgba(11,22,51,0.98));
      color: var(--muted);
      font-size: 32px;
    }

    .travel-card-content { padding: 12px; display: grid; gap: 8px; flex: 1; }
    .travel-card-header { display: flex; align-items: center; gap: 6px; }
    .travel-card-flag-icon { width: 22px; height: 16px; border-radius: 3px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15); }
    .travel-card-name { font-size: 17px; font-weight: 700; line-height: 1.25; margin: 0; flex: 1; min-width: 0; }
    .travel-card-menu-btn {
      width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #dce8ff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .travel-card-menu-btn:hover { border-color: var(--accent); color: var(--accent); }
    .travel-card-code { font-size: 11px; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }

    .travel-card-details { display: grid; gap: 6px; }
    .travel-card-detail { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #dce8ff; }
    .travel-card-icon { width: 16px; color: var(--accent); font-size: 12px; text-align: center; }

    .travel-card-cities { margin-top: 4px; }
    .travel-card-cities-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .travel-card-cities-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .travel-card-city {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #bfdbfe;
    }

    .travel-card-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 12px 12px;
    }
    .travel-card-save-btn, .travel-card-view-btn {
      padding: 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .travel-card-save-btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--white);
    }
    .travel-card-save-btn:hover { border-color: var(--accent); color: var(--accent); }
    .travel-card-view-btn {
      border: 1px solid rgba(245,158,11,0.3);
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(255,184,77,0.1));
      color: var(--accent);
    }
    .travel-card-view-btn:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(255,184,77,0.2)); }

    .travel-empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .travel-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .travel-empty-state h3 { margin: 0 0 6px; font-size: 18px; color: var(--white); }
    .travel-empty-state p { margin: 0; font-size: 14px; }

    .pagination {
      max-width: 1200px;
      margin: 12px auto 0;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .page-btn {
      min-width: 44px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-info { color: var(--muted); font-size: 13px; }

    .travel-toast {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      z-index: 9999;
    }
    .travel-toast.ok { background: #10b981; }
    .travel-toast.err { background: #ef4444; }

    @media (max-width: 760px) {
      .controls { grid-template-columns: minmax(0, 1fr) 52px 52px; gap: 10px; }
      .controls input, .controls button { height: 52px; font-size: 16px; }
      .travel-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .travel-card-name { font-size: 15px; }
    }
  </style>

<body>

  <section class="hero" id="travelHero">
    <div class="hero-backdrop" id="travelHeroBackdrop" aria-hidden="true"></div>
    <div class="hero-copy">
      <h1><i class="fa-solid fa-earth-americas"></i> popular destinations right now</h1>
      <p>Browse live travel picks ranked by recent global attention, then save them to your lists.</p>
      <div class="hero-note">sources: Wikimedia Pageviews, Wikimedia Commons, and REST Countries. <a href="credits.html">all credits</a></div>
    </div>
    <div class="hero-spotlight" id="travelHeroSpotlight" aria-label="featured destinations"></div>
  </section>

  <section class="controls">
    <input id="q" class="search-input" placeholder="Search countries, capitals, regions...">
    <button id="travelSearchBtn" class="control-icon-btn" type="button" aria-label="Search countries"><i class="fas fa-search"></i></button>
    <button id="travelFilterBtn" class="control-icon-btn" type="button" aria-label="Open travel filters"><i class="fas fa-sliders-h"></i></button>
  </section>

  <div class="control-modal" id="travelFilterModal" aria-hidden="true">
    <div class="control-modal-card">
      <div class="control-modal-head">
        <div class="control-modal-title">Filter destinations</div>
        <button class="control-modal-close" id="travelFilterCloseBtn" type="button" aria-label="Close travel filters">&times;</button>
      </div>
      <div class="control-modal-grid">
        <select id="region"><option value="">All Regions</option></select>
        <select id="travelSort">
          <option value="popular">popular right now</option>
          <option value="name">Name A-Z</option>
          <option value="region">Region</option>
        </select>
        <button id="travelRefresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Refresh</button>
      </div>
    </div>
  </div>

  <section class="shell">
    <div id="grid" class="travel-grid"></div>
    <div id="empty" class="travel-empty-state" style="display:none;">
      <div class="travel-empty-icon">&#x1F30D;</div>
      <h3>No countries found</h3>
      <p>Try adjusting your search or filters</p>
    </div>
  </section>

  <section class="pagination">
    <button class="page-btn" id="prevPageBtn" type="button" disabled><i class="fas fa-chevron-left"></i></button>
    <div class="page-info" id="pageInfo">Page 1 of 1</div>
    <button class="page-btn" id="nextPageBtn" type="button" disabled><i class="fas fa-chevron-right"></i></button>
  </section>

  <script src="js/index-list-menu-adapter.js?v=20260623z" defer></script>
  <script src="js/travel-home-directory.js?v=20260623z" defer></script>
  <script>
    (function () {
      const referralUtils = window.ZO2Y_REFERRALS || null;
      if (!referralUtils) return;
      const referral = referralUtils.captureReferralFromLocation(window.location.search);
      document.querySelectorAll('[data-auth-entry]').forEach((link) => {
        const href = link.getAttribute('href');
        if (!href) return;
        link.setAttribute('href', referralUtils.appendReferralToHref(href, { referral, next: 'travel.html' }));
      });
    })();
  </script>
  <link rel="stylesheet" href="css/pages/legal.css?v=20260623z">
  <script src="js/legal-consent.js?v=20260623z" defer></script>
  <script src="/js/shared-components.js?v=20260623z" defer></script>
</body>
