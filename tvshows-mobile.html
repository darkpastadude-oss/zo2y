  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: radial-gradient(circle at 18% -10%, rgba(245,158,11,0.18), transparent 35%), radial-gradient(circle at 88% -14%, rgba(53,103,194,0.25), transparent 42%), var(--bg); color: var(--white); font-family: "Inter", system-ui, sans-serif; }

    .header-inner { min-height: 60px; display: flex; align-items: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; }

    .search-wrap { flex: 1; min-width: 150px; position: relative; }
    .search { width: 100%; height: 38px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); color: var(--white); padding: 0 12px 0 30px; outline: none; font-size: 14px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    .hero { border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; background: linear-gradient(120deg, rgba(10, 31, 56, 0.92), rgba(15, 44, 80, 0.7)), url("https://images.unsplash.com/photo-1593784991095-a205069470b6?auto=format&fit=crop&w=800&q=80") center/cover; }
    .hero h1 { font-size: 26px; line-height: 1.1; }

    .controls input, .controls select { height: 52px; border: 1px solid var(--border); border-radius: 18px; background: #10224a; color: #fff; padding: 0 18px; font-size: 16px; -webkit-appearance: none; appearance: none; }
    .controls button, .pager button { height: 52px; border: 1px solid var(--border); border-radius: 18px; background: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%); color: #0b1633; padding: 0; cursor: pointer; }
    .control-modal { position: fixed; inset: 0; z-index: 1700; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(4, 10, 23, 0.72); backdrop-filter: blur(6px); }
    .control-modal.show { display: flex; }
    .control-modal-card { width: min(480px, 100%); border-radius: 18px; border: 1px solid var(--border); background: linear-gradient(180deg, rgba(19, 35, 71, 0.98), rgba(11, 23, 50, 0.98)); box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42); padding: 16px; }
    .control-modal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .control-modal-title { font-size: 18px; font-weight: 800; }
    .control-modal-close { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: #fff; cursor: pointer; }
    .control-modal-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .control-modal-grid select, .control-modal-action { width: 100%; height: 48px; border-radius: 14px; border: 1px solid var(--border); background: #10224a; color: #fff; padding: 0 14px; font-size: 14px; }
    .control-modal-action { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--card); color: #fff; cursor: pointer; }
    .control-icon-btn { width: 52px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .grid { padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card { border-radius: 12px; overflow: hidden; background: var(--card-2); min-height: 260px; display: flex; flex-direction: column; }
    .card-media { aspect-ratio: 2/3; background: linear-gradient(135deg, #102545 0%, #0b1c35 100%); overflow: hidden; }

  <script>
    const supabaseConfig = window.__ZO2Y_SUPABASE_CONFIG || {};
    const SUPABASE_URL = String(supabaseConfig.url || '').trim();
    const SUPABASE_KEY = String(supabaseConfig.key || '').trim();
    const TMDB_PROXY_BASE = '/api/tmdb';
    const POSTER_BASE = 'https://image.tmdb.org/t/p/w500';
    const TVSHOWS_PAGE_SIZE = 100;
    let supabaseClient = null, currentUser = null;
    const state = { tvshows: [], search: '', genre: '', year: '', sort: 'popular', page: 1, totalPages: 1, listStatusMap: new Map(), pendingQuickOps: new Set() };
    function escapeHtml(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function showToast(m, isError) { const el=document.createElement('div');el.style.position='fixed';el.style.top='12px';el.style.right='12px';el.style.zIndex='9999';el.style.background=isError?'#dc2626':'#f59e0b';el.style.color='#fff';el.style.padding='8px 12px';el.style.borderRadius='8px';el.style.fontSize='12px';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),2000); }
    async function ensureSupabase() {
      if (supabaseClient) return supabaseClient;
      const authRuntime = window.ZO2Y_AUTH || null;
      if (authRuntime && typeof authRuntime.waitForSupabase === 'function') await authRuntime.waitForSupabase(8000);
      else { const s=Date.now(); while (!(window.supabase && typeof window.supabase.createClient === 'function') && Date.now()-s<8000) await new Promise(r=>setTimeout(r,40)); }
      if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') { supabaseClient = await window.__ZO2Y_ENSURE_SUPABASE_CLIENT(); if (supabaseClient) return supabaseClient; }
      if (window.supabase && typeof window.supabase.createClient === 'function' && window.__ZO2Y_SUPABASE_CONFIG) {
        supabaseClient = window.supabase.createClient(window.__ZO2Y_SUPABASE_CONFIG.url, window.__ZO2Y_SUPABASE_CONFIG.key, { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } });
        window.__ZO2Y_SUPABASE_CLIENT = supabaseClient;
      }
      return supabaseClient;
    }
    async function initAuthUi() {
      const client = await ensureSupabase(); if (!client) return;
      const loginBtn=document.getElementById('loginBtn'), signupBtn=document.getElementById('signupBtn'), profileBtn=document.getElementById('profileBtn');
      const {data}=await client.auth.getUser(); currentUser=data?.user||null;
      if (currentUser) { if(loginBtn)loginBtn.style.display='none'; if(signupBtn)signupBtn.style.display='none'; if(profileBtn){profileBtn.style.display='inline-flex';profileBtn.innerHTML='<i class="fas fa-user"></i>'; } }
      else { if(loginBtn)loginBtn.style.display='inline-flex'; if(signupBtn)signupBtn.style.display='inline-flex'; if(profileBtn)profileBtn.style.display='none'; }
    }
    function filterNonAnime(tvResults) {
      return (Array.isArray(tvResults)?tvResults:[]).filter(tv=>{
        const genreIds=Array.isArray(tv.genre_ids)?tv.genre_ids:[], originCountry=Array.isArray(tv.origin_country)?tv.origin_country:[];
        const isJapaneseAnime=originCountry.includes('JP')||genreIds.includes(16);
        const n=String(tv.name||'').toLowerCase(), o=String(tv.overview||'').toLowerCase();
        return !(isJapaneseAnime||/anime|manga|japanese/.test(n+' '+o));
      });
    }
    async function loadTvshows(qOverride='') {
      const q=String(qOverride||state.currentQuery||'').trim();
      let tvshows=[];
      try {
        const endpoint=q?'search/tv':'trending/tv/week', params=q?{query,q,page:1}:{};
        const url=`${TMDB_PROXY_BASE}/${endpoint}?${new URLSearchParams(params).toString()}`;
        const res=await fetch(url);
        if (res.ok) { const json=await res.json(); const tvResults=Array.isArray(json?.results)?json.results:[]; tvshows=filterNonAnime(tvResults); }
      } catch(e) { console.error('Failed to load tvshows',e); }
      state.tvshows=tvshows.map(t=>({id:String(t.id||''),name:t.name||t.title||'Unknown TV Show',posterPath:t.poster_path||'',firstAirDate:t.first_air_date||'',voteAverage:t.vote_average||0})).filter(t=>t.id);
      state.page=1; state.totalPages=Math.max(1,Math.ceil(state.tvshows.length/TVSHOWS_PAGE_SIZE));
    }
    async function loadListStatus() {
      state.listStatusMap=new Map(); if (!currentUser?.id||!state.tvshows.length) return;
      const client=await ensureSupabase(); if (!client) return;
      const ids=state.tvshows.map(t=>t.id); if (!ids.length) return;
      const {data}=await client.from('tvshow_list_items').select('tvshow_id,list_type').eq('user_id',currentUser.id).in('tvshow_id',ids);
      (data||[]).forEach(r=>{ const id=String(r.tvshow_id||''); if (!id)return; if (!state.listStatusMap.has(id))state.listStatusMap.set(id,{favorites:false,watched:false,watchlist:false}); const b=state.listStatusMap.get(id); if (r.list_type in b)b[r.list_type]=true; });
    }
    function getTvshowListStatus(id) { const i=String(id||'').trim(), e={favorites:false,watched:false,watchlist:false}; if (!i)return e; if (!state.listStatusMap.has(i))state.listStatusMap.set(i,{...e}); return state.listStatusMap.get(i); }
    function getTvshowCardExtra(t) { const y=t.firstAirDate?new Date(t.firstAirDate).getFullYear():'TBD', r=t.voteAverage?`Rating: ${t.voteAverage.toFixed(1)}/10`:''; return [y,r].filter(Boolean).join(' | ')||'TV Show details'; }
    function renderGrid() {
      const grid=document.getElementById('tvshowsGrid'); if (!grid)return;
      if (!state.tvshows.length) { grid.innerHTML='<div class="empty">No TV shows found.</div>'; updatePagination(); return; }
      const start=(state.page-1)*TVSHOWS_PAGE_SIZE, visible=state.tvshows.slice(start,start+TVSHOWS_PAGE_SIZE);
      grid.innerHTML=visible.map(t=>{ const p=t.posterPath?`${POSTER_BASE}${t.posterPath}`:'/newlogo.webp'; return `<article class="card" data-id="${escapeHtml(t.id)}"><div class="card-media"><img src="${escapeHtml(p)}" alt="${escapeHtml(t.name)}" loading="lazy"></div><div class="card-meta"><p class="card-title">${escapeHtml(t.name)}</p><p class="card-sub">${escapeHtml(t.firstAirDate?new Date(t.firstAirDate).getFullYear():'TBD')}</p><p class="card-extra">${escapeHtml(getTvshowCardExtra(t))}</p><div class="card-actions"><button class="icon-btn menu-btn"><i class="fas fa-ellipsis-v"></i></button></div></div></article>`; }).join('');
      document.querySelectorAll('.menu-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation(); const c=b.closest('.card'); if(c&&typeof window.openIndexStyleListMenu==='function')window.openIndexStyleListMenu(c); }));
      document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',e=>{if(e.target.closest('.menu-btn'))return; const i=String(c.getAttribute('data-id')||'').trim(); if(i)window.location.href=`tvshow.html?id=${encodeURIComponent(i)}`; }));
      updatePagination();
    }
    function updatePagination() {
      const prev=document.getElementById('prevPageBtn'), next=document.getElementById('nextPageBtn'), info=document.getElementById('pageInfo');
      state.totalPages=Math.max(1,Math.ceil(state.tvshows.length/TVSHOWS_PAGE_SIZE));
      if (state.page>state.totalPages)state.page=state.totalPages; if (state.page<1)state.page=1;
      if (prev)prev.disabled=state.page<=1; if (next)next.disabled=state.page>=state.totalPages;
      if (info)info.textContent=`Page ${state.page} of ${state.totalPages}`;
    }
    async function upsertTvshowRecord(client,t) { if (!client||!t?.id)return false; const {error}=await client.from('tvshows').upsert({id:String(t.id),name:t.name||'',poster_url:t.posterPath?`${POSTER_BASE}${t.posterPath}`:'',updated_at:new Date().toISOString()},{onConflict:'id'}); if (error){console.error('TV show upsert failed',error);return false; }return true; }
    async function toggleDefaultList(itemId,listType) {
      const tid=String(itemId||'').trim(); if (!tid)return{ok:false,saved:false};
      const tvshow=state.tvshows.find(r=>String(r.id||'').trim()===tid); if (!tvshow)return{ok:false,saved:false};
      const client=await ensureSupabase(); if (!client||!currentUser?.id){window.location.href='login.html';return{ok:false,saved:false};}
      const status=getTvshowListStatus(tid); if (!(listType in status))return{ok:false,saved:false};
      const prev=!!status[listType], next=!prev, opKey=`${tid}:${listType}`;
      if (state.pendingQuickOps.has(opKey))return{ok:false,saved:prev};
      state.pendingQuickOps.add(opKey); status[listType]=next;
      try {
        if (next) { const ok=await upsertTvshowRecord(client,tvshow); if (!ok)throw new Error('TV show upsert failed'); const {error}=await client.from('tvshow_list_items').insert({user_id:currentUser.id,tvshow_id:tid,list_type:listType}); if (error&&String(error.code||'')!=='23505')throw error; showToast('Added to list'); }
        else { const {error}=await client.from('tvshow_list_items').delete().eq('user_id',currentUser.id).eq('tvshow_id',tid).eq('list_type',listType); if (error)throw error; showToast('Removed from list'); }
        return{ok:true,saved:next};
      } catch(e) { console.error('TV show list toggle failed',e); status[listType]=prev; showToast('Could not update list',true);return{ok:false,saved:prev}; }finally{state.pendingQuickOps.delete(opKey);}
    }
    async function loadPage() { try{await initAuthUi();await loadTvshows();await loadListStatus();renderGrid();}catch(e){const g=document.getElementById('tvshowsGrid');if(g)g.innerHTML='<div class="empty">TV shows feed unavailable.</div>';}}
    document.getElementById('refreshTvshowsBtn')?.addEventListener('click',loadPage);
    document.getElementById('tvshowsSearchBtn')?.addEventListener('click',async()=>{state.search=String(document.getElementById('q')?.value||'').trim();await loadPage();});
    document.getElementById('q')?.addEventListener('keydown',async e=>{if(e.key!=='Enter')return;e.preventDefault();state.search=String(e.target.value||'').trim();await loadPage();});
    document.getElementById('tvshowsFilterBtn')?.addEventListener('click',()=>{document.getElementById('tvshowsFilterModal')?.classList.add('show');});
    document.getElementById('tvshowsFilterCloseBtn')?.addEventListener('click',()=>{document.getElementById('tvshowsFilterModal')?.classList.remove('show');});
    document.getElementById('genre')?.addEventListener('change',e=>{state.genre=String(e.target.value||'').trim();});
    document.getElementById('year')?.addEventListener('change',e=>{state.year=String(e.target.value||'').trim();});
    document.getElementById('sort')?.addEventListener('change',e=>{state.sort=String(e.target.value||'popular').trim();});
    document.getElementById('refresh')?.addEventListener('click',async()=>{document.getElementById('tvshowsFilterModal')?.classList.remove('show');await loadPage();});
    document.getElementById('prevPageBtn')?.addEventListener('click',()=>{if(state.page<=1)return;state.page-=1;renderGrid();});
    document.getElementById('nextPageBtn')?.addEventListener('click',()=>{if(state.page>=state.totalPages)return;state.page+=1;renderGrid();});
    document.addEventListener('DOMContentLoaded',()=>{
      if (window.initIndexStyleListMenu)window.initIndexStyleListMenu({mediaType:'tvshows',itemIdAttr:'data-id',getVisibleItemIds:()=>Array.from(document.querySelectorAll('.card[data-id]')).map(c=>c.getAttribute('data-id')).filter(Boolean),getQuickStatusForItem:i=>{const k=String(i||'').trim();const s=state.listStatusMap.get(k);return s?{...s}:null;},ensureClient:async()=>{if(supabaseClient)return supabaseClient;await ensureSupabase();return supabaseClient;},getCurrentUser:()=>currentUser,notify:(m,is)=>showToast(m,!!is),toggleDefaultList:async({itemId,listType})=>toggleDefaultList(itemId,listType)});
      loadPage();
    });
  </script>
</body>
</html>
