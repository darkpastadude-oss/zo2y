<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="paperDust">
        <feFuncA type="table" tableValues="0 0 .02 .05"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="paperTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbf1c8"/>
      <stop offset="100%" stop-color="#b7d89d"/>
    </linearGradient>
    <linearGradient id="curlTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bed3a8"/>
      <stop offset="100%" stop-color="rgba(117,89,39,.72)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="18" dy="26" stdDeviation="22" flood-color="rgba(0,0,0,.22)"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
