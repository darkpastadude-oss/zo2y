<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" preserveAspectRatio="none">
  <defs>
    <linearGradient id="woodFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcb27a"/>
      <stop offset="24%" stop-color="#b97c45"/>
      <stop offset="52%" stop-color="#8d592b"/>
      <stop offset="100%" stop-color="#d5a269"/>
    </linearGradient>
    <linearGradient id="frameShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,.18)"/>
    </linearGradient>
    <filter id="boardNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 0 .025 .05"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="boardPaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#245b31"/>
      <stop offset="55%" stop-color="#153d20"/>
      <stop offset="100%" stop-color="#0b2413"/>
    </linearGradient>
  </defs>
