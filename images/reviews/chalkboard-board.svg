<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" preserveAspectRatio="none">
  <defs>
    <linearGradient id="frameWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5627"/>
      <stop offset="22%" stop-color="#b5773f"/>
      <stop offset="48%" stop-color="#6d411f"/>
      <stop offset="74%" stop-color="#bf8348"/>
      <stop offset="100%" stop-color="#7f4b22"/>
    </linearGradient>
    <filter id="corkNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="2" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.34  0 0 0 0 0.20  0 0 0 0 0.08  0 0 0 .9 0" result="brownNoise"/>
    </filter>
    <linearGradient id="corkBase" x1="0" y1="0" x2="1" y2="1">
