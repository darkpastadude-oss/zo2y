<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760">
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="14" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="paperDust">
        <feFuncA type="table" tableValues="0 0 .02 .05"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="topPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f0dd"/>
      <stop offset="100%" stop-color="#ebddbc"/>
    </linearGradient>
