      <stop offset="0%" stop-color="#cfbf96"/>
      <stop offset="100%" stop-color="#b5a57d"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="180%" height="200%">
      <feDropShadow dx="10" dy="18" stdDeviation="16" flood-color="rgba(0,0,0,.24)"/>
    </filter>
