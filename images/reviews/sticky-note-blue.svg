<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720">
  <defs>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="15" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="paperDust">
        <feFuncA type="table" tableValues="0 0 .015 .035"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="paperTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ecff"/>
      <stop offset="100%" stop-color="#acd3ef"/>
    </linearGradient>
    <linearGradient id="curlTone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b2cadb"/>
      <stop offset="100%" stop-color="#b59a62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="12" dy="18" stdDeviation="14" flood-color="rgba(0,0,0,.20)"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <path d="M136 128 L546 108 Q 598 106 604 154 L612 530 Q 610 584 566 604 L190 614 Q 130 612 122 562 L110 184 Q 108 138 136 128 Z" fill="url(#paperTone)"/>
