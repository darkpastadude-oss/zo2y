<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazooka</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
  body {background:#fff;color:#333;overflow-x:hidden;}

  /* --- Top Stripe + Logo --- */
  .top-stripe {background:#FF6F00; height:20px; position:relative;}
  .logo {position:absolute; top:-30px; left:50%; transform:translateX(-50%); width:100px; cursor:pointer;}

  /* --- Hero Section --- */
  .hero {text-align:center; padding:140px 20px 80px 20px; position:relative;}
  .hero h1 {font-size:3rem; margin-bottom:20px;}
  .hero p {font-size:1.2rem; color:#555; margin-bottom:40px;}

  /* --- Sections --- */
  section {padding:40px 20px;}
  h2 {font-size:2rem; margin-bottom:20px; color:#FF6F00;}
  p {font-size:1rem; color:#555; margin-bottom:10px;}
  .placeholder {font-style:italic; color:#aaa;}
</style>
</head>
<body>

<!-- Top Stripe + Bazooka Logo -->
<div class="top-stripe">
  <img src="bazooka.jpg" alt="Bazooka Logo" class="logo" onclick="window.location.href='index.html'">
</div>

<!-- Hero Section -->
<section class="hero">
  <h1>Bazooka</h1>
  <p class="placeholder">Description about Bazooka restaurant.</p>
</section>

<!-- Menu Section -->
<section>
  <h2>Menu</h2>
  <p class="placeholder">Menu items will go here.</p>
</section>

<!-- Branches Section -->
<section>
  <h2>Branches</h2>
  <p class="placeholder">Branches information will go here.</p>
</section>

<!-- Reviews Section -->
<section>
  <h2>Reviews</h2>
  <p class="placeholder">Reviews will go here.</p>
</section>

<!-- Hotline / Ordering Section -->
<section>
  <h2>Hotline & Ordering</h2>
  <p class="placeholder">Hotline number and ordering info will go here.</p>
</section>

</body>
</html>
