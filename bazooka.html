<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazooka</title>
<style>
  * {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
  body {background:#fff;color:#333;overflow-x:hidden;}

  /* --- Top Stripe + Logo --- */
  .top-stripe {background:#FF6F00; height:50px; position:relative;}
  .logo {position:absolute; top:60px; left:50%; transform:translateX(-50%); width:100px; cursor:pointer;} /* moved below stripe */

  /* --- Hero Section --- */
  .hero {text-align:center; padding:100px 20px 40px 20px; position:relative;}
  .hero h1 {font-size:2.5rem; margin-bottom:10px;}
  .hero p {font-size:1rem; color:#555; margin-bottom:10px;}
  .rating {color:#FF6F00; font-size:1.2rem; margin-bottom:20px;}

  /* --- Info Section --- */
  .info {padding:20px; max-width:800px; margin:0 auto;}
  .info h2 {margin-bottom:10px;}
  .info p {margin-bottom:8px; color:#555;}
  .placeholder {font-style:italic; color:#aaa;}

  /* --- Menu Section --- */
  .menu {padding:20px; max-width:800px; margin:0 auto;}
  .menu h2 {margin-bottom:15px;}
  .menu-item {display:flex; justify-content:space-between; margin-bottom:10px; padding:10px; border-bottom:1px solid #eee;}
  .menu-item span {color:#aaa;}

  /* --- Reviews Section --- */
  .reviews {padding:20px; max-width:800px; margin:0 auto;}
  .reviews h2 {margin-bottom:15px;}
  .review {border-bottom:1px solid #eee; padding:10px 0;}
  .review p {margin-bottom:5px;}
  .review-form {margin-top:20px; display:flex; flex-direction:column; gap:10px;}
  .review-form input, .review-form textarea {padding:10px; font-size:1rem; width:100%; border:1px solid #ccc; border-radius:5px;}
  .review-form button {background:#FF6F00; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;}
  .review-form button:hover {transform: scale(1.05);}

  /* --- Footer --- */
  footer {text-align:center; padding:40px 20px; border-top:1px solid #eee; font-size:0.9rem; color:#555;}
</style>
</head>
<body>

<!-- Top Stripe + Logo -->
<div class="top-stripe"></div>
<img src="bazooka.jpg" alt="Bazooka Logo" class="logo" onclick="window.location.href='index.html'">

<!-- Hero / Header -->
<section class="hero">
  <h1>Bazooka</h1>
  <p class="placeholder">Category here</p>
  <div class="rating placeholder">Rating placeholder</div>
</section>

<!-- Restaurant Info -->
<section class="info">
  <h2>Contact & Branches</h2>
  <p class="placeholder">Hotline info here</p>
  <p class="placeholder">Branches info here</p>
  <p class="placeholder">Address info here</p>
</section>

<!-- Menu -->
<section class="menu">
  <h2>Menu</h2>
  <div class="menu-item"><span class="placeholder">Menu Item</span><span class="placeholder">Price</span></div>
</section>

<!-- Reviews -->
<section class="reviews">
  <h2>Reviews</h2>
  <div id="reviews-list">
    <div class="review">
      <p class="placeholder">Reviewer name</p>
      <p class="placeholder">Review text</p>
    </div>
  </div>

  <form class="review-form" id="review-form">
    <input type="text" placeholder="Your Name" id="reviewer">
    <textarea placeholder="Write your review..." id="review-text"></textarea>
    <button type="submit">Submit Review</button>
  </form>
</section>

<!-- Footer -->
<footer>
  © 2025 Zo2y. All rights reserved.
</footer>

<script>
const reviewForm = document.getElementById('review-form');
const reviewsList = document.getElementById('reviews-list');

reviewForm.addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('reviewer').value.trim();
  const text = document.getElementById('review-text').value.trim();
  if(name && text){
    const reviewDiv = document.createElement('div');
    reviewDiv.className = 'review';
    reviewDiv.innerHTML = `<p><strong>${name}</strong></p><p>${text}</p>`;
    reviewsList.appendChild(reviewDiv);
    reviewForm.reset();
  }
});
</script>

</body>
</html>
