<body data-brand-type="food" data-nav-page="food">
  <main class="container">
    <section class="brand-hero">
      <h1>Food</h1>
      <p>Discover food brands from around the world and save your favorites to your profile.</p>
    </section>

    <div class="controls">
      <input id="brandSearch" class="search-input" type="search" placeholder="Search brands, categories, countries..." />
      <button class="control-icon-btn" id="brandSearchBtn" type="button" aria-label="Search food brands">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="control-icon-btn" id="brandFilterBtn" type="button" aria-label="Open food filters">
        <i class="fa-solid fa-sliders-h"></i>
      </button>
    </div>
    <div class="controls-meta">
      <span id="brandCount">0 brands shown</span>
      <span id="brandDidYouMean" class="did-you-mean"></span>
    </div>
    <div class="control-modal" id="brandFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter food brands</div>
          <button class="control-modal-close" id="brandFilterCloseBtn" type="button" aria-label="Close food filters">&times;</button>
        </div>
        <select id="brandCategory">
          <option value="all">All Food Brands</option>
        </select>
      </div>
    </div>

    <div class="brand-grid" id="brandGrid"></div>
  </main>
