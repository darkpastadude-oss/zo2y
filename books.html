</div>

  <main class="container page-shell books-shell">
    <section class="hero">
      <h1>books</h1>
      <p>Bestsellers, new releases, fantasy, sci-fi, romance, mystery, BookTok favorites. Save anything to your reading lists.</p>
    </section>

    <section class="controls">
      <div class="search-input-wrap">
        <input id="q" class="search-input" placeholder="Search books, authors, series..." autocomplete="off" inputmode="search" type="text">
      </div>
      <button id="booksSearchBtn" class="control-icon-btn" type="button" aria-label="Search books"><i class="fas fa-search"></i></button>
      <button id="booksFilterBtn" class="control-icon-btn" type="button" aria-label="Open book filters"><i class="fas fa-sliders-h"></i></button>
    </section>
    
    <div class="control-modal" id="booksFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter books</div>
          <button class="control-modal-close" id="booksFilterCloseBtn" type="button" aria-label="Close book filters">&times;</button>
        </div>
        <div class="control-modal-grid">
          <select id="genre"><option value="">All Genres</option></select>
          <div class="filter-year-group">
            <input type="number" id="year_from" placeholder="From year" min="1000" max="2026">
            <input type="number" id="year_to" placeholder="To year" min="1000" max="2026">
          </div>
          <select id="sort">
            <option value="relevance">Relevance</option>
            <option value="newest">Newest First</option>
          </select>
          <button id="refresh" class="control-modal-action" type="button"><i class="fas fa-rotate"></i> Apply Filters</button>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2 id="gridTitle">popular books right now</h2>
        <p id="gridDesc">Trending fiction and non-fiction across Zo2y.</p>
      </div>
      <div class="grid" id="booksGrid"></div>
      <div id="scrollSentinel" style="height:1px;width:100%"></div>
    </section>
  </main>
