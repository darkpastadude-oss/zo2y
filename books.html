<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="/js/vercel-analytics.js?v=20260307a" defer></script>
<script src="/js/auth-gate.js?v=20260322a"></script>

  <title>Zo2y - Books</title>
  <link rel="icon" href="/newlogo.webp" type="image/webp" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/list-utils.js?v=20260317b"></script>
  <script src="js/index-list-menu-adapter.js?v=20260317b"></script>
  <style>
    :root {
      --bg: #0b1633;
      --card: #132347;
      --muted: #8ca3c7;
      --accent: #f59e0b;
      --glass: rgba(255,255,255,0.03);
      --white: #ffffff;
      --border: rgba(255,255,255,0.1);
      --gradient: linear-gradient(135deg, #f59e0b 0%, #ffb84d 100%);
      --surface: rgba(19, 35, 71, 0.6);
      --radial-glow: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      --shadow: 0 10px 30px rgba(0,0,0,0.3);
      --info: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20% 0 0 0;
      background: var(--radial-glow);
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0 12px, rgba(255, 184, 77, 0) 12px 24px);
      opacity: 0.25;
      pointer-events: none;
      z-index: -3;
    }

    a { color: inherit; text-decoration: none; }

    /* Header to match index/book */
    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 14px 16px;
      backdrop-filter: blur(10px) saturate(180%);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      gap: 12px;
    }

    .logo {
      height: 40px;
      width: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .logo:hover { transform: scale(1.05); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav a.ghost {
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .nav a.ghost:hover { color: var(--accent); background: rgba(245, 158, 11, 0.05); }

    .account-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .account-btn:hover { border-color: var(--accent); color: var(--accent); }

    .account-btn.logged-in {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero {
      max-width: 1200px;
      margin: 24px auto 0;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 28px;
      margin: 0 0 8px 0;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .media-spotlight {
      max-width: 1200px;
      margin: 18px auto 0;
      padding: 0 20px;
    }

    .media-spotlight[hidden] { display: none; }

    .media-spotlight-shell {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      min-height: 300px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 16px;
      align-items: center;
      background: linear-gradient(140deg, rgba(16, 31, 64, 0.96), rgba(8, 19, 41, 0.92));
    }

    .media-spotlight-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(8,14,31,0.74), rgba(10,19,39,0.40));
      background-size: cover;
      background-position: center center;
    }

    .media-spotlight-copy,
    .media-spotlight-poster { position: relative; z-index: 1; }

    .media-spotlight-copy {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
    }

    .media-spotlight-kicker {
      display: inline-flex;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(19,35,71,0.48);
      color: #dbe7ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .media-spotlight-copy h2 { margin: 0; font-size: clamp(28px, 4vw, 42px); line-height: 1.02; }
    .media-spotlight-meta,
    .media-spotlight-summary { margin: 0; color: var(--muted); line-height: 1.5; }

    .media-spotlight-poster {
      padding: 28px;
      display: flex;
      justify-content: center;
    }

    .media-spotlight-poster img {
      width: min(100%, 260px);
      max-height: 360px;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 20px 36px rgba(0,0,0,0.28);
      background: rgba(255,255,255,0.04);
    }

    .media-spotlight-actions { margin-top: 6px; display: flex; gap: 10px; }

    .controls {
      max-width: 1200px;
      margin: 16px auto 0;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .search-input {
      flex: 1 1 280px;
      width: min(92vw, 320px);
      max-height: 70vh;
      overflow-y: auto;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
    }

    .filter-select {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
      min-width: 200px;
    }

    .small-input {
      max-width: 140px;
    }

    .chip-row {
      max-width: 1200px;
      margin: 10px auto 0;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      max-width: 1110px;
      margin: 24px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 202px));
      gap: 16px;
      align-items: stretch;
      justify-content: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 300px;
      transition: all 0.2s ease;
      position: relative;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card.menu-open,
    .card.menu-open:hover {
      transform: none;
      overflow: visible;
    }

    .card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      height: auto;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #0f1f40 0%, #1a2d5f 100%);
      position: relative;
    }

    .card img[src=""] {
      background: linear-gradient(90deg, #0f1f40 0px, rgba(255,255,255,0.05) 50%, #0f1f40 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card img[src*="logo.png"] {
      object-fit: contain;
      padding: 20px;
      background: linear-gradient(135deg, #132347 0%, #0b1633 100%);
      opacity: 0.6;
    }

    .card-body {
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      order: 1;
    }

    .card-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 60px;
      order: 2;
      flex: 1;
    }

    .empty {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      color: var(--muted);
      text-align: center;
    }

    .pagination {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .page-btn {
      min-width: 44px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .card-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      order: 3;
      margin-top: auto;
    }

    .card-menu-wrap {
      position: relative;
      margin-left: auto;
      flex-shrink: 0;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(19, 35, 71, 0.9);
      color: var(--white);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .menu-btn:hover { border-color: var(--accent); color: var(--accent); }

    .list-menu {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .list-menu.open { display: flex; }

    .list-menu-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    .list-menu-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

    .list-action {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: all 0.2s ease;
      margin-bottom: 6px;
    }

    .list-action:last-child { margin-bottom: 0; }
    .list-action:hover { border-color: var(--accent); color: var(--accent); }
    .list-action.active {
      background: rgba(245, 158, 11, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 2000;
      box-shadow: var(--shadow);
    }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--error); color: white; }
    .notification.info { background: var(--info); color: white; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
    }
    .modal-list {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
      margin-bottom: 12px;
    }
    .modal-list-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .modal-list-actions { display: inline-flex; gap: 6px; align-items: center; }
    .list-edit-btn {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .list-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-list-item.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.12);
    }
    .modal-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .modal-input input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0f1f40;
      color: var(--white);
      outline: none;
    }
    .icon-options { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .icon-option {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-option.selected { border-color: var(--accent); color: var(--accent); }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-info {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 202px)); justify-content: center; }
    }

    @media (max-width: 780px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 202px)); justify-content: center; }
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 22px; }
      .grid { gap: 12px; }
      .card img { height: 220px; }
    }

    .menu-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .menu-modal.active {
      display: flex;
    }

    .menu-modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 380px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: menuFadeIn 0.2s ease;
    }

    @keyframes menuFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .menu-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .menu-modal-header h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--white);
      margin: 0;
    }

    .menu-modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .menu-modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }

    .menu-modal-body {
      padding: 16px 20px;
    }

    .menu-quick-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .menu-custom-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .menu-custom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .menu-create-list-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-create-list-btn:hover {
      background: rgba(245, 158, 11, 0.1);
      border-color: var(--accent);
    }

    .menu-custom-lists {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>

      const GOOGLE_BOOKS_PROXY_BASE = '/api/books';

      const CATEGORY_OPTIONS = [

      const BOOK_GENRE_RULES = {
        Fiction: ['fiction', 'literary', 'novel', 'novella', 'short stories', 'classic'],
        Mystery: ['mystery', 'thriller', 'crime', 'detective', 'suspense'],
        Fantasy: ['fantasy', 'magic', 'epic fantasy', 'urban fantasy', 'paranormal', 'science fiction', 'sci-fi', 'dystopian'],

        Business: ['business', 'economics', 'finance', 'management', 'leadership', 'marketing'],

      const state = {

      };

      const booksRuntimeCache = new Map();

      let supabaseClient = null;

      function toHttpsUrl(value) {
        return String(value || '').replace(/^http:\/\//i, 'https://').trim();
      }

      function buildOpenLibraryCoverUrl(doc, size = 'L') {
        const safeSize = ['S', 'M', 'L'].includes(String(size || '').toUpperCase())
          ? String(size).toUpperCase()
          : 'L';
        const coverId = Number(doc?.cover_i || 0) || 0;
        if (coverId > 0) {
          return `https://covers.openlibrary.org/b/id/${encodeURIComponent(String(coverId))}-${safeSize}.jpg`;
        }
        const isbnRaw = Array.isArray(doc?.isbn) ? String(doc.isbn[0] || '').trim() : '';
        const isbn = isbnRaw.replace(/[^0-9Xx]/g, '');
        if (isbn) {
          return `https://covers.openlibrary.org/b/isbn/${encodeURIComponent(isbn)}-${safeSize}.jpg`;
        }
        return '';
      }

      function normalizeBookText(value) {
        return String(value || '').trim().toLowerCase();
      }

      function deriveCanonicalBookGenres(subjects = []) {
        const values = Array.isArray(subjects) ? subjects : [];
        const joined = values.map((entry) => normalizeBookText(entry)).filter(Boolean).join(' | ');
        const matched = Object.entries(BOOK_GENRE_RULES)
          .filter(([, tokens]) => tokens.some((token) => joined.includes(token)))
          .map(([label]) => label);
        return matched.length ? matched : [];
      }

      function bookMatchesCategory(subjects = [], activeCategory = '') {
        const category = String(activeCategory || '').trim();
        if (!category) return true;
        const canonical = deriveCanonicalBookGenres(subjects);
        if (canonical.includes(category)) return true;
        const raw = (Array.isArray(subjects) ? subjects : []).map((entry) => normalizeBookText(entry));
        const target = normalizeBookText(category);
        return raw.some((entry) => entry === target || entry.includes(target));
      }

      function normalizeRemoteBookDoc(raw, idx = 0) {
        if (!raw) return null;
        if (raw.volumeInfo) {
          return normalizeGoogleBookDoc(raw, idx);
        }
        const title = String(raw?.title || `Book ${idx + 1}`).trim();
        if (!title) return null;
        const authorNames = Array.isArray(raw?.author_name)
          ? raw.author_name.map((entry) => String(entry || '').trim()).filter(Boolean)
          : [];
        const year = Number(raw?.first_publish_year || 0) || null;
        const isbn = Array.isArray(raw?.isbn)
          ? raw.isbn.map((entry) => String(entry || '').replace(/[^0-9Xx]/g, '')).filter(Boolean)
          : [];
        const subject = Array.isArray(raw?.subject)
          ? raw.subject.map((entry) => String(entry || '').trim()).filter(Boolean)
          : [];
        const publisher = Array.isArray(raw?.publisher)
          ? raw.publisher.map((entry) => String(entry || '').trim()).filter(Boolean)
          : [];
        return {
          key: String(raw?.key || '').trim(),
          title,
          author_name: authorNames.length ? authorNames : ['Unknown author'],
          first_publish_year: year,
          isbn,
          subject,
          publisher,
          cover_i: Number(raw?.cover_i || 0) || null,
          coverImage: toHttpsUrl(raw?.coverImage || ''),
          _googleThumbnail: toHttpsUrl(raw?._googleThumbnail || ''),
          _googleVolumeId: String(raw?._googleVolumeId || '').trim()
        };
      }

      function buildGoogleBooksQuery(params = {}) {
        const title = String(params?.title || '').trim();
        const author = String(params?.author || '').trim();
        const qRaw = String(params?.q || '').trim();
        const subject = String(params?.subject || '').trim();
        const year = String(params?.first_publish_year || params?.year || '').trim();
        const chunks = [];
        if (qRaw) chunks.push(qRaw);
        if (title) chunks.push(`intitle:\"${title}\"`);
        if (author) chunks.push(`inauthor:\"${author}\"`);
        if (subject) chunks.push(subject);
        if (year) chunks.push(year);
        return chunks.join(' ').trim();
      }

      function normalizeGoogleBookDoc(volume, idx = 0) {
        const info = volume?.volumeInfo || {};
        const title = String(info?.title || `Book ${idx + 1}`).trim();
        const authorNames = Array.isArray(info?.authors) ? info.authors.filter(Boolean).map((name) => String(name).trim()).filter(Boolean) : [];
        const published = String(info?.publishedDate || '').trim();
        const yearMatch = published.match(/\d{4}/);
        const year = yearMatch ? Number(yearMatch[0]) : null;
        const categories = Array.isArray(info?.categories) ? info.categories.filter(Boolean).map((entry) => String(entry).trim()) : [];
        const publisher = String(info?.publisher || '').trim();
        const identifiers = Array.isArray(info?.industryIdentifiers) ? info.industryIdentifiers : [];
        const isbn = identifiers
          .map((entry) => String(entry?.identifier || '').replace(/[^0-9Xx]/g, ''))
          .filter(Boolean);
        const thumb = String(info?.imageLinks?.thumbnail || info?.imageLinks?.smallThumbnail || '').replace(/^http:\/\//i, 'https://').trim();

        return {
          key: '',
          title,
          author_name: authorNames.length ? authorNames : ['Unknown author'],
          first_publish_year: Number.isFinite(year) ? year : null,
          isbn,
          subject: categories,
          publisher: publisher ? [publisher] : [],
          cover_i: null,
          _googleThumbnail: thumb,
          _googleVolumeId: String(volume?.id || '').trim()
        };
      }

      async function fetchGoogleBooksDocs(params = {}) {
        const q = buildGoogleBooksQuery(params);
        if (!q) return [];
        const googleUrl = new URL(`${GOOGLE_BOOKS_PROXY_BASE}/volumes`, window.location.origin);
        googleUrl.searchParams.set('q', q);
        googleUrl.searchParams.set('printType', 'books');
        googleUrl.searchParams.set('langRestrict', 'en');
        googleUrl.searchParams.set('maxResults', String(Math.max(1, Number(params?.limit || 20))));
        try {
          const res = await fetch(googleUrl.toString(), { headers: { Accept: 'application/json' } });
          if (!res.ok) return [];
          const json = await res.json();
          const items = Array.isArray(json?.items) ? json.items : [];
          return items.map((entry, idx) => normalizeGoogleBookDoc(entry, idx)).filter((entry) => String(entry?.title || '').trim());
        } catch (_err) {
          return [];
        }
      }

      async function booksFetch(path, params = {}) {
        const normalizedPath = String(path || '').startsWith('/') ? String(path) : `/${String(path || '')}`;
        const endpoint = normalizedPath === '/search.json'
          ? `${GOOGLE_BOOKS_PROXY_BASE}/search`
          : `${GOOGLE_BOOKS_PROXY_BASE}${normalizedPath}`;
        const url = new URL(endpoint, window.location.origin);
        Object.entries(params || {}).forEach(([key, value]) => {
          if (value === undefined || value === null || value === '') return;
          if (Array.isArray(value)) {
            value.forEach((entry) => {
              if (entry === undefined || entry === null || entry === '') return;
              url.searchParams.append(key, String(entry));
            });
            return;
          }
          url.searchParams.set(key, String(value));
        });
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 6500);
        let res;
        try {
          res = await fetch(url.toString(), {
            headers: { Accept: 'application/json' },
            signal: controller.signal
          });
        } finally {
          window.clearTimeout(timeoutId);
        }
        if (!res.ok) throw new Error(`Books API error ${res.status}`);
        const json = await res.json();
        const docsRaw = Array.isArray(json?.docs) ? json.docs : (Array.isArray(json?.items) ? json.items : []);
        const docs = docsRaw.map((entry, idx) => normalizeRemoteBookDoc(entry, idx)).filter((entry) => String(entry?.title || '').trim());
        const numFound = Number(json?.numFound || json?.count || json?.totalItems || docs.length) || docs.length;
        return { docs, numFound };
      }

      async function fetchPopularBooks(page = 1, limit = BOOKS_PER_PAGE) {
        return booksFetch('/popular', {
          page,
          limit,
          subject: state.activeCategory || 'fiction',
          language: 'en',
          orderBy: 'relevance'
        });
      }

      async function fetchTrendingBooks(limit = BOOKS_PER_PAGE) {
        return booksFetch('/trending', {
          period: 'weekly',
          limit
        });
      }

      function getPreferredBookImage(doc) {
        const googleThumb = toHttpsUrl(doc?._googleThumbnail || '');
        if (googleThumb) return googleThumb;
        const byCoverId = toHttpsUrl(buildOpenLibraryCoverUrl(doc, 'L'));
        if (byCoverId) return byCoverId;
        const byIsbn = toHttpsUrl(buildOpenLibraryCoverUrl(doc, 'M'));
        if (byIsbn) return byIsbn;
        const coverImage = toHttpsUrl(doc?.coverImage || '');
        if (coverImage && !/supabase\.co\/storage\/v1\/object\/public/i.test(coverImage)) return coverImage;
        return null;
      }

      function normalizeLocalBookDoc(row) {
        if (!row) return null;
        const authors = String(row.authors || '').trim();
        const rawCategories = Array.isArray(row.categories) ? row.categories : [];
        const categories = deriveCanonicalBookGenres(rawCategories);
        const publishedYear = String(row.published_date || '').slice(0, 4);
        return {
          key: row.id ? `/books/${row.id}` : '',
          title: String(row.title || '').trim(),
          author_name: authors ? authors.split(',').map((entry) => String(entry || '').trim()).filter(Boolean) : [],
          first_publish_year: publishedYear ? Number(publishedYear) : null,
          subject: categories.length ? categories : rawCategories,
          publisher: row.publisher ? [String(row.publisher).trim()] : [],
          cover_i: null,
          coverImage: '',
          _googleThumbnail: '',
          _googleVolumeId: '',
          description: String(row.description || '').trim(),
          pageCount: Number(row.page_count || 0) || null,
          _source: 'supabase-books'
        };
      }

      async function fetchLocalBooksPage() {
        if (!supabaseClient) return null;
        const page = Math.max(1, Number(state.page || 1));
        const category = String(state.activeCategory || '').trim();
        const q = String(state.query || '').trim();
        const author = String(state.author || '').trim();
        const year = String(state.year || '').trim();
        const needsClientSideCategory = !!category;
        let query = supabaseClient
          .from('books')
          .select('id,title,authors,thumbnail,published_date,categories,description,page_count,publisher,updated_at', { count: 'exact' });

        if (q) query = query.ilike('title', `%${q}%`);
        if (author) query = query.ilike('authors', `%${author}%`);
        if (year) {
          query = query.gte('published_date', `${year}-01-01`).lte('published_date', `${year}-12-31`);
        }

        query = query
          .order('published_date', { ascending: false, nullsFirst: false })
          .order('title', { ascending: true });

        if (needsClientSideCategory) {
          query = query.range(0, 799);
        } else {
          query = query.range((page - 1) * BOOKS_PER_PAGE, page * BOOKS_PER_PAGE - 1);
        }

        const { data, error, count } = await query;
        if (error) return null;
        let docs = (Array.isArray(data) ? data : []).map((row) => normalizeLocalBookDoc(row)).filter((row) => row && row.title);
        if (needsClientSideCategory) {
          docs = docs.filter((row) => bookMatchesCategory(row.subject || [], category));
          const total = docs.length;
          docs = docs.slice((page - 1) * BOOKS_PER_PAGE, page * BOOKS_PER_PAGE);
          return {
            docs,
            numFound: total,
            source: 'supabase-books'
          };
        }
        return {
          docs,
          numFound: Number(count || docs.length) || docs.length,
          source: 'supabase-books'
        };
      }

      function slugifyBookPart(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .slice(0, 64);
      }

      function getBookEntryId(item, idx = 0) {
        const googleVolumeId = String(item?._googleVolumeId || '').trim();
        if (googleVolumeId) return googleVolumeId;
        const workKey = String(item?.key || '').trim();
        if (workKey.startsWith('/works/')) {
          const workId = workKey.replace('/works/', '').trim();
          if (workId) return workId;
        }
        const titleSlug = slugifyBookPart(item?.title || `book-${idx}`);
        const authorSlug = slugifyBookPart(Array.isArray(item?.author_name) ? item.author_name[0] : '');
        const year = String(item?.first_publish_year || '').trim();
        return `search-${titleSlug}-${authorSlug || 'unknown'}-${year || 'na'}`;
      }

      async function loadCuratedPopularBooks() {
        const [trendingResult, popularResult] = await Promise.allSettled([
          fetchTrendingBooks(BOOKS_PER_PAGE),
          fetchPopularBooks(1, BOOKS_PER_PAGE)
        ]);

        const trending = trendingResult.status === 'fulfilled' ? trendingResult.value : null;
        const popular = popularResult.status === 'fulfilled' ? popularResult.value : null;
        const trendingDocs = Array.isArray(trending?.docs) ? trending.docs.slice(0, BOOKS_PER_PAGE) : [];
        const popularDocs = Array.isArray(popular?.docs) ? popular.docs.slice(0, BOOKS_PER_PAGE) : [];

        if (popularDocs.length || trendingDocs.length) {
          const merged = [];
          const seen = new Set();
          [...trendingDocs, ...popularDocs].forEach((doc) => {
            const title = String(doc?.title || '').trim().toLowerCase();
            const author = String((Array.isArray(doc?.author_name) ? doc.author_name[0] : '') || '').trim().toLowerCase();
            const key = `${title}::${author}`;
            if (!title || seen.has(key)) return;
            seen.add(key);
            merged.push(doc);
          });

          const docs = (merged.length ? merged : (popularDocs.length ? popularDocs : trendingDocs)).slice(0, BOOKS_PER_PAGE);
          return {
            docs,
            numFound: Math.max(
              Number(popular?.numFound || 0),
              Number(trending?.numFound || 0),
              docs.length,
              BOOKS_PER_PAGE * 2
            )
          };
        }

        return { docs: [], numFound: 0 };
      }

      function stripHtml(html) {
        if (!html) return '';
        return html.replace(/<[^>]*>/g, '').trim();
      }

      function truncateText(text, maxLen) {
        if (!text) return '';
        if (text.length <= maxLen) return text;
        return `${text.slice(0, maxLen - 1)}\u2026`;
      }

      function showNotification(message, type = 'info', duration = 3000) {
        const existing = document.querySelectorAll('.notification');
        existing.forEach(n => n.remove());
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), duration);
      }

      function debounce(fn, wait = 260) {
        let timeoutId = null;
        return (...args) => {
          if (timeoutId) clearTimeout(timeoutId);
          timeoutId = setTimeout(() => fn(...args), wait);
        };
      }


      function getBooksCacheKey() {
        return `books_search_v4_${state.query}_${state.author}_${state.activeCategory}_${state.year}_${state.page}`;
      }

      function readBooksCache(cacheKey) {
        const runtimeEntry = booksRuntimeCache.get(cacheKey);
        if (runtimeEntry && runtimeEntry.cachedAt && (Date.now() - runtimeEntry.cachedAt) < BOOKS_CACHE_TTL_MS) {
          return runtimeEntry;
        }
        const cachedRaw = localStorage.getItem(cacheKey);
        if (!cachedRaw) return null;
        try {
          const parsed = JSON.parse(cachedRaw);
          if (Array.isArray(parsed?.docs)) {
            const normalized = {
              docs: parsed.docs,
              numFound: Number(parsed.numFound || parsed.docs.length) || parsed.docs.length,
              cachedAt: Number(parsed.cachedAt || 0) || 0
            };
            booksRuntimeCache.set(cacheKey, normalized);
            return normalized;
          }
        } catch (error) {
          console.warn('Cache read error', error);
        }
        return null;
      }

      function writeBooksCache(cacheKey, data) {
        if (!cacheKey || !Array.isArray(data?.docs)) return;
        const payload = {
          docs: data.docs,
          numFound: Number(data.numFound || data.docs.length) || data.docs.length,
          cachedAt: Date.now()
        };
        booksRuntimeCache.set(cacheKey, payload);
        try {
          localStorage.setItem(cacheKey, JSON.stringify(payload));
        } catch (_error) {
          // Ignore storage quota errors.
        }
      }

      function scheduleBooksBackgroundRefresh(taskKey, callback) {
        if (!taskKey || typeof callback !== 'function' || state.backgroundRefreshes.has(taskKey)) return;
        state.backgroundRefreshes.add(taskKey);
        const run = () => {
          Promise.resolve()
            .then(callback)
            .catch((error) => console.warn('Books background refresh failed', error))
            .finally(() => state.backgroundRefreshes.delete(taskKey));
        };
        if (typeof window.requestIdleCallback === 'function') {
          window.requestIdleCallback(run, { timeout: 1800 });
        } else {
          window.setTimeout(run, 350);
        }
      }

      function scoreBookMatch(item) {
        const query = String(state.query || '').trim().toLowerCase();
        const authorQuery = String(state.author || '').trim().toLowerCase();
        const categoryQuery = String(state.activeCategory || '').trim().toLowerCase();
        const yearQuery = String(state.year || '').trim();
        const title = String(item?.title || '').trim().toLowerCase();
        const authors = Array.isArray(item?.author_name)
          ? item.author_name.map((name) => String(name || '').trim().toLowerCase()).join(' ')
          : '';
        const subjects = Array.isArray(item?.subject)
          ? item.subject.map((entry) => String(entry || '').trim().toLowerCase()).join(' ')
          : '';
        const publishYear = String(item?.first_publish_year || '').trim();
        let score = 0;

        if (query) {
          if (title === query) score += 240;
          else if (title.startsWith(query)) score += 180;
          else if (title.includes(query)) score += 120;
          if (authors.includes(query)) score += 80;
          if (subjects.includes(query)) score += 36;
          query.split(/\s+/).filter(Boolean).forEach((term) => {
            if (title.includes(term)) score += 16;
            if (authors.includes(term)) score += 11;
            if (subjects.includes(term)) score += 6;
          });
        }

        if (authorQuery) {
          if (authors === authorQuery) score += 140;
          else if (authors.includes(authorQuery)) score += 90;
        }

        if (categoryQuery && subjects.includes(categoryQuery)) score += 42;
        if (yearQuery && publishYear.startsWith(yearQuery)) score += 30;
        return score;
      }

      function sortBooksByAccuracy(items) {
        const list = Array.isArray(items) ? items.slice() : [];
        if (!list.length) return [];
        const hasQuery = !!String(state.query || '').trim() ||
          !!String(state.author || '').trim() ||
          !!String(state.activeCategory || '').trim() ||
          !!String(state.year || '').trim();
        if (!hasQuery) return list;
        return list
          .map((item, index) => ({ item, index, score: scoreBookMatch(item) }))
          .sort((a, b) => (Number(b.score || 0) - Number(a.score || 0)) || (a.index - b.index))
          .map((entry) => entry.item);
      }

      function renderListIcon(icon) {
        if (window.ListUtils) return ListUtils.renderListIcon(icon, 'fas fa-book');
        if (!icon) return '<i class="fas fa-book"></i>';
        if (icon.includes('fa-')) return `<i class="${icon}"></i>`;
        return icon;
      }

        if (typeof supabase === 'undefined') {
          await new Promise(resolve => setTimeout(resolve, 500));

        if (typeof supabase === 'undefined') return null;
        if (typeof window.__ZO2Y_ENSURE_SUPABASE_CLIENT === 'function') {
          supabaseClient = window.__ZO2Y_ENSURE_SUPABASE_CLIENT();
        }
        if (!supabaseClient) {
          supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: false,
              storageKey: 'zo2y-auth-v1'
            }
          });
        }
        return supabaseClient;
      }

      async function initAuth() {
        if (!supabaseClient) return;
        const { data: { user } } = await supabaseClient.auth.getUser();
        state.currentUser = user || null;

      async function loadUserListStatus() {
        state.listStatusMap = new Map();

        const { data, error } = await supabaseClient
          .from('book_list_items')
          .select('book_id, list_type')
          .eq('user_id', state.currentUser.id);

          if (!state.listStatusMap.has(row.book_id)) {
            state.listStatusMap.set(row.book_id, { favorites: false, read: false, readlist: false });

          if (row.list_type && state.listStatusMap.get(row.book_id)[row.list_type] !== undefined) {
            state.listStatusMap.get(row.book_id)[row.list_type] = true;
          }

      let pageSpotlightTimer = null;
      let pageSpotlightItems = [];
      let pageSpotlightIndex = 0;

      function getBookSpotlightCover(book) {
        return getPreferredBookImage(book) || FALLBACK_BOOK_IMAGE;
      }

      function pickBookSpotlightPool(items = []) {
        const seen = new Set();
        return (Array.isArray(items) ? items : []).filter((book) => {
          const key = String(book?.id || book?.key || book?.title || '').trim().toLowerCase();
          const cover = getBookSpotlightCover(book);
          if (!key || !cover || seen.has(key)) return false;
          seen.add(key);
          return true;
        }).slice(0, 12);
      }

      function renderBookPageSpotlight(book) {
        const section = document.getElementById('booksSpotlight');
        if (!section || !book) return;
        const bg = document.getElementById('booksSpotlightBg');
        const titleEl = document.getElementById('booksSpotlightTitle');
        const metaEl = document.getElementById('booksSpotlightMeta');
        const summaryEl = document.getElementById('booksSpotlightSummary');
        const imgEl = document.getElementById('booksSpotlightImage');
        const openEl = document.getElementById('booksSpotlightOpen');
        const cover = getBookSpotlightCover(book);
        const hasRealCover = cover && cover !== FALLBACK_BOOK_IMAGE;
        section.hidden = false;
        if (bg) {
          bg.style.backgroundImage = hasRealCover
            ? `linear-gradient(120deg, rgba(8,14,31,0.76), rgba(10,19,39,0.38)), url("${cover}")`
            : 'linear-gradient(120deg, #12203e 0%, #1b2f61 48%, #243b77 100%)';
        }
        if (titleEl) titleEl.textContent = book.title || 'Book Spotlight';
        if (metaEl) metaEl.textContent = [Array.isArray(book.author_name) ? book.author_name.slice(0, 2).join(', ') : '', book.first_publish_year || ''].filter(Boolean).join(' ? ');
        if (summaryEl) summaryEl.textContent = String(book.description || '').trim() || (Array.isArray(book.subject) ? book.subject.slice(0, 4).join(' ? ') : 'A standout book from the local catalog.');
        if (imgEl) {
          imgEl.src = cover;
          imgEl.alt = `${book.title || 'Book'} cover`;
        }
        if (openEl) openEl.href = `book.html?id=${encodeURIComponent(String(getBookEntryId(book) || ''))}`;
      }

      function resetBookPageSpotlightTimer() {
        if (pageSpotlightTimer) clearInterval(pageSpotlightTimer);
        if (pageSpotlightItems.length < 2) return;
        pageSpotlightTimer = window.setInterval(() => {
          pageSpotlightIndex = (pageSpotlightIndex + 1) % pageSpotlightItems.length;
          renderBookPageSpotlight(pageSpotlightItems[pageSpotlightIndex]);
        }, 6500);
      }

      function updateBookPageSpotlight(items = []) {
        pageSpotlightItems = pickBookSpotlightPool(items);
        pageSpotlightIndex = 0;
        const section = document.getElementById('booksSpotlight');
        if (!section) return;
        if (!pageSpotlightItems.length) {
          section.hidden = true;
          if (pageSpotlightTimer) clearInterval(pageSpotlightTimer);
          return;
        }
        renderBookPageSpotlight(pageSpotlightItems[0]);
        resetBookPageSpotlightTimer();
      }

      function filterByYear(items) {

      async function upsertBookRecord(book, bookId) {
        if (!book) return false;
        const safeId = String(bookId || getBookEntryId(book)).trim();
        if (!safeId) return false;
        const payload = {
          id: safeId,
          title: book.title || '',
          authors: (book.author_name || []).join(', '),
          thumbnail: getPreferredBookImage(book) || '',
          published_date: book.first_publish_year ? `${book.first_publish_year}-01-01` : null,
          categories: book.subject || [],
          description: '',
          page_count: null,
          publisher: book.publisher ? book.publisher[0] : null,
          updated_at: new Date().toISOString()
        };
        if (window.ListUtils && typeof ListUtils.ensureBookRecord === 'function') {
          const ok = await ListUtils.ensureBookRecord(supabaseClient, payload);
          if (!ok && !state.bookSyncWarned) {
            state.bookSyncWarned = true;
            showNotification('Book info is unavailable right now.', 'error');
          }
          return !!ok;
        }
        return false;
      }

      async function loadBooks() {
        const grid = document.getElementById('booksGrid');
        if (!grid) return;
        const requestSeq = ++state.requestSeq;
        const cacheKey = getBooksCacheKey();
        const cached = readBooksCache(cacheKey);
        const hasActiveFilters = !!(state.query || state.author || state.activeCategory || state.year);
        const isFirstPopularPage = !hasActiveFilters && Number(state.page || 1) === 1;
        const cachedIsFresh = !!(cached?.cachedAt && (Date.now() - cached.cachedAt) < BOOKS_CACHE_TTL_MS);

        if (cached?.docs?.length) {
          updateBookPageSpotlight(cached.docs);
          displayBookResults(cached.docs, cached.numFound || cached.docs.length);
          if (cachedIsFresh) {
            if (isFirstPopularPage) {
              scheduleBooksBackgroundRefresh('books-trending-warmup', async () => {
                await fetchTrendingBooks(Math.min(8, BOOKS_PER_PAGE));
              });
            }
            return;
          }
        }

          let data;
          try {
            const localData = await fetchLocalBooksPage();
            if (requestSeq !== state.requestSeq) return;
            const localDocs = Array.isArray(localData?.docs) ? localData.docs : [];
            const localDocsWithApiCovers = localDocs.filter((doc) => Boolean(getPreferredBookImage(doc)));
            if (localDocsWithApiCovers.length) {
              data = {
                ...(localData || {}),
                docs: localDocsWithApiCovers,
                numFound: Number(localData?.numFound || localDocsWithApiCovers.length)
              };
              updateBookPageSpotlight(localDocsWithApiCovers);
              writeBooksCache(cacheKey, data);
            } else {
              const params = {
                page: state.page,
                limit: BOOKS_PER_PAGE,
                language: 'en'
              };
              if (state.query) params.q = state.query;
              if (state.author) params.author = state.author;
              if (state.activeCategory) params.subject = state.activeCategory;
              if (state.year) params.first_publish_year = state.year;
          if (!params.q && !params.author && !params.subject && !params.first_publish_year) {
            data = await fetchPopularBooks(state.page, BOOKS_PER_PAGE);
            if (Number(state.page || 1) === 1) {
              scheduleBooksBackgroundRefresh('books-trending-warmup', async () => {
                await fetchTrendingBooks(Math.min(8, BOOKS_PER_PAGE));
              });
            }
          } else {
            data = await booksFetch('/search.json', params);
          }
          if (!Array.isArray(data?.docs) || !data.docs.length) {
            data = { docs: [], numFound: 0 };
          }
          updateBookPageSpotlight(data.docs || []);
          writeBooksCache(cacheKey, data);
          }
        } catch (e) {
          console.error('Books fetch error', e);
          data = cached && Array.isArray(cached.docs)
            ? { docs: cached.docs, numFound: cached.numFound || cached.docs.length }
            : { docs: [], numFound: 0 };
        }

        if (requestSeq !== state.requestSeq) return;
        updateBookPageSpotlight(data.docs || []);
        displayBookResults(data.docs || [], data.numFound || 0);
      }

      function displayBookResults(docs, totalFound) {
        const grid = document.getElementById('booksGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;
        const data = { docs: docs || [], numFound: totalFound || 0 };

        let results = data.docs || [];
        results = filterByYear(results);
        results = sortBooksByAccuracy(results);

        if (!results.length) {
          if (empty) empty.style.display = 'block';
          grid.innerHTML = '';
          return;
        }

        const fragment = document.createDocumentFragment();
        state.bookIndex.clear();
        results.forEach((item, idx) => {
          const authors = item.author_name ? item.author_name.join(', ') : 'Unknown author';
          const year = item.first_publish_year || '';
          const desc = truncateText(item.title || '', 140) || 'No description available.';
          const thumb = getPreferredBookImage(item);
          const bookId = getBookEntryId(item, idx);
          const titleParam = encodeURIComponent(String(item?.title || '').trim());
          const authorParam = encodeURIComponent(String((Array.isArray(item?.author_name) ? item.author_name[0] : '') || '').trim());
          state.bookIndex.set(bookId, item);

          const card = document.createElement('div');
          card.className = 'card';
          card.setAttribute('data-book-id', bookId);
          card.innerHTML = `
            <img
              src="${thumb || FALLBACK_BOOK_IMAGE}"
              alt="${item.title || 'Book'}"
              loading="lazy"
              onerror="this.onerror=null;this.src='/newlogo.webp';">
            <div class="card-body">
              <h3 class="card-title">${item.title || 'Untitled'}</h3>
              <div class="card-meta-row">
                <div class="card-meta">${authors}${year ? ` ÃƒÆ’Ã‚Â¯Ãƒâ€šÃ‚Â¿Ãƒâ€šÃ‚Â½ ${year}` : ''}</div>
                <div class="card-menu-wrap">
                  <button class="menu-btn" aria-label="Save to lists"><i class="fas fa-ellipsis-v"></i></button>
                </div>
              </div>
              <div class="card-desc">${desc}</div>
            </div>
          `;
          card.onclick = (e) => {
            if (e.target.closest('.menu-btn')) return;
            window.location.href = `book.html?id=${encodeURIComponent(bookId)}&title=${titleParam}&author=${authorParam}`;
          };
          wireCardMenu(card, bookId);
          updateCardMenuUI(card, bookId);
          fragment.appendChild(card);
        });
        grid.innerHTML = '';
        grid.appendChild(fragment);
        if (empty) empty.style.display = 'none';

        const reportedTotal = Number(data.numFound || 0) || 0;
        const currentPage = Math.max(1, Number(state.page || 1));
        const minimumTotal = ((currentPage - 1) * BOOKS_PER_PAGE) + results.length;
        let effectiveTotal = Math.max(reportedTotal, minimumTotal);
        if (results.length >= BOOKS_PER_PAGE && effectiveTotal <= (currentPage * BOOKS_PER_PAGE)) {
          effectiveTotal = (currentPage * BOOKS_PER_PAGE) + BOOKS_PER_PAGE;
        }
        state.totalPages = Math.max(currentPage, Math.ceil(effectiveTotal / BOOKS_PER_PAGE));
        updatePagination();
      }

      async function toggleDefaultList(bookId, listType, card, forcedNextSaved) {
        if (!state.currentUser) {
          showNotification('Please sign in to save books', 'info');
          return { ok: false, saved: false };
        }
        if (!supabaseClient) return { ok: false, saved: false };
        const status = state.listStatusMap.get(bookId) || { favorites: false, read: false, readlist: false };
        const previousSaved = !!status[listType];
        const nextSaved = typeof forcedNextSaved === 'boolean' ? forcedNextSaved : !previousSaved;
        const opKey = `${bookId}:${listType}`;
        if (state.pendingDefaultOps.has(opKey)) {
          return { ok: false, saved: previousSaved };
        }
        state.pendingDefaultOps.add(opKey);

        status[listType] = nextSaved;
        state.listStatusMap.set(bookId, status);
        if (card) updateCardMenuUI(card, bookId);

        try {
          if (nextSaved) {
            const ensured = await upsertBookRecord(state.bookIndex.get(bookId), bookId);
            if (!ensured) throw new Error('book_record_missing');
            const { error } = await supabaseClient
              .from('book_list_items')
              .insert({ user_id: state.currentUser.id, book_id: bookId, list_type: listType });
            if (error && String(error.code || '') !== '23505') throw error;
            showNotification('Saved to list', 'success');
          } else {
            const { error } = await supabaseClient
              .from('book_list_items')
              .delete()
              .eq('user_id', state.currentUser.id)
              .eq('book_id', bookId)
              .eq('list_type', listType);
            if (error) throw error;
            showNotification('Removed from list', 'info');
          }
          return { ok: true, saved: nextSaved };
        } catch (_err) {
          status[listType] = previousSaved;
          state.listStatusMap.set(bookId, status);
          if (card) updateCardMenuUI(card, bookId);
          showNotification('Could not update list', 'error');
          return { ok: false, saved: previousSaved };
        } finally {
          state.pendingDefaultOps.delete(opKey);
        }
      }

      function wireUI() {
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const yearInput = document.getElementById('yearInput');
        const authorInput = document.getElementById('authorInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const closeListsBtn = document.getElementById('closeBookListsBtn');
        const saveListsBtn = document.getElementById('saveBookListsBtn');
        const createListBtn = document.getElementById('createBookListBtn');
        const iconOptions = document.querySelectorAll('#bookListIconOptions .icon-option');
        const debouncedSearchReload = debounce(() => {
          renderFilters();
          state.page = 1;
          loadBooks();
        }, 280);
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            state.query = e.target.value.trim();
            debouncedSearchReload();
          });
        }
        if (categorySelect) {
          categorySelect.addEventListener('change', (e) => {
            state.activeCategory = e.target.value;
            renderFilters();
            state.page = 1;
            loadBooks();
          });
        }
        if (yearInput) {
          yearInput.addEventListener('input', (e) => {
            state.year = e.target.value.trim();
            renderFilters();
            state.page = 1;
            loadBooks();
          });
        }
        if (authorInput) {
          authorInput.addEventListener('input', (e) => {
            state.author = e.target.value.trim();
            debouncedSearchReload();
          });
        }
        if (refreshBtn) {
          refreshBtn.addEventListener('click', () => loadBooks());
        }
        if (prevBtn) {
          prevBtn.addEventListener('click', () => {
            if (state.page > 1) {
              state.page -= 1;
              loadBooks();
            }
          });
        }
        if (nextBtn) {
          nextBtn.addEventListener('click', () => {
            if (state.page < state.totalPages) {
              state.page += 1;
              loadBooks();
            }
          });
        }
        if (closeListsBtn) closeListsBtn.addEventListener('click', closeBookListsModal);
        if (saveListsBtn) saveListsBtn.addEventListener('click', saveBookListChanges);
        if (createListBtn) createListBtn.addEventListener('click', createBookList);
        iconOptions.forEach(btn => {
          btn.addEventListener('click', () => {
            iconOptions.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            state.selectedIcon = btn.getAttribute('data-icon') || 'fas fa-book';
          });
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeAllListMenus();
        });
      }

      function updatePagination() {
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const info = document.getElementById('pageInfo');
        if (prevBtn) prevBtn.disabled = state.page <= 1;
        if (nextBtn) nextBtn.disabled = state.page >= state.totalPages;
        if (info) info.textContent = `Page ${state.page} of ${state.totalPages}`;
      }

      function syncSearchStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const search = (params.get('search') || '').trim();
        if (!search) return;
        state.query = search;
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.value = search;
      }

      if (window.initIndexStyleListMenu) {
        window.initIndexStyleListMenu({
          mediaType: 'book',
          itemIdAttr: 'data-book-id',
          getVisibleItemIds: () =>
            Array.from(document.querySelectorAll('.card[data-book-id]'))
              .map((card) => card.getAttribute('data-book-id'))
              .filter(Boolean),
          getQuickStatusForItem: (itemId) => {
            const key = String(itemId || '');
            const status = state.listStatusMap.get(key);
            return status ? { ...status } : null;
          },
          ensureClient: async () => {
            if (supabaseClient) return supabaseClient;
            await initSupabase();
            return supabaseClient;
          },
          getCurrentUser: () => state.currentUser,
          notify: (message, isError) => showNotification(message, isError ? 'error' : 'success'),
          toggleDefaultList: async ({ itemId, listType, card, nextSaved }) =>
            toggleDefaultList(itemId, listType, card, nextSaved)
        });
      }

      (async function init() {
        await initSupabase();
        wireUI();
        syncSearchStateFromUrl();
        populateCategories();
        await initAuth();
        renderFilters();
        loadBooks();
      })();
    })();
  </script>
  <script src="js/production-runtime.js?v=20260307a" defer></script>
</body>
</html>
