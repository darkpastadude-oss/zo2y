<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zo2y</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Orange stripe */
        header {
            background-color: orange;
            height: 120px; /* made bigger */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .welcome-section {
            text-align: center;
            padding: 50px 20px;
        }

        .welcome-section h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .welcome-section p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .get-started-btn {
            padding: 15px 40px;
            background-color: orange;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .items {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            padding: 40px 20px;
        }

        .item {
            text-align: center;
        }

        .item-img {
            width: 200px;
            height: auto;
            border-radius: 12px;
        }

        .item h2 {
            margin-top: 10px;
            font-size: 1.5rem;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: white;
            color: orange;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid orange;
        }
    </style>
</head>
<body>
    <header>
        Zo2y
    </header>

    <a href="index.html" class="home-btn">Home</a>

    <section class="welcome-section">
        <h1>Welcome to Zo2y</h1>
        <p>Your one-stop spot for cool stuff.</p>
        <a href="#" class="get-started-btn">Get Started</a>
    </section>

    <section class="items">
        <!-- Mori Sushi -->
        <div class="item">
            <img src="mori.png" alt="Mori Sushi" class="item-img">
            <h2>Mori Sushi</h2>
        </div>

        <!-- Bazooka -->
        <div class="item">
            <img src="bazooka.jpg" alt="Bazooka" class="item-img">
            <h2>Bazooka</h2>
        </div>
    </section>
</body>
</html>
