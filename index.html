<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zo2y</title>
<style>
  /* --- Reset & Fonts --- */
  * {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
  body {background:#fff;color:#333;overflow-x:hidden;}

  /* --- Top Stripe --- */
  .top-stripe {
    background:#FF6F00;
    height:6px;
    position:relative;
  }

  /* --- Logo --- */
  .logo {
    position:absolute;
    top: -30px;
    left:50%;
    transform:translateX(-50%);
    width:100px;
    animation: float 3s ease-in-out infinite;
    cursor:pointer;
  }
  @keyframes float {
    0%,100% {transform: translate(-50%, -5px);}
    50% {transform: translate(-50%, 5px);}
  }

  /* --- Hero Section --- */
  .hero {
    text-align:center;
    padding:140px 20px 80px 20px;
    position:relative;
  }
  .hero h1 {
    font-size:3rem;
    margin-bottom:20px;
    opacity:0;
    animation: fadeInUp 1s forwards;
  }
  .hero p {
    font-size:1.2rem;
    color:#555;
    margin-bottom:40px;
    opacity:0;
    animation: fadeInUp 1s 0.3s forwards;
  }
  .get-started {
    background:#FF6F00;
    color:#fff;
    padding:15px 50px;
    font-size:1.2rem;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    opacity:0;
    animation: fadeInUp 1s 0.6s forwards;
  }
  .get-started:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(255,111,0,0.5);
  }
  @keyframes fadeInUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
  }

  /* --- Restaurants Section --- */
  .restaurants {
    display:flex;
    gap:20px;
    padding:50px 20px;
    overflow-x:auto;
    scroll-behavior:smooth;
  }
  .restaurant-card {
    flex:0 0 250px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transform: translateY(50px);
    opacity:0;
    transition: transform 0.6s, opacity 0.6s;
  }
  .restaurant-card img {
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
  }
  .restaurant-card h3 {margin-bottom:10px;}
  .restaurant-card p {margin-bottom:10px; color:#777;}
  .restaurant-card .stars {color:#FF6F00; font-size:1.1rem;}

  /* --- Footer --- */
  footer {
    text-align:center;
    padding:40px 20px;
    border-top:1px solid #eee;
    font-size:0.9rem;
    color:#555;
  }

  /* Scrollbar style for restaurant row */
  .restaurants::-webkit-scrollbar {height:8px;}
  .restaurants::-webkit-scrollbar-thumb {background:#FF6F00;border-radius:4px;}
  .restaurants::-webkit-scrollbar-track {background:#f1f1f1;}
</style>
</head>
<body>

<!-- Top Stripe + Logo -->
<div class="top-stripe">
  <img src="zo2y.png" alt="Zo2y Logo" class="logo">
</div>

<!-- Hero Section -->
<section class="hero">
  <h1>Discover and Rate the Best Spots Around You</h1>
  <p>Restaurants, malls, cinemas, and more—your go-to rating app.</p>
  <button class="get-started" onclick="window.location.href='login.html'">Get Started</button>
</section>

<!-- Restaurants Preview -->
<section class="restaurants" id="restaurants">
  <!-- Cards added by JS -->
</section>

<!-- Footer -->
<footer>
  © 2025 Zo2y. All rights reserved.
</footer>

<script>
  // --- Sample Restaurant Data ---
  const restaurants = [
    {name:"Mori Sushi", category:"Japanese", img:"https://via.placeholder.com/250x150", rating:4.7},
    {name:"Kilo Kebab", category:"Middle Eastern", img:"https://via.placeholder.com/250x150", rating:4.5},
    {name:"Hameed", category:"Fast Food", img:"https://via.placeholder.com/250x150", rating:4.3},
    {name:"Bazooka", category:"Burger", img:"https://via.placeholder.com/250x150", rating:4.2},
    {name:"Mexican Corn", category:"Mexican", img:"https://via.placeholder.com/250x150", rating:4.0}
  ];

  const container = document.getElementById('restaurants');

  restaurants.forEach((r, i)=>{
    const card = document.createElement('div');
    card.className = 'restaurant-card';
    card.innerHTML = `
      <img src="${r.img}" alt="${r.name}">
      <h3>${r.name}</h3>
      <p>${r.category}</p>
      <div class="stars">${'★'.repeat(Math.round(r.rating))}</div>
    `;
    container.appendChild(card);

    // Animate cards on load with staggered delay
    setTimeout(()=> {
      card.style.transform = 'translateY(0)';
      card.style.opacity = '1';
    }, i*200);
  });
</script>

</body>
</html>
