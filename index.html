<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zo2y - Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #fafafa;
      color: #333;
    }

    header {
      background: #FF6F00;
      color: white;
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header img {
      height: 50px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #FF6F00, #FFA000);
      color: white;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: fadeInDown 1s ease;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      animation: fadeIn 1.5s ease;
    }

    .hero button {
      padding: 12px 25px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: white;
      color: #FF6F00;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero button:hover {
      background: #ffe0b2;
    }

    .restaurants {
      display: flex;
      gap: 20px;
      padding: 50px 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .restaurant-card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
      width: 180px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .restaurant-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .icon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .restaurant-icon, .more-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    .more-icon {
      border: 2px dashed #FF6F00;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #FF6F00;
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
      animation: pulse 2s infinite;
    }
