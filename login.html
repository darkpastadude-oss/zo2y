<body data-auth-variant="login">
<div class="auth-entry-shell auth-entry-shell-login">
  <section class="auth-entry-panel">
    <div class="auth-panel-topbar">
      <a class="auth-entry-home" href="index.html" aria-label="Back to landing">
        <img src="/newlogo.webp" alt="Zo2y home">
      </a>
      <a class="auth-topbar-link" href="sign-up.html">sign up</a>
    </div>
    <div class="auth-panel-card auth-panel-card-login auth-card">
      <h2>Log in</h2>

      <div id="errorMessage" class="message error"></div>
      <div id="successMessage" class="message success"></div>
      <div class="auth-invite-banner" id="authInviteBanner" hidden></div>

      <button class="google-btn" id="googleAuthBtn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <form id="authForm">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" id="email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password" required>
        </div>
        <div class="actions-row">
          <label><input type="checkbox" id="remember"> Remember me</label>
          <a href="#" id="forgotPassword">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
      </form>

      <div class="alt-link">Don't have an account? <a href="sign-up.html" id="altSignupLink">Sign up</a></div>
    </div>
  </section>
</div>
