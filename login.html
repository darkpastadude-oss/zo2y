<body data-auth-variant="login">
<div class="auth-entry-shell auth-entry-shell-login">
  <section class="auth-entry-panel">
    <div class="auth-panel-topbar">
      <a class="auth-entry-home" href="index.html" aria-label="Back to landing">
        <img src="/newlogo.webp" alt="Zo2y home">
      </a>
      <a class="auth-topbar-link" href="sign-up.html">sign up</a>
    </div>
    <div class="auth-panel-card auth-panel-card-login auth-card">
      <h2>Log in</h2>

      <div id="errorMessage" class="message error"></div>
      <div id="successMessage" class="message success"></div>
      <div class="auth-invite-banner" id="authInviteBanner" hidden></div>

      <button class="google-btn" id="googleAuthBtn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <form id="authForm">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Email" id="email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="password" required>
        </div>
        <div class="actions-row">
          <label><input type="checkbox" id="remember"> Remember me</label>
          <a href="#" id="forgotPassword">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-sign-in-alt"></i> Log In</button>
      </form>

      <div class="alt-link">Don't have an account? <a href="sign-up.html" id="altSignupLink">Sign up</a></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/referral-utils.js?v=20260319a"></script>
<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'zo2y-auth-v1';
  const LEGACY_STORAGE_KEY = 'sb-gfkhjbztayjyojsgdpgk-auth-token';
  const PERSIST_STORAGE_KEY = 'zo2y-auth-persist-v1';
  const DURABLE_STORAGE_KEY = 'zo2y-auth-durable-v1';
  function getAuthStorageKeys(key) {
    const value = String(key || '').trim();
    if (!value) return [];
    if (value === STORAGE_KEY || value === LEGACY_STORAGE_KEY || value === PERSIST_STORAGE_KEY) {
      return [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY];
    }
    return [value];
  }
  const bootstrapAuthStorageBridge = window.__ZO2Y_AUTH_STORAGE_BRIDGE || {
    getItem(key) {
      const keys = getAuthStorageKeys(key);
      for (const candidate of keys) {
        try {
          const localValue = window.localStorage ? window.localStorage.getItem(candidate) : null;
          if (localValue !== null && localValue !== undefined && localValue !== '') return localValue;
        } catch (_err) {}
      }
      for (const candidate of keys) {
        try {
          const sessionValue = window.sessionStorage ? window.sessionStorage.getItem(candidate) : null;
          if (sessionValue !== null && sessionValue !== undefined && sessionValue !== '') return sessionValue;
        } catch (_err) {}
      }
      return null;
    },
    setItem(key, value) {
      const keys = getAuthStorageKeys(key);
      keys.forEach((candidate) => {
        try {
          if (window.localStorage) window.localStorage.setItem(candidate, value);
        } catch (_err) {}
      });
      keys.forEach((candidate) => {
        try {
          if (window.sessionStorage) window.sessionStorage.setItem(candidate, value);
        } catch (_err) {}
      });
    },
    removeItem(key) {
      const keys = getAuthStorageKeys(key);
      keys.forEach((candidate) => {
        try {
          if (window.sessionStorage) window.sessionStorage.removeItem(candidate);
        } catch (_err) {}
      });
      keys.forEach((candidate) => {
        try {
          if (window.localStorage) window.localStorage.removeItem(candidate);
        } catch (_err) {}
      });
    }
  };
  window.__ZO2Y_AUTH_STORAGE_BRIDGE = bootstrapAuthStorageBridge;
  const supabase = window.supabase.createClient(
    'https://gfkhjbztayjyojsgdpgk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdma2hqYnp0YXlqeW9qc2dkcGdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwOTYyNjQsImV4cCI6MjA3NTY3MjI2NH0.WUb2yDAwCeokdpWCPeH13FE8NhWF6G8e6ivTsgu6b2s',
    {
      auth: {
        storage: bootstrapAuthStorageBridge,
        storageKey: STORAGE_KEY,
        persistSession: true,
        autoRefreshToken: false,
        detectSessionInUrl: false  // Important: Don't auto-detect on login page
      }
    }
  );

  const form = document.getElementById('authForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const remember = document.getElementById('remember');
  const forgotPassword = document.getElementById('forgotPassword');
  const googleBtn = document.getElementById('googleAuthBtn');
  const submitBtn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('errorMessage');
  const successEl = document.getElementById('successMessage');

  const googleDefaultHtml = googleBtn.innerHTML;
  const submitDefaultHtml = submitBtn.innerHTML;
  const referralUtils = window.ZO2Y_REFERRALS || null;
  const activeReferral = referralUtils ? referralUtils.captureReferralFromLocation(window.location.search) : '';
  let verifiedUserPromise = null;
  const AUTH_DEBUG_KEY = 'zo2y_auth_debug';
  function safeGetAuthStorage(key) {
    const keys = getAuthStorageKeys(key);
    for (const candidate of keys) {
      try {
        const localValue = window.localStorage ? window.localStorage.getItem(candidate) : null;
        if (localValue !== null && localValue !== undefined && localValue !== '') return localValue;
      } catch (_err) {}
    }
    for (const candidate of keys) {
      try {
        const sessionValue = window.sessionStorage ? window.sessionStorage.getItem(candidate) : null;
        if (sessionValue !== null && sessionValue !== undefined && sessionValue !== '') return sessionValue;
      } catch (_err) {}
    }
    return null;
  }

  function safeSetAuthStorage(key, value) {
    const keys = getAuthStorageKeys(key);
    let wroteAny = false;
    keys.forEach((candidate) => {
      try {
        if (window.localStorage) {
          window.localStorage.setItem(candidate, value);
          wroteAny = true;
        }
      } catch (_err) {}
    });
    keys.forEach((candidate) => {
      try {
        if (window.sessionStorage) {
          window.sessionStorage.setItem(candidate, value);
          wroteAny = true;
        }
      } catch (_err) {}
    });
    return wroteAny;
  }

  function safeRemoveAuthStorage(key) {
    const keys = getAuthStorageKeys(key);
    keys.forEach((candidate) => {
      try {
        if (window.sessionStorage) window.sessionStorage.removeItem(candidate);
      } catch (_err) {}
    });
    keys.forEach((candidate) => {
      try {
        if (window.localStorage) window.localStorage.removeItem(candidate);
      } catch (_err) {}
    });
  }

  function authDebugEnabled() {
    try {
      const params = new URLSearchParams(window.location.search);
      if (params.get('debug_auth') === '1') {
        if (window.localStorage) window.localStorage.setItem(AUTH_DEBUG_KEY, '1');
        return true;
      }
    } catch (_err) {}
    try {
      return !!(window.localStorage && window.localStorage.getItem(AUTH_DEBUG_KEY) === '1');
    } catch (_err) {
      return false;
    }
  }

  function previewSession(session) {
    return session ? {
      hasAccessToken: !!session.access_token,
      hasRefreshToken: !!session.refresh_token,
      userId: String(session.user?.id || '').trim() || null,
      email: String(session.user?.email || '').trim() || null,
      provider: String(session.user?.app_metadata?.provider || session.user?.user_metadata?.provider || '').trim() || null,
      expiresAt: session.expires_at || null
    } : null;
  }

  function getAuthStoragePresence() {
    const keys = [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY, DURABLE_STORAGE_KEY];
    const state = {};
    keys.forEach((key) => {
      let local = false;
      let session = false;
      try {
        local = !!(window.localStorage && window.localStorage.getItem(key));
      } catch (_err) {}
      try {
        session = !!(window.sessionStorage && window.sessionStorage.getItem(key));
      } catch (_err) {}
      state[key] = { local, session };
    });
    return state;
  }

  function authDebug(label, payload) {
    if (!authDebugEnabled()) return;
    if (payload === undefined) {
      console.log('[ZO2Y AUTH][login]', label);
      return;
    }
    console.log('[ZO2Y AUTH][login]', label, payload);
  }

  function persistSessionSnapshot(session) {
    if (!session || typeof session !== 'object') return false;
    try {
      const payload = JSON.stringify(session);
      safeSetAuthStorage(STORAGE_KEY, payload);
      safeSetAuthStorage(LEGACY_STORAGE_KEY, payload);
      safeSetAuthStorage(PERSIST_STORAGE_KEY, payload);
      try {
        localStorage.setItem(DURABLE_STORAGE_KEY, JSON.stringify({
          session,
          createdAt: Date.now()
        }));
      } catch (_err) {}
      if (typeof window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT === 'function') {
        window.__ZO2Y_CLEAR_EXPLICIT_SIGNOUT();
      }
      authDebug('persistSessionSnapshot', {
        session: previewSession(session),
        storage: getAuthStoragePresence()
      });
      return true;
    } catch (_err) {
      authDebug('persistSessionSnapshot:error', {
        message: String(_err?.message || _err || '')
      });
      return false;
    }
  }

  function readStoredSessionSnapshot() {
    const keys = [STORAGE_KEY, LEGACY_STORAGE_KEY, PERSIST_STORAGE_KEY];
    for (const key of keys) {
      try {
        const raw = safeGetAuthStorage(key);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        const session = parsed?.currentSession || parsed?.session || parsed;
        if (session?.access_token && session?.refresh_token) return session;
      } catch (_err) {}
    }
    try {
      const raw = localStorage.getItem(DURABLE_STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const session = parsed?.session || parsed?.currentSession || parsed;
      if (session?.access_token && session?.refresh_token) return session;
    } catch (_err) {}
    return null;
  }

  async function restoreSessionFromStorage(clientOverride = null) {
    const storedSession = readStoredSessionSnapshot();
    if (!storedSession?.access_token || !storedSession?.refresh_token) return null;
    const authClient = clientOverride || getPreferredOAuthClient();
    if (!authClient?.auth || typeof authClient.auth.setSession !== 'function') return null;
    try {
      const { data } = await authClient.auth.setSession({
        access_token: storedSession.access_token,
        refresh_token: storedSession.refresh_token
      });
      const session = data?.session || null;
      if (session?.access_token && session?.refresh_token) {
        persistSessionSnapshot(session);
      }
      return session;
    } catch (_err) {
      return null;
    }
  }

  const authStorageBridge = window.__ZO2Y_AUTH_STORAGE_BRIDGE || {
    getItem(key) {
      return safeGetAuthStorage(key);
    },
    setItem(key, value) {
      safeSetAuthStorage(key, value);
    },
    removeItem(key) {
      safeRemoveAuthStorage(key);
    }
  };
  window.__ZO2Y_AUTH_STORAGE_BRIDGE = authStorageBridge;

  const initialNextPath = sanitizeNextPath(new URLSearchParams(window.location.search).get('next') || safeGetAuthStorage('postAuthRedirect') || 'index.html');

  function analyticsTrack(eventName, properties = {}, essential = false) {
    try {
      if (window.ZO2Y_ANALYTICS && typeof window.ZO2Y_ANALYTICS.track === 'function') {
        window.ZO2Y_ANALYTICS.track(eventName, properties, essential ? { essential: true } : {});
      }
    } catch (_err) {}
  }

  function analyticsMarkFirstAction(eventName, properties = {}) {
    try {
      if (window.ZO2Y_ANALYTICS && typeof window.ZO2Y_ANALYTICS.markFirstAction === 'function') {
        window.ZO2Y_ANALYTICS.markFirstAction(eventName, properties, { essential: true });
      } else {
        analyticsTrack(eventName, properties, true);
      }
    } catch (_err) {}
  }

  function sanitizeNextPath(raw) {
    const value = String(raw || '').trim();
    if (!value) return 'index.html';
    if (/^https?:\/\//i.test(value) || value.startsWith('//')) return 'index.html';
    if (value.startsWith('/')) return value.slice(1) || 'index.html';
    return value;
  }

  function getPostAuthRedirect() {
    return sanitizeNextPath(new URLSearchParams(window.location.search).get('next') || safeGetAuthStorage('postAuthRedirect') || initialNextPath || 'index.html');
  }

  function getHashParams() {
    const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
    return new URLSearchParams(hash);
  }

  function buildPostAuthRedirectTarget(rawNext) {
    const safeNext = sanitizeNextPath(rawNext || 'index.html');
    try {
      const targetUrl = new URL(safeNext, window.location.origin);
      targetUrl.searchParams.set('auth_return', '1');
      targetUrl.searchParams.set('authv', '20260325c');
      return `${targetUrl.pathname.replace(/^\//, '')}${targetUrl.search}${targetUrl.hash}`;
    } catch (_err) {
      return safeNext;
    }
  }

  function decorateReferralLinks() {
    const inviteBanner = document.getElementById('authInviteBanner');
    const safeReferral = referralUtils ? referralUtils.getStoredReferral() : activeReferral;
    if (inviteBanner) {
      if (safeReferral) {
        inviteBanner.hidden = false;
        inviteBanner.innerHTML = `<i class="fas fa-user-group"></i><span>You came through @${safeReferral}'s invite. Log in or create an account to keep exploring.</span>`;
      } else {
        inviteBanner.hidden = true;
      }
    }

    const signupLink = document.getElementById('altSignupLink');
    if (signupLink && referralUtils) {
      signupLink.href = referralUtils.appendReferralToHref('sign-up.html', {
        referral: safeReferral,
        next: getPostAuthRedirect()
      });
    }

    document.querySelectorAll('.auth-entry-home').forEach((link) => {
      if (!referralUtils) return;
      link.href = referralUtils.appendReferralToHref('index.html', {
        referral: safeReferral,
        next: 'index.html'
      });
    });
  }

  decorateReferralLinks();

  async function waitForStableSession(timeoutMs = 2400) {
    const startedAt = Date.now();
    while ((Date.now() - startedAt) < timeoutMs) {
      const user = await getVerifiedUser();
      if (user?.id) return user;
      await new Promise((resolve) => setTimeout(resolve, 100));
    }
    return null;
  }

  async function ensureProfileBootstrap(userOverride = null, clientOverride = null) {
    const user = userOverride?.id ? userOverride : await getVerifiedUser();
    authDebug('ensureProfileBootstrap:start', {
      userId: String(user?.id || '').trim() || null
    });
    if (!user?.id || typeof window.__ZO2Y_ENSURE_AUTH_PROFILE !== 'function') {
      return false;
    }
    try {
      const result = await window.__ZO2Y_ENSURE_AUTH_PROFILE(clientOverride || supabase, user);
      authDebug('ensureProfileBootstrap:result', {
        ok: !!(result && result.ok !== false),
        created: !!result?.created
      });
      return !!(result && result.ok !== false);
    } catch (_err) {
      authDebug('ensureProfileBootstrap:error', {
        message: String(_err?.message || _err || '')
      });
      return false;
    }
  }

  function getPreferredOAuthClient() {
    const sharedClient = window.__ZO2Y_SUPABASE_CLIENT;
    if (sharedClient?.auth && typeof sharedClient.auth.getSession === 'function') {
      authDebug('getPreferredOAuthClient', { client: 'shared' });
      return sharedClient;
    }
    authDebug('getPreferredOAuthClient', { client: 'page-local' });
    return supabase;
  }

  async function resolveStableOAuthSession(client, fallbackSession = null) {
    const fallback = fallbackSession?.access_token && fallbackSession?.refresh_token
      ? fallbackSession
      : null;
    authDebug('resolveStableOAuthSession:start', {
      fallback: previewSession(fallback)
    });
    if (!client?.auth || typeof client.auth.getSession !== 'function') {
      return fallback;
    }
    try {
      const { data } = await withTimeout(
        client.auth.getSession(),
        6000,
        'Google login timed out'
      );
      const liveSession = data?.session || null;
      if (liveSession?.access_token && liveSession?.refresh_token) {
        authDebug('resolveStableOAuthSession:live-session', previewSession(liveSession));
        return liveSession;
      }
    } catch (_err) {
      authDebug('resolveStableOAuthSession:error', {
        message: String(_err?.message || _err || '')
      });
    }
    authDebug('resolveStableOAuthSession:fallback', previewSession(fallback));
    return fallback;
  }

  function persistGoogleOAuthSession(session) {
    let wroteAny = false;
    if (typeof window.__ZO2Y_PERSIST_SESSION_SNAPSHOT === 'function') {
      try {
        wroteAny = window.__ZO2Y_PERSIST_SESSION_SNAPSHOT(session) || wroteAny;
      } catch (_err) {}
    }
    wroteAny = persistSessionSnapshot(session) || wroteAny;
    authDebug('persistGoogleOAuthSession', {
      wroteAny,
      session: previewSession(session),
      storage: getAuthStoragePresence()
    });
    return wroteAny;
  }

  async function finalizeAuthRedirect(sessionOverride = null, clientOverride = null) {
    authDebug('finalizeAuthRedirect:start', {
      session: previewSession(sessionOverride),
      next: getPostAuthRedirect(),
      storage: getAuthStoragePresence()
    });
    if (sessionOverride) persistSessionSnapshot(sessionOverride);
    let stableUser = sessionOverride?.user || null;
    if (!stableUser?.id) {
      stableUser = await waitForStableSession(2400);
    }
    if (stableUser?.id) {
      await ensureProfileBootstrap(stableUser, clientOverride || supabase);
    }
    const nextPath = getPostAuthRedirect();
    safeRemoveAuthStorage('oauthFlow');
    safeRemoveAuthStorage('postAuthRedirect');
    authDebug('finalizeAuthRedirect:replace', {
      stableUserId: String(stableUser?.id || '').trim() || null,
      target: buildPostAuthRedirectTarget(nextPath)
    });
    window.location.replace(buildPostAuthRedirectTarget(nextPath));
  }

  async function completeGoogleLoginFromReturn() {
    const params = new URLSearchParams(window.location.search);
    const hashParams = getHashParams();
    authDebug('completeGoogleLoginFromReturn:start', {
      search: window.location.search,
      hashKeys: Array.from(hashParams.keys()),
      storage: getAuthStoragePresence()
    });
    const oauthError = params.get('error_description') || params.get('error') || hashParams.get('error_description') || hashParams.get('error');
    if (oauthError) {
      authDebug('completeGoogleLoginFromReturn:oauth-error', { oauthError });
      throw new Error(String(oauthError).trim() || 'Google login failed.');
    }

    const code = params.get('code');
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const authClient = getPreferredOAuthClient();
    let session = null;

    if (code) {
      authDebug('completeGoogleLoginFromReturn:exchange-code', {
        hasCode: true,
        flow: params.get('flow') || safeGetAuthStorage('oauthFlow') || null
      });
      const { data, error } = await withTimeout(
        authClient.auth.exchangeCodeForSession(code),
        12000,
        'Google login timed out'
      );
      if (error) throw error;
      session = data?.session || null;
    } else if (accessToken && refreshToken) {
      authDebug('completeGoogleLoginFromReturn:set-session-from-hash', {
        hasAccessToken: true,
        hasRefreshToken: true
      });
      const { data, error } = await withTimeout(
        authClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        }),
        12000,
        'Google login timed out'
      );
      if (error) throw error;
      session = data?.session || null;
    }
    authDebug('completeGoogleLoginFromReturn:session-after-exchange', previewSession(session));

    if (!session?.access_token || !session?.refresh_token) {
      throw new Error('Google login did not return a usable session.');
    }

    session = await resolveStableOAuthSession(authClient, session);
    authDebug('completeGoogleLoginFromReturn:stable-session', previewSession(session));
    if (!session?.access_token || !session?.refresh_token) {
      throw new Error('Google login did not persist a usable session.');
    }

    persistGoogleOAuthSession(session);
    await finalizeAuthRedirect(session, authClient);
  }

  function showError(msg) {
    console.error('Error:', msg);
    errorEl.textContent = msg;
    errorEl.classList.add('show');
    successEl.classList.remove('show');
  }

  function showSuccess(msg) {
    console.log('Success:', msg);
    successEl.textContent = msg;
    successEl.classList.add('show');
    errorEl.classList.remove('show');
  }

  function clearMessages() {
    errorEl.classList.remove('show');
    successEl.classList.remove('show');
  }

  function setSubmitLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading ? '<div class="loading"></div>' : submitDefaultHtml;
  }

  function setGoogleLoading(loading, text) {
    googleBtn.disabled = loading;
    googleBtn.innerHTML = loading ? `<div class="loading"></div> ${text}` : googleDefaultHtml;
  }

  async function withTimeout(promise, ms, timeoutMessage) {
    let timerId;
    const timeoutPromise = new Promise((_, reject) => {
      timerId = setTimeout(() => reject(new Error(timeoutMessage)), ms);
    });
    try {
      return await Promise.race([promise, timeoutPromise]);
    } finally {
      clearTimeout(timerId);
    }
  }

  function getReadableAuthError(err, fallback) {
    const msg = String(err?.message || '').toLowerCase();
    if (!msg) return fallback;
    if (msg.includes('failed to fetch') || msg.includes('network')) {
      return 'Auth service is temporarily unreachable. Please try again in a minute.';
    }
    if (msg.includes('timed out')) {
      return 'Auth request timed out. Please try again.';
    }
    return err.message || fallback;
  }

  function clearStoredAuthSnapshots() {
    safeRemoveAuthStorage(STORAGE_KEY);
    safeRemoveAuthStorage(LEGACY_STORAGE_KEY);
    safeRemoveAuthStorage(PERSIST_STORAGE_KEY);
    try {
      localStorage.removeItem(DURABLE_STORAGE_KEY);
    } catch (_err) {}
  }

  async function clearActiveAuthSessionForSwitch() {
    clearStoredAuthSnapshots();
    try {
      await supabase.auth.signOut({ scope: 'local' });
    } catch (_err) {}
    try {
      const authClient = getPreferredOAuthClient();
      if (authClient && authClient.auth && typeof authClient.auth.signOut === 'function') {
        await authClient.auth.signOut({ scope: 'local' });
      }
    } catch (_err) {}
  }

  function shouldClearStoredAuthSnapshotsForError(error) {
    const message = String(error?.message || '').trim().toLowerCase();
    const code = String(error?.code || '').trim().toLowerCase();
    if (!message && !code) return false;
    if (message.includes('refresh token already used') || message.includes('already been used')) return false;
    return (
      message.includes('invalid refresh token') ||
      message.includes('refresh token not found') ||
      message.includes('invalid grant') ||
      message.includes('session missing') ||
      message.includes('session not found') ||
      message.includes('user from sub claim in jwt does not exist') ||
      code === 'refresh_token_not_found' ||
      code === 'session_not_found'
    );
  }

  async function getVerifiedUser() {
    if (verifiedUserPromise) return verifiedUserPromise;
    verifiedUserPromise = (async () => {
      const authClient = getPreferredOAuthClient();
      let { data: { session } } = await authClient.auth.getSession();
      authDebug('getVerifiedUser:getSession', previewSession(session));
      if (!session) {
        session = await restoreSessionFromStorage(authClient);
        authDebug('getVerifiedUser:restored-session', previewSession(session));
        if (!session) return null;
      }
      const { data: userData, error: userError } = await authClient.auth.getUser();
      authDebug('getVerifiedUser:getUser', {
        userId: String(userData?.user?.id || '').trim() || null,
        error: String(userError?.message || '').trim() || null
      });
      if (!userError && userData?.user) {
        return userData.user;
      }
      if (userError && shouldClearStoredAuthSnapshotsForError(userError)) {
        clearStoredAuthSnapshots();
        return null;
      }
      const { data: refreshed, error: refreshError } = await authClient.auth.refreshSession();
      if (!refreshError && refreshed?.session?.user) {
        persistSessionSnapshot(refreshed.session);
        return refreshed.session.user;
      }
      if (refreshError && shouldClearStoredAuthSnapshotsForError(refreshError)) {
        clearStoredAuthSnapshots();
      }
      return null;
    })();
    try {
      return await verifiedUserPromise;
    } finally {
      verifiedUserPromise = null;
    }
  }

  // Check if already logged in
  (async () => {
    try {
      const nativeOauthReturn = new URLSearchParams(window.location.search).get('native_oauth') === '1';
      const hashParams = getHashParams();
      if (
        nativeOauthReturn &&
        (
          new URLSearchParams(window.location.search).has('code') ||
          new URLSearchParams(window.location.search).has('error') ||
          new URLSearchParams(window.location.search).has('error_description') ||
          hashParams.has('access_token') ||
          hashParams.has('error') ||
          hashParams.has('error_description')
        )
      ) {
        setGoogleLoading(true, 'Signing in...');
        await completeGoogleLoginFromReturn();
        return;
      }
      await clearActiveAuthSessionForSwitch();
    } catch (error) {
      console.error('Session check error:', error);
    }
  })();

  const rememberedEmail = localStorage.getItem('rememberedEmail');
  if (rememberedEmail) {
    emailInput.value = rememberedEmail;
    remember.checked = true;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMessages();

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) {
      showError('Email and password are required.');
      analyticsTrack('login_validation_error', { reason: 'missing_credentials', path: window.location.pathname });
      return;
    }

    setSubmitLoading(true);
    try {
      console.log('Attempting login...');
      const { data, error } = await withTimeout(
        supabase.auth.signInWithPassword({ email, password }),
        12000,
        'Auth request timed out'
      );
      
      if (error) throw error;
      
      console.log('Login successful');
      analyticsTrack('login_success', { method: 'password', path: window.location.pathname }, true);
      analyticsMarkFirstAction('first_login_success', { method: 'password' });
      if (remember.checked) localStorage.setItem('rememberedEmail', email);
      else localStorage.removeItem('rememberedEmail');
      
      persistSessionSnapshot(data?.session || null);
      showSuccess('Login successful! Redirecting...');
      await finalizeAuthRedirect(data?.session || null);
      
    } catch (err) {
      console.error('Login error:', err);
      analyticsTrack('login_error', { method: 'password', message: String(err?.message || 'unknown').slice(0, 180) }, true);
      showError(getReadableAuthError(err, 'Login failed.'));
      setSubmitLoading(false);
    }
  });

  googleBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    clearMessages();
    setGoogleLoading(true, 'Signing in...');
    
    try {
      console.log('Starting Google OAuth...');
      analyticsTrack('login_google_start', { path: window.location.pathname }, true);
      
      // Store that this is a login flow
      const nextPath = getPostAuthRedirect();
      const callbackUrl = new URL('/login.html', window.location.origin);
      callbackUrl.searchParams.set('native_oauth', '1');
      callbackUrl.searchParams.set('flow', 'login');
      callbackUrl.searchParams.set('next', nextPath);
      authDebug('google-button:redirect-start', {
          redirectTo: callbackUrl.toString(),
          storage: getAuthStoragePresence()
        });
      safeSetAuthStorage('oauthFlow', 'login');
      safeSetAuthStorage('postAuthRedirect', nextPath);
      
      await clearActiveAuthSessionForSwitch();
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: callbackUrl.toString(),
          queryParams: {
            prompt: 'select_account'
          }
        }
      });
      
      if (error) {
        console.error('Google OAuth error:', error);
        throw error;
      }
      
      // Browser will redirect, so button stays disabled
      
    } catch (err) {
      console.error('Google login error:', err);
      analyticsTrack('login_google_error', { message: String(err?.message || 'unknown').slice(0, 180) }, true);
      showError(err?.message || 'Google login failed.');
      setGoogleLoading(false);
    }
  });

  window.__ZO2Y_LOGIN_AUTH_DEBUG = function () {
    const snapshot = readStoredSessionSnapshot();
    return {
      page: 'login',
      debugEnabled: authDebugEnabled(),
      location: {
        search: window.location.search,
        hash: window.location.hash
      },
      storage: getAuthStoragePresence(),
      oauthFlow: safeGetAuthStorage('oauthFlow'),
      postAuthRedirect: safeGetAuthStorage('postAuthRedirect'),
      sessionPreview: previewSession(snapshot)
    };
  };

  forgotPassword.addEventListener('click', async (e) => {
    e.preventDefault();
    clearMessages();
    const email = emailInput.value.trim();
    if (!email) {
      showError('Enter your email first.');
      return;
    }
    try {
      const { error } = await withTimeout(
        supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/update-password.html'
        }),
        12000,
        'Password reset request timed out'
      );
      if (error) throw error;
      analyticsTrack('password_reset_requested', { path: window.location.pathname }, true);
      showSuccess('Reset email sent. Check your inbox.');
    } catch (err) {
      analyticsTrack('password_reset_error', { message: String(err?.message || 'unknown').slice(0, 180) }, true);
      showError(getReadableAuthError(err, 'Failed to send reset email.'));
    }
  });
})();
</script>
