<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/js/auth-gate.js?v=20260418c"></script>
  <meta name="robots" content="index,follow,max-image-preview:none,noimageindex" />
  <title>Car Brands ? Zo2y</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/pages/brands.css?v=20260417f" />
  <link rel="stylesheet" href="css/shared-header.css?v=20260319b" />
  <link rel="stylesheet" href="css/global-lowercase.css?v=20260308a" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="192x192" href="/images/icon-192.png" />
  <meta name="theme-color" content="#0b1633" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Zo2y" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/images/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/js/mobile-app.css?v=20260308a" />
  <script src="/js/mobile-webapp.js?v=20260322r" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="js/list-utils.js?v=20260317b" defer></script>
  <script src="js/index-list-menu-adapter.js?v=20260317b" defer></script>
  <script src="js/shared-header.js?v=20260415b" defer></script>
  <script src="js/pages/brands.js?v=20260322e" defer></script>
</head>
<body data-brand-type="car" data-nav-page="cars">
  <main class="container">
    <div class="page-header">
      <h1 id="pageTitle">Cars</h1>
      <p id="pageSubtitle"></p>
    </div>

    <section class="brand-spotlight" id="brandSpotlight" hidden>
      <div class="brand-spotlight-bg" id="brandSpotlightBg"></div>
      <div class="brand-spotlight-copy">
        <span class="brand-spotlight-kicker" id="brandSpotlightKicker">Spotlight</span>
        <h2 id="brandSpotlightTitle">Loading spotlight...</h2>
        <p class="brand-spotlight-meta" id="brandSpotlightMeta"></p>
        <p class="brand-spotlight-summary" id="brandSpotlightSummary"></p>
        <div class="brand-spotlight-actions">
          <a class="brand-spotlight-btn" id="brandSpotlightOpen" href="#">Open brand</a>
        </div>
      </div>
      <div class="brand-spotlight-logo">
        <img id="brandSpotlightLogo" src="/newlogo.webp" alt="Brand spotlight logo" loading="eager" decoding="async" referrerpolicy="no-referrer">
      </div>
    </section>

    <div class="controls">
      <input id="brandSearch" class="search-input" type="search" placeholder="Search car brands, categories, countries..." />
      <button class="control-icon-btn" id="brandSearchBtn" type="button" aria-label="Search car brands">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="control-icon-btn" id="brandFilterBtn" type="button" aria-label="Open car filters">
        <i class="fa-solid fa-sliders-h"></i>
      </button>
    </div>
    <div class="controls-meta">
      <span id="brandCount">0 brands shown</span>
    </div>
    <div class="control-modal" id="brandFilterModal" aria-hidden="true">
      <div class="control-modal-card">
        <div class="control-modal-head">
          <div class="control-modal-title">Filter car brands</div>
          <button class="control-modal-close" id="brandFilterCloseBtn" type="button" aria-label="Close car filters">&times;</button>
        </div>
        <select id="brandCategory">
          <option value="all">All Car Brands</option>
        </select>
      </div>
    </div>

    <div class="brand-grid" id="brandGrid"></div>
  </main>

  <div id="itemMenuModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content">
      <div class="menu-modal-header">
        <h3 id="menuModalTitle">Add to List</h3>
        <button class="menu-modal-close" id="closeMenuModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body" id="menuModalBody">
        <div class="menu-quick-lists" id="menuQuickLists"></div>
        <div class="menu-custom-section">
          <div class="menu-custom-header">
            <span>Your Custom Lists</span>
            <button class="menu-create-list-btn" id="menuCreateListBtn">
              <i class="fas fa-plus"></i> New
            </button>
          </div>
          <div class="menu-custom-lists" id="menuCustomLists"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="createListModal" class="menu-modal authenticated-only" aria-hidden="true">
    <div class="menu-modal-content" style="max-width: 320px;">
      <div class="menu-modal-header">
        <h3>Create New List</h3>
        <button class="menu-modal-close" id="closeCreateModalBtn" aria-label="Close">&times;</button>
      </div>
      <div class="menu-modal-body">
        <input type="text" id="newListNameInput" class="menu-input" placeholder="List name..." maxlength="50">
        <div class="menu-icon-grid">
          <button class="menu-icon-option selected" data-icon="fas fa-list"><i class="fas fa-list"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-heart"><i class="fas fa-heart"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-star"><i class="fas fa-star"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-bookmark"><i class="fas fa-bookmark"></i></button>
          <button class="menu-icon-option" data-icon="fas fa-shirt"><i class="fas fa-shirt"></i></button>
        </div>
        <div class="menu-modal-actions">
          <button class="menu-btn menu-btn-secondary" id="cancelCreateBtn">Cancel</button>
          <button class="menu-btn menu-btn-primary" id="saveNewListBtn">Create List</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
